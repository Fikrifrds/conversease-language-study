<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Isometric English conversation learning workspace</title>
  <desc id="desc">An abstract isometric desk, laptop, books, audio waveform, and speech bubbles with no living beings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.48" stop-color="#fed7aa"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
