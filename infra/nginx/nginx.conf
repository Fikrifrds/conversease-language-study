events {}

http {
  upstream conversease_web {
    server web:3000;
  }

  upstream conversease_api {
    server api:8000;
  }

  server {
    listen 80;
    server_name conversease.com www.conversease.com;

    location /api/ {
      proxy_pass http://conversease_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://conversease_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

