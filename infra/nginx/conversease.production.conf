# Replace app.example.com and api.example.com with real domains.
# Recommended topology:
# - app.example.com -> Next.js web on 127.0.0.1:3000
# - api.example.com -> FastAPI API on 127.0.0.1:8000

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

upstream conversease_web {
  server 127.0.0.1:3000;
  keepalive 16;
}

upstream conversease_api {
  server 127.0.0.1:8000;
  keepalive 16;
}

server {
  listen 80;
  server_name app.example.com api.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name app.example.com;

  # Certbot can manage these paths after:
  # sudo certbot --nginx -d app.example.com -d api.example.com
  ssl_certificate /etc/letsencrypt/live/app.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

  access_log /var/log/nginx/conversease-web.access.log;
  error_log /var/log/nginx/conversease-web.error.log;

  location / {
    proxy_pass http://conversease_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
  }
}

server {
  listen 443 ssl http2;
  server_name api.example.com;

  ssl_certificate /etc/letsencrypt/live/app.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

  access_log /var/log/nginx/conversease-api.access.log;
  error_log /var/log/nginx/conversease-api.error.log;
  client_max_body_size 10m;

  location / {
    proxy_pass http://conversease_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
  }
}
