phrases:
  - phrase: My name is ...
    meaning_id: Nama saya ...
    usage_note: Clear, neutral way to say your name.
    common_mistake: Do not say "my name ..."
  - phrase: I'm ...
    meaning_id: Saya ...
    usage_note: Natural shorter form for introductions.
    common_mistake: Use "I'm", not only "I".
  - phrase: Nice to meet you too.
    meaning_id: Senang bertemu denganmu juga.
    usage_note: Use after someone says nice to meet you.
    common_mistake: Do not say "nice meet you too".
  - phrase: Please call me ...
    meaning_id: Panggil saya ...
    usage_note: Use when your nickname is easier.
    common_mistake: Do not say "call to me".
