prompts:
  - key: say_full_name
    instruction_id: Sebutkan namamu dengan jelas.
    prompt_en: My name is ...
    expected_response_examples:
      - My name is Arif.
      - My name is Ahmad.
  - key: reply_nice_to_meet_you
    instruction_id: Balas kalimat "Nice to meet you."
    prompt_en: Nice to meet you.
    expected_response_examples:
      - Nice to meet you too.
      - Nice to meet you too, Omar.
  - key: say_nickname
    instruction_id: Sebutkan nama panggilanmu.
    prompt_en: Please call me ...
    expected_response_examples:
      - Please call me Arif.
      - Please call me Rina.
