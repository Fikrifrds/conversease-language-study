vocabulary:
- word: good morning
  meaning_id: selamat pagi
  usage_note: 'Sapaan yang dipakai sebelum siang. Contoh: "Hi, good morning. What is your name?"'
- word: nice
  meaning_id: ramah/menyenangkan
  usage_note: 'Dipakai untuk menyatakan kesan positif. Contoh: "Nice to meet you, Mina. Where are you
    from?"'
- word: meet
  meaning_id: bertemu
  usage_note: 'Kata kerja untuk bertemu seseorang. Contoh: "Nice to meet you, Mina. Where are you from?"'
- word: name
  meaning_id: nama
  usage_note: 'Dipakai saat memperkenalkan diri. Contoh: "My name is Mina."'
- word: repeat
  meaning_id: mengulang
  usage_note: 'Dipakai saat meminta lawan bicara mengatakan lagi. Contoh: "Sorry, can you repeat that,
    please?"'
- word: from
  meaning_id: dari
  usage_note: 'Dipakai untuk asal kota atau negara. Contoh: "I''m from Indonesia. How about you?"'
