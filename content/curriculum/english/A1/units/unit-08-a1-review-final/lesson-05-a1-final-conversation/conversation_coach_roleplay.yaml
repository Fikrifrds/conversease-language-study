scenario_key: completing_a_full_a1_final_conversation
mode: lesson_practice_coach
level_code: A1
opening_line: Hi, good morning. What is your name?
learner_goal: >-
  Complete a longer A1 conversation with introduction, routine, place, order, repetition, and polite
  closing.
max_turns: 12
feedback_level:
  free: basic
  pro: detailed
turns:
  - coach: Hi, good morning. What is your name?
    hint: Perkenalkan diri dengan kalimat lengkap.
    sample_answer: Good morning. My name is Mina.
    focus: Final opening
    expected_keywords:
      - morning
      - name
      - mina
  - coach: Nice to meet you. Where are you from?
    hint: Jawab asal dan tanyakan balik.
    sample_answer: I'm from Indonesia. How about you?
    focus: Origin and follow-up
    expected_keywords:
      - i'm
      - from
      - indonesia
      - how
      - "?"
  - coach: I'm from Malaysia. What do you do every morning?
    hint: Sebutkan rutinitas dan waktu.
    sample_answer: I study English at seven.
    focus: Routine
    expected_keywords:
      - study
      - english
      - seven
  - coach: Great. The cafe is open now.
    hint: Tanyakan lokasi cafe.
    sample_answer: Where is the cafe?
    focus: Place
    expected_keywords:
      - where
      - cafe
      - "?"
  - coach: Go straight and turn left.
    hint: Pesan satu item dengan sopan.
    sample_answer: Thank you. I would like one tea, please.
    focus: Order
    expected_keywords:
      - one
      - tea
  - coach: Sure. It is two dollars.
    hint: Minta ulang harga jika perlu.
    sample_answer: Sorry, can you repeat that, please?
    focus: Clarification
    expected_keywords:
      - sorry
      - repeat
      - "?"
  - coach: Two dollars.
    hint: Bayar dan tutup dengan terima kasih.
    sample_answer: Here you go. Thank you for your help.
    focus: Final closing
    expected_keywords:
      - help
target_phrases:
  - My name is ...
  - I'm from Indonesia. How about you?
  - I study English at seven.
  - Where is the cafe?
  - I would like one tea, please.
  - Sorry, can you repeat that, please?
  - Thank you for your help.
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
