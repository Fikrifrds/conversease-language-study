prompts:
- prompt: Say when you wake up.
  target_response: I wake up at six.
  acceptable_variations:
  - I wake up at six.
- prompt: Say your English routine.
  target_response: I study English at seven.
  acceptable_variations:
  - I study English at seven.
- prompt: Ask when the class is.
  target_response: When is our speaking class?
  acceptable_variations:
  - When is our speaking class?
- prompt: Say the class day and time.
  target_response: It is on Tuesday at eight.
  acceptable_variations:
  - It is on Tuesday at eight.
- prompt: Close after hearing the schedule.
  target_response: See you then.
  acceptable_variations:
  - See you then.
