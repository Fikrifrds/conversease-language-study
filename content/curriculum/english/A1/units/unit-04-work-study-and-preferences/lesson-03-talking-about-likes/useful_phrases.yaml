phrases:
  - phrase: "Do you like English?"
    meaning_id: "Apakah kamu suka bahasa Inggris?"
    usage_note: "Ask about a preference."
    common_mistake: "Use \"Do you like\", not \"Are you like\"."
  - phrase: "Yes, I like it."
    meaning_id: "Ya, saya suka."
    usage_note: "Give a simple positive answer."
    common_mistake: "Use \"it\" when the topic is already clear."
  - phrase: "What do you like?"
    meaning_id: "Apa yang kamu suka?"
    usage_note: "Ask for a specific preference."
    common_mistake: "Use \"what\", not \"where\", for things."
  - phrase: "I like speaking practice."
    meaning_id: "Saya suka latihan speaking."
    usage_note: "Say a learning preference."
    common_mistake: "Use like + noun or activity phrase."
  - phrase: "Speaking is my favorite."
    meaning_id: "Speaking adalah favorit saya."
    usage_note: "Say your favorite part."
    common_mistake: "Use \"my favorite\", not \"my like\"."
