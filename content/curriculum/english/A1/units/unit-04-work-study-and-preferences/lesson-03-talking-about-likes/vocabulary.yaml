vocabulary:
- word: like
  meaning_id: suka
  usage_note: 'Dipakai untuk menyatakan hal yang disukai. Contoh: "Do you like English?"'
- word: speaking
  meaning_id: 'bagian dari frasa: Speaking adalah favorit saya.'
  usage_note: 'Muncul dalam frasa lesson: "Speaking is my favorite."'
- word: favorite
  meaning_id: favorit/paling disukai
  usage_note: 'Dipakai untuk menyebut pilihan yang paling disukai. Contoh: "Speaking is my favorite."'
