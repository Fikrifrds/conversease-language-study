phrases:
  - phrase: "Can you speak English?"
    meaning_id: "Apakah kamu bisa berbicara bahasa Inggris?"
    usage_note: "Ask about speaking ability."
    common_mistake: "Use \"Can you\", not \"Do you can\"."
  - phrase: "I can speak a little."
    meaning_id: "Saya bisa berbicara sedikit."
    usage_note: "Say a small ability."
    common_mistake: "Use \"a little\" to sound honest and clear."
  - phrase: "Can you write simple emails?"
    meaning_id: "Apakah kamu bisa menulis email sederhana?"
    usage_note: "Ask about writing ability."
    common_mistake: "Use base verb after can: write, not writes."
  - phrase: "Yes, I can."
    meaning_id: "Ya, saya bisa."
    usage_note: "Give a short positive answer."
    common_mistake: "Do not say \"Yes, I do\" for can questions."
  - phrase: "Not yet, but I can try."
    meaning_id: "Belum, tapi saya bisa mencoba."
    usage_note: "Say you cannot do it now but are willing."
    common_mistake: "Use \"not yet\" for something you are still learning."
