phrases:
  - phrase: "Do you work or study?"
    meaning_id: "Apakah kamu bekerja atau belajar?"
    usage_note: "Ask about someone's main activity."
    common_mistake: "Use \"or\" to offer two simple choices."
  - phrase: "I work in a small office."
    meaning_id: "Saya bekerja di kantor kecil."
    usage_note: "Say where you work."
    common_mistake: "Use \"in\" for a workplace like office."
  - phrase: "What do you do there?"
    meaning_id: "Apa yang kamu lakukan di sana?"
    usage_note: "Ask about the role or activity."
    common_mistake: "Use \"there\" after someone says the place."
  - phrase: "I'm an assistant."
    meaning_id: "Saya seorang asisten."
    usage_note: "Say a simple job."
    common_mistake: "Use \"an\" before assistant."
  - phrase: "How about you?"
    meaning_id: "Kalau kamu?"
    usage_note: "Ask the same topic back."
    common_mistake: "This keeps the conversation moving."
