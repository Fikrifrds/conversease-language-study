phrases:
  - phrase: "Do you work or study?"
    meaning_id: "Apakah kamu bekerja atau belajar?"
    usage_note: "Ask about someone's main activity."
    common_mistake: "Use a clear either/or question."
  - phrase: "I study English online and I work in a shop."
    meaning_id: "Saya belajar bahasa Inggris online dan bekerja di toko."
    usage_note: "Combine study and work in one simple sentence."
    common_mistake: "Use \"and\" to connect two simple ideas."
  - phrase: "What do you like about English?"
    meaning_id: "Apa yang kamu suka dari bahasa Inggris?"
    usage_note: "Ask a preference question."
    common_mistake: "Use \"about\" before the topic."
  - phrase: "What can you do in English?"
    meaning_id: "Apa yang bisa kamu lakukan dalam bahasa Inggris?"
    usage_note: "Ask about ability."
    common_mistake: "Use \"can you do\", not \"you can do\"."
  - phrase: "I can introduce myself."
    meaning_id: "Saya bisa memperkenalkan diri."
    usage_note: "Say one English ability."
    common_mistake: "Use base verb after can."
