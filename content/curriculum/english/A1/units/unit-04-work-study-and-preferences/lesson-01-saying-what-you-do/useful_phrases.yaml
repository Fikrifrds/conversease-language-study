phrases:
  - phrase: "What do you do?"
    meaning_id: "Apa pekerjaan atau kegiatanmu?"
    usage_note: "Ask about someone's work or study status."
    common_mistake: "Do not translate this as \"Apa yang kamu lakukan?\" in every context. Here it asks work or study."
  - phrase: "I'm a student."
    meaning_id: "Saya seorang pelajar."
    usage_note: "Say your simple status."
    common_mistake: "Use \"a\" before student."
  - phrase: "What do you study?"
    meaning_id: "Apa yang kamu pelajari?"
    usage_note: "Ask about a study subject."
    common_mistake: "Use \"study\", not \"learn\" in this question."
  - phrase: "I study design."
    meaning_id: "Saya belajar desain."
    usage_note: "Say what you study."
    common_mistake: "Do not say \"I study in design\" here."
  - phrase: "I study online."
    meaning_id: "Saya belajar online."
    usage_note: "Say how you study."
    common_mistake: "Use online after the verb phrase."
