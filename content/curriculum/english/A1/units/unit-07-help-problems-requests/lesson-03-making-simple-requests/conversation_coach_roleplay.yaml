scenario_key: making_a_simple_polite_request
mode: lesson_practice_coach
level_code: A1
opening_line: What do you need?
learner_goal: Make one polite request, accept one simple request, and close with thanks.
max_turns: 7
feedback_level:
  free: basic
  pro: detailed
turns:
  - coach: What do you need?
    hint: Minta link dengan sopan.
    sample_answer: Can you send me the link, please?
    focus: Polite request
    expected_keywords:
      - send
      - link
      - "?"
  - coach: Yes, of course.
    hint: Ucapkan terima kasih.
    sample_answer: Thank you.
    focus: Thanking
    expected_keywords: []
  - coach: Can you wait a minute?
    hint: Terima request untuk menunggu.
    sample_answer: Sure. No problem.
    focus: Accepting request
    expected_keywords:
      - sure
      - problem
  - coach: Here is the link.
    hint: Tutup dengan thanks.
    sample_answer: Great. Thanks.
    focus: Closing
    expected_keywords:
      - great
target_phrases:
  - Can you send me the link, please?
  - Thank you.
  - Sure. No problem.
  - Great. Thanks.
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
