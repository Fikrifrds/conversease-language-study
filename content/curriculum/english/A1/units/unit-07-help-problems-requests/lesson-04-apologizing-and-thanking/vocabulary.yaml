vocabulary:
- word: class
  meaning_id: kelas
  usage_note: 'Dipakai saat membicarakan pelajaran atau sesi belajar. Contoh: "No problem. Please join
    the class."'
- word: problem
  meaning_id: masalah
  usage_note: 'Hal yang perlu dijelaskan atau diselesaikan. Contoh: "No problem. Please join the class."'
- word: thank
  meaning_id: berterima kasih
  usage_note: 'Dipakai saat mengucapkan terima kasih. Contoh: "Thank you for waiting."'
- word: now
  meaning_id: sekarang
  usage_note: 'Dipakai untuk menyatakan waktu saat ini. Contoh: "I am ready now."'
