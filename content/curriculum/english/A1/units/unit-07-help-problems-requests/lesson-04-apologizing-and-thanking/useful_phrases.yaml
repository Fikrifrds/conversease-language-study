phrases:
- phrase: Sorry I'm late.
  meaning_id: Maaf saya terlambat.
  usage_note: Apologize when you arrive late.
  common_mistake: Do not give a long excuse at A1.
- phrase: That's okay.
  meaning_id: Tidak apa-apa.
  usage_note: Accept an apology.
  common_mistake: Use a calm tone.
- phrase: My internet was slow.
  meaning_id: Internet saya lambat.
  usage_note: Give one short reason.
  common_mistake: Keep the reason simple.
- phrase: Thank you for waiting.
  meaning_id: Terima kasih sudah menunggu.
  usage_note: Thank someone for waiting.
  common_mistake: Use for + noun/gerund.
- phrase: I am ready now.
  meaning_id: Sekarang saya siap.
  usage_note: Say you are ready to continue.
  common_mistake: Do not say 'I ready now.'
