scenario_key: asking_for_a_simple_price
mode: lesson_practice_coach
level_code: A1
opening_line: Hello. Can I help you?
learner_goal: Ask prices for simple items and confirm the amount.
max_turns: 7
feedback_level:
  free: basic
  pro: detailed
turns:
  - coach: Hello. Can I help you?
    hint: Tanyakan harga coffee.
    sample_answer: How much is the coffee?
    focus: Price question
    expected_keywords:
      - how
      - much
      - coffee
      - "?"
  - coach: It is twenty thousand rupiah.
    hint: Konfirmasi harga.
    sample_answer: Twenty thousand rupiah?
    focus: Price confirmation
    expected_keywords:
      - twenty
      - thousand
      - rupiah
      - "?"
  - coach: Yes, twenty thousand rupiah.
    hint: Tanyakan harga cake.
    sample_answer: How much is the cake?
    focus: Second price
    expected_keywords:
      - how
      - much
      - cake
      - "?"
  - coach: It is twenty-five thousand rupiah.
    hint: Tutup dengan thank you.
    sample_answer: Okay. Thank you.
    focus: Closing
    expected_keywords: []
target_phrases:
  - How much is the coffee?
  - Twenty thousand rupiah?
  - How much is the cake?
  - Thank you.
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
