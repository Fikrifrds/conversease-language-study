phrases:
- phrase: How much is the coffee?
  meaning_id: Berapa harga kopinya?
  usage_note: Ask the price of one item.
  common_mistake: Do not say 'How many is the coffee?'
- phrase: It is twenty thousand rupiah.
  meaning_id: Harganya dua puluh ribu rupiah.
  usage_note: Answer a simple price.
  common_mistake: Use 'is' for one item price.
- phrase: Twenty thousand rupiah?
  meaning_id: Dua puluh ribu rupiah?
  usage_note: Repeat the price to confirm.
  common_mistake: Keep your voice rising a little.
- phrase: How much is the cake?
  meaning_id: Berapa harga kuenya?
  usage_note: Ask another item price.
  common_mistake: Do not use plural if asking one cake item.
