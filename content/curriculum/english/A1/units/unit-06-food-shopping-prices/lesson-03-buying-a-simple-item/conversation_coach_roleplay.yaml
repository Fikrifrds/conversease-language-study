scenario_key: buying_one_basic_item_in_a_shop
mode: lesson_practice_coach
level_code: A1
opening_line: Hello. What do you need?
learner_goal: Buy one item, ask the price, pay, and thank the staff.
max_turns: 7
feedback_level:
  free: basic
  pro: detailed
turns:
  - coach: Hello. What do you need?
    hint: Minta beli pen ini.
    sample_answer: Can I have this pen?
    focus: Buying item
    expected_keywords:
      - have
      - pen
      - "?"
  - coach: Yes, of course.
    hint: Tanyakan harganya.
    sample_answer: How much is it?
    focus: Price
    expected_keywords:
      - how
      - much
      - "?"
  - coach: It is one dollar.
    hint: Bayar dengan Here you go.
    sample_answer: Okay. Here you go.
    focus: Payment
    expected_keywords: []
  - coach: Thank you. Here is your pen.
    hint: Tutup singkat.
    sample_answer: Thanks.
    focus: Closing
    expected_keywords: []
target_phrases:
  - Can I have this pen?
  - How much is it?
  - Here you go.
  - Thanks.
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
