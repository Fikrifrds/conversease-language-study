phrases:
  - phrase: "What time do you wake up?"
    meaning_id: "Jam berapa kamu bangun?"
    usage_note: "Ask about a routine time."
    common_mistake: "Use \"What time do you\", not \"What time you\"."
  - phrase: "I wake up at six."
    meaning_id: "Saya bangun jam enam."
    usage_note: "Say a morning routine."
    common_mistake: "Use \"at\" before a time."
  - phrase: "When do you study English?"
    meaning_id: "Kapan kamu belajar bahasa Inggris?"
    usage_note: "Ask about a study schedule."
    common_mistake: "Use \"When do you\", not \"When you\"."
  - phrase: "I study on Monday and Wednesday at seven."
    meaning_id: "Saya belajar hari Senin dan Rabu jam tujuh."
    usage_note: "Give days and time together."
    common_mistake: "Use \"on\" for days and \"at\" for time."
  - phrase: "Is the class online?"
    meaning_id: "Apakah kelasnya online?"
    usage_note: "Ask about class format."
    common_mistake: "Use \"Is the class\", not \"The class is?\""
