phrases:
  - phrase: "When is the meeting?"
    meaning_id: "Kapan meetingnya?"
    usage_note: "Ask when an event happens."
    common_mistake: "Use \"When is\", not \"When the meeting\"."
  - phrase: "It's tomorrow at ten."
    meaning_id: "Besok jam sepuluh."
    usage_note: "Answer with day and time."
    common_mistake: "Use \"at\" before the time."
  - phrase: "Is it online?"
    meaning_id: "Apakah online?"
    usage_note: "Ask about the meeting format."
    common_mistake: "Use \"Is it\", not \"It is online?\" for a question."
  - phrase: "Is that right?"
    meaning_id: "Benar begitu?"
    usage_note: "Check that your understanding is correct."
    common_mistake: "Use this after repeating the detail."
  - phrase: "Yes, that's right."
    meaning_id: "Ya, betul."
    usage_note: "Confirm the detail."
    common_mistake: "Use \"that's\", not \"that\"."
