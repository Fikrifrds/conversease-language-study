phrases:
  - phrase: "When is the English class?"
    meaning_id: "Kapan kelas bahasa Inggrisnya?"
    usage_note: "Ask about the day or schedule."
    common_mistake: "Use \"When is\", not \"When the class\"."
  - phrase: "It's on Monday and Wednesday."
    meaning_id: "Kelasnya hari Senin dan Rabu."
    usage_note: "Answer with class days."
    common_mistake: "Use \"on\" before days."
  - phrase: "What time?"
    meaning_id: "Jam berapa?"
    usage_note: "Ask a short follow-up about time."
    common_mistake: "Use this after the topic is clear."
  - phrase: "At seven in the evening."
    meaning_id: "Jam tujuh malam."
    usage_note: "Answer with time of day."
    common_mistake: "Use \"in the evening\", not \"at evening\"."
  - phrase: "See you on Monday."
    meaning_id: "Sampai jumpa hari Senin."
    usage_note: "Close with the day you will meet."
    common_mistake: "Use \"on Monday\"."
