phrases:
  - phrase: "What time is the class?"
    meaning_id: "Jam berapa kelasnya?"
    usage_note: "Ask about the time of an event."
    common_mistake: "Use \"What time\", not \"When time\"."
  - phrase: "It's at nine o'clock."
    meaning_id: "Jam sembilan."
    usage_note: "Answer with a clear time."
    common_mistake: "Use \"at\" before the time."
  - phrase: "In the morning?"
    meaning_id: "Pagi?"
    usage_note: "Check the part of the day."
    common_mistake: "Use this as a short follow-up question."
  - phrase: "Yes, in the morning."
    meaning_id: "Ya, pagi."
    usage_note: "Confirm the time of day."
    common_mistake: "Do not say \"yes, at morning\"."
  - phrase: "You're welcome."
    meaning_id: "Sama-sama."
    usage_note: "Reply after someone says thank you."
    common_mistake: "Do not write \"your welcome\"."
