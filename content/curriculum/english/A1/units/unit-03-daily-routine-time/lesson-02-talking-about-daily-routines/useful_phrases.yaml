phrases:
  - phrase: "What do you do in the morning?"
    meaning_id: "Apa yang kamu lakukan di pagi hari?"
    usage_note: "Ask about a morning routine."
    common_mistake: "Use \"do you do\", not only \"you do\"."
  - phrase: "I wake up at six."
    meaning_id: "Saya bangun jam enam."
    usage_note: "Say when you wake up."
    common_mistake: "Use \"wake up\", not \"wake\"."
  - phrase: "What do you do after that?"
    meaning_id: "Apa yang kamu lakukan setelah itu?"
    usage_note: "Ask for the next routine step."
    common_mistake: "Use \"after that\" for the next step."
  - phrase: "I study English at seven."
    meaning_id: "Saya belajar bahasa Inggris jam tujuh."
    usage_note: "Say a study routine."
    common_mistake: "Use \"study English\", not \"study the English\"."
  - phrase: "I work at one."
    meaning_id: "Saya bekerja jam satu."
    usage_note: "Say a work routine."
    common_mistake: "Use \"at\" before the time."
