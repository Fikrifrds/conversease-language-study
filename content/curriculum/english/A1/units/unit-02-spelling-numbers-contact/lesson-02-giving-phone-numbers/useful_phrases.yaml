phrases:
  - phrase: "What is your phone number?"
    meaning_id: "Berapa nomor teleponmu?"
    usage_note: "Ask for a phone number in a clear, direct way."
    common_mistake: "Do not say \"What your phone number?\" without \"is\"."
  - phrase: "It's zero eight one two."
    meaning_id: "Nomornya nol delapan satu dua."
    usage_note: "Start giving a phone number."
    common_mistake: "For phone numbers, say \"zero\", not only \"oh\" in beginner practice."
  - phrase: "Let me check."
    meaning_id: "Saya cek ya."
    usage_note: "Introduce a quick confirmation before repeating information."
    common_mistake: "Do not say \"I check\" as a complete sentence here."
  - phrase: "Yes, that's correct."
    meaning_id: "Ya, itu benar."
    usage_note: "Confirm that the repeated information is right."
    common_mistake: "Avoid \"yes, correct\" as the full reply."
  - phrase: "Can you repeat that, please?"
    meaning_id: "Bisa diulang, tolong?"
    usage_note: "Ask politely when you miss a number."
    common_mistake: "Avoid just saying \"repeat\" in polite situations."
