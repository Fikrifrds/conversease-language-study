phrases:
  - phrase: "Sorry, can you repeat that, please?"
    meaning_id: "Maaf, bisa diulang, tolong?"
    usage_note: "Ask politely when you do not hear clearly."
    common_mistake: "Do not say only \"repeat\" in polite conversation."
  - phrase: "Sure."
    meaning_id: "Tentu."
    usage_note: "Agree to repeat information."
    common_mistake: "Do not use \"surely\" here; \"sure\" is natural."
  - phrase: "Did you say two two five five?"
    meaning_id: "Apakah kamu bilang dua dua lima lima?"
    usage_note: "Check a specific part of what you heard."
    common_mistake: "Use \"Did you say\", not \"Do you said\"."
  - phrase: "Yes, that's right."
    meaning_id: "Ya, betul."
    usage_note: "Confirm that the listener heard correctly."
    common_mistake: "Do not say \"yes, that right\"; use \"that's\"."
  - phrase: "Got it."
    meaning_id: "Sudah saya mengerti."
    usage_note: "Show that you understand now."
    common_mistake: "Use this in casual or friendly situations."
