phrases:
  - phrase: "I need your contact details."
    meaning_id: "Saya perlu detail kontakmu."
    usage_note: "Start a request for name, phone number, and email."
    common_mistake: "Do not say \"I need your contacts detail\"; use \"contact details\"."
  - phrase: "How do you spell your name?"
    meaning_id: "Bagaimana kamu mengeja namamu?"
    usage_note: "Ask someone to spell their name."
    common_mistake: "Use \"spell your name\", not \"spell you name\"."
  - phrase: "And your email address?"
    meaning_id: "Dan alamat emailmu?"
    usage_note: "Ask the next contact detail after another question."
    common_mistake: "This short form is natural after the topic is clear."
  - phrase: "Is everything correct?"
    meaning_id: "Apakah semuanya benar?"
    usage_note: "Check all contact information at the end."
    common_mistake: "Use \"everything\", not \"all is\"."
  - phrase: "Yes, everything is correct."
    meaning_id: "Ya, semuanya benar."
    usage_note: "Confirm all information is correct."
    common_mistake: "Do not say \"everything correct\" as a full sentence."
