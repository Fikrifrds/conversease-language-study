phrases:
  - phrase: "What is your email address?"
    meaning_id: "Apa alamat emailmu?"
    usage_note: "Ask for someone's email address."
    common_mistake: "Do not say \"What your email?\" in complete conversation."
  - phrase: "It's ben dot rama at example dot com."
    meaning_id: "Alamatnya ben titik rama at example titik com."
    usage_note: "Say an email address slowly."
    common_mistake: "Say \"at\" for @ and \"dot\" for a period."
  - phrase: "Can you spell that, please?"
    meaning_id: "Bisa dieja, tolong?"
    usage_note: "Ask someone to spell the email address."
    common_mistake: "Do not say \"spell again\" in a formal setting."
  - phrase: "Is that correct?"
    meaning_id: "Apakah itu benar?"
    usage_note: "Ask for confirmation after writing information."
    common_mistake: "Use \"that\", not \"this\", when confirming what you heard."
  - phrase: "Yes, that's correct."
    meaning_id: "Ya, itu benar."
    usage_note: "Confirm the email address is right."
    common_mistake: "Avoid \"yes, right\" as the whole response."
