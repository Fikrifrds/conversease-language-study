scenario_key: asking_for_a_place_location
mode: lesson_practice_coach
level_code: A1
opening_line: Excuse me. What do you need?
learner_goal: Ask where a place is, confirm the location, and close politely.
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
  - coach: Excuse me. What do you need?
    hint: Tanyakan lokasi classroom.
    sample_answer: Where is the classroom?
    focus: Place question
    expected_keywords:
      - where
      - classroom
      - "?"
  - coach: It is on the first floor.
    hint: Tanyakan apakah dekat office.
    sample_answer: Is it near the office?
    focus: Confirming location
    expected_keywords:
      - near
      - office
      - "?"
  - coach: Yes, it is next to the office.
    hint: Tutup dengan thank you.
    sample_answer: Thank you.
    focus: Polite closing
    expected_keywords: []
target_phrases:
  - Excuse me.
  - Where is the classroom?
  - Is it near the office?
  - Thank you.
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
