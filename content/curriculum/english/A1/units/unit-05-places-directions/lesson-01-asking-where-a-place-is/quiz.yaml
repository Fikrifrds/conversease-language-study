- type: multiple_choice
  prompt: What phrase starts the polite question?
  choices:
  - Excuse me.
  - Good night.
  - See you.
  answer: Excuse me.
- type: multiple_choice
  prompt: What does 'next to' mean?
  choices:
  - Di sebelah
  - Jauh dari
  - Di atas
  answer: Di sebelah
