vocabulary:
- word: today
  meaning_id: hari ini
  usage_note: 'Dipakai untuk membicarakan waktu sekarang. Contoh: "Next steps are: I''ll send a one-page
    summary today, and we''ll align tomorrow."'
- word: tomorrow
  meaning_id: besok
  usage_note: 'Dipakai untuk rencana hari berikutnya. Contoh: "Next steps are: I''ll send a one-page summary
    today, and we''ll align tomorrow."'
- word: decision
  meaning_id: keputusan
  usage_note: 'Pilihan akhir setelah mempertimbangkan opsi. Contoh: "The decision is to run a two-week
    pilot."'
- word: position
  meaning_id: posisi/pendapat
  usage_note: 'Sikap utama dalam diskusi. Contoh: "Give your nuanced position."'
- word: scope
  meaning_id: ruang lingkup
  usage_note: 'Batas topik atau pekerjaan. Contoh: "Next steps are: I''ll send a one-page summary today,
    and we''ll align on scope tomorrow."'
- word: summary
  meaning_id: ringkasan
  usage_note: 'Versi singkat dari informasi utama. Contoh: "Next steps are: I''ll send a one-page summary
    today, and we''ll align tomorrow."'
