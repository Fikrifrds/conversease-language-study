vocabulary:
- word: work
  meaning_id: bekerja/pekerjaan
  usage_note: 'Dipakai saat membicarakan pekerjaan. Contoh: "That could work."'
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "So you want to delay?"'
- word: think
  meaning_id: berpikir/berpendapat
  usage_note: 'Dipakai saat menyatakan pendapat. Contoh: "I think we should launch next week, no matter
    what."'
- word: delay
  meaning_id: keterlambatan
  usage_note: 'Saat sesuatu terjadi lebih lambat dari jadwal. Contoh: "So you want to delay?"'
- word: frame
  meaning_id: membingkai
  usage_note: Menjelaskan konteks agar pembahasan jelas.
- word: reliability
  meaning_id: keandalan
  usage_note: 'Tingkat bisa dipercaya atau stabilnya sesuatu. Contoh: "This way we protect reliability
    without losing momentum."'
