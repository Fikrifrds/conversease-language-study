vocabulary:
- word: help
  meaning_id: bantuan
  usage_note: 'Dipakai saat meminta bantuan. Contoh: "Are you confident it will help?"'
- word: think
  meaning_id: berpikir/berpendapat
  usage_note: 'Dipakai saat menyatakan pendapat. Contoh: "I still think we should launch next week no
    matter what."'
- word: review
  meaning_id: meninjau ulang
  usage_note: 'Memeriksa sesuatu dengan lebih teliti. Contoh: "I might frame it differently: limited launch
    first, then review the data."'
- word: risk
  meaning_id: risiko
  usage_note: 'Kemungkinan dampak negatif. Contoh: "On the one hand, speed matters. On the other hand,
    stability reduces risk. On balance, I''d prioritize stability with a limited rollout."'
- word: frame
  meaning_id: membingkai
  usage_note: 'Menjelaskan konteks agar pembahasan jelas. Contoh: "I might frame it differently: limited
    launch first, then review the data."'
- word: differently
  meaning_id: dengan cara berbeda
  usage_note: 'Dipakai saat menjelaskan ulang dengan kata lain. Contoh: "I might frame it differently:
    limited launch first, then review the data."'
