vocabulary:
- word: work
  meaning_id: bekerja/pekerjaan
  usage_note: 'Dipakai saat membicarakan pekerjaan. Contoh: "On the other hand, stability work reduces
    long-term risk."'
- word: small
  meaning_id: kecil
  usage_note: 'Ukuran yang tidak besar. Contoh: "I''d ring-fence a small budget for experiments."'
- word: take
  meaning_id: mengambil/memilih
  usage_note: 'Dipakai saat memilih barang yang akan dibeli. Contoh: "So what''s your take?"'
- word: risk
  meaning_id: risiko
  usage_note: 'Kemungkinan dampak negatif. Contoh: "On the other hand, stability work reduces long-term
    risk."'
