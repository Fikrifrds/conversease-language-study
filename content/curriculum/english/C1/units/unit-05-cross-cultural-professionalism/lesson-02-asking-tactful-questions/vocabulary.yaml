vocabulary:
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "If it''s okay, could you clarify whether you
    want feedback in writing or in a call?"'
- word: prefer
  meaning_id: lebih memilih
  usage_note: 'Dipakai untuk menyatakan pilihan yang disukai. Contoh: "Would you mind if I ask how you
    prefer to receive feedback?"'
- word: share
  meaning_id: membagikan/menyampaikan
  usage_note: 'Dipakai saat menyampaikan ide atau informasi. Contoh: "Just to make sure I understand,
    should we share concerns privately first?"'
- word: seem
  meaning_id: terlihat/terkesan
  usage_note: 'Dipakai untuk kesan yang belum pasti. Contoh: "The client seems uncomfortable with direct
    feedback."'
- word: seems
  meaning_id: terlihat/terkesan
  usage_note: 'Bentuk present untuk he/she/it. Contoh: "The client seems uncomfortable with direct feedback."'
- word: feedback
  meaning_id: masukan
  usage_note: 'Tanggapan untuk memperbaiki sesuatu. Contoh: "Would you mind if I ask how you prefer to
    receive feedback?"'
