vocabulary:
- word: from
  meaning_id: dari
  usage_note: Dipakai untuk asal kota atau negara.
- word: work
  meaning_id: bekerja/pekerjaan
  usage_note: 'Dipakai saat membicarakan pekerjaan. Contoh: "Sure. The article is about remote work and
    productivity. The main point is clear rules improve focus."'
- word: like
  meaning_id: suka
  usage_note: 'Dipakai untuk menyatakan hal yang disukai. Contoh: "I wasn''t aware of that. That changes
    things. I''d like to understand the methodology. Can you share the link so we can revise our conclusion?"'
- word: small
  meaning_id: kecil
  usage_note: 'Ukuran yang tidak besar. Contoh: "I found a report that contradicts it. The sample size
    was small."'
- word: now
  meaning_id: sekarang
  usage_note: 'Dipakai untuk menyatakan waktu saat ini. Contoh: "Sure. I''ll send the link now."'
- word: size
  meaning_id: ukuran
  usage_note: 'Ukuran pakaian atau barang. Contoh: "I found a report that contradicts it. The sample size
    was small."'
