vocabulary:
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "We''re almost out of time, and I want everyone
    to leave with the same understanding."'
- word: problem
  meaning_id: masalah
  usage_note: 'Hal yang perlu dijelaskan atau diselesaikan. Contoh: "No problem. I''ll post the summary
    in the channel right after this."'
- word: thank
  meaning_id: berterima kasih
  usage_note: 'Dipakai saat mengucapkan terima kasih. Contoh: "Thanks for summarizing."'
- word: tomorrow
  meaning_id: besok
  usage_note: 'Dipakai untuk rencana hari berikutnya. Contoh: "Action items are: I''ll update the tickets,
    and you''ll confirm the design handoff. Both by tomorrow afternoon, ideally."'
- word: leave
  meaning_id: berangkat/meninggalkan
  usage_note: 'Dipakai untuk jadwal keberangkatan. Contoh: "We''re almost out of time, and I want everyone
    to leave with the same understanding."'
- word: item
  meaning_id: barang
  usage_note: 'Benda yang ingin dibeli atau diminta. Contoh: "Action items are: I''ll update the tickets,
    and you''ll confirm the design handoff."'
