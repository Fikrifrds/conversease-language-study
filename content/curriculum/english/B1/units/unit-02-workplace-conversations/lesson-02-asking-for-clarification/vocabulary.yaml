vocabulary:
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "Just to confirm, you want the latest numbers
    too, right?"'
- word: thank
  meaning_id: berterima kasih
  usage_note: 'Dipakai saat mengucapkan terima kasih. Contoh: "Perfect. Thanks."'
- word: confirm
  meaning_id: mengonfirmasi
  usage_note: 'Memastikan detail sudah benar. Contoh: "Just to confirm, you want the latest numbers too,
    right?"'
- word: update
  meaning_id: kabar terbaru
  usage_note: 'Informasi terbaru tentang progres. Contoh: "Can you update the report for Friday?"'
- word: summary
  meaning_id: ringkasan
  usage_note: 'Versi singkat dari informasi utama. Contoh: "Do you mean the summary or the full report?"'
- word: risk
  meaning_id: risiko
  usage_note: 'Kemungkinan dampak negatif. Contoh: "Focus on the summary and the risks."'
