vocabulary:
- word: nice
  meaning_id: ramah/menyenangkan
  usage_note: 'Dipakai untuk menyatakan kesan positif. Contoh: "Nice. What happened?"'
- word: routine
  meaning_id: rutinitas
  usage_note: 'Kebiasaan yang dilakukan secara teratur. Contoh: "Pretty good. Last week I tried a new
    speaking routine."'
- word: problem
  meaning_id: masalah
  usage_note: 'Hal yang perlu dijelaskan atau diselesaikan. Contoh: "Any problems right now?"'
- word: now
  meaning_id: sekarang
  usage_note: 'Dipakai untuk menyatakan waktu saat ini. Contoh: "Great progress. What''s your goal now?"'
- word: leave
  meaning_id: berangkat/meninggalkan
  usage_note: 'Dipakai untuk jadwal keberangkatan. Contoh: "Sometimes I get distracted, so I leave my
    phone in another room."'
- word: goal
  meaning_id: tujuan
  usage_note: 'Hal yang ingin dicapai. Contoh: "Great progress. What''s your goal now?"'
