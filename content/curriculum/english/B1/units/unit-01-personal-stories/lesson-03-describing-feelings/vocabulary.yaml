vocabulary:
- word: place
  meaning_id: tempat
  usage_note: 'Lokasi yang ingin dituju atau dijelaskan. Contoh: "Yes. I was excited when we found a great
    food place."'
- word: direction
  meaning_id: arah
  usage_note: 'Petunjuk jalan atau posisi. Contoh: "We asked for directions, and (sighs) I felt relieved."'
- word: trip
  meaning_id: perjalanan
  usage_note: 'Perjalanan dari satu tempat ke tempat lain. Contoh: "How did you feel during the trip?"'
- word: feel
  meaning_id: 'bagian dari frasa: Gimana perasaanmu?'
  usage_note: 'Muncul dalam frasa lesson: "How did you feel?"'
