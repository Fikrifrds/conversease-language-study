prompts:
- prompt: State goal + deadline.
  target_response: My goal is to speak more confidently by the end of this month.
  acceptable_variations:
  - My goal is to speak more confidently by the end of this month.
  - My goal is to speak more confidently by next month.
- prompt: Share progress with I've been practicing.
  target_response: I'm making progress. I've been practicing every morning.
  acceptable_variations:
  - I'm making progress. I've been practicing every morning.
  - I'm making progress. I've been practicing every day.
- prompt: Name challenge + next step plan.
  target_response: The biggest challenge is staying consistent after work. My next step is to practice three times this week.
  acceptable_variations:
  - The biggest challenge is staying consistent after work. My next step is to practice three times this week.
  - The biggest challenge is finding time. My next step is to practice twice this week.
