prompts:
  - prompt: Decline politely.
    target_response: Thanks, but I can't.
    acceptable_variations:
      - Thanks, but I can't.
      - Sorry, I can't.
  - prompt: Give a short reason.
    target_response: I'm busy tonight because I have a meeting.
    acceptable_variations:
      - I'm busy tonight because I have a meeting.
      - I'm busy tonight because I have work.
  - prompt: Respond politely when someone declines.
    target_response: No problem. Maybe another time.
    acceptable_variations:
      - No problem. Maybe another time.
      - Okay. Maybe next time.
