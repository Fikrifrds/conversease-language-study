vocabulary:
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "Hey Dimas. Do you want to join our dinner
    tonight?"'
- word: problem
  meaning_id: masalah
  usage_note: 'Hal yang perlu dijelaskan atau diselesaikan. Contoh: "No problem."'
- word: thank
  meaning_id: berterima kasih
  usage_note: 'Dipakai saat mengucapkan terima kasih. Contoh: "Thanks, but I can''t."'
- word: tomorrow
  meaning_id: besok
  usage_note: 'Dipakai untuk rencana hari berikutnya. Contoh: "Yes, maybe tomorrow. Thanks for asking."'
- word: meeting
  meaning_id: rapat
  usage_note: 'Percakapan kerja dengan beberapa orang. Contoh: "because I have a meeting."'
