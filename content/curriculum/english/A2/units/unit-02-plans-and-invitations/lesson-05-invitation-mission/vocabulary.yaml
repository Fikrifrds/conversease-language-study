vocabulary:
- word: meet
  meaning_id: bertemu
  usage_note: 'Kata kerja untuk bertemu seseorang. Contoh: "Yes, 3 pm works. Where should we meet?"'
- word: work
  meaning_id: bekerja/pekerjaan
  usage_note: 'Dipakai saat membicarakan pekerjaan. Contoh: "Does 3 pm work for you?"'
- word: cafe
  meaning_id: kafe
  usage_note: 'Tempat untuk membeli minuman atau makanan ringan. Contoh: "Let''s meet at the cafe near
    the station."'
- word: near
  meaning_id: dekat
  usage_note: 'Dipakai untuk menjelaskan jarak yang dekat. Contoh: "Let''s meet at the cafe near the station."'
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "Do you want to grab coffee?"'
- word: problem
  meaning_id: masalah
  usage_note: 'Hal yang perlu dijelaskan atau diselesaikan. Contoh: "No problem. How about Saturday?"'
