vocabulary:
- word: evening
  meaning_id: malam/sore
  usage_note: 'Bagian hari setelah afternoon. Contoh: "How about Friday evening?"'
- word: work
  meaning_id: bekerja/pekerjaan
  usage_note: 'Dipakai saat membicarakan pekerjaan. Contoh: "Does 7 pm work for you?"'
- word: cafe
  meaning_id: kafe
  usage_note: 'Tempat untuk membeli minuman atau makanan ringan. Contoh: "Same cafe?"'
- word: problem
  meaning_id: masalah
  usage_note: 'Hal yang perlu dijelaskan atau diselesaikan. Contoh: "No problem. When are you free?"'
- word: reschedule
  meaning_id: menjadwalkan ulang
  usage_note: 'Mengubah waktu rencana atau janji. Contoh: "Can we reschedule?"'
- word: happened
  meaning_id: terjadi
  usage_note: 'Bentuk lampau dari happen. Contoh: "Sure. What happened?"'
