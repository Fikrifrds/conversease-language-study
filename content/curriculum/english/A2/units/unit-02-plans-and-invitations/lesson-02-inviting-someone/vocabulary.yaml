vocabulary:
- word: nice
  meaning_id: ramah/menyenangkan
  usage_note: 'Dipakai untuk menyatakan kesan positif. Contoh: "Nice. I''d love to go."'
- word: work
  meaning_id: bekerja/pekerjaan
  usage_note: 'Dipakai saat membicarakan pekerjaan. Contoh: "8 pm works. Which movie?"'
- word: like
  meaning_id: suka
  usage_note: 'Dipakai untuk menyatakan hal yang disukai. Contoh: "Would you like to join?"'
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "Do you want to watch a movie?"'
