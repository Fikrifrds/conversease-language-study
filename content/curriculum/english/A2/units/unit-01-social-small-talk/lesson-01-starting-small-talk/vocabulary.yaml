vocabulary:
- word: nice
  meaning_id: ramah/menyenangkan
  usage_note: 'Dipakai untuk menyatakan kesan positif. Contoh: "It was nice. I went to the park."'
- word: later
  meaning_id: nanti
  usage_note: 'Dipakai saat menutup percakapan santai. Contoh: "You too. See you later."'
- word: went
  meaning_id: pergi
  usage_note: 'Bentuk lampau dari go. Contoh: "It was nice. I went to the park."'
- word: thank
  meaning_id: berterima kasih
  usage_note: 'Dipakai saat mengucapkan terima kasih. Contoh: "Hi Ben. It''s good, thanks. How about you?"'
- word: today
  meaning_id: hari ini
  usage_note: 'Dipakai untuk membicarakan waktu sekarang. Contoh: "It''s busy today."'
- word: weekend
  meaning_id: akhir pekan
  usage_note: 'Sabtu dan Minggu atau waktu libur mingguan. Contoh: "How was your weekend?"'
