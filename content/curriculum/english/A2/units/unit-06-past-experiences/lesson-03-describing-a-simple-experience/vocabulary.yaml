vocabulary:
- word: nice
  meaning_id: ramah/menyenangkan
  usage_note: 'Dipakai untuk menyatakan kesan positif. Contoh: "Oh nice. How was it?"'
- word: yesterday
  meaning_id: kemarin
  usage_note: 'Hari sebelum hari ini. Contoh: "I tried a new restaurant yesterday."'
- word: tried
  meaning_id: mencoba
  usage_note: 'Bentuk lampau dari try. Contoh: "I tried a new restaurant yesterday."'
- word: delicious
  meaning_id: 'bagian dari frasa: Enak banget.'
  usage_note: 'Muncul dalam frasa lesson: "It was delicious."'
