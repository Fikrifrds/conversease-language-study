vocabulary:
- word: nice
  meaning_id: ramah/menyenangkan
  usage_note: 'Dipakai untuk menyatakan kesan positif. Contoh: "Nice. What did you do there?"'
- word: went
  meaning_id: pergi
  usage_note: 'Bentuk lampau dari go. Contoh: "I went to the mall."'
- word: yesterday
  meaning_id: kemarin
  usage_note: 'Hari sebelum hari ini. Contoh: "How was your day yesterday?"'
- word: day
  meaning_id: 'bagian dari frasa: Gimana harimu kemarin?'
  usage_note: 'Muncul dalam frasa lesson: "How was your day yesterday?"'
