vocabulary:
- word: nice
  meaning_id: ramah/menyenangkan
  usage_note: 'Dipakai untuk menyatakan kesan positif. Contoh: "Oh nice. Where did you go after that?"'
- word: went
  meaning_id: pergi
  usage_note: 'Bentuk lampau dari go. Contoh: "I went to the museum."'
- word: cafe
  meaning_id: kafe
  usage_note: 'Tempat untuk membeli minuman atau makanan ringan. Contoh: "I went to a cafe near the river."'
- word: near
  meaning_id: dekat
  usage_note: 'Dipakai untuk menjelaskan jarak yang dekat. Contoh: "I went to a cafe near the river."'
- word: yesterday
  meaning_id: kemarin
  usage_note: 'Hari sebelum hari ini. Contoh: "Hi! Did you go anywhere interesting yesterday?"'
