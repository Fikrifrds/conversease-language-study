    options:
      - Jalan yang benar
      - Tiket yang benar
      - Jam yang benar
    correct_answer: Jalan yang benar
  - key: direction_question
    type: multiple_choice
    prompt: Which question checks directions?
    options:
      - Is this the right way?
      - How much is it?
      - Are you free tomorrow?
