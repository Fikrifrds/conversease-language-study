prompts:
- prompt: Ask for an opinion about the restaurant.
  target_response: What do you think about this restaurant?
  acceptable_variations:
  - What do you think about this restaurant?
  - What do you think about the restaurant?
- prompt: Say you are not sure and the service might be slow.
  target_response: I'm not sure. The service might be slow.
  acceptable_variations:
  - I'm not sure. The service might be slow.
  - I'm not sure. It might be slow.
- prompt: 'Give a reason: because it''s quieter and the coffee is good.'
  target_response: Because it's quieter and the coffee is good.
  acceptable_variations:
  - Because it's quieter and the coffee is good.
  - Because it is quieter and the coffee is good.
