vocabulary:
- word: want
  meaning_id: mau/ingin
  usage_note: 'Dipakai untuk menyatakan keinginan. Contoh: "Do you want to go home?"'
- word: take
  meaning_id: mengambil/memilih
  usage_note: 'Dipakai saat memilih barang yang akan dibeli. Contoh: "Okay. Take care."'
- word: headache
  meaning_id: sakit kepala
  usage_note: 'Gejala sakit pada kepala. Contoh: "I have a headache."'
- word: fever
  meaning_id: demam
  usage_note: 'Kondisi suhu tubuh naik saat sakit. Contoh: "I think I have a fever."'
- word: tired
  meaning_id: lelah
  usage_note: 'Kondisi ketika energi sedang rendah. Contoh: "I''m really tired."'
- word: wrong
  meaning_id: salah/ada masalah
  usage_note: 'Dipakai untuk menanyakan apa yang terjadi. Contoh: "What''s wrong?"'
