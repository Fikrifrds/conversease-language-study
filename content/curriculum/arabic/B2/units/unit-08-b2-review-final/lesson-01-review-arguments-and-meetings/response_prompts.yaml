prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku usul kita kunci tenggatnya hari ini.'
  target_response: أَقْتَرِحُ أَنْ نُثَبِّتَ الْمَوْعِدَ الْيَوْمَ.
  acceptable_responses:
  - أَقْتَرِحُ أَنْ نُثَبِّتَ الْمَوْعِدَ الْيَوْمَ.
- prompt: 'Ucapkan dalam bahasa Arab: Alasannya, penundaan justru lebih memakan biaya.'
  target_response: السَّبَبُ هُوَ أَنَّ التَّأْخِيرَ يُكَلِّفُنَا أَكْثَرَ.
  acceptable_responses:
  - السَّبَبُ هُوَ أَنَّ التَّأْخِيرَ يُكَلِّفُنَا أَكْثَرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham keberatanmu, tapi kita bisa mulai dari bagian kecil.'
  target_response: أَفْهَمُ تَحَفُّظَكِ، لَكِنْ يُمْكِنُنَا الْبَدْءُ بِجُزْءٍ صَغِيرٍ.
  acceptable_responses:
  - أَفْهَمُ تَحَفُّظَكِ، لَكِنْ يُمْكِنُنَا الْبَدْءُ بِجُزْءٍ صَغِيرٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Jadi keputusannya: penyerahan awal hari Kamis.'
  target_response: إِذَنِ الْقَرَارُ هُوَ تَسْلِيمٌ مَبْدَئِيٌّ يَوْمَ الْخَمِيسِ.
  acceptable_responses:
  - إِذَنِ الْقَرَارُ هُوَ تَسْلِيمٌ مَبْدَئِيٌّ يَوْمَ الْخَمِيسِ.
