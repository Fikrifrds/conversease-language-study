scenario_key: arabic_b2_review_arguments_and_meetings
mode: lesson_practice_coach
level_code: B2
opening_line: مَا زِلْنَا بِلَا مَوْعِدٍ نِهَائِيٍّ. مَا رَأْيُكِ؟
learner_goal: Latih percakapan Arab B2 untuk menutup poin rapat dengan argumen ringkas dan keputusan yang
  jelas.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا زِلْنَا بِلَا مَوْعِدٍ نِهَائِيٍّ. مَا رَأْيُكِ؟
  hint: 'Jawab dengan struktur B2 memakai: أَقْتَرِحُ أَنْ نُثَبِّتَ الْمَوْعِدَ الْيَوْمَ.'
  sample_answer: أَقْتَرِحُ أَنْ نُثَبِّتَ الْمَوْعِدَ الْيَوْمَ.
  focus: Membuka usulan rapat.
  expected_keywords:
  - أَقْتَرِحُ
  - أَنْ
  - نُثَبِّتَ
  - الْمَوْعِدَ
  - الْيَوْمَ
  indonesian_explanation: Aku usul kita kunci tenggatnya hari ini.
- coach: 'استخدم الفكرة: السَّبَبُ هُوَ أَنَّ التَّأْخِيرَ يُكَلِّفُنَا أَكْثَرَ.'
  hint: 'Jawab dengan struktur B2 memakai: السَّبَبُ هُوَ أَنَّ التَّأْخِيرَ يُكَلِّفُنَا أَكْثَرَ.'
  sample_answer: السَّبَبُ هُوَ أَنَّ التَّأْخِيرَ يُكَلِّفُنَا أَكْثَرَ.
  focus: Memberi alasan.
  expected_keywords:
  - السَّبَبُ
  - هُوَ
  - أَنَّ
  - التَّأْخِيرَ
  - يُكَلِّفُنَا
  indonesian_explanation: Alasannya, penundaan justru lebih memakan biaya.
- coach: 'استخدم الفكرة: أَفْهَمُ تَحَفُّظَكِ، لَكِنْ يُمْكِنُنَا الْبَدْءُ بِجُزْءٍ صَغِيرٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ تَحَفُّظَكِ، لَكِنْ يُمْكِنُنَا الْبَدْءُ بِجُزْءٍ
    صَغِيرٍ.'
  sample_answer: أَفْهَمُ تَحَفُّظَكِ، لَكِنْ يُمْكِنُنَا الْبَدْءُ بِجُزْءٍ صَغِيرٍ.
  focus: Menanggapi keberatan.
  expected_keywords:
  - أَفْهَمُ
  - تَحَفُّظَكِ
  - لَكِنْ
  - يُمْكِنُنَا
  - الْبَدْءُ
  indonesian_explanation: Aku paham keberatanmu, tapi kita bisa mulai dari bagian kecil.
- coach: 'استخدم الفكرة: إِذَنِ الْقَرَارُ هُوَ تَسْلِيمٌ مَبْدَئِيٌّ يَوْمَ الْخَمِيسِ.'
  hint: 'Jawab dengan struktur B2 memakai: إِذَنِ الْقَرَارُ هُوَ تَسْلِيمٌ مَبْدَئِيٌّ يَوْمَ الْخَمِيسِ.'
  sample_answer: إِذَنِ الْقَرَارُ هُوَ تَسْلِيمٌ مَبْدَئِيٌّ يَوْمَ الْخَمِيسِ.
  focus: Menyimpulkan keputusan.
  expected_keywords:
  - إِذَنِ
  - الْقَرَارُ
  - هُوَ
  - تَسْلِيمٌ
  - مَبْدَئِيٌّ
  indonesian_explanation: 'Jadi keputusannya: penyerahan awal hari Kamis.'
target_phrases:
- أَقْتَرِحُ أَنْ نُثَبِّتَ الْمَوْعِدَ الْيَوْمَ.
- السَّبَبُ هُوَ أَنَّ التَّأْخِيرَ يُكَلِّفُنَا أَكْثَرَ.
- أَفْهَمُ تَحَفُّظَكِ، لَكِنْ يُمْكِنُنَا الْبَدْءُ بِجُزْءٍ صَغِيرٍ.
- إِذَنِ الْقَرَارُ هُوَ تَسْلِيمٌ مَبْدَئِيٌّ يَوْمَ الْخَمِيسِ.
- سَأُرْسِلُ الْمُلَخَّصَ وَالْمَسْؤُولِيَّاتِ بَعْدَ الِاجْتِمَاعِ.
