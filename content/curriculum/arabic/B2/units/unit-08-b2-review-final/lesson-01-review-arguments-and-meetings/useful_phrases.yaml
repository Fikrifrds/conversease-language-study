phrases:
- phrase: أَقْتَرِحُ أَنْ نُثَبِّتَ الْمَوْعِدَ الْيَوْمَ.
  meaning_id: Aku usul kita kunci tenggatnya hari ini.
  usage_note: Membuka usulan rapat.
- phrase: السَّبَبُ هُوَ أَنَّ التَّأْخِيرَ يُكَلِّفُنَا أَكْثَرَ.
  meaning_id: Alasannya, penundaan justru lebih memakan biaya.
  usage_note: Memberi alasan.
- phrase: أَفْهَمُ تَحَفُّظَكِ، لَكِنْ يُمْكِنُنَا الْبَدْءُ بِجُزْءٍ صَغِيرٍ.
  meaning_id: Aku paham keberatanmu, tapi kita bisa mulai dari bagian kecil.
  usage_note: Menanggapi keberatan.
- phrase: إِذَنِ الْقَرَارُ هُوَ تَسْلِيمٌ مَبْدَئِيٌّ يَوْمَ الْخَمِيسِ.
  meaning_id: 'Jadi keputusannya: penyerahan awal hari Kamis.'
  usage_note: Menyimpulkan keputusan.
- phrase: سَأُرْسِلُ الْمُلَخَّصَ وَالْمَسْؤُولِيَّاتِ بَعْدَ الِاجْتِمَاعِ.
  meaning_id: Aku kirim ringkasan dan tanggung jawab setelah rapat.
  usage_note: Menutup dengan tindak lanjut.
