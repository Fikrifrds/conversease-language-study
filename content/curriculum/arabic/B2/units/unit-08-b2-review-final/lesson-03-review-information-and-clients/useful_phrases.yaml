phrases:
- phrase: قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  meaning_id: Sebelum mengandalkan angkanya, kita pastikan sumbernya.
  usage_note: Menilai informasi.
- phrase: الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
  meaning_id: Sampelnya kecil, jadi belum bisa menggeneralisasi.
  usage_note: Menahan kesimpulan.
- phrase: أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.
  meaning_id: Aku paham kekhawatiran klien soal keterlambatan.
  usage_note: Mengakui kekhawatiran klien.
- phrase: 'إِلَيْكَ الْخُطَّةُ: تَحْدِيثٌ يَوْمِيٌّ حَتَّى التَّسْلِيمِ.'
  meaning_id: 'Ini rencananya: update harian sampai penyerahan.'
  usage_note: Menawarkan solusi.
- phrase: سَأُؤَكِّدُ كُلَّ ذَلِكَ كِتَابَةً.
  meaning_id: Aku konfirmasi semua itu secara tertulis.
  usage_note: Menutup dengan tindak lanjut.
