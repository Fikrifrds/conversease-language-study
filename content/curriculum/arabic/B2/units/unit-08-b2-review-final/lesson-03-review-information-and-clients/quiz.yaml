questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Sebelum mengandalkan angkanya, kita pastikan sumbernya."?
  options:
  - قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  - الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
  - أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.
  correct_answer: قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Sampelnya kecil, jadi belum bisa menggeneralisasi."?
  options:
  - الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
  - قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  - أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.
  correct_answer: الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
