vocabulary:
- word: أُرَاجِعُ
  meaning_id: saya mengulang/review
  usage_note: 'Dipakai untuk arti "saya mengulang/review". Contoh: "أُرَاجِعُ التَّعَامُلَ مَعَ الْمَعْلُومَاتِ
    وَالْعُمَلَاءِ لِأَنَّهُ مُهِمٌّ فِي النِّقَاشِ."'
- word: مَعْلُومَاتٌ
  meaning_id: informasi
  usage_note: 'Dipakai untuk arti "informasi". Contoh: "أُرَاجِعُ التَّعَامُلَ مَعَ الْمَعْلُومَاتِ وَالْعُمَلَاءِ
    لِأَنَّهُ مُهِمٌّ فِي النِّقَاشِ."'
- word: نِقَاشٌ
  meaning_id: diskusi
  usage_note: 'Dipakai untuk arti "diskusi". Contoh: "أُرَاجِعُ التَّعَامُلَ مَعَ الْمَعْلُومَاتِ وَالْعُمَلَاءِ
    لِأَنَّهُ مُهِمٌّ فِي النِّقَاشِ."'
- word: أَسْتَطِيعُ
  meaning_id: saya bisa
  usage_note: 'Dipakai untuk arti "saya bisa". Contoh: "أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ
    بِدَلِيلٍ."'
- word: اِعْتِرَاضٌ
  meaning_id: keberatan
  usage_note: 'Dipakai untuk arti "keberatan". Contoh: "إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ
    بِهُدُوءٍ."'
- word: اِخْتِبَارٌ
  meaning_id: ujian
  usage_note: 'Dipakai untuk arti "ujian". Contoh: "فِي الِاخْتِبَارِ النِّهَائِيِّ، سَأُرَكِّزُ عَلَى
    التَّرَابُطِ وَالْوُضُوحِ."'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "مَا أَهَمُّ مَهَارَةٍ تُرَاجِعِينَها الْآنَ؟
    أُرِيدُ أَنْ أُرَكِّزَ عَلَى التَّعَامُلِ مَعَ الْم..."'
- word: مِثَالٌ
  meaning_id: contoh
  usage_note: 'Dipakai untuk arti "contoh". Contoh: "مَا الْمِثَالُ الْعَمَلِيُّ الَّذِي يُوَضِّحُ الْفِكْرَةَ؟"'
