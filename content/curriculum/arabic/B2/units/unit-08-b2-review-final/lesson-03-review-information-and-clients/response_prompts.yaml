prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Sebelum mengandalkan angkanya, kita pastikan sumbernya.'
  target_response: قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  acceptable_responses:
  - قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Sampelnya kecil, jadi belum bisa menggeneralisasi.'
  target_response: الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
  acceptable_responses:
  - الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham kekhawatiran klien soal keterlambatan.'
  target_response: أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.
  acceptable_responses:
  - أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Ini rencananya: update harian sampai penyerahan.'
  target_response: 'إِلَيْكَ الْخُطَّةُ: تَحْدِيثٌ يَوْمِيٌّ حَتَّى التَّسْلِيمِ.'
  acceptable_responses:
  - 'إِلَيْكَ الْخُطَّةُ: تَحْدِيثٌ يَوْمِيٌّ حَتَّى التَّسْلِيمِ.'
