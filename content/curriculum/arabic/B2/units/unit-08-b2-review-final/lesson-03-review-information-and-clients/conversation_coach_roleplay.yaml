scenario_key: arabic_b2_review_information_and_clients
mode: lesson_practice_coach
level_code: B2
opening_line: هَذَا التَّقْرِيرُ يَقُولُ إِنَّ الطَّلَبَ يَرْتَفِعُ. نُصَدِّقُهُ؟
learner_goal: Latih percakapan Arab B2 untuk menilai informasi lalu menjawab kekhawatiran klien dengan
  tenang.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: هَذَا التَّقْرِيرُ يَقُولُ إِنَّ الطَّلَبَ يَرْتَفِعُ. نُصَدِّقُهُ؟
  hint: 'Jawab dengan struktur B2 memakai: قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.'
  sample_answer: قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  focus: Menilai informasi.
  expected_keywords:
  - قَبْلَ
  - أَنْ
  - نَعْتَمِدَ
  - الرَّقْمَ
  - نَتَأَكَّدُ
  indonesian_explanation: Sebelum mengandalkan angkanya, kita pastikan sumbernya.
- coach: 'استخدم الفكرة: الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.'
  hint: 'Jawab dengan struktur B2 memakai: الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.'
  sample_answer: الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
  focus: Menahan kesimpulan.
  expected_keywords:
  - الْعَيِّنَةُ
  - صَغِيرَةٌ
  - فَلَا
  - نُعَمِّمُ
  - بَعْدُ
  indonesian_explanation: Sampelnya kecil, jadi belum bisa menggeneralisasi.
- coach: 'استخدم الفكرة: أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.'
  sample_answer: أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.
  focus: Mengakui kekhawatiran klien.
  expected_keywords:
  - أَفْهَمُ
  - قَلَقَ
  - الْعَمِيلِ
  - مِنَ
  - التَّأْخِيرِ
  indonesian_explanation: Aku paham kekhawatiran klien soal keterlambatan.
- coach: 'استخدم الفكرة: إِلَيْكَ الْخُطَّةُ: تَحْدِيثٌ يَوْمِيٌّ حَتَّى التَّسْلِيمِ.'
  hint: 'Jawab dengan struktur B2 memakai: إِلَيْكَ الْخُطَّةُ: تَحْدِيثٌ يَوْمِيٌّ حَتَّى التَّسْلِيمِ.'
  sample_answer: 'إِلَيْكَ الْخُطَّةُ: تَحْدِيثٌ يَوْمِيٌّ حَتَّى التَّسْلِيمِ.'
  focus: Menawarkan solusi.
  expected_keywords:
  - إِلَيْكَ
  - 'الْخُطَّةُ:'
  - تَحْدِيثٌ
  - يَوْمِيٌّ
  - حَتَّى
  indonesian_explanation: 'Ini rencananya: update harian sampai penyerahan.'
target_phrases:
- قَبْلَ أَنْ نَعْتَمِدَ الرَّقْمَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
- الْعَيِّنَةُ صَغِيرَةٌ، فَلَا نُعَمِّمُ بَعْدُ.
- أَفْهَمُ قَلَقَ الْعَمِيلِ مِنَ التَّأْخِيرِ.
- 'إِلَيْكَ الْخُطَّةُ: تَحْدِيثٌ يَوْمِيٌّ حَتَّى التَّسْلِيمِ.'
- سَأُؤَكِّدُ كُلَّ ذَلِكَ كِتَابَةً.
