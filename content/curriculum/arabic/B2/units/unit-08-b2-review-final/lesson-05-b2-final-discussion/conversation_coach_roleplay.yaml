scenario_key: arabic_b2_b2_final_discussion
mode: lesson_practice_coach
level_code: B2
opening_line: 'لِنَتَنَاقَشْ بِحُرِّيَّةٍ: هَلْ نَتَبَنَّى الْعَمَلَ الْمَرِنَ؟'
learner_goal: 'Latih percakapan Arab B2 untuk diskusi terbuka: memberi pendapat berbukti, menanggapi keberatan,
  lalu menutup dengan langkah.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: 'لِنَتَنَاقَشْ بِحُرِّيَّةٍ: هَلْ نَتَبَنَّى الْعَمَلَ الْمَرِنَ؟'
  hint: 'Jawab dengan struktur B2 memakai: أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.'
  sample_answer: أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.
  focus: Memberi pendapat.
  expected_keywords:
  - أَرَى
  - أَنَّ
  - الْعَمَلَ
  - الْمَرِنَ
  - يُنَاسِبُ
  indonesian_explanation: Menurutku kerja fleksibel cocok untuk tim kita.
- coach: 'استخدم الفكرة: الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.'
  hint: 'Jawab dengan struktur B2 memakai: الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.'
  sample_answer: الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.
  focus: Menopang dengan bukti.
  expected_keywords:
  - الدَّلِيلُ
  - هُوَ
  - أَنَّ
  - الْإِنْتَاجَ
  - ارْتَفَعَ
  indonesian_explanation: Buktinya, produksi naik bulan lalu.
- coach: 'استخدم الفكرة: أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.'
  sample_answer: أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.
  focus: Mengakui keberatan.
  expected_keywords:
  - أَفْهَمُ
  - مَنْ
  - يَخْشَى
  - عَلَى
  - الِانْضِبَاطِ
  indonesian_explanation: Aku paham yang khawatir soal disiplin.
- coach: 'استخدم الفكرة: لَكِنَّ مِعْيَارَ الْحُضُورِ يَحُلُّ ذَلِكَ.'
  hint: 'Jawab dengan struktur B2 memakai: لَكِنَّ مِعْيَارَ الْحُضُورِ يَحُلُّ ذَلِكَ.'
  sample_answer: لَكِنَّ مِعْيَارَ الْحُضُورِ يَحُلُّ ذَلِكَ.
  focus: Menjawab keberatan.
  expected_keywords:
  - لَكِنَّ
  - مِعْيَارَ
  - الْحُضُورِ
  - يَحُلُّ
  - ذَلِكَ
  indonesian_explanation: Tapi standar kehadiran menyelesaikannya.
target_phrases:
- أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.
- الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.
- أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.
- لَكِنَّ مِعْيَارَ الْحُضُورِ يَحُلُّ ذَلِكَ.
- أَقْتَرِحُ كَخُطْوَةٍ أَنْ نُجَرِّبَهُ شَهْرًا.
