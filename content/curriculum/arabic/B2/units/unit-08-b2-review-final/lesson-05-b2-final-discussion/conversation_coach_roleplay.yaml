level_code: B2
opening_line: مَا أَهَمُّ مَهَارَةٍ تُرَاجِعِينَها الْآنَ؟ أُرِيدُ أَنْ أُرَكِّزَ عَلَى النِّقَاشِ النِّهَائِيِّ.
learner_goal: Latih percakapan Arab B2 untuk menjalani diskusi akhir dengan alasan, contoh, respons, dan
