turns:
- coach: مَا أَهَمُّ مَهَارَةٍ تُرَاجِعِينَها الْآنَ؟ أُرِيدُ أَنْ أُرَكِّزَ عَلَى النِّقَاشِ النِّهَائِيِّ.
  hint: 'Jawab dengan struktur B2 memakai: أُرَاجِعُ النِّقَاشَ النِّهَائِيَّ لِأَنَّهُ يَجْمَعُ مَهَارَاتِ
    الْمُسْتَوَى.'
  sample_answer: أُرَاجِعُ النِّقَاشَ النِّهَائِيَّ لِأَنَّهُ يَجْمَعُ مَهَارَاتِ الْمُسْتَوَى.
  focus: Membuka sesi peninjauan ulang.
  expected_keywords:
  - أُرَاجِعُ
  - النِّقَاشَ
  - النِّهَائِيَّ
  - لِأَنَّهُ
  - يَجْمَعُ
  indonesian_explanation: Saya meninjau kembali diskusi akhir karena itu menggabungkan keterampilan level ini.
- coach: 'استخدم الفكرة: أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.'
  sample_answer: أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.
  focus: Mereview kemampuan menyusun argumen.
  expected_keywords:
  - أَسْتَطِيعُ
  - أَنْ
  - أُقَدِّمَ
  - رَأْيًا
  - وَأَدْعَمَهُ
  indonesian_explanation: Saya bisa menyampaikan pendapat dan mendukungnya dengan bukti.
- coach: 'استخدم الفكرة: أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.'
  sample_answer: أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.
  focus: Mereview kemampuan percakapan profesional.
  expected_keywords:
  - أَسْتَطِيعُ
  - أَيْضًا
  - أَنْ
  - أُدِيرَ
  - حِوَارًا
  indonesian_explanation: Saya juga bisa mengelola percakapan profesional dengan jelas.
- coach: 'استخدم الفكرة: إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.'
  hint: 'Jawab dengan struktur B2 memakai: إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.'
  sample_answer: إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.
  focus: Mereview respons terhadap keberatan.
  expected_keywords:
  - إِذَا
  - ظَهَرَ
  - اِعْتِرَاضٌ،
  - فَسَأَرُدُّ
  - عَلَيْهِ
  indonesian_explanation: Jika muncul keberatan, saya akan menanggapinya dengan tenang.
target_phrases:
- أُرَاجِعُ النِّقَاشَ النِّهَائِيَّ لِأَنَّهُ يَجْمَعُ مَهَارَاتِ الْمُسْتَوَى.
