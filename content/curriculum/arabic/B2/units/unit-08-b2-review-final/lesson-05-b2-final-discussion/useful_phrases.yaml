phrases:
- phrase: أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.
  meaning_id: Menurutku kerja fleksibel cocok untuk tim kita.
  usage_note: Memberi pendapat.
- phrase: الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.
  meaning_id: Buktinya, produksi naik bulan lalu.
  usage_note: Menopang dengan bukti.
- phrase: أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.
  meaning_id: Aku paham yang khawatir soal disiplin.
  usage_note: Mengakui keberatan.
- phrase: لَكِنَّ مِعْيَارَ الْحُضُورِ يَحُلُّ ذَلِكَ.
  meaning_id: Tapi standar kehadiran menyelesaikannya.
  usage_note: Menjawab keberatan.
- phrase: أَقْتَرِحُ كَخُطْوَةٍ أَنْ نُجَرِّبَهُ شَهْرًا.
  meaning_id: Sebagai langkah, aku usul kita coba sebulan.
  usage_note: Menutup dengan langkah.
