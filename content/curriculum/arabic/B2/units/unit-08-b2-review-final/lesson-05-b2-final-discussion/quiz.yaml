questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Menurutku kerja fleksibel cocok untuk tim kita."?
  options:
  - أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.
  - الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.
  - أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.
  correct_answer: أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.
