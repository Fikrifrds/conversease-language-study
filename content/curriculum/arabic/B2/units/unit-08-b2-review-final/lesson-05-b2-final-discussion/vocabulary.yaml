vocabulary:
- word: أُرَاجِعُ
  meaning_id: saya mengulang/review
  usage_note: 'Dipakai untuk arti "saya mengulang/review". Contoh: "أُرَاجِعُ النِّقَاشَ النِّهَائِيَّ
    لِأَنَّهُ يَجْمَعُ مَهَارَاتِ الْمُسْتَوَى."'
- word: نِقَاشٌ
  meaning_id: diskusi
  usage_note: 'Dipakai untuk arti "diskusi". Contoh: "أُرَاجِعُ النِّقَاشَ النِّهَائِيَّ لِأَنَّهُ يَجْمَعُ
    مَهَارَاتِ الْمُسْتَوَى."'
- word: أَسْتَطِيعُ
  meaning_id: saya bisa
  usage_note: 'Dipakai untuk arti "saya bisa". Contoh: "أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ
    بِدَلِيلٍ."'
- word: اِعْتِرَاضٌ
  meaning_id: keberatan
  usage_note: 'Dipakai untuk arti "keberatan". Contoh: "إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ
    بِهُدُوءٍ."'
- word: اِخْتِبَارٌ
  meaning_id: ujian
  usage_note: 'Dipakai untuk arti "ujian". Contoh: "فِي الِاخْتِبَارِ النِّهَائِيِّ، سَأُرَكِّزُ عَلَى
    التَّرَابُطِ وَالْوُضُوحِ."'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "مَا أَهَمُّ مَهَارَةٍ تُرَاجِعِينَها الْآنَ؟
    أُرِيدُ أَنْ أُرَكِّزَ عَلَى النِّقَاشِ النِّهَائِي..."'
- word: دَلِيلٌ
  meaning_id: bukti/petunjuk
  usage_note: 'Dipakai untuk arti "bukti/petunjuk". Contoh: "مَا الدَّلِيلُ أَوِ الْمِثَالُ الَّذِي يُوَضِّحُ
    ذَلِكَ؟"'
- word: مِثَالٌ
  meaning_id: contoh
  usage_note: 'Dipakai untuk arti "contoh". Contoh: "مَا الدَّلِيلُ أَوِ الْمِثَالُ الَّذِي يُوَضِّحُ
    ذَلِكَ؟"'
