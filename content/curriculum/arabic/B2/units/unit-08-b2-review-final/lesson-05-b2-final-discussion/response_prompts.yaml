prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Menurutku kerja fleksibel cocok untuk tim kita.'
  target_response: أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.
  acceptable_responses:
  - أَرَى أَنَّ الْعَمَلَ الْمَرِنَ يُنَاسِبُ فَرِيقَنَا.
- prompt: 'Ucapkan dalam bahasa Arab: Buktinya, produksi naik bulan lalu.'
  target_response: الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.
  acceptable_responses:
  - الدَّلِيلُ هُوَ أَنَّ الْإِنْتَاجَ ارْتَفَعَ الشَّهْرَ الْمَاضِيَ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham yang khawatir soal disiplin.'
  target_response: أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.
  acceptable_responses:
  - أَفْهَمُ مَنْ يَخْشَى عَلَى الِانْضِبَاطِ.
- prompt: 'Ucapkan dalam bahasa Arab: Tapi standar kehadiran menyelesaikannya.'
  target_response: لَكِنَّ مِعْيَارَ الْحُضُورِ يَحُلُّ ذَلِكَ.
  acceptable_responses:
  - لَكِنَّ مِعْيَارَ الْحُضُورِ يَحُلُّ ذَلِكَ.
