prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Posisiku jelas, akan kujelaskan dengan dua poin.'
  target_response: مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
  acceptable_responses:
  - مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
- prompt: 'Ucapkan dalam bahasa Arab: Alasan pertama begini, kedua begitu.'
  target_response: السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
  acceptable_responses:
  - السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
- prompt: 'Ucapkan dalam bahasa Arab: Contoh sederhananya dari pekerjaan kita.'
  target_response: مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.
  acceptable_responses:
  - مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham pertanyaannya, kalau lupa kata kuungkap cara lain.'
  target_response: أَفْهَمُ السُّؤَالَ، وَلَوْ نَسِيتُ كَلِمَةً قُلْتُهَا بِطَرِيقَةٍ أُخْرَى.
  acceptable_responses:
  - أَفْهَمُ السُّؤَالَ، وَلَوْ نَسِيتُ كَلِمَةً قُلْتُهَا بِطَرِيقَةٍ أُخْرَى.
