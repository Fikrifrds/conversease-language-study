phrases:
- phrase: مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
  meaning_id: Posisiku jelas, akan kujelaskan dengan dua poin.
  usage_note: Membuka jawaban.
- phrase: السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
  meaning_id: Alasan pertama begini, kedua begitu.
  usage_note: Memberi dua alasan.
- phrase: مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.
  meaning_id: Contoh sederhananya dari pekerjaan kita.
  usage_note: Memberi contoh.
- phrase: أَفْهَمُ السُّؤَالَ، وَلَوْ نَسِيتُ كَلِمَةً قُلْتُهَا بِطَرِيقَةٍ أُخْرَى.
  meaning_id: Aku paham pertanyaannya, kalau lupa kata kuungkap cara lain.
  usage_note: Mengatasi lupa kata.
- phrase: بِاخْتِصَارٍ، خُلَاصَتِي هِيَ ...
  meaning_id: Singkatnya, kesimpulanku adalah...
  usage_note: Menutup ringkas.
