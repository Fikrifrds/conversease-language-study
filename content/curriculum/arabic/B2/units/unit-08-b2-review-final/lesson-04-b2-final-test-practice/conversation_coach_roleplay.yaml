scenario_key: arabic_b2_b2_final_test_practice
mode: lesson_practice_coach
level_code: B2
opening_line: 'لِنُجَرِّبْ سُؤَالًا كَالِاخْتِبَارِ: لِمَاذَا تُؤَيِّدِينَ الْعَمَلَ الْمَرِنَ؟'
learner_goal: 'Latih percakapan Arab B2 untuk menjawab pertanyaan ujian: posisi, dua alasan, contoh, lalu
  kesimpulan.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: 'لِنُجَرِّبْ سُؤَالًا كَالِاخْتِبَارِ: لِمَاذَا تُؤَيِّدِينَ الْعَمَلَ الْمَرِنَ؟'
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.'
  sample_answer: مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
  focus: Membuka jawaban.
  expected_keywords:
  - مَوْقِفِي
  - وَاضِحٌ
  - وَسَأَشْرَحُهُ
  - بِنُقْطَتَيْنِ
  indonesian_explanation: Posisiku jelas, akan kujelaskan dengan dua poin.
- coach: 'استخدم الفكرة: السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.'
  hint: 'Jawab dengan struktur B2 memakai: السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.'
  sample_answer: السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
  focus: Memberi dua alasan.
  expected_keywords:
  - السَّبَبُ
  - الْأَوَّلُ
  - هُوَ
  - كَذَا
  - وَالثَّانِي
  indonesian_explanation: Alasan pertama begini, kedua begitu.
- coach: 'استخدم الفكرة: مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.'
  hint: 'Jawab dengan struktur B2 memakai: مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.'
  sample_answer: مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.
  focus: Memberi contoh.
  expected_keywords:
  - مِثَالٌ
  - بَسِيطٌ
  - عَلَى
  - ذَلِكَ
  - مِنْ
  indonesian_explanation: Contoh sederhananya dari pekerjaan kita.
- coach: 'استخدم الفكرة: أَفْهَمُ السُّؤَالَ، وَلَوْ نَسِيتُ كَلِمَةً قُلْتُهَا بِطَرِيقَةٍ أُخْرَى.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ السُّؤَالَ، وَلَوْ نَسِيتُ كَلِمَةً قُلْتُهَا بِطَرِيقَةٍ
    أُخْرَى.'
  sample_answer: أَفْهَمُ السُّؤَالَ، وَلَوْ نَسِيتُ كَلِمَةً قُلْتُهَا بِطَرِيقَةٍ أُخْرَى.
  focus: Mengatasi lupa kata.
  expected_keywords:
  - أَفْهَمُ
  - السُّؤَالَ
  - وَلَوْ
  - نَسِيتُ
  - كَلِمَةً
  indonesian_explanation: Aku paham pertanyaannya, kalau lupa kata kuungkap cara lain.
target_phrases:
- مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
- السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
- مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.
- أَفْهَمُ السُّؤَالَ، وَلَوْ نَسِيتُ كَلِمَةً قُلْتُهَا بِطَرِيقَةٍ أُخْرَى.
- بِاخْتِصَارٍ، خُلَاصَتِي هِيَ ...
