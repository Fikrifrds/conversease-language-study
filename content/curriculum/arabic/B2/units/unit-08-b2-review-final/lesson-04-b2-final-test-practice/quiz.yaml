questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Posisiku jelas, akan kujelaskan dengan dua poin."?
  options:
  - مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
  - السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
  - مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.
  correct_answer: مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Alasan pertama begini, kedua begitu."?
  options:
  - السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
  - مَوْقِفِي وَاضِحٌ، وَسَأَشْرَحُهُ بِنُقْطَتَيْنِ.
  - مِثَالٌ بَسِيطٌ عَلَى ذَلِكَ مِنْ عَمَلِنَا.
  correct_answer: السَّبَبُ الْأَوَّلُ هُوَ كَذَا، وَالثَّانِي هُوَ كَذَا.
