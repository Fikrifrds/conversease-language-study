phrases:
- phrase: أُرَاجِعُ مَهَارَةَ مُرَاجَعَةُ التَّفَاوُضِ وَالْعَرْضِ لِأَنَّهَا مُهِمَّةٌ فِي النِّقَاشِ.
  meaning_id: Saya mengulang skill review negosiasi dan presentasi karena itu penting dalam diskusi.
  usage_note: Membuka review.
- phrase: أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.
  meaning_id: Saya bisa menyampaikan pendapat dan mendukungnya dengan bukti.
  usage_note: Mereview argument skill.
- phrase: أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.
  meaning_id: Saya juga bisa mengelola percakapan profesional dengan jelas.
  usage_note: Mereview professional skill.
- phrase: إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.
  meaning_id: Jika muncul keberatan, saya akan menanggapinya dengan tenang.
  usage_note: Mereview counterpoint skill.
- phrase: فِي الِاخْتِبَارِ النِّهَائِيِّ، سَأُرَكِّزُ عَلَى التَّرَابُطِ وَالْوُضُوحِ.
  meaning_id: Dalam tes akhir, saya akan fokus pada koherensi dan kejelasan.
  usage_note: Menutup dengan strategy.
