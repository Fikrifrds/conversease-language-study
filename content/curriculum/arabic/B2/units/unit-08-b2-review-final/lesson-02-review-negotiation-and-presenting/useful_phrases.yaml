phrases:
- phrase: أَوْلَوِيَّتِي أَنْ يَبْقَى السِّعْرُ فِي الْمِيزَانِيَّةِ.
  meaning_id: Prioritasku, harganya tetap dalam anggaran.
  usage_note: Menyatakan prioritas.
- phrase: يُمْكِنُنِي أَنْ أَتَنَازَلَ عَنْ مِيزَةٍ صَغِيرَةٍ.
  meaning_id: Aku bisa melepas satu fitur kecil.
  usage_note: Memberi konsesi.
- phrase: فِي الْمُقَابِلِ، أَحْتَاجُ إِلَى دَعْمٍ أَسْرَعَ.
  meaning_id: Sebagai gantinya, aku butuh dukungan lebih cepat.
  usage_note: Meminta imbalan.
- phrase: هَذَا عَرْضٌ عَادِلٌ لِلطَّرَفَيْنِ.
  meaning_id: Ini tawaran yang adil untuk kedua pihak.
  usage_note: Menyeimbangkan.
- phrase: إِنِ اتَّفَقْنَا، نَكْتُبُ ذَلِكَ فِي الْعَقْدِ.
  meaning_id: Kalau sepakat, kita tulis di kontrak.
  usage_note: Menutup kesepakatan.
