prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Prioritasku, harganya tetap dalam anggaran.'
  target_response: أَوْلَوِيَّتِي أَنْ يَبْقَى السِّعْرُ فِي الْمِيزَانِيَّةِ.
  acceptable_responses:
  - أَوْلَوِيَّتِي أَنْ يَبْقَى السِّعْرُ فِي الْمِيزَانِيَّةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku bisa melepas satu fitur kecil.'
  target_response: يُمْكِنُنِي أَنْ أَتَنَازَلَ عَنْ مِيزَةٍ صَغِيرَةٍ.
  acceptable_responses:
  - يُمْكِنُنِي أَنْ أَتَنَازَلَ عَنْ مِيزَةٍ صَغِيرَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Sebagai gantinya, aku butuh dukungan lebih cepat.'
  target_response: فِي الْمُقَابِلِ، أَحْتَاجُ إِلَى دَعْمٍ أَسْرَعَ.
  acceptable_responses:
  - فِي الْمُقَابِلِ، أَحْتَاجُ إِلَى دَعْمٍ أَسْرَعَ.
- prompt: 'Ucapkan dalam bahasa Arab: Ini tawaran yang adil untuk kedua pihak.'
  target_response: هَذَا عَرْضٌ عَادِلٌ لِلطَّرَفَيْنِ.
  acceptable_responses:
  - هَذَا عَرْضٌ عَادِلٌ لِلطَّرَفَيْنِ.
