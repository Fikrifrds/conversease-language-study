scenario_key: arabic_b2_review_negotiation_and_presenting
mode: lesson_practice_coach
level_code: B2
opening_line: الْمُورِّدُ يُرِيدُ سِعْرًا أَعْلَى. كَيْفَ نُفَاوِضُ؟
learner_goal: 'Latih percakapan Arab B2 untuk bernegosiasi: menyatakan prioritas, memberi konsesi kecil,
  lalu menutup kesepakatan.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: الْمُورِّدُ يُرِيدُ سِعْرًا أَعْلَى. كَيْفَ نُفَاوِضُ؟
  hint: 'Jawab dengan struktur B2 memakai: أَوْلَوِيَّتِي أَنْ يَبْقَى السِّعْرُ فِي الْمِيزَانِيَّةِ.'
  sample_answer: أَوْلَوِيَّتِي أَنْ يَبْقَى السِّعْرُ فِي الْمِيزَانِيَّةِ.
  focus: Menyatakan prioritas.
  expected_keywords:
  - أَوْلَوِيَّتِي
  - أَنْ
  - يَبْقَى
  - السِّعْرُ
  - فِي
  indonesian_explanation: Prioritasku, harganya tetap dalam anggaran.
- coach: 'استخدم الفكرة: يُمْكِنُنِي أَنْ أَتَنَازَلَ عَنْ مِيزَةٍ صَغِيرَةٍ.'
  hint: 'Jawab dengan struktur B2 memakai: يُمْكِنُنِي أَنْ أَتَنَازَلَ عَنْ مِيزَةٍ صَغِيرَةٍ.'
  sample_answer: يُمْكِنُنِي أَنْ أَتَنَازَلَ عَنْ مِيزَةٍ صَغِيرَةٍ.
  focus: Memberi konsesi.
  expected_keywords:
  - يُمْكِنُنِي
  - أَنْ
  - أَتَنَازَلَ
  - عَنْ
  - مِيزَةٍ
  indonesian_explanation: Aku bisa melepas satu fitur kecil.
- coach: 'استخدم الفكرة: فِي الْمُقَابِلِ، أَحْتَاجُ إِلَى دَعْمٍ أَسْرَعَ.'
  hint: 'Jawab dengan struktur B2 memakai: فِي الْمُقَابِلِ، أَحْتَاجُ إِلَى دَعْمٍ أَسْرَعَ.'
  sample_answer: فِي الْمُقَابِلِ، أَحْتَاجُ إِلَى دَعْمٍ أَسْرَعَ.
  focus: Meminta imbalan.
  expected_keywords:
  - فِي
  - الْمُقَابِلِ
  - أَحْتَاجُ
  - إِلَى
  - دَعْمٍ
  indonesian_explanation: Sebagai gantinya, aku butuh dukungan lebih cepat.
- coach: 'استخدم الفكرة: هَذَا عَرْضٌ عَادِلٌ لِلطَّرَفَيْنِ.'
  hint: 'Jawab dengan struktur B2 memakai: هَذَا عَرْضٌ عَادِلٌ لِلطَّرَفَيْنِ.'
  sample_answer: هَذَا عَرْضٌ عَادِلٌ لِلطَّرَفَيْنِ.
  focus: Menyeimbangkan.
  expected_keywords:
  - هَذَا
  - عَرْضٌ
  - عَادِلٌ
  - لِلطَّرَفَيْنِ
  indonesian_explanation: Ini tawaran yang adil untuk kedua pihak.
target_phrases:
- أَوْلَوِيَّتِي أَنْ يَبْقَى السِّعْرُ فِي الْمِيزَانِيَّةِ.
- يُمْكِنُنِي أَنْ أَتَنَازَلَ عَنْ مِيزَةٍ صَغِيرَةٍ.
- فِي الْمُقَابِلِ، أَحْتَاجُ إِلَى دَعْمٍ أَسْرَعَ.
- هَذَا عَرْضٌ عَادِلٌ لِلطَّرَفَيْنِ.
- إِنِ اتَّفَقْنَا، نَكْتُبُ ذَلِكَ فِي الْعَقْدِ.
