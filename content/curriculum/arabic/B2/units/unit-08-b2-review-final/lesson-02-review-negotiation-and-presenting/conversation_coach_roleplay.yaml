scenario_key: arabic_b2_review_negotiation_and_presenting
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي مُرَاجَعَةِ التَّفَاوُضِ وَالْعَرْضِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
  تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk meninjau negosiasi dan presentasi dengan alasan, contoh, respons, dan rekomendasi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي مُرَاجَعَةِ التَّفَاوُضِ وَالْعَرْضِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
    تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي مُرَاجَعَةِ التَّفَاوُضِ وَالْعَرْضِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ
    وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي مُرَاجَعَةِ التَّفَاوُضِ وَالْعَرْضِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Membuka sesi peninjauan ulang.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - مُرَاجَعَةِ
  - التَّفَاوُضِ
  - وَالْعَرْضِ
  indonesian_explanation: Posisi saya adalah bahwa review negosiasi dan presentasi membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.'
  sample_answer: أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.
  focus: Mereview kemampuan menyusun argumen.
  expected_keywords:
  - أَسْتَطِيعُ
  - أَنْ
  - أُقَدِّمَ
  - رَأْيًا
  - وَأَدْعَمَهُ
  indonesian_explanation: Saya bisa menyampaikan pendapat dan mendukungnya dengan bukti.
- coach: 'استخدم الفكرة: أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.'
  sample_answer: أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.
  focus: Mereview kemampuan percakapan profesional.
  expected_keywords:
  - أَسْتَطِيعُ
  - أَيْضًا
  - أَنْ
  - أُدِيرَ
  - حِوَارًا
  indonesian_explanation: Saya juga bisa mengelola percakapan profesional dengan jelas.
- coach: 'استخدم الفكرة: إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.'
  hint: 'Jawab dengan struktur B2 memakai: إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.'
  sample_answer: إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.
  focus: Mereview respons terhadap keberatan.
  expected_keywords:
  - إِذَا
  - ظَهَرَ
  - اِعْتِرَاضٌ،
  - فَسَأَرُدُّ
  - عَلَيْهِ
  indonesian_explanation: Jika muncul keberatan, saya akan menanggapinya dengan tenang.
target_phrases:
- مَوْقِفِي فِي مُرَاجَعَةِ التَّفَاوُضِ وَالْعَرْضِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- أَسْتَطِيعُ أَنْ أُقَدِّمَ رَأْيًا وَأَدْعَمَهُ بِدَلِيلٍ.
- أَسْتَطِيعُ أَيْضًا أَنْ أُدِيرَ حِوَارًا مِهَنِيًّا بِوُضُوحٍ.
- إِذَا ظَهَرَ اِعْتِرَاضٌ، فَسَأَرُدُّ عَلَيْهِ بِهُدُوءٍ.
- فِي الِاخْتِبَارِ النِّهَائِيِّ، سَأُرَكِّزُ عَلَى التَّرَابُطِ وَالْوُضُوحِ.
