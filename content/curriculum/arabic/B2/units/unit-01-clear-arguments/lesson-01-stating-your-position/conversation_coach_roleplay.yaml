scenario_key: arabic_b2_stating_your_position
mode: lesson_practice_coach
level_code: B2
opening_line: سَنُصَوِّتُ عَلَى تَغْيِيرِ الْأَدَاةِ. مَا مَوْقِفُكَ؟
learner_goal: Latih percakapan Arab B2 untuk menyatakan posisimu dengan jelas, lalu menopangnya dengan
  sikap yang tegas namun terbuka.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: سَنُصَوِّتُ عَلَى تَغْيِيرِ الْأَدَاةِ. مَا مَوْقِفُكَ؟
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
  sample_answer: 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
  focus: Menyatakan posisi dengan tegas.
  expected_keywords:
  - مَوْقِفِي
  - 'وَاضِحٌ:'
  - أَنَا
  - مَعَ
  - هَذَا
  indonesian_explanation: 'Posisiku jelas: aku mendukung arah ini.'
- coach: 'استخدم الفكرة: أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.'
  hint: 'Jawab dengan struktur B2 memakai: أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.'
  sample_answer: أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
  focus: Mendukung dengan kualifikasi ringan.
  expected_keywords:
  - أُؤَيِّدُ
  - الْفِكْرَةَ
  - مِنْ
  - حَيْثُ
  - الْمَبْدَأُ
  indonesian_explanation: Aku mendukung idenya secara prinsip.
- coach: 'استخدم الفكرة: لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.'
  hint: 'Jawab dengan struktur B2 memakai: لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.'
  sample_answer: لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.
  focus: Menyatakan ketidaksetujuan dengan sopan.
  expected_keywords:
  - لَا
  - أُوَافِقُ
  - تَمَامًا
  - وَلِي
  - رَأْيٌ
  indonesian_explanation: Aku tidak sepenuhnya setuju, dan punya pandangan berbeda.
- coach: 'استخدم الفكرة: دَعْنِي أُوَضِّحُ سَبَبَ مَوْقِفِي بِاخْتِصَارٍ.'
  hint: 'Jawab dengan struktur B2 memakai: دَعْنِي أُوَضِّحُ سَبَبَ مَوْقِفِي بِاخْتِصَارٍ.'
  sample_answer: دَعْنِي أُوَضِّحُ سَبَبَ مَوْقِفِي بِاخْتِصَارٍ.
  focus: Menjembatani ke alasan.
  expected_keywords:
  - دَعْنِي
  - أُوَضِّحُ
  - سَبَبَ
  - مَوْقِفِي
  - بِاخْتِصَارٍ
  indonesian_explanation: Coba aku jelaskan alasan posisiku singkat.
target_phrases:
- 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
- أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
- لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.
- دَعْنِي أُوَضِّحُ سَبَبَ مَوْقِفِي بِاخْتِصَارٍ.
- بِاخْتِصَارٍ، أَنَا أُفَضِّلُ هَذَا الْخِيَارَ.
