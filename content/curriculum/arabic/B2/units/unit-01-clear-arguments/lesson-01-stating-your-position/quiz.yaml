questions:
- key: phrase_1
  prompt: 'Frasa mana yang berarti "Posisiku jelas: aku mendukung arah ini."?'
  options:
  - 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
  - أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
  - لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.
  correct_answer: 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
- key: phrase_2
  prompt: Frasa mana yang berarti "Aku mendukung idenya secara prinsip."?
  options:
  - أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
  - 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
  - لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.
  correct_answer: أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
