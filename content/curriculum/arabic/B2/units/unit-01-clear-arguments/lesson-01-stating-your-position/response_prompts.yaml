prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Posisiku jelas: aku mendukung arah ini.'
  target_response: 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
  acceptable_responses:
  - 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
- prompt: 'Ucapkan dalam bahasa Arab: Aku mendukung idenya secara prinsip.'
  target_response: أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
  acceptable_responses:
  - أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku tidak sepenuhnya setuju, dan punya pandangan berbeda.'
  target_response: لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.
  acceptable_responses:
  - لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Coba aku jelaskan alasan posisiku singkat.'
  target_response: دَعْنِي أُوَضِّحُ سَبَبَ مَوْقِفِي بِاخْتِصَارٍ.
  acceptable_responses:
  - دَعْنِي أُوَضِّحُ سَبَبَ مَوْقِفِي بِاخْتِصَارٍ.
