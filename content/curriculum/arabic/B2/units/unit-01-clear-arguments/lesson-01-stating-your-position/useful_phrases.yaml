phrases:
- phrase: مَوْقِفِي هُوَ أَنَّ هَذَا الْمَوْضُوعَ مُهِمٌّ فِي النِّقَاشِ.
  meaning_id: Posisi saya adalah bahwa topik menentukan posisi penting dalam diskusi.
  usage_note: Menyatakan posisi dengan jelas.
- phrase: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
  meaning_id: Saya mendukung pendapat ini dengan dua alasan yang jelas.
  usage_note: Memberi kerangka argumen.
- phrase: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.
  meaning_id: Contohnya, tim membutuhkan keputusan yang cepat.
  usage_note: Memberi contoh konkret.
- phrase: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
  meaning_id: Saya memahami poin lawannya, tetapi manfaatnya lebih besar.
  usage_note: Merespons counterpoint dengan sopan.
- phrase: لِذَلِكَ أُفَضِّلُ أَنْ نَتَّفِقَ عَلَى هَذَا الْمَسَارِ.
  meaning_id: Karena itu, saya lebih memilih kita sepakat pada arah ini.
  usage_note: Menutup argumen dengan rekomendasi.
