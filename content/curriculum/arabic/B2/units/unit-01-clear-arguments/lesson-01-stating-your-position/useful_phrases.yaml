phrases:
- phrase: 'مَوْقِفِي وَاضِحٌ: أَنَا مَعَ هَذَا الِاتِّجَاهِ.'
  meaning_id: 'Posisiku jelas: aku mendukung arah ini.'
  usage_note: Menyatakan posisi dengan tegas.
- phrase: أُؤَيِّدُ الْفِكْرَةَ مِنْ حَيْثُ الْمَبْدَأُ.
  meaning_id: Aku mendukung idenya secara prinsip.
  usage_note: Mendukung dengan kualifikasi ringan.
- phrase: لَا أُوَافِقُ تَمَامًا، وَلِي رَأْيٌ مُخْتَلِفٌ.
  meaning_id: Aku tidak sepenuhnya setuju, dan punya pandangan berbeda.
  usage_note: Menyatakan ketidaksetujuan dengan sopan.
- phrase: دَعْنِي أُوَضِّحُ سَبَبَ مَوْقِفِي بِاخْتِصَارٍ.
  meaning_id: Coba aku jelaskan alasan posisiku singkat.
  usage_note: Menjembatani ke alasan.
- phrase: بِاخْتِصَارٍ، أَنَا أُفَضِّلُ هَذَا الْخِيَارَ.
  meaning_id: Singkatnya, aku lebih memilih opsi ini.
  usage_note: Menutup dengan posisi ringkas.
