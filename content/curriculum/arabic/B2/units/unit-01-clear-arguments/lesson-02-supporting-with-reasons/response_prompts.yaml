prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Posisiku, jadwal sekarang membuat tim kelelahan.'
  target_response: مَوْقِفِي هُوَ أَنَّ الْجَدْوَلَ الْحَالِيَّ يُرْهِقُ الْفَرِيقَ.
  acceptable_responses:
  - مَوْقِفِي هُوَ أَنَّ الْجَدْوَلَ الْحَالِيَّ يُرْهِقُ الْفَرِيقَ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku dukung pendapat ini dengan dua alasan jelas.'
  target_response: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
  acceptable_responses:
  - أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
- prompt: 'Ucapkan dalam bahasa Arab: Contohnya, tim butuh keputusan cepat hampir tiap hari.'
  target_response: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ كُلَّ يَوْمٍ.
  acceptable_responses:
  - مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ كُلَّ يَوْمٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham poin lawannya, tapi manfaatnya lebih besar.'
  target_response: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
  acceptable_responses:
  - أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
