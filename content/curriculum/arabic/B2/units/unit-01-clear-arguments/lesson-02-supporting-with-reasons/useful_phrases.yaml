phrases:
- phrase: مَوْقِفِي هُوَ أَنَّ الْجَدْوَلَ الْحَالِيَّ يُرْهِقُ الْفَرِيقَ.
  meaning_id: Posisiku, jadwal sekarang membuat tim kelelahan.
  usage_note: Menyatakan posisi dengan jelas.
- phrase: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
  meaning_id: Aku dukung pendapat ini dengan dua alasan jelas.
  usage_note: Memberi kerangka argumen.
- phrase: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ كُلَّ يَوْمٍ.
  meaning_id: Contohnya, tim butuh keputusan cepat hampir tiap hari.
  usage_note: Memberi contoh konkret.
- phrase: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
  meaning_id: Aku paham poin lawannya, tapi manfaatnya lebih besar.
  usage_note: Merespons counterpoint dengan sopan.
- phrase: لِذَلِكَ أُفَضِّلُ أَنْ نَتَّفِقَ عَلَى هَذَا الْمَسَارِ.
  meaning_id: Karena itu aku lebih memilih kita sepakat pada arah ini.
  usage_note: Menutup argumen dengan rekomendasi.
