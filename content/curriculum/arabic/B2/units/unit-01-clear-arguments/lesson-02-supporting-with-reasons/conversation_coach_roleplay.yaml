scenario_key: arabic_b2_supporting_with_reasons
mode: lesson_practice_coach
level_code: B2
opening_line: مَا مَوْقِفُكَ مِنْ هَذَا الْمَوْضُوعِ؟
learner_goal: Latih percakapan Arab B2 untuk mendukung pendapat dengan alasan dengan alasan, contoh, respons,
  dan rekomendasi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا مَوْقِفُكَ مِنْ هَذَا الْمَوْضُوعِ؟
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي هُوَ أَنَّ هَذَا الْمَوْضُوعَ مُهِمٌّ فِي النِّقَاشِ.'
  sample_answer: مَوْقِفِي هُوَ أَنَّ هَذَا الْمَوْضُوعَ مُهِمٌّ فِي النِّقَاشِ.
  focus: Menyatakan posisi dengan jelas.
  expected_keywords:
  - مَوْقِفِي
  - هُوَ
  - أَنَّ
  - هَذَا
  - الْمَوْضُوعَ
  indonesian_explanation: Posisi saya adalah bahwa topik mendukung pendapat dengan alasan penting dalam
    diskusi.
- coach: 'استخدم الفكرة: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.'
  hint: 'Jawab dengan struktur B2 memakai: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.'
  sample_answer: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
  focus: Memberi kerangka argumen.
  expected_keywords:
  - أَدْعَمُ
  - هَذَا
  - الرَّأْيَ
  - بِسَبَبَيْنِ
  - وَاضِحَيْنِ
  indonesian_explanation: Saya mendukung pendapat ini dengan dua alasan yang jelas.
- coach: 'استخدم الفكرة: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.'
  hint: 'Jawab dengan struktur B2 memakai: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.'
  sample_answer: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.
  focus: Memberi contoh konkret.
  expected_keywords:
  - مِثَالُ
  - ذَلِكَ
  - أَنَّ
  - الْفَرِيقَ
  - يَحْتَاجُ
  indonesian_explanation: Contohnya, tim membutuhkan keputusan yang cepat.
- coach: 'استخدم الفكرة: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ
    أَكْبَرُ.'
  sample_answer: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
  focus: Merespons counterpoint dengan sopan.
  expected_keywords:
  - أَفْهَمُ
  - هَذِهِ
  - النُّقْطَةَ
  - الْمُعَارِضَةَ،
  - وَلَكِنَّ
  indonesian_explanation: Saya memahami poin lawannya, tetapi manfaatnya lebih besar.
target_phrases:
- مَوْقِفِي هُوَ أَنَّ هَذَا الْمَوْضُوعَ مُهِمٌّ فِي النِّقَاشِ.
- أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
- مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.
- أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
- لِذَلِكَ أُفَضِّلُ أَنْ نَتَّفِقَ عَلَى هَذَا الْمَسَارِ.
