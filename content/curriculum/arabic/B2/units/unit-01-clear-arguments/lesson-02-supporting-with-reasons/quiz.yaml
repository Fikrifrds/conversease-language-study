questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Posisiku, jadwal sekarang membuat tim kelelahan."?
  options:
  - مَوْقِفِي هُوَ أَنَّ الْجَدْوَلَ الْحَالِيَّ يُرْهِقُ الْفَرِيقَ.
  - أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
  - مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ كُلَّ يَوْمٍ.
  correct_answer: مَوْقِفِي هُوَ أَنَّ الْجَدْوَلَ الْحَالِيَّ يُرْهِقُ الْفَرِيقَ.
- key: phrase_2
