scenario_key: arabic_b2_using_examples
mode: lesson_practice_coach
level_code: B2
opening_line: أَقْتَرِحُ أَدَاةً جَدِيدَةً، لَكِنِّي أُرِيدُ دَلِيلًا.
learner_goal: Latih percakapan Arab B2 untuk memperkuat pendapat dengan contoh konkret dari pengalaman
  nyata.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: أَقْتَرِحُ أَدَاةً جَدِيدَةً، لَكِنِّي أُرِيدُ دَلِيلًا.
  hint: 'Jawab dengan struktur B2 memakai: لِأُوَضِّحَ فِكْرَتِي، سَأُعْطِي مِثَالًا مِنْ تَجْرِبَتِنَا.'
  sample_answer: لِأُوَضِّحَ فِكْرَتِي، سَأُعْطِي مِثَالًا مِنْ تَجْرِبَتِنَا.
  focus: Membuka dengan contoh.
  expected_keywords:
  - لِأُوَضِّحَ
  - فِكْرَتِي
  - سَأُعْطِي
  - مِثَالًا
  - مِنْ
  indonesian_explanation: Untuk memperjelas, aku beri contoh dari pengalaman kita.
- coach: 'استخدم الفكرة: مِثَالٌ وَاحِدٌ مَلْمُوسٌ يُسَاوِي شَرْحًا طَوِيلًا.'
  hint: 'Jawab dengan struktur B2 memakai: مِثَالٌ وَاحِدٌ مَلْمُوسٌ يُسَاوِي شَرْحًا طَوِيلًا.'
  sample_answer: مِثَالٌ وَاحِدٌ مَلْمُوسٌ يُسَاوِي شَرْحًا طَوِيلًا.
  focus: Menegaskan nilai contoh.
  expected_keywords:
  - مِثَالٌ
  - وَاحِدٌ
  - مَلْمُوسٌ
  - يُسَاوِي
  - شَرْحًا
  indonesian_explanation: Satu contoh konkret setara penjelasan panjang.
- coach: 'استخدم الفكرة: حَدَثَ هَذَا فِعْلًا مَعَ عَمِيلٍ الشَّهْرَ الْمَاضِيَ.'
  hint: 'Jawab dengan struktur B2 memakai: حَدَثَ هَذَا فِعْلًا مَعَ عَمِيلٍ الشَّهْرَ الْمَاضِيَ.'
  sample_answer: حَدَثَ هَذَا فِعْلًا مَعَ عَمِيلٍ الشَّهْرَ الْمَاضِيَ.
  focus: Memberi contoh nyata.
  expected_keywords:
  - حَدَثَ
  - هَذَا
  - فِعْلًا
  - مَعَ
  - عَمِيلٍ
  indonesian_explanation: Ini benar-benar terjadi dengan klien bulan lalu.
- coach: 'استخدم الفكرة: هَذَا الْمِثَالُ يُظْهِرُ الْمُشْكِلَةَ بِوُضُوحٍ.'
  hint: 'Jawab dengan struktur B2 memakai: هَذَا الْمِثَالُ يُظْهِرُ الْمُشْكِلَةَ بِوُضُوحٍ.'
  sample_answer: هَذَا الْمِثَالُ يُظْهِرُ الْمُشْكِلَةَ بِوُضُوحٍ.
  focus: Menghubungkan contoh ke poin.
  expected_keywords:
  - هَذَا
  - الْمِثَالُ
  - يُظْهِرُ
  - الْمُشْكِلَةَ
  - بِوُضُوحٍ
  indonesian_explanation: Contoh ini menunjukkan masalahnya dengan jelas.
target_phrases:
- لِأُوَضِّحَ فِكْرَتِي، سَأُعْطِي مِثَالًا مِنْ تَجْرِبَتِنَا.
- مِثَالٌ وَاحِدٌ مَلْمُوسٌ يُسَاوِي شَرْحًا طَوِيلًا.
- حَدَثَ هَذَا فِعْلًا مَعَ عَمِيلٍ الشَّهْرَ الْمَاضِيَ.
- هَذَا الْمِثَالُ يُظْهِرُ الْمُشْكِلَةَ بِوُضُوحٍ.
- وَلِنُبْقِيَ الْمِثَالَ عَامًّا، نُخْفِي اسْمَ الْعَمِيلِ.
