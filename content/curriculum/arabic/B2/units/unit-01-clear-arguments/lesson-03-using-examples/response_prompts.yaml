prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Untuk memperjelas, aku beri contoh dari pengalaman kita.'
  target_response: لِأُوَضِّحَ فِكْرَتِي، سَأُعْطِي مِثَالًا مِنْ تَجْرِبَتِنَا.
  acceptable_responses:
  - لِأُوَضِّحَ فِكْرَتِي، سَأُعْطِي مِثَالًا مِنْ تَجْرِبَتِنَا.
- prompt: 'Ucapkan dalam bahasa Arab: Satu contoh konkret setara penjelasan panjang.'
  target_response: مِثَالٌ وَاحِدٌ مَلْمُوسٌ يُسَاوِي شَرْحًا طَوِيلًا.
  acceptable_responses:
  - مِثَالٌ وَاحِدٌ مَلْمُوسٌ يُسَاوِي شَرْحًا طَوِيلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Ini benar-benar terjadi dengan klien bulan lalu.'
  target_response: حَدَثَ هَذَا فِعْلًا مَعَ عَمِيلٍ الشَّهْرَ الْمَاضِيَ.
  acceptable_responses:
  - حَدَثَ هَذَا فِعْلًا مَعَ عَمِيلٍ الشَّهْرَ الْمَاضِيَ.
- prompt: 'Ucapkan dalam bahasa Arab: Contoh ini menunjukkan masalahnya dengan jelas.'
  target_response: هَذَا الْمِثَالُ يُظْهِرُ الْمُشْكِلَةَ بِوُضُوحٍ.
  acceptable_responses:
  - هَذَا الْمِثَالُ يُظْهِرُ الْمُشْكِلَةَ بِوُضُوحٍ.
