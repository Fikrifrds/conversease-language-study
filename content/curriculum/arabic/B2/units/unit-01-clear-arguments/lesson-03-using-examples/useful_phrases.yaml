phrases:
- phrase: لِأُوَضِّحَ فِكْرَتِي، سَأُعْطِي مِثَالًا مِنْ تَجْرِبَتِنَا.
  meaning_id: Untuk memperjelas, aku beri contoh dari pengalaman kita.
  usage_note: Membuka dengan contoh.
- phrase: مِثَالٌ وَاحِدٌ مَلْمُوسٌ يُسَاوِي شَرْحًا طَوِيلًا.
  meaning_id: Satu contoh konkret setara penjelasan panjang.
  usage_note: Menegaskan nilai contoh.
- phrase: حَدَثَ هَذَا فِعْلًا مَعَ عَمِيلٍ الشَّهْرَ الْمَاضِيَ.
  meaning_id: Ini benar-benar terjadi dengan klien bulan lalu.
  usage_note: Memberi contoh nyata.
- phrase: هَذَا الْمِثَالُ يُظْهِرُ الْمُشْكِلَةَ بِوُضُوحٍ.
  meaning_id: Contoh ini menunjukkan masalahnya dengan jelas.
  usage_note: Menghubungkan contoh ke poin.
- phrase: وَلِنُبْقِيَ الْمِثَالَ عَامًّا، نُخْفِي اسْمَ الْعَمِيلِ.
  meaning_id: Dan agar tetap netral, kita sembunyikan nama klien.
  usage_note: Menjaga contoh tetap aman.
