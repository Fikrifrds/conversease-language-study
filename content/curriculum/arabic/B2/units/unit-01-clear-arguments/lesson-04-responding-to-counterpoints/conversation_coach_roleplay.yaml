scenario_key: arabic_b2_responding_to_counterpoints
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي الِاعْتِرَاضِ عَلَى زِيَادَةِ الْمُرَاجَعَةِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ
  وَخُطْوَةٍ تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk menanggapi keberatan dengan alasan, contoh, respons, dan rekomendasi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي الِاعْتِرَاضِ عَلَى زِيَادَةِ الْمُرَاجَعَةِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
    تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي الِاعْتِرَاضِ عَلَى زِيَادَةِ الْمُرَاجَعَةِ أَنَّنَا نَحْتَاجُ إِلَى
    قَرَارٍ وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي الِاعْتِرَاضِ عَلَى زِيَادَةِ الْمُرَاجَعَةِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Menyatakan posisi dengan jelas.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - الِاعْتِرَاضِ
  - عَلَى
  - زِيَادَةِ
  indonesian_explanation: Posisi saya adalah bahwa keberatan terhadap tambahan review membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.'
  hint: 'Jawab dengan struktur B2 memakai: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.'
  sample_answer: أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
  focus: Memberi kerangka argumen.
  expected_keywords:
  - أَدْعَمُ
  - هَذَا
  - الرَّأْيَ
  - بِسَبَبَيْنِ
  - وَاضِحَيْنِ
  indonesian_explanation: Saya mendukung pendapat ini dengan dua alasan yang jelas.
- coach: 'استخدم الفكرة: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.'
  hint: 'Jawab dengan struktur B2 memakai: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.'
  sample_answer: مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.
  focus: Memberi contoh konkret.
  expected_keywords:
  - مِثَالُ
  - ذَلِكَ
  - أَنَّ
  - الْفَرِيقَ
  - يَحْتَاجُ
  indonesian_explanation: Contohnya, tim membutuhkan keputusan yang cepat.
- coach: 'استخدم الفكرة: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.'
  sample_answer: أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
  focus: Merespons counterpoint dengan sopan.
  expected_keywords:
  - أَفْهَمُ
  - هَذِهِ
  - النُّقْطَةَ
  - الْمُعَارِضَةَ،
  - وَلَكِنَّ
  indonesian_explanation: Saya memahami poin lawannya, tetapi manfaatnya lebih besar.
target_phrases:
- مَوْقِفِي فِي الِاعْتِرَاضِ عَلَى زِيَادَةِ الْمُرَاجَعَةِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- أَدْعَمُ هَذَا الرَّأْيَ بِسَبَبَيْنِ وَاضِحَيْنِ.
- مِثَالُ ذَلِكَ أَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ سَرِيعٍ.
- أَفْهَمُ هَذِهِ النُّقْطَةَ الْمُعَارِضَةَ، وَلَكِنَّ الْفَائِدَةَ أَكْبَرُ.
- لِذَلِكَ أُفَضِّلُ أَنْ نَتَّفِقَ عَلَى هَذَا الْمَسَارِ.
