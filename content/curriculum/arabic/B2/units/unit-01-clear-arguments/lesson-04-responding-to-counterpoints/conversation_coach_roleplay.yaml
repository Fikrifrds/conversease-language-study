scenario_key: arabic_b2_responding_to_counterpoints
mode: lesson_practice_coach
level_code: B2
opening_line: أَخْشَى أَنَّ الْعَمَلَ عَنْ بُعْدٍ يُضْعِفُ التَّوَاصُلَ.
learner_goal: 'Latih percakapan Arab B2 untuk menanggapi keberatan dengan tenang: mengakui poin lawan
  lalu menjawabnya.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: أَخْشَى أَنَّ الْعَمَلَ عَنْ بُعْدٍ يُضْعِفُ التَّوَاصُلَ.
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.'
  sample_answer: أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
  focus: Mengakui keberatan.
  expected_keywords:
  - أَفْهَمُ
  - قَلَقَكَ
  - وَهُوَ
  - قَلَقٌ
  - مَشْرُوعٌ
  indonesian_explanation: Aku paham kekhawatiranmu, dan itu wajar.
- coach: 'استخدم الفكرة: هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.'
  sample_answer: هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
  focus: Mengakui sebagian, menahan sebagian.
  expected_keywords:
  - هَذَا
  - صَحِيحٌ
  - جُزْئِيًّا
  - لَكِنَّهُ
  - لَيْسَ
  indonesian_explanation: Itu sebagian benar, tapi bukan keseluruhan.
- coach: 'استخدم الفكرة: مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.'
  hint: 'Jawab dengan struktur B2 memakai: مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.'
  sample_answer: مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.
  focus: Membalikkan ke manfaat.
  expected_keywords:
  - مَعَ
  - ذَلِكَ
  - الْفَائِدَةُ
  - تَبْقَى
  - أَكْبَرَ
  indonesian_explanation: Meski begitu, manfaatnya tetap lebih besar.
- coach: 'استخدم الفكرة: دَعْنَا نُعَالِجُ هَذِهِ النُّقْطَةَ بِخُطَّةٍ.'
  hint: 'Jawab dengan struktur B2 memakai: دَعْنَا نُعَالِجُ هَذِهِ النُّقْطَةَ بِخُطَّةٍ.'
  sample_answer: دَعْنَا نُعَالِجُ هَذِهِ النُّقْطَةَ بِخُطَّةٍ.
  focus: Mengubah keberatan jadi solusi.
  expected_keywords:
  - دَعْنَا
  - نُعَالِجُ
  - هَذِهِ
  - النُّقْطَةَ
  - بِخُطَّةٍ
  indonesian_explanation: Mari kita atasi poin ini dengan rencana.
target_phrases:
- أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
- هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
- مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.
- دَعْنَا نُعَالِجُ هَذِهِ النُّقْطَةَ بِخُطَّةٍ.
- بِهَذَا نَحْتَفِظُ بِالْمِيزَةِ وَنُقَلِّلُ الْخَطَرَ.
rubric:
  speaking:
    minimum_score: 72
  relevance:
    minimum_score: 72
  argument_structure:
    minimum_score: 70
  grammar:
    minimum_score: 70
