prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham kekhawatiranmu, dan itu wajar.'
  target_response: أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
  acceptable_responses:
  - أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Itu sebagian benar, tapi bukan keseluruhan.'
  target_response: هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
  acceptable_responses:
  - هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Meski begitu, manfaatnya tetap lebih besar.'
  target_response: مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.
  acceptable_responses:
  - مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Mari kita atasi poin ini dengan rencana.'
  target_response: دَعْنَا نُعَالِجُ هَذِهِ النُّقْطَةَ بِخُطَّةٍ.
  acceptable_responses:
  - دَعْنَا نُعَالِجُ هَذِهِ النُّقْطَةَ بِخُطَّةٍ.
