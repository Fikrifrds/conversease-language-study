phrases:
- phrase: أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
  meaning_id: Aku paham kekhawatiranmu, dan itu wajar.
  usage_note: Mengakui keberatan.
- phrase: هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
  meaning_id: Itu sebagian benar, tapi bukan keseluruhan.
  usage_note: Mengakui sebagian, menahan sebagian.
- phrase: مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.
  meaning_id: Meski begitu, manfaatnya tetap lebih besar.
  usage_note: Membalikkan ke manfaat.
- phrase: دَعْنَا نُعَالِجُ هَذِهِ النُّقْطَةَ بِخُطَّةٍ.
  meaning_id: Mari kita atasi poin ini dengan rencana.
  usage_note: Mengubah keberatan jadi solusi.
- phrase: بِهَذَا نَحْتَفِظُ بِالْمِيزَةِ وَنُقَلِّلُ الْخَطَرَ.
  meaning_id: Dengan begitu kita pertahankan keunggulan dan kurangi risiko.
  usage_note: Menutup dengan keseimbangan.
