questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku paham kekhawatiranmu, dan itu wajar."?
  options:
  - أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
  - هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
  - مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.
  correct_answer: أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Itu sebagian benar, tapi bukan keseluruhan."?
  options:
  - هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
  - أَفْهَمُ قَلَقَكَ، وَهُوَ قَلَقٌ مَشْرُوعٌ.
  - مَعَ ذَلِكَ، الْفَائِدَةُ تَبْقَى أَكْبَرَ.
  correct_answer: هَذَا صَحِيحٌ جُزْئِيًّا، لَكِنَّهُ لَيْسَ كُلَّ الصُّورَةِ.
