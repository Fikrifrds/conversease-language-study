prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Posisiku, vendor kedua lebih cocok.'
  target_response: مَوْقِفِي أَنَّ الْمُورِّدَ الثَّانِيَ أَنْسَبُ.
  acceptable_responses:
  - مَوْقِفِي أَنَّ الْمُورِّدَ الثَّانِيَ أَنْسَبُ.
- prompt: 'Ucapkan dalam bahasa Arab: Alasan pertama adalah kecepatan dukungan.'
  target_response: السَّبَبُ الْأَوَّلُ هُوَ سُرْعَةُ الدَّعْمِ.
  acceptable_responses:
  - السَّبَبُ الْأَوَّلُ هُوَ سُرْعَةُ الدَّعْمِ.
- prompt: 'Ucapkan dalam bahasa Arab: Contohnya, dia menjawab kita dalam sejam.'
  target_response: مِثَالُ ذَلِكَ أَنَّهُ رَدَّ عَلَيْنَا فِي سَاعَةٍ.
  acceptable_responses:
  - مِثَالُ ذَلِكَ أَنَّهُ رَدَّ عَلَيْنَا فِي سَاعَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham dia lebih mahal, tapi layanannya sepadan.'
  target_response: أَفْهَمُ أَنَّهُ أَغْلَى، لَكِنَّ الْخِدْمَةَ تُبَرِّرُ ذَلِكَ.
  acceptable_responses:
  - أَفْهَمُ أَنَّهُ أَغْلَى، لَكِنَّ الْخِدْمَةَ تُبَرِّرُ ذَلِكَ.
