scenario_key: arabic_b2_clear_argument_mission
mode: lesson_practice_coach
level_code: B2
opening_line: عَلَيْنَا اخْتِيَارُ مُورِّدٍ الْيَوْمَ. مَا رَأْيُكَ؟
learner_goal: 'Latih percakapan Arab B2 untuk membangun argumen utuh: posisi, alasan, contoh, respons
  keberatan, lalu rekomendasi.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: عَلَيْنَا اخْتِيَارُ مُورِّدٍ الْيَوْمَ. مَا رَأْيُكَ؟
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي أَنَّ الْمُورِّدَ الثَّانِيَ أَنْسَبُ.'
  sample_answer: مَوْقِفِي أَنَّ الْمُورِّدَ الثَّانِيَ أَنْسَبُ.
  focus: Membuka argumen dengan posisi.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - الْمُورِّدَ
  - الثَّانِيَ
  - أَنْسَبُ
  indonesian_explanation: Posisiku, vendor kedua lebih cocok.
- coach: 'استخدم الفكرة: السَّبَبُ الْأَوَّلُ هُوَ سُرْعَةُ الدَّعْمِ.'
  hint: 'Jawab dengan struktur B2 memakai: السَّبَبُ الْأَوَّلُ هُوَ سُرْعَةُ الدَّعْمِ.'
  sample_answer: السَّبَبُ الْأَوَّلُ هُوَ سُرْعَةُ الدَّعْمِ.
  focus: Memberi alasan utama.
  expected_keywords:
  - السَّبَبُ
  - الْأَوَّلُ
  - هُوَ
  - سُرْعَةُ
  - الدَّعْمِ
  indonesian_explanation: Alasan pertama adalah kecepatan dukungan.
- coach: 'استخدم الفكرة: مِثَالُ ذَلِكَ أَنَّهُ رَدَّ عَلَيْنَا فِي سَاعَةٍ.'
  hint: 'Jawab dengan struktur B2 memakai: مِثَالُ ذَلِكَ أَنَّهُ رَدَّ عَلَيْنَا فِي سَاعَةٍ.'
  sample_answer: مِثَالُ ذَلِكَ أَنَّهُ رَدَّ عَلَيْنَا فِي سَاعَةٍ.
  focus: Menopang dengan contoh.
  expected_keywords:
  - مِثَالُ
  - ذَلِكَ
  - أَنَّهُ
  - رَدَّ
  - عَلَيْنَا
  indonesian_explanation: Contohnya, dia menjawab kita dalam sejam.
- coach: 'استخدم الفكرة: أَفْهَمُ أَنَّهُ أَغْلَى، لَكِنَّ الْخِدْمَةَ تُبَرِّرُ ذَلِكَ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ أَنَّهُ أَغْلَى، لَكِنَّ الْخِدْمَةَ تُبَرِّرُ ذَلِكَ.'
  sample_answer: أَفْهَمُ أَنَّهُ أَغْلَى، لَكِنَّ الْخِدْمَةَ تُبَرِّرُ ذَلِكَ.
  focus: Menanggapi keberatan harga.
  expected_keywords:
  - أَفْهَمُ
  - أَنَّهُ
  - أَغْلَى
  - لَكِنَّ
  - الْخِدْمَةَ
  indonesian_explanation: Aku paham dia lebih mahal, tapi layanannya sepadan.
target_phrases:
- مَوْقِفِي أَنَّ الْمُورِّدَ الثَّانِيَ أَنْسَبُ.
- السَّبَبُ الْأَوَّلُ هُوَ سُرْعَةُ الدَّعْمِ.
- مِثَالُ ذَلِكَ أَنَّهُ رَدَّ عَلَيْنَا فِي سَاعَةٍ.
- أَفْهَمُ أَنَّهُ أَغْلَى، لَكِنَّ الْخِدْمَةَ تُبَرِّرُ ذَلِكَ.
- لِذَلِكَ أُوصِي بِهِ مَعَ عَقْدٍ تَجْرِيبِيٍّ.
