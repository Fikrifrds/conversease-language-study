phrases:
- phrase: مَوْقِفِي أَنَّ الْمُورِّدَ الثَّانِيَ أَنْسَبُ.
  meaning_id: Posisiku, vendor kedua lebih cocok.
  usage_note: Membuka argumen dengan posisi.
- phrase: السَّبَبُ الْأَوَّلُ هُوَ سُرْعَةُ الدَّعْمِ.
  meaning_id: Alasan pertama adalah kecepatan dukungan.
  usage_note: Memberi alasan utama.
- phrase: مِثَالُ ذَلِكَ أَنَّهُ رَدَّ عَلَيْنَا فِي سَاعَةٍ.
  meaning_id: Contohnya, dia menjawab kita dalam sejam.
  usage_note: Menopang dengan contoh.
- phrase: أَفْهَمُ أَنَّهُ أَغْلَى، لَكِنَّ الْخِدْمَةَ تُبَرِّرُ ذَلِكَ.
  meaning_id: Aku paham dia lebih mahal, tapi layanannya sepadan.
  usage_note: Menanggapi keberatan harga.
- phrase: لِذَلِكَ أُوصِي بِهِ مَعَ عَقْدٍ تَجْرِيبِيٍّ.
  meaning_id: Karena itu aku rekomendasikan dia dengan kontrak percobaan.
  usage_note: Menutup dengan rekomendasi.
