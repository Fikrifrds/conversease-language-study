questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Menurutku, iklannya menarik tapi kabur."?
  options:
  - فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
  - أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
  - مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.
  correct_answer: فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Aku bersandar pada pengalaman pengguna."?
  options:
  - أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
  - فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
  - مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.
  correct_answer: أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
