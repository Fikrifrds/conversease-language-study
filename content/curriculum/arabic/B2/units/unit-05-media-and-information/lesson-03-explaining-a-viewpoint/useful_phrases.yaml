phrases:
- phrase: فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
  meaning_id: Menurutku, iklannya menarik tapi kabur.
  usage_note: Menyatakan sudut pandang.
- phrase: أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
  meaning_id: Aku bersandar pada pengalaman pengguna.
  usage_note: Menopang dengan dasar.
- phrase: مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.
  meaning_id: Dari sudut lain, pesannya butuh kejelasan.
  usage_note: Menambah perspektif.
- phrase: لَا أُعَمِّمُ، فَالذَّوْقُ يَخْتَلِفُ.
  meaning_id: Aku tidak menggeneralisasi, selera berbeda-beda.
  usage_note: Menahan klaim berlebihan.
- phrase: لِذَلِكَ أَقْتَرِحُ أَنْ نَخْتَبِرَ نُسْخَتَيْنِ.
  meaning_id: Karena itu aku usul kita uji dua versi.
  usage_note: Menutup dengan langkah uji.
