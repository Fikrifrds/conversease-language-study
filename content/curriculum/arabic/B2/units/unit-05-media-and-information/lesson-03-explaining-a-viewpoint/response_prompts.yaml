prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Menurutku, iklannya menarik tapi kabur.'
  target_response: فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
  acceptable_responses:
  - فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku bersandar pada pengalaman pengguna.'
  target_response: أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
  acceptable_responses:
  - أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
- prompt: 'Ucapkan dalam bahasa Arab: Dari sudut lain, pesannya butuh kejelasan.'
  target_response: مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.
  acceptable_responses:
  - مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.
- prompt: 'Ucapkan dalam bahasa Arab: Aku tidak menggeneralisasi, selera berbeda-beda.'
  target_response: لَا أُعَمِّمُ، فَالذَّوْقُ يَخْتَلِفُ.
  acceptable_responses:
  - لَا أُعَمِّمُ، فَالذَّوْقُ يَخْتَلِفُ.
