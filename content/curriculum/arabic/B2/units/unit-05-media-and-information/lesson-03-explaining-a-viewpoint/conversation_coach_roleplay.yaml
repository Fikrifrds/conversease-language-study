scenario_key: arabic_b2_explaining_a_viewpoint
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي الْإِعْلَانِ الْجَدِيدِ؟
learner_goal: Latih percakapan Arab B2 untuk menjelaskan sudut pandang dan menopangnya dengan alasan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي الْإِعْلَانِ الْجَدِيدِ؟
  hint: 'Jawab dengan struktur B2 memakai: فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.'
  sample_answer: فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
  focus: Menyatakan sudut pandang.
  expected_keywords:
  - فِي
  - رَأْيِي
  - الْإِعْلَانُ
  - جَذَّابٌ
  - لَكِنَّهُ
  indonesian_explanation: Menurutku, iklannya menarik tapi kabur.
- coach: 'استخدم الفكرة: أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.'
  hint: 'Jawab dengan struktur B2 memakai: أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.'
  sample_answer: أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
  focus: Menopang dengan dasar.
  expected_keywords:
  - أَسْتَنِدُ
  - إِلَى
  - تَجْرِبَةِ
  - الْمُسْتَخْدِمِينَ
  indonesian_explanation: Aku bersandar pada pengalaman pengguna.
- coach: 'استخدم الفكرة: مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.'
  hint: 'Jawab dengan struktur B2 memakai: مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.'
  sample_answer: مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.
  focus: Menambah perspektif.
  expected_keywords:
  - مِنْ
  - زَاوِيَةٍ
  - أُخْرَى
  - الرِّسَالَةُ
  - تَحْتَاجُ
  indonesian_explanation: Dari sudut lain, pesannya butuh kejelasan.
- coach: 'استخدم الفكرة: لَا أُعَمِّمُ، فَالذَّوْقُ يَخْتَلِفُ.'
  hint: 'Jawab dengan struktur B2 memakai: لَا أُعَمِّمُ، فَالذَّوْقُ يَخْتَلِفُ.'
  sample_answer: لَا أُعَمِّمُ، فَالذَّوْقُ يَخْتَلِفُ.
  focus: Menahan klaim berlebihan.
  expected_keywords:
  - لَا
  - أُعَمِّمُ
  - فَالذَّوْقُ
  - يَخْتَلِفُ
  indonesian_explanation: Aku tidak menggeneralisasi, selera berbeda-beda.
target_phrases:
- فِي رَأْيِي، الْإِعْلَانُ جَذَّابٌ لَكِنَّهُ غَامِضٌ.
- أَسْتَنِدُ إِلَى تَجْرِبَةِ الْمُسْتَخْدِمِينَ.
- مِنْ زَاوِيَةٍ أُخْرَى، الرِّسَالَةُ تَحْتَاجُ وُضُوحًا.
- لَا أُعَمِّمُ، فَالذَّوْقُ يَخْتَلِفُ.
- لِذَلِكَ أَقْتَرِحُ أَنْ نَخْتَبِرَ نُسْخَتَيْنِ.
