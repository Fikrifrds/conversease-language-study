scenario_key: arabic_b2_summarizing_an_article
mode: lesson_practice_coach
level_code: B2
opening_line: قَرَأْتَ الْمَقَالَ عَنْ عَادَاتِ الْمُسْتَخْدِمِينَ. مَا خُلَاصَتُهُ؟
learner_goal: Latih percakapan Arab B2 untuk merangkum sebuah artikel dan menilai kekuatan kesimpulannya.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: قَرَأْتَ الْمَقَالَ عَنْ عَادَاتِ الْمُسْتَخْدِمِينَ. مَا خُلَاصَتُهُ؟
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ مِنَ الْمَقَالِ أَنَّ النَّاسَ يُفَضِّلُونَ الْخِدْمَةَ
    الْأَسْرَعَ.'
  sample_answer: أَفْهَمُ مِنَ الْمَقَالِ أَنَّ النَّاسَ يُفَضِّلُونَ الْخِدْمَةَ الْأَسْرَعَ.
  focus: Merangkum inti artikel.
  expected_keywords:
  - أَفْهَمُ
  - مِنَ
  - الْمَقَالِ
  - أَنَّ
  - النَّاسَ
  indonesian_explanation: Aku paham dari artikel bahwa orang lebih suka layanan yang lebih cepat.
- coach: 'استخدم الفكرة: يَجِبُ أَنْ نَتَأَكَّدَ مِنْ أَنَّ الْمَصْدَرَ مَوْثُوقٌ.'
  hint: 'Jawab dengan struktur B2 memakai: يَجِبُ أَنْ نَتَأَكَّدَ مِنْ أَنَّ الْمَصْدَرَ مَوْثُوقٌ.'
  sample_answer: يَجِبُ أَنْ نَتَأَكَّدَ مِنْ أَنَّ الْمَصْدَرَ مَوْثُوقٌ.
  focus: Mengevaluasi sumber.
  expected_keywords:
  - يَجِبُ
  - أَنْ
  - نَتَأَكَّدَ
  - مِنْ
  - أَنَّ
  indonesian_explanation: Kita harus memastikan sumbernya tepercaya.
- coach: 'استخدم الفكرة: وِجْهَةُ النَّظَرِ هَذِهِ تَحْتَاجُ إِلَى دَلِيلٍ أَقْوَى.'
  hint: 'Jawab dengan struktur B2 memakai: وِجْهَةُ النَّظَرِ هَذِهِ تَحْتَاجُ إِلَى دَلِيلٍ أَقْوَى.'
  sample_answer: وِجْهَةُ النَّظَرِ هَذِهِ تَحْتَاجُ إِلَى دَلِيلٍ أَقْوَى.
  focus: Menguji kesimpulan.
  expected_keywords:
  - وِجْهَةُ
  - النَّظَرِ
  - هَذِهِ
  - تَحْتَاجُ
  - إِلَى
  indonesian_explanation: Sudut pandang ini butuh bukti yang lebih kuat.
- coach: 'استخدم الفكرة: حَجْمُ الْعَيِّنَةِ صَغِيرٌ، فَلَا نُعَمِّمُ بَعْدُ.'
  hint: 'Jawab dengan struktur B2 memakai: حَجْمُ الْعَيِّنَةِ صَغِيرٌ، فَلَا نُعَمِّمُ بَعْدُ.'
  sample_answer: حَجْمُ الْعَيِّنَةِ صَغِيرٌ، فَلَا نُعَمِّمُ بَعْدُ.
  focus: Mewaspadai batas data.
  expected_keywords:
  - حَجْمُ
  - الْعَيِّنَةِ
  - صَغِيرٌ
  - فَلَا
  - نُعَمِّمُ
  indonesian_explanation: Ukuran sampelnya kecil, jadi belum bisa menggeneralisasi.
target_phrases:
- أَفْهَمُ مِنَ الْمَقَالِ أَنَّ النَّاسَ يُفَضِّلُونَ الْخِدْمَةَ الْأَسْرَعَ.
- يَجِبُ أَنْ نَتَأَكَّدَ مِنْ أَنَّ الْمَصْدَرَ مَوْثُوقٌ.
- وِجْهَةُ النَّظَرِ هَذِهِ تَحْتَاجُ إِلَى دَلِيلٍ أَقْوَى.
- حَجْمُ الْعَيِّنَةِ صَغِيرٌ، فَلَا نُعَمِّمُ بَعْدُ.
- لِذَلِكَ أُفَضِّلُ أَنْ نُوَازِنَ بَيْنَ الْمَصَادِرِ.
