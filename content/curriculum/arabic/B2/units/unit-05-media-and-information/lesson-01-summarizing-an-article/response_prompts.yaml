prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham dari artikel bahwa orang lebih suka layanan yang lebih
    cepat.'
  target_response: أَفْهَمُ مِنَ الْمَقَالِ أَنَّ النَّاسَ يُفَضِّلُونَ الْخِدْمَةَ الْأَسْرَعَ.
  acceptable_responses:
  - أَفْهَمُ مِنَ الْمَقَالِ أَنَّ النَّاسَ يُفَضِّلُونَ الْخِدْمَةَ الْأَسْرَعَ.
- prompt: 'Ucapkan dalam bahasa Arab: Kita harus memastikan sumbernya tepercaya.'
  target_response: يَجِبُ أَنْ نَتَأَكَّدَ مِنْ أَنَّ الْمَصْدَرَ مَوْثُوقٌ.
  acceptable_responses:
  - يَجِبُ أَنْ نَتَأَكَّدَ مِنْ أَنَّ الْمَصْدَرَ مَوْثُوقٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Sudut pandang ini butuh bukti yang lebih kuat.'
  target_response: وِجْهَةُ النَّظَرِ هَذِهِ تَحْتَاجُ إِلَى دَلِيلٍ أَقْوَى.
  acceptable_responses:
  - وِجْهَةُ النَّظَرِ هَذِهِ تَحْتَاجُ إِلَى دَلِيلٍ أَقْوَى.
- prompt: 'Ucapkan dalam bahasa Arab: Ukuran sampelnya kecil, jadi belum bisa menggeneralisasi.'
  target_response: حَجْمُ الْعَيِّنَةِ صَغِيرٌ، فَلَا نُعَمِّمُ بَعْدُ.
  acceptable_responses:
  - حَجْمُ الْعَيِّنَةِ صَغِيرٌ، فَلَا نُعَمِّمُ بَعْدُ.
