questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku paham dari artikel bahwa orang lebih suka layanan yang lebih cepat."?
  options:
  - أَفْهَمُ مِنَ الْمَقَالِ أَنَّ النَّاسَ يُفَضِّلُونَ الْخِدْمَةَ الْأَسْرَعَ.
  - يَجِبُ أَنْ نَتَأَكَّدَ مِنْ أَنَّ الْمَصْدَرَ مَوْثُوقٌ.
  - وِجْهَةُ النَّظَرِ هَذِهِ تَحْتَاجُ إِلَى دَلِيلٍ أَقْوَى.
  correct_answer: أَفْهَمُ مِنَ الْمَقَالِ أَنَّ النَّاسَ يُفَضِّلُونَ الْخِدْمَةَ الْأَسْرَعَ.
