prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Sebelum percaya, siapa yang menulis berita ini?'
  target_response: قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
  acceptable_responses:
  - قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
- prompt: 'Ucapkan dalam bahasa Arab: Tanggal terbit itu penting, beritanya lama.'
  target_response: تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
  acceptable_responses:
  - تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Apa ada bukti atau sekadar opini?'
  target_response: هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟
  acceptable_responses:
  - هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟
- prompt: 'Ucapkan dalam bahasa Arab: Situsnya tidak dikenal, mari hati-hati.'
  target_response: الْمَوْقِعُ غَيْرُ مَعْرُوفٍ، فَلْنَكُنْ حَذِرِينَ.
  acceptable_responses:
  - الْمَوْقِعُ غَيْرُ مَعْرُوفٍ، فَلْنَكُنْ حَذِرِينَ.
