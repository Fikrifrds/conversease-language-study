phrases:
- phrase: قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
  meaning_id: Sebelum percaya, siapa yang menulis berita ini?
  usage_note: Memeriksa penulis.
- phrase: تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
  meaning_id: Tanggal terbit itu penting, beritanya lama.
  usage_note: Memeriksa kapan terbit.
- phrase: هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟
  meaning_id: Apa ada bukti atau sekadar opini?
  usage_note: Membedakan bukti dan opini.
- phrase: الْمَوْقِعُ غَيْرُ مَعْرُوفٍ، فَلْنَكُنْ حَذِرِينَ.
  meaning_id: Situsnya tidak dikenal, mari hati-hati.
  usage_note: Menilai reputasi sumber.
- phrase: لِذَلِكَ أُفَضِّلُ أَنْ نُقَارِنَهُ بِمَصْدَرَيْنِ آخَرَيْنِ.
  meaning_id: Karena itu aku lebih memilih membandingkannya dengan dua sumber lain.
  usage_note: Menutup dengan verifikasi silang.
