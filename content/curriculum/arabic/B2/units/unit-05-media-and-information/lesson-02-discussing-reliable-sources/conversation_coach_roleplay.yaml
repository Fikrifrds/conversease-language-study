scenario_key: arabic_b2_discussing_reliable_sources
mode: lesson_practice_coach
level_code: B2
opening_line: وَجَدْتُ خَبَرًا يَدْعَمُ خُطَّتَنَا.
learner_goal: Latih percakapan Arab B2 untuk menilai apakah sebuah sumber tepercaya sebelum memakainya.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: وَجَدْتُ خَبَرًا يَدْعَمُ خُطَّتَنَا.
  hint: 'Jawab dengan struktur B2 memakai: قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟'
  sample_answer: قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
  focus: Memeriksa penulis.
  expected_keywords:
  - قَبْلَ
  - أَنْ
  - نَثِقَ
  - مَنْ
  - كَتَبَ
  indonesian_explanation: Sebelum percaya, siapa yang menulis berita ini?
- coach: 'استخدم الفكرة: تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.'
  hint: 'Jawab dengan struktur B2 memakai: تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.'
  sample_answer: تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
  focus: Memeriksa kapan terbit.
  expected_keywords:
  - تَارِيخُ
  - النَّشْرِ
  - مُهِمٌّ
  - فَالْخَبَرُ
  - قَدِيمٌ
  indonesian_explanation: Tanggal terbit itu penting, beritanya lama.
- coach: 'استخدم الفكرة: هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟'
  hint: 'Jawab dengan struktur B2 memakai: هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟'
  sample_answer: هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟
  focus: Membedakan bukti dan opini.
  expected_keywords:
  - هَلْ
  - يُوجَدُ
  - دَلِيلٌ
  - أَمْ
  - مُجَرَّدُ
  indonesian_explanation: Apa ada bukti atau sekadar opini?
- coach: 'استخدم الفكرة: الْمَوْقِعُ غَيْرُ مَعْرُوفٍ، فَلْنَكُنْ حَذِرِينَ.'
  hint: 'Jawab dengan struktur B2 memakai: الْمَوْقِعُ غَيْرُ مَعْرُوفٍ، فَلْنَكُنْ حَذِرِينَ.'
  sample_answer: الْمَوْقِعُ غَيْرُ مَعْرُوفٍ، فَلْنَكُنْ حَذِرِينَ.
  focus: Menilai reputasi sumber.
  expected_keywords:
  - الْمَوْقِعُ
  - غَيْرُ
  - مَعْرُوفٍ
  - فَلْنَكُنْ
  - حَذِرِينَ
  indonesian_explanation: Situsnya tidak dikenal, mari hati-hati.
target_phrases:
- قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
- تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
- هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟
- الْمَوْقِعُ غَيْرُ مَعْرُوفٍ، فَلْنَكُنْ حَذِرِينَ.
- لِذَلِكَ أُفَضِّلُ أَنْ نُقَارِنَهُ بِمَصْدَرَيْنِ آخَرَيْنِ.
