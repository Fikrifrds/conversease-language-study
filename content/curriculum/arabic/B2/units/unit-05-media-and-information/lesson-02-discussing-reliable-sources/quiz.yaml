questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Sebelum percaya, siapa yang menulis berita ini?"?
  options:
  - قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
  - تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
  - هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟
  correct_answer: قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
- key: phrase_2
  prompt: Frasa mana yang berarti "Tanggal terbit itu penting, beritanya lama."?
  options:
  - تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
  - قَبْلَ أَنْ نَثِقَ، مَنْ كَتَبَ هَذَا الْخَبَرَ؟
  - هَلْ يُوجَدُ دَلِيلٌ أَمْ مُجَرَّدُ رَأْيٍ؟
  correct_answer: تَارِيخُ النَّشْرِ مُهِمٌّ، فَالْخَبَرُ قَدِيمٌ.
