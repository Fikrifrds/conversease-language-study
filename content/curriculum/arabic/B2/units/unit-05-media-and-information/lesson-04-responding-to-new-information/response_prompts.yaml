prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Informasi ini sedikit mengubah gambaran.'
  target_response: هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.
  acceptable_responses:
  - هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Tadinya kita kira harga penyebabnya.'
  target_response: كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.
  acceptable_responses:
  - كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.
- prompt: 'Ucapkan dalam bahasa Arab: Sebelum memutuskan, kita pastikan sumbernya.'
  target_response: قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  acceptable_responses:
  - قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku tinjau ulang, tapi tidak mengubah semuanya.'
  target_response: أُعِيدُ النَّظَرَ، لَكِنْ لَا أُغَيِّرُ كُلَّ شَيْءٍ.
  acceptable_responses:
  - أُعِيدُ النَّظَرَ، لَكِنْ لَا أُغَيِّرُ كُلَّ شَيْءٍ.
