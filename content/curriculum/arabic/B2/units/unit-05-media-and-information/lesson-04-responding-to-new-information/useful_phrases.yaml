phrases:
- phrase: هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.
  meaning_id: Informasi ini sedikit mengubah gambaran.
  usage_note: Mengakui informasi baru.
- phrase: كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.
  meaning_id: Tadinya kita kira harga penyebabnya.
  usage_note: Menyebut asumsi lama.
- phrase: قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  meaning_id: Sebelum memutuskan, kita pastikan sumbernya.
  usage_note: Menahan keputusan terburu.
- phrase: أُعِيدُ النَّظَرَ، لَكِنْ لَا أُغَيِّرُ كُلَّ شَيْءٍ.
  meaning_id: Aku tinjau ulang, tapi tidak mengubah semuanya.
  usage_note: Menyesuaikan secukupnya.
- phrase: لِذَلِكَ أُعِيدُ تَرْتِيبَ التَّوْصِيَةِ بِنَاءً عَلَيْهَا.
  meaning_id: Karena itu aku susun ulang rekomendasi berdasarkannya.
  usage_note: Menutup dengan penyesuaian.
