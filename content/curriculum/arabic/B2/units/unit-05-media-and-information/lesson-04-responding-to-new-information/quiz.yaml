questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Informasi ini sedikit mengubah gambaran."?
  options:
  - هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.
  - كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.
  - قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  correct_answer: هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.
