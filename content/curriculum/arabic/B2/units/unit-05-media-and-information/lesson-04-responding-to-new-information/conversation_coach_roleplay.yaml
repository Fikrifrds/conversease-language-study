scenario_key: arabic_b2_responding_to_new_information
mode: lesson_practice_coach
level_code: B2
opening_line: وَصَلَتْنَا مَعْلُومَاتٌ جَدِيدَةٌ عَنِ الْمُنَافِسِ.
learner_goal: Latih percakapan Arab B2 untuk menyesuaikan pendapat ketika muncul informasi baru, tanpa
  berlebihan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: وَصَلَتْنَا مَعْلُومَاتٌ جَدِيدَةٌ عَنِ الْمُنَافِسِ.
  hint: 'Jawab dengan struktur B2 memakai: هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.'
  sample_answer: هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.
  focus: Mengakui informasi baru.
  expected_keywords:
  - هَذِهِ
  - الْمَعْلُومَةُ
  - تُغَيِّرُ
  - الصُّورَةَ
  - قَلِيلًا
  indonesian_explanation: Informasi ini sedikit mengubah gambaran.
- coach: 'استخدم الفكرة: كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.'
  hint: 'Jawab dengan struktur B2 memakai: كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.'
  sample_answer: كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.
  focus: Menyebut asumsi lama.
  expected_keywords:
  - كُنَّا
  - نَظُنُّ
  - أَنَّ
  - السِّعْرَ
  - هُوَ
  indonesian_explanation: Tadinya kita kira harga penyebabnya.
- coach: 'استخدم الفكرة: قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.'
  hint: 'Jawab dengan struktur B2 memakai: قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.'
  sample_answer: قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
  focus: Menahan keputusan terburu.
  expected_keywords:
  - قَبْلَ
  - أَنْ
  - نُقَرِّرَ
  - نَتَأَكَّدُ
  - مِنَ
  indonesian_explanation: Sebelum memutuskan, kita pastikan sumbernya.
- coach: 'استخدم الفكرة: أُعِيدُ النَّظَرَ، لَكِنْ لَا أُغَيِّرُ كُلَّ شَيْءٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أُعِيدُ النَّظَرَ، لَكِنْ لَا أُغَيِّرُ كُلَّ شَيْءٍ.'
  sample_answer: أُعِيدُ النَّظَرَ، لَكِنْ لَا أُغَيِّرُ كُلَّ شَيْءٍ.
  focus: Menyesuaikan secukupnya.
  expected_keywords:
  - أُعِيدُ
  - النَّظَرَ
  - لَكِنْ
  - لَا
  - أُغَيِّرُ
  indonesian_explanation: Aku tinjau ulang, tapi tidak mengubah semuanya.
target_phrases:
- هَذِهِ الْمَعْلُومَةُ تُغَيِّرُ الصُّورَةَ قَلِيلًا.
- كُنَّا نَظُنُّ أَنَّ السِّعْرَ هُوَ السَّبَبُ.
- قَبْلَ أَنْ نُقَرِّرَ، نَتَأَكَّدُ مِنَ الْمَصْدَرِ.
- أُعِيدُ النَّظَرَ، لَكِنْ لَا أُغَيِّرُ كُلَّ شَيْءٍ.
- لِذَلِكَ أُعِيدُ تَرْتِيبَ التَّوْصِيَةِ بِنَاءً عَلَيْهَا.
