prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku mulai dari angka yang paling dekat ke target.'
  target_response: أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.
  acceptable_responses:
  - أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.
- prompt: 'Ucapkan dalam bahasa Arab: Lalu aku sebut apa yang tidak dikatakan data.'
  target_response: ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.
  acceptable_responses:
  - ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.
- prompt: 'Ucapkan dalam bahasa Arab: Persentase bisa salah dipahami tanpa konteks.'
  target_response: النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.
  acceptable_responses:
  - النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Angka itu indikasi, bukan bukti final.'
  target_response: الرَّقْمُ مُؤَشِّرٌ، لَا دَلِيلٌ نِهَائِيٌّ.
  acceptable_responses:
  - الرَّقْمُ مُؤَشِّرٌ، لَا دَلِيلٌ نِهَائِيٌّ.
