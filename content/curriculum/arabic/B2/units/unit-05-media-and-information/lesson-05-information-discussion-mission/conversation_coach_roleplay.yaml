scenario_key: arabic_b2_information_discussion_mission
mode: lesson_practice_coach
level_code: B2
opening_line: عِنْدَنَا بَيَانَاتُ الْحَمْلَةِ. كَيْفَ نُحَوِّلُهَا إِلَى قَرَارٍ؟
learner_goal: 'Latih percakapan Arab B2 untuk mengubah data mentah menjadi keputusan: angka kunci, batasnya,
  lalu langkah.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: عِنْدَنَا بَيَانَاتُ الْحَمْلَةِ. كَيْفَ نُحَوِّلُهَا إِلَى قَرَارٍ؟
  hint: 'Jawab dengan struktur B2 memakai: أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.'
  sample_answer: أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.
  focus: Memilih angka kunci.
  expected_keywords:
  - أَبْدَأُ
  - بِالرَّقْمِ
  - الْأَقْرَبِ
  - إِلَى
  - هَدَفِنَا
  indonesian_explanation: Aku mulai dari angka yang paling dekat ke target.
- coach: 'استخدم الفكرة: ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.'
  hint: 'Jawab dengan struktur B2 memakai: ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.'
  sample_answer: ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.
  focus: Menyebut batas data.
  expected_keywords:
  - ثُمَّ
  - أَذْكُرُ
  - مَا
  - لَا
  - تَقُولُهُ
  indonesian_explanation: Lalu aku sebut apa yang tidak dikatakan data.
- coach: 'استخدم الفكرة: النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.'
  hint: 'Jawab dengan struktur B2 memakai: النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.'
  sample_answer: النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.
  focus: Mewaspadai salah tafsir.
  expected_keywords:
  - النِّسْبَةُ
  - قَدْ
  - تُفْهَمُ
  - خَطَأً
  - بِدُونِ
  indonesian_explanation: Persentase bisa salah dipahami tanpa konteks.
- coach: 'استخدم الفكرة: الرَّقْمُ مُؤَشِّرٌ، لَا دَلِيلٌ نِهَائِيٌّ.'
  hint: 'Jawab dengan struktur B2 memakai: الرَّقْمُ مُؤَشِّرٌ، لَا دَلِيلٌ نِهَائِيٌّ.'
  sample_answer: الرَّقْمُ مُؤَشِّرٌ، لَا دَلِيلٌ نِهَائِيٌّ.
  focus: Menahan klaim berlebihan.
  expected_keywords:
  - الرَّقْمُ
  - مُؤَشِّرٌ
  - لَا
  - دَلِيلٌ
  - نِهَائِيٌّ
  indonesian_explanation: Angka itu indikasi, bukan bukti final.
target_phrases:
- أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.
- ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.
- النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.
- الرَّقْمُ مُؤَشِّرٌ، لَا دَلِيلٌ نِهَائِيٌّ.
- 'لِذَلِكَ أَخْتِمُ بِسُؤَالٍ: مَا الَّذِي نُغَيِّرُهُ فِعْلًا؟'
