phrases:
- phrase: أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.
  meaning_id: Aku mulai dari angka yang paling dekat ke target.
  usage_note: Memilih angka kunci.
- phrase: ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.
  meaning_id: Lalu aku sebut apa yang tidak dikatakan data.
  usage_note: Menyebut batas data.
- phrase: النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.
  meaning_id: Persentase bisa salah dipahami tanpa konteks.
  usage_note: Mewaspadai salah tafsir.
- phrase: الرَّقْمُ مُؤَشِّرٌ، لَا دَلِيلٌ نِهَائِيٌّ.
  meaning_id: Angka itu indikasi, bukan bukti final.
  usage_note: Menahan klaim berlebihan.
- phrase: 'لِذَلِكَ أَخْتِمُ بِسُؤَالٍ: مَا الَّذِي نُغَيِّرُهُ فِعْلًا؟'
  meaning_id: 'Karena itu aku tutup dengan pertanyaan: apa yang benar-benar kita ubah?'
  usage_note: Menutup dengan langkah.
