questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku mulai dari angka yang paling dekat ke target."?
  options:
  - أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.
  - ثُمَّ أَذْكُرُ مَا لَا تَقُولُهُ الْبَيَانَاتُ.
  - النِّسْبَةُ قَدْ تُفْهَمُ خَطَأً بِدُونِ سِيَاقٍ.
  correct_answer: أَبْدَأُ بِالرَّقْمِ الْأَقْرَبِ إِلَى هَدَفِنَا.
