scenario_key: arabic_b2_explaining_benefits_and_risks
mode: lesson_practice_coach
level_code: B2
opening_line: اعْرِضِي فِكْرَةَ الْأَتْمَتَةِ بِتَوَازُنٍ بَيْنَ الْفَائِدَةِ وَالْخَطَرِ.
learner_goal: Latih percakapan Arab B2 untuk menjelaskan manfaat dan risiko sebuah ide secara seimbang.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: اعْرِضِي فِكْرَةَ الْأَتْمَتَةِ بِتَوَازُنٍ بَيْنَ الْفَائِدَةِ وَالْخَطَرِ.
  hint: 'Jawab dengan struktur B2 memakai: الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.'
  sample_answer: الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.
  focus: Menyebut manfaat utama.
  expected_keywords:
  - الْفَائِدَةُ
  - الْأَكْبَرُ
  - هِيَ
  - تَقْلِيلُ
  - الْعَمَلِ
  indonesian_explanation: Manfaat terbesarnya, mengurangi pekerjaan berulang.
- coach: 'استخدم الفكرة: وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.'
  hint: 'Jawab dengan struktur B2 memakai: وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.'
  sample_answer: وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.
  focus: Menyebut risiko.
  expected_keywords:
  - وَفِي
  - الْمُقَابِلِ
  - هُنَاكَ
  - خَطَرٌ
  - إِنْ
  indonesian_explanation: Di sisi lain ada risiko kalau kita abai memantau.
- coach: 'استخدم الفكرة: أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.'
  hint: 'Jawab dengan struktur B2 memakai: أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.'
  sample_answer: أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.
  focus: Mengakui kekhawatiran.
  expected_keywords:
  - أَتَفَهَّمُ
  - خَوْفَ
  - مَنْ
  - يَخْشَى
  - الْأَتْمَتَةَ
  indonesian_explanation: Aku paham yang takut otomatisasi.
- coach: 'استخدم الفكرة: لِتَقْلِيلِهِ، نُرَاقِبُ النَّتَائِجَ كُلَّ أُسْبُوعٍ.'
  hint: 'Jawab dengan struktur B2 memakai: لِتَقْلِيلِهِ، نُرَاقِبُ النَّتَائِجَ كُلَّ أُسْبُوعٍ.'
  sample_answer: لِتَقْلِيلِهِ، نُرَاقِبُ النَّتَائِجَ كُلَّ أُسْبُوعٍ.
  focus: Memitigasi risiko.
  expected_keywords:
  - لِتَقْلِيلِهِ
  - نُرَاقِبُ
  - النَّتَائِجَ
  - كُلَّ
  - أُسْبُوعٍ
  indonesian_explanation: Untuk menguranginya, kita pantau hasil tiap minggu.
target_phrases:
- الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.
- وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.
- أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.
- لِتَقْلِيلِهِ، نُرَاقِبُ النَّتَائِجَ كُلَّ أُسْبُوعٍ.
- فَالْبِدَايَةُ الصَّغِيرَةُ تَكْشِفُ أَيَّ مُشْكِلَةٍ مُبَكِّرًا.
