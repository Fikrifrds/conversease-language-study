prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan mulai dengan pembuka singkat tentang menjelaskan manfaat
    dan risiko.'
  target_response: سَأَبْدَأُ بِمُقَدِّمَةٍ قَصِيرَةٍ عَنْ شَرْحُ الْفَوَائِدِ وَالْمَخَاطِرِ.
  acceptable_responses:
  - سَأَبْدَأُ بِمُقَدِّمَةٍ قَصِيرَةٍ عَنْ شَرْحُ الْفَوَائِدِ وَالْمَخَاطِرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Setelah itu, saya akan menjelaskan manfaat utamanya.'
  target_response: بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ.
  acceptable_responses:
  - بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ.
- prompt: 'Ucapkan dalam bahasa Arab: Penting juga untuk menyebutkan risikonya.'
  target_response: مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا.
  acceptable_responses:
  - مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا.
- prompt: 'Ucapkan dalam bahasa Arab: Jika ada pertanyaan, saya akan menjawabnya dengan jelas.'
  target_response: إِذَا كَانَتْ هُنَاكَ أَسْئِلَةٌ، فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ.
  acceptable_responses:
  - إِذَا كَانَتْ هُنَاكَ أَسْئِلَةٌ، فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ.
