prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Manfaat terbesarnya, mengurangi pekerjaan berulang.'
  target_response: الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.
  acceptable_responses:
  - الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Di sisi lain ada risiko kalau kita abai memantau.'
  target_response: وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.
  acceptable_responses:
  - وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham yang takut otomatisasi.'
  target_response: أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.
  acceptable_responses:
  - أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.
- prompt: 'Ucapkan dalam bahasa Arab: Untuk menguranginya, kita pantau hasil tiap minggu.'
  target_response: لِتَقْلِيلِهِ، نُرَاقِبُ النَّتَائِجَ كُلَّ أُسْبُوعٍ.
  acceptable_responses:
  - لِتَقْلِيلِهِ، نُرَاقِبُ النَّتَائِجَ كُلَّ أُسْبُوعٍ.
