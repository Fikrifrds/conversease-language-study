phrases:
- phrase: الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.
  meaning_id: Manfaat terbesarnya, mengurangi pekerjaan berulang.
  usage_note: Menyebut manfaat utama.
- phrase: وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.
  meaning_id: Di sisi lain ada risiko kalau kita abai memantau.
  usage_note: Menyebut risiko.
- phrase: أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.
  meaning_id: Aku paham yang takut otomatisasi.
  usage_note: Mengakui kekhawatiran.
- phrase: لِتَقْلِيلِهِ، نُرَاقِبُ النَّتَائِجَ كُلَّ أُسْبُوعٍ.
  meaning_id: Untuk menguranginya, kita pantau hasil tiap minggu.
  usage_note: Memitigasi risiko.
- phrase: فَالْبِدَايَةُ الصَّغِيرَةُ تَكْشِفُ أَيَّ مُشْكِلَةٍ مُبَكِّرًا.
  meaning_id: Mulai kecil membuat masalah ketahuan lebih awal.
  usage_note: Menutup dengan langkah aman.
