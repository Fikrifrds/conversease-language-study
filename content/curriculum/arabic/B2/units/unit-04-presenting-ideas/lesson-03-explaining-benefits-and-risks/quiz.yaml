questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Manfaat terbesarnya, mengurangi pekerjaan berulang."?
  options:
  - الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.
  - وَفِي الْمُقَابِلِ هُنَاكَ خَطَرٌ إِنْ أَهْمَلْنَا الْمُرَاقَبَةَ.
  - أَتَفَهَّمُ خَوْفَ مَنْ يَخْشَى الْأَتْمَتَةَ.
  correct_answer: الْفَائِدَةُ الْأَكْبَرُ هِيَ تَقْلِيلُ الْعَمَلِ الْمُكَرَّرِ.
