phrases:
- phrase: لَدَيَّ فِكْرَةٌ تُوَفِّرُ وَقْتَ الْفَرِيقِ.
  meaning_id: Aku punya ide yang menghemat waktu tim.
  usage_note: Membuka pitch.
- phrase: الدَّلِيلُ هُوَ تَجْرِبَةٌ نَجَحَتْ مَعَ فَرِيقٍ آخَرَ.
  meaning_id: Buktinya, uji coba yang berhasil di tim lain.
  usage_note: Menopang dengan bukti.
- phrase: الْخَطَرُ مَحْدُودٌ لِأَنَّنَا نَبْدَأُ صَغِيرًا.
  meaning_id: Risikonya terbatas karena kita mulai kecil.
  usage_note: Menjawab risiko.
- phrase: لَنْ يَأْخُذَ هَذَا أَكْثَرَ مِنْ أُسْبُوعٍ لِلتَّجْرِبَةِ.
  meaning_id: Ini tidak makan waktu lebih dari sepekan untuk diuji.
  usage_note: Memperjelas komitmen kecil.
- phrase: أَطْلُبُ مُوَافَقَتَكِ عَلَى تَجْرِبَةٍ وَاحِدَةٍ.
  meaning_id: Aku minta persetujuanmu untuk satu uji coba.
  usage_note: Menutup dengan permintaan.
