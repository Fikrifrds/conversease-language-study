scenario_key: arabic_b2_idea_presentation_mission
mode: lesson_practice_coach
level_code: B2
opening_line: عِنْدَكِ خَمْسُ دَقَائِقَ فَقَطْ. اعْرِضِي فِكْرَتَكِ.
learner_goal: Latih percakapan Arab B2 untuk menyampaikan ide dalam waktu singkat dan meminta keputusan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: عِنْدَكِ خَمْسُ دَقَائِقَ فَقَطْ. اعْرِضِي فِكْرَتَكِ.
  hint: 'Jawab dengan struktur B2 memakai: لَدَيَّ فِكْرَةٌ تُوَفِّرُ وَقْتَ الْفَرِيقِ.'
  sample_answer: لَدَيَّ فِكْرَةٌ تُوَفِّرُ وَقْتَ الْفَرِيقِ.
  focus: Membuka pitch.
  expected_keywords:
  - لَدَيَّ
  - فِكْرَةٌ
  - تُوَفِّرُ
  - وَقْتَ
  - الْفَرِيقِ
  indonesian_explanation: Aku punya ide yang menghemat waktu tim.
- coach: 'استخدم الفكرة: الدَّلِيلُ هُوَ تَجْرِبَةٌ نَجَحَتْ مَعَ فَرِيقٍ آخَرَ.'
  hint: 'Jawab dengan struktur B2 memakai: الدَّلِيلُ هُوَ تَجْرِبَةٌ نَجَحَتْ مَعَ فَرِيقٍ آخَرَ.'
  sample_answer: الدَّلِيلُ هُوَ تَجْرِبَةٌ نَجَحَتْ مَعَ فَرِيقٍ آخَرَ.
  focus: Menopang dengan bukti.
  expected_keywords:
  - الدَّلِيلُ
  - هُوَ
  - تَجْرِبَةٌ
  - نَجَحَتْ
  - مَعَ
  indonesian_explanation: Buktinya, uji coba yang berhasil di tim lain.
- coach: 'استخدم الفكرة: الْخَطَرُ مَحْدُودٌ لِأَنَّنَا نَبْدَأُ صَغِيرًا.'
  hint: 'Jawab dengan struktur B2 memakai: الْخَطَرُ مَحْدُودٌ لِأَنَّنَا نَبْدَأُ صَغِيرًا.'
  sample_answer: الْخَطَرُ مَحْدُودٌ لِأَنَّنَا نَبْدَأُ صَغِيرًا.
  focus: Menjawab risiko.
  expected_keywords:
  - الْخَطَرُ
  - مَحْدُودٌ
  - لِأَنَّنَا
  - نَبْدَأُ
  - صَغِيرًا
  indonesian_explanation: Risikonya terbatas karena kita mulai kecil.
- coach: 'استخدم الفكرة: لَنْ يَأْخُذَ هَذَا أَكْثَرَ مِنْ أُسْبُوعٍ لِلتَّجْرِبَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: لَنْ يَأْخُذَ هَذَا أَكْثَرَ مِنْ أُسْبُوعٍ لِلتَّجْرِبَةِ.'
  sample_answer: لَنْ يَأْخُذَ هَذَا أَكْثَرَ مِنْ أُسْبُوعٍ لِلتَّجْرِبَةِ.
  focus: Memperjelas komitmen kecil.
  expected_keywords:
  - لَنْ
  - يَأْخُذَ
  - هَذَا
  - أَكْثَرَ
  - مِنْ
  indonesian_explanation: Ini tidak makan waktu lebih dari sepekan untuk diuji.
target_phrases:
- لَدَيَّ فِكْرَةٌ تُوَفِّرُ وَقْتَ الْفَرِيقِ.
- الدَّلِيلُ هُوَ تَجْرِبَةٌ نَجَحَتْ مَعَ فَرِيقٍ آخَرَ.
- الْخَطَرُ مَحْدُودٌ لِأَنَّنَا نَبْدَأُ صَغِيرًا.
- لَنْ يَأْخُذَ هَذَا أَكْثَرَ مِنْ أُسْبُوعٍ لِلتَّجْرِبَةِ.
- أَطْلُبُ مُوَافَقَتَكِ عَلَى تَجْرِبَةٍ وَاحِدَةٍ.
