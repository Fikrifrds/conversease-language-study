vocabulary:
- word: فَائِدَةٌ
  meaning_id: manfaat
  usage_note: 'Dipakai untuk arti "manfaat". Contoh: "بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ."'
- word: مَخَاطِرُ
  meaning_id: risiko
  usage_note: 'Dipakai untuk arti "risiko". Contoh: "مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا."'
- word: أَسْئِلَةٌ
  meaning_id: pertanyaan-pertanyaan
  usage_note: 'Dipakai untuk arti "pertanyaan-pertanyaan". Contoh: "إِذَا كَانَتْ هُنَاكَ أَسْئِلَةٌ،
    فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "فِي الْخِتَامِ، سَأَقْتَرِحُ خُطْوَةً عَمَلِيَّةً."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ سَتُقَدِّمِينَ هَذِهِ الْفِكْرَةَ؟ أُرِيدُ
    أَنْ أُرَكِّزَ عَلَى تَقْدِيمُ فِكْرَةٍ وَالدّ..."'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "كَيْفَ سَتُقَدِّمِينَ هَذِهِ الْفِكْرَةَ؟ أُرِيدُ
    أَنْ أُرَكِّزَ عَلَى تَقْدِيمُ فِكْرَةٍ وَالدّ..."'
- word: السِّيَاقُ
  meaning_id: konteks
  usage_note: 'Dipakai untuk arti "konteks". Contoh: "كَيْفَ تَجْمَعِينَ مَهَارَاتِ الْوَحْدَةِ فِي هَذَا
    السِّيَاقِ؟"'
- word: مِهَنِيٌّ
  meaning_id: profesional
  usage_note: 'Dipakai untuk arti "profesional". Contoh: "مَا الْمُخْرَجُ الْمِهَنِيُّ الَّذِي تُرِيدِينَ
    تَحْقِيقَهُ؟"'
