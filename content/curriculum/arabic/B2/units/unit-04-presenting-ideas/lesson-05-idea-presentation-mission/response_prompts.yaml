prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku punya ide yang menghemat waktu tim.'
  target_response: لَدَيَّ فِكْرَةٌ تُوَفِّرُ وَقْتَ الْفَرِيقِ.
  acceptable_responses:
  - لَدَيَّ فِكْرَةٌ تُوَفِّرُ وَقْتَ الْفَرِيقِ.
- prompt: 'Ucapkan dalam bahasa Arab: Buktinya, uji coba yang berhasil di tim lain.'
  target_response: الدَّلِيلُ هُوَ تَجْرِبَةٌ نَجَحَتْ مَعَ فَرِيقٍ آخَرَ.
  acceptable_responses:
  - الدَّلِيلُ هُوَ تَجْرِبَةٌ نَجَحَتْ مَعَ فَرِيقٍ آخَرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Risikonya terbatas karena kita mulai kecil.'
  target_response: الْخَطَرُ مَحْدُودٌ لِأَنَّنَا نَبْدَأُ صَغِيرًا.
  acceptable_responses:
  - الْخَطَرُ مَحْدُودٌ لِأَنَّنَا نَبْدَأُ صَغِيرًا.
- prompt: 'Ucapkan dalam bahasa Arab: Ini tidak makan waktu lebih dari sepekan untuk diuji.'
  target_response: لَنْ يَأْخُذَ هَذَا أَكْثَرَ مِنْ أُسْبُوعٍ لِلتَّجْرِبَةِ.
  acceptable_responses:
  - لَنْ يَأْخُذَ هَذَا أَكْثَرَ مِنْ أُسْبُوعٍ لِلتَّجْرِبَةِ.
