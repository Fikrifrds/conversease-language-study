questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya akan mulai dengan pembuka singkat tentang mempresentasikan dan
    mempertahankan ide."?
  options:
  - سَأَبْدَأُ بِمُقَدِّمَةٍ قَصِيرَةٍ عَنْ تَقْدِيمُ فِكْرَةٍ وَالدِّفَاعُ عَنْهَا.
  - بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ.
  - مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا.
  correct_answer: سَأَبْدَأُ بِمُقَدِّمَةٍ قَصِيرَةٍ عَنْ تَقْدِيمُ فِكْرَةٍ وَالدِّفَاعُ عَنْهَا.
- key: phrase_2
