scenario_key: arabic_b2_signposting_clearly
mode: lesson_practice_coach
level_code: B2
opening_line: اعْرِضِي فِكْرَةَ الْخِدْمَةِ، وَاجْعَلِينِي أُتَابِعُ بِسُهُولَةٍ.
learner_goal: Latih percakapan Arab B2 untuk memandu pendengar dengan penanda yang jelas antarbagian.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: اعْرِضِي فِكْرَةَ الْخِدْمَةِ، وَاجْعَلِينِي أُتَابِعُ بِسُهُولَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.'
  sample_answer: أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
  focus: Menandai pembuka.
  expected_keywords:
  - أَوَّلًا
  - دَعِينِي
  - أَشْرَحُ
  - الْمُشْكِلَةَ
  - بِإِيجَازٍ
  indonesian_explanation: Pertama, izinkan aku jelaskan masalahnya singkat.
- coach: 'استخدم الفكرة: ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.'
  hint: 'Jawab dengan struktur B2 memakai: ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.'
  sample_answer: ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
  focus: Menandai transisi.
  expected_keywords:
  - ثُمَّ
  - نَنْتَقِلُ
  - إِلَى
  - الْفَائِدَةِ
  - الْأَسَاسِيَّةِ
  indonesian_explanation: Lalu kita beralih ke manfaat utamanya.
- coach: 'استخدم الفكرة: بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.'
  hint: 'Jawab dengan struktur B2 memakai: بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.'
  sample_answer: بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.
  focus: Menandai bagian data.
  expected_keywords:
  - بَعْدَ
  - ذَلِكَ
  - نَنْظُرُ
  - إِلَى
  - الْأَرْقَامِ
  indonesian_explanation: Setelah itu kita lihat angkanya sekilas.
- coach: 'استخدم الفكرة: هُنَا نُقْطَةٌ مُهِمَّةٌ يَجِبُ أَنْ تَنْتَبِهِي لَهَا.'
  hint: 'Jawab dengan struktur B2 memakai: هُنَا نُقْطَةٌ مُهِمَّةٌ يَجِبُ أَنْ تَنْتَبِهِي لَهَا.'
  sample_answer: هُنَا نُقْطَةٌ مُهِمَّةٌ يَجِبُ أَنْ تَنْتَبِهِي لَهَا.
  focus: Menyorot poin kunci.
  expected_keywords:
  - هُنَا
  - نُقْطَةٌ
  - مُهِمَّةٌ
  - يَجِبُ
  - أَنْ
  indonesian_explanation: Di sini ada poin penting yang perlu kamu cermati.
target_phrases:
- أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
- ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
- بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.
- هُنَا نُقْطَةٌ مُهِمَّةٌ يَجِبُ أَنْ تَنْتَبِهِي لَهَا.
- وَأَخِيرًا، أَصِلُ إِلَى الْخُطْوَةِ الْمُقْتَرَحَةِ.
