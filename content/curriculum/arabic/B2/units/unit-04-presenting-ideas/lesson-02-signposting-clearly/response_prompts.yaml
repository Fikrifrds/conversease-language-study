prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Pertama, izinkan aku jelaskan masalahnya singkat.'
  target_response: أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
  acceptable_responses:
  - أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Lalu kita beralih ke manfaat utamanya.'
  target_response: ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
  acceptable_responses:
  - ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Setelah itu kita lihat angkanya sekilas.'
  target_response: بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.
  acceptable_responses:
  - بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Di sini ada poin penting yang perlu kamu cermati.'
  target_response: هُنَا نُقْطَةٌ مُهِمَّةٌ يَجِبُ أَنْ تَنْتَبِهِي لَهَا.
  acceptable_responses:
  - هُنَا نُقْطَةٌ مُهِمَّةٌ يَجِبُ أَنْ تَنْتَبِهِي لَهَا.
