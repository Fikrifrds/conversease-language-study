vocabulary:
- word: تَوْضِيحٌ
  meaning_id: klarifikasi/penjelasan
  usage_note: 'Dipakai untuk arti "klarifikasi/penjelasan". Contoh: "سَأَبْدَأُ بِمُقَدِّمَةٍ
    قَصِيرَةٍ عَنْ تَوْضِيحُ الِانْتِقَالَاتِ."'
- word: فَائِدَةٌ
  meaning_id: manfaat
  usage_note: 'Dipakai untuk arti "manfaat". Contoh: "بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ
    الْأَسَاسِيَّةَ."'
- word: مَخَاطِرُ
  meaning_id: risiko
  usage_note: 'Dipakai untuk arti "risiko". Contoh: "مِنَ الْمُهِمِّ أَنْ نَذْكُرَ
    الْمَخَاطِرَ أَيْضًا."'
- word: أَسْئِلَةٌ
  meaning_id: pertanyaan-pertanyaan
  usage_note: 'Dipakai untuk arti "pertanyaan-pertanyaan". Contoh: "إِذَا كَانَتْ
    هُنَاكَ أَسْئِلَةٌ، فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "فِي الْخِتَامِ، سَأَقْتَرِحُ
    خُطْوَةً عَمَلِيَّةً."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ سَتُقَدِّمِينَ هَذِهِ
    الْفِكْرَةَ؟ أُرِيدُ أَنْ أُرَكِّزَ عَلَى تَوْضِيحُ الِانْتِقَالَات..."'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "كَيْفَ سَتُقَدِّمِينَ هَذِهِ
    الْفِكْرَةَ؟ أُرِيدُ أَنْ أُرَكِّزَ عَلَى تَوْضِيحُ الِانْتِقَالَات..."'
- word: دَلِيلٌ
  meaning_id: bukti/petunjuk
  usage_note: 'Dipakai untuk arti "bukti/petunjuk". Contoh: "مَا الدَّلِيلُ أَوِ الْمِثَالُ
    الَّذِي يُوَضِّحُ ذَلِكَ؟"'
