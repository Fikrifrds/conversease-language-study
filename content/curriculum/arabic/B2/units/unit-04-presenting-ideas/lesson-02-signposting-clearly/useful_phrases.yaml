phrases:
- phrase: أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
  meaning_id: Pertama, izinkan aku jelaskan masalahnya singkat.
  usage_note: Menandai pembuka.
- phrase: ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
  meaning_id: Lalu kita beralih ke manfaat utamanya.
  usage_note: Menandai transisi.
- phrase: بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.
  meaning_id: Setelah itu kita lihat angkanya sekilas.
  usage_note: Menandai bagian data.
- phrase: هُنَا نُقْطَةٌ مُهِمَّةٌ يَجِبُ أَنْ تَنْتَبِهِي لَهَا.
  meaning_id: Di sini ada poin penting yang perlu kamu cermati.
  usage_note: Menyorot poin kunci.
- phrase: وَأَخِيرًا، أَصِلُ إِلَى الْخُطْوَةِ الْمُقْتَرَحَةِ.
  meaning_id: Dan terakhir, aku sampai ke langkah yang diusulkan.
  usage_note: Menandai penutup.
