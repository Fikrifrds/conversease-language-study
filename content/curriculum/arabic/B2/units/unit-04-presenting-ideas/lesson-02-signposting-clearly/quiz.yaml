questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Pertama, izinkan aku jelaskan masalahnya singkat."?
  options:
  - أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
  - ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
  - بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.
  correct_answer: أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Lalu kita beralih ke manfaat utamanya."?
  options:
  - ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
  - أَوَّلًا، دَعِينِي أَشْرَحُ الْمُشْكِلَةَ بِإِيجَازٍ.
  - بَعْدَ ذَلِكَ نَنْظُرُ إِلَى الْأَرْقَامِ بِسُرْعَةٍ.
  correct_answer: ثُمَّ نَنْتَقِلُ إِلَى الْفَائِدَةِ الْأَسَاسِيَّةِ.
