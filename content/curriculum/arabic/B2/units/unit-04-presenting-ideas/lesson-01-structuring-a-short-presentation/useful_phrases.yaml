phrases:
- phrase: الْمُشْكِلَةُ هِيَ أَنَّ الْفَرِيقَ يُضَيِّعُ وَقْتًا فِي الْمُتَابَعَةِ.
  meaning_id: Masalahnya, tim membuang waktu untuk tracking.
  usage_note: Membuka dengan masalah.
- phrase: الْفَائِدَةُ أَنَّ اللَّوْحَةَ تُوَفِّرُ سَاعَةً كُلَّ يَوْمٍ.
  meaning_id: Manfaatnya, dashboard menghemat satu jam tiap hari.
  usage_note: Menyebut manfaat utama.
- phrase: أَعْرِفُ أَنَّ الْإِعْدَادَ يَأْخُذُ جُهْدًا فِي الْبِدَايَةِ.
  meaning_id: Aku tahu setup-nya butuh usaha di awal.
  usage_note: Mengakui kekurangan.
- phrase: لَكِنَّهُ جُهْدٌ لِمَرَّةٍ وَاحِدَةٍ فَقَطْ.
  meaning_id: Tapi itu usaha sekali saja.
  usage_note: Menjawab kekurangan.
- phrase: أَقْتَرِحُ كَبِدَايَةٍ تَجْرِبَةً لِفَرِيقٍ وَاحِدٍ.
  meaning_id: Sebagai awal, aku usul uji coba untuk satu tim.
  usage_note: Menutup dengan langkah.
