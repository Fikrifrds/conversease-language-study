scenario_key: arabic_b2_structuring_a_short_presentation
mode: lesson_practice_coach
level_code: B2
opening_line: حَدِّثِينِي عَنْ فِكْرَةِ لَوْحَةِ الْمُتَابَعَةِ.
learner_goal: 'Latih percakapan Arab B2 untuk menyampaikan ide ringkas: masalah, manfaat, lalu langkah.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: حَدِّثِينِي عَنْ فِكْرَةِ لَوْحَةِ الْمُتَابَعَةِ.
  hint: 'Jawab dengan struktur B2 memakai: الْمُشْكِلَةُ هِيَ أَنَّ الْفَرِيقَ يُضَيِّعُ وَقْتًا فِي الْمُتَابَعَةِ.'
  sample_answer: الْمُشْكِلَةُ هِيَ أَنَّ الْفَرِيقَ يُضَيِّعُ وَقْتًا فِي الْمُتَابَعَةِ.
  focus: Membuka dengan masalah.
  expected_keywords:
  - الْمُشْكِلَةُ
  - هِيَ
  - أَنَّ
  - الْفَرِيقَ
  - يُضَيِّعُ
  indonesian_explanation: Masalahnya, tim membuang waktu untuk tracking.
- coach: 'استخدم الفكرة: الْفَائِدَةُ أَنَّ اللَّوْحَةَ تُوَفِّرُ سَاعَةً كُلَّ يَوْمٍ.'
  hint: 'Jawab dengan struktur B2 memakai: الْفَائِدَةُ أَنَّ اللَّوْحَةَ تُوَفِّرُ سَاعَةً كُلَّ يَوْمٍ.'
  sample_answer: الْفَائِدَةُ أَنَّ اللَّوْحَةَ تُوَفِّرُ سَاعَةً كُلَّ يَوْمٍ.
  focus: Menyebut manfaat utama.
  expected_keywords:
  - الْفَائِدَةُ
  - أَنَّ
  - اللَّوْحَةَ
  - تُوَفِّرُ
  - سَاعَةً
  indonesian_explanation: Manfaatnya, dashboard menghemat satu jam tiap hari.
- coach: 'استخدم الفكرة: أَعْرِفُ أَنَّ الْإِعْدَادَ يَأْخُذُ جُهْدًا فِي الْبِدَايَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: أَعْرِفُ أَنَّ الْإِعْدَادَ يَأْخُذُ جُهْدًا فِي الْبِدَايَةِ.'
  sample_answer: أَعْرِفُ أَنَّ الْإِعْدَادَ يَأْخُذُ جُهْدًا فِي الْبِدَايَةِ.
  focus: Mengakui kekurangan.
  expected_keywords:
  - أَعْرِفُ
  - أَنَّ
  - الْإِعْدَادَ
  - يَأْخُذُ
  - جُهْدًا
  indonesian_explanation: Aku tahu setup-nya butuh usaha di awal.
- coach: 'استخدم الفكرة: لَكِنَّهُ جُهْدٌ لِمَرَّةٍ وَاحِدَةٍ فَقَطْ.'
  hint: 'Jawab dengan struktur B2 memakai: لَكِنَّهُ جُهْدٌ لِمَرَّةٍ وَاحِدَةٍ فَقَطْ.'
  sample_answer: لَكِنَّهُ جُهْدٌ لِمَرَّةٍ وَاحِدَةٍ فَقَطْ.
  focus: Menjawab kekurangan.
  expected_keywords:
  - لَكِنَّهُ
  - جُهْدٌ
  - لِمَرَّةٍ
  - وَاحِدَةٍ
  - فَقَطْ
  indonesian_explanation: Tapi itu usaha sekali saja.
target_phrases:
- الْمُشْكِلَةُ هِيَ أَنَّ الْفَرِيقَ يُضَيِّعُ وَقْتًا فِي الْمُتَابَعَةِ.
- الْفَائِدَةُ أَنَّ اللَّوْحَةَ تُوَفِّرُ سَاعَةً كُلَّ يَوْمٍ.
- أَعْرِفُ أَنَّ الْإِعْدَادَ يَأْخُذُ جُهْدًا فِي الْبِدَايَةِ.
- لَكِنَّهُ جُهْدٌ لِمَرَّةٍ وَاحِدَةٍ فَقَطْ.
- أَقْتَرِحُ كَبِدَايَةٍ تَجْرِبَةً لِفَرِيقٍ وَاحِدٍ.
