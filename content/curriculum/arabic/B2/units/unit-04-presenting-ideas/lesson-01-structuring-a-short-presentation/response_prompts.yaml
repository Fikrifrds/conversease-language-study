prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Masalahnya, tim membuang waktu untuk tracking.'
  target_response: الْمُشْكِلَةُ هِيَ أَنَّ الْفَرِيقَ يُضَيِّعُ وَقْتًا فِي الْمُتَابَعَةِ.
  acceptable_responses:
  - الْمُشْكِلَةُ هِيَ أَنَّ الْفَرِيقَ يُضَيِّعُ وَقْتًا فِي الْمُتَابَعَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Manfaatnya, dashboard menghemat satu jam tiap hari.'
  target_response: الْفَائِدَةُ أَنَّ اللَّوْحَةَ تُوَفِّرُ سَاعَةً كُلَّ يَوْمٍ.
  acceptable_responses:
  - الْفَائِدَةُ أَنَّ اللَّوْحَةَ تُوَفِّرُ سَاعَةً كُلَّ يَوْمٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku tahu setup-nya butuh usaha di awal.'
  target_response: أَعْرِفُ أَنَّ الْإِعْدَادَ يَأْخُذُ جُهْدًا فِي الْبِدَايَةِ.
  acceptable_responses:
  - أَعْرِفُ أَنَّ الْإِعْدَادَ يَأْخُذُ جُهْدًا فِي الْبِدَايَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Tapi itu usaha sekali saja.'
  target_response: لَكِنَّهُ جُهْدٌ لِمَرَّةٍ وَاحِدَةٍ فَقَطْ.
  acceptable_responses:
  - لَكِنَّهُ جُهْدٌ لِمَرَّةٍ وَاحِدَةٍ فَقَطْ.
