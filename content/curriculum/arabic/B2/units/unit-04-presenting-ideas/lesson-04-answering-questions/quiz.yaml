questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Pertanyaan bagus, akan kujawab dengan satu poin."?
  options:
  - سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.
  - لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.
  - هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.
  correct_answer: سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.
- key: phrase_2
