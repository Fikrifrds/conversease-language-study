prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Pertanyaan bagus, akan kujawab dengan satu poin.'
  target_response: سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.
  acceptable_responses:
  - سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku tidak punya angkanya sekarang, tapi kukirim besok.'
  target_response: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.
  acceptable_responses:
  - لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.
- prompt: 'Ucapkan dalam bahasa Arab: Pertanyaan ini sedikit di luar lingkup kita.'
  target_response: هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.
  acceptable_responses:
  - هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Tapi biar kuhubungkan ke tujuan utama kita.'
  target_response: لَكِنْ دَعِينِي أَرْبِطُهُ بِهَدَفِنَا الْأَسَاسِيِّ.
  acceptable_responses:
  - لَكِنْ دَعِينِي أَرْبِطُهُ بِهَدَفِنَا الْأَسَاسِيِّ.
