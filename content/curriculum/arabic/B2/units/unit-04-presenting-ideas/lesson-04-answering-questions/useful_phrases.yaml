phrases:
- phrase: سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.
  meaning_id: Pertanyaan bagus, akan kujawab dengan satu poin.
  usage_note: Membuka jawaban.
- phrase: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.
  meaning_id: Aku tidak punya angkanya sekarang, tapi kukirim besok.
  usage_note: Jujur soal batas.
- phrase: هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.
  meaning_id: Pertanyaan ini sedikit di luar lingkup kita.
  usage_note: Menandai di luar topik.
- phrase: لَكِنْ دَعِينِي أَرْبِطُهُ بِهَدَفِنَا الْأَسَاسِيِّ.
  meaning_id: Tapi biar kuhubungkan ke tujuan utama kita.
  usage_note: Mengembalikan ke fokus.
- phrase: بِاخْتِصَارٍ، الْجَوَابُ يَخْدُمُ نَفْسَ الْهَدَفِ.
  meaning_id: Singkatnya, jawabannya melayani tujuan yang sama.
  usage_note: Menutup terhubung tujuan.
