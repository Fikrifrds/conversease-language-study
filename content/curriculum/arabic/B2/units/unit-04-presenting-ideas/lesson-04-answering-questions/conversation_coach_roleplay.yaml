scenario_key: arabic_b2_answering_questions
mode: lesson_practice_coach
level_code: B2
opening_line: 'عَرْضُكِ انْتَهَى. سَأَسْأَلُكِ كَالْجُمْهُورِ: مَا تَكْلِفَتُهُ؟'
learner_goal: Latih percakapan Arab B2 untuk menjawab pertanyaan audiens dengan jujur dan terhubung ke
  tujuan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: 'عَرْضُكِ انْتَهَى. سَأَسْأَلُكِ كَالْجُمْهُورِ: مَا تَكْلِفَتُهُ؟'
  hint: 'Jawab dengan struktur B2 memakai: سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.'
  sample_answer: سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.
  focus: Membuka jawaban.
  expected_keywords:
  - سُؤَالٌ
  - جَيِّدٌ
  - وَسَأُجِيبُ
  - بِنُقْطَةٍ
  - وَاحِدَةٍ
  indonesian_explanation: Pertanyaan bagus, akan kujawab dengan satu poin.
- coach: 'استخدم الفكرة: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.'
  hint: 'Jawab dengan struktur B2 memakai: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.'
  sample_answer: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.
  focus: Jujur soal batas.
  expected_keywords:
  - لَا
  - أَمْلِكُ
  - الرَّقْمَ
  - الْآنَ
  - لَكِنِّي
  indonesian_explanation: Aku tidak punya angkanya sekarang, tapi kukirim besok.
- coach: 'استخدم الفكرة: هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.'
  hint: 'Jawab dengan struktur B2 memakai: هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.'
  sample_answer: هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.
  focus: Menandai di luar topik.
  expected_keywords:
  - هَذَا
  - السُّؤَالُ
  - خَارِجُ
  - نِطَاقِنَا
  - قَلِيلًا
  indonesian_explanation: Pertanyaan ini sedikit di luar lingkup kita.
- coach: 'استخدم الفكرة: لَكِنْ دَعِينِي أَرْبِطُهُ بِهَدَفِنَا الْأَسَاسِيِّ.'
  hint: 'Jawab dengan struktur B2 memakai: لَكِنْ دَعِينِي أَرْبِطُهُ بِهَدَفِنَا الْأَسَاسِيِّ.'
  sample_answer: لَكِنْ دَعِينِي أَرْبِطُهُ بِهَدَفِنَا الْأَسَاسِيِّ.
  focus: Mengembalikan ke fokus.
  expected_keywords:
  - لَكِنْ
  - دَعِينِي
  - أَرْبِطُهُ
  - بِهَدَفِنَا
  - الْأَسَاسِيِّ
  indonesian_explanation: Tapi biar kuhubungkan ke tujuan utama kita.
target_phrases:
- سُؤَالٌ جَيِّدٌ، وَسَأُجِيبُ بِنُقْطَةٍ وَاحِدَةٍ.
- لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُرْسِلُهُ غَدًا.
- هَذَا السُّؤَالُ خَارِجُ نِطَاقِنَا قَلِيلًا.
- لَكِنْ دَعِينِي أَرْبِطُهُ بِهَدَفِنَا الْأَسَاسِيِّ.
- بِاخْتِصَارٍ، الْجَوَابُ يَخْدُمُ نَفْسَ الْهَدَفِ.
