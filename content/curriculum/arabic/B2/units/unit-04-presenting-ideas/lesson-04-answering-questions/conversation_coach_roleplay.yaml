scenario_key: arabic_b2_answering_questions
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي أَسْئِلَةِ الْجُمْهُورِ بَعْدَ الْعَرْضِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
  تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk menjawab pertanyaan dengan alasan, contoh, respons, dan rekomendasi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي أَسْئِلَةِ الْجُمْهُورِ بَعْدَ الْعَرْضِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
    تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي أَسْئِلَةِ الْجُمْهُورِ بَعْدَ الْعَرْضِ أَنَّنَا نَحْتَاجُ إِلَى
    قَرَارٍ وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي أَسْئِلَةِ الْجُمْهُورِ بَعْدَ الْعَرْضِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Membuka presentasi.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - أَسْئِلَةِ
  - الْجُمْهُورِ
  - بَعْدَ
  indonesian_explanation: Posisi saya adalah bahwa pertanyaan audiens setelah presentasi membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ.'
  hint: 'Jawab dengan struktur B2 memakai: بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ.'
  sample_answer: بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ.
  focus: Memberi signposting.
  expected_keywords:
  - بَعْدَ
  - ذَلِكَ،
  - سَأَشْرَحُ
  - الْفَائِدَةَ
  - الْأَسَاسِيَّةَ
  indonesian_explanation: Setelah itu, saya akan menjelaskan manfaat utamanya.
- coach: 'استخدم الفكرة: مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا.'
  hint: 'Jawab dengan struktur B2 memakai: مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا.'
  sample_answer: مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا.
  focus: Menjelaskan risk secara seimbang.
  expected_keywords:
  - مِنَ
  - الْمُهِمِّ
  - أَنْ
  - نَذْكُرَ
  - الْمَخَاطِرَ
  indonesian_explanation: Penting juga untuk menyebutkan risikonya.
- coach: 'استخدم الفكرة: إِذَا كَانَتْ هُنَاكَ أَسْئِلَةٌ، فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ.'
  hint: 'Jawab dengan struktur B2 memakai: إِذَا كَانَتْ هُنَاكَ أَسْئِلَةٌ، فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ.'
  sample_answer: إِذَا كَانَتْ هُنَاكَ أَسْئِلَةٌ، فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ.
  focus: Menyiapkan Q&A.
  expected_keywords:
  - إِذَا
  - كَانَتْ
  - هُنَاكَ
  - أَسْئِلَةٌ،
  - فَسَأُجِيبُ
  indonesian_explanation: Jika ada pertanyaan, saya akan menjawabnya dengan jelas.
target_phrases:
- مَوْقِفِي فِي أَسْئِلَةِ الْجُمْهُورِ بَعْدَ الْعَرْضِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ.
- مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا.
- إِذَا كَانَتْ هُنَاكَ أَسْئِلَةٌ، فَسَأُجِيبُ عَنْهَا بِوُضُوحٍ.
- فِي الْخِتَامِ، سَأَقْتَرِحُ خُطْوَةً عَمَلِيَّةً.
