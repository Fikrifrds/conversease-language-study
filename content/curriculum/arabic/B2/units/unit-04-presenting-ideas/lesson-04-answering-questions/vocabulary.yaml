vocabulary:
- word: أَسْئِلَةٌ
  meaning_id: pertanyaan-pertanyaan
  usage_note: 'Dipakai untuk arti "pertanyaan-pertanyaan". Contoh: "سَأَبْدَأُ بِمُقَدِّمَةٍ قَصِيرَةٍ
    عَنْ الْإِجَابَةُ عَنِ الْأَسْئِلَةِ."'
- word: فَائِدَةٌ
  meaning_id: manfaat
  usage_note: 'Dipakai untuk arti "manfaat". Contoh: "بَعْدَ ذَلِكَ، سَأَشْرَحُ الْفَائِدَةَ الْأَسَاسِيَّةَ."'
- word: مَخَاطِرُ
  meaning_id: risiko
  usage_note: 'Dipakai untuk arti "risiko". Contoh: "مِنَ الْمُهِمِّ أَنْ نَذْكُرَ الْمَخَاطِرَ أَيْضًا."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "فِي الْخِتَامِ، سَأَقْتَرِحُ خُطْوَةً عَمَلِيَّةً."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ سَتُقَدِّمِينَ هَذِهِ الْفِكْرَةَ؟ أُرِيدُ
    أَنْ أُرَكِّزَ عَلَى الْإِجَابَةُ عَنِ الْأَسْ..."'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "كَيْفَ سَتُقَدِّمِينَ هَذِهِ الْفِكْرَةَ؟ أُرِيدُ
    أَنْ أُرَكِّزَ عَلَى الْإِجَابَةُ عَنِ الْأَسْ..."'
- word: قَرَارٌ
  meaning_id: keputusan
  usage_note: 'Dipakai untuk arti "keputusan". Contoh: "مَا الْقَرَارُ الَّذِي نَحْتَاجُ إِلَى تَسْمِيَتِهِ
    بِوُضُوحٍ؟"'
- word: نِهَايَةٌ
  meaning_id: akhir
  usage_note: 'Dipakai untuk arti "akhir". Contoh: "عِنْدَ نِهَايَةِ الِاجْتِمَاعِ، بَعْدَ ذَلِكَ، سَأَشْرَحُ
    الْفَائِدَةَ الْأَسَاسِيَّةَ. مِنَ الْ..."'
