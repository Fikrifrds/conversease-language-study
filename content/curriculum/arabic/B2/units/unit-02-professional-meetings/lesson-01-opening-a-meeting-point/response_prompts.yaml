prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saya ingin membuka diskusi tentang tenggat penyerahan proyek.'
  target_response: أَوَدُّ أَنْ أَفْتَحَ النِّقَاشَ حَوْلَ مَوْعِدِ تَسْلِيمِ الْمَشْرُوعِ.
  acceptable_responses:
  - أَوَدُّ أَنْ أَفْتَحَ النِّقَاشَ حَوْلَ مَوْعِدِ تَسْلِيمِ الْمَشْرُوعِ.
- prompt: 'Ucapkan dalam bahasa Arab: Karena tim membutuhkan keputusan sebelum akhir hari.'
  target_response: لِأَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ قَبْلَ نِهَايَةِ الْيَوْمِ.
  acceptable_responses:
  - لِأَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ قَبْلَ نِهَايَةِ الْيَوْمِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kita menentukan tenggat akhir dan siapa yang akan meninjau versi
    terakhir.'
  target_response: نُحَدِّدُ الْمَوْعِدَ النِّهَائِيَّ وَمَنْ سَيُرَاجِعُ النُّسْخَةَ الأَخِيرَةَ.
  acceptable_responses:
  - نُحَدِّدُ الْمَوْعِدَ النِّهَائِيَّ وَمَنْ سَيُرَاجِعُ النُّسْخَةَ الأَخِيرَةَ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan mengirim ringkasan singkat berisi keputusan dan tanggung
    jawab.'
  target_response: سَأُرْسِلُ مُلَخَّصًا قَصِيرًا مَعَ الْقَرَارِ وَالْمَسْؤُولِيَّاتِ.
  acceptable_responses:
  - سَأُرْسِلُ مُلَخَّصًا قَصِيرًا مَعَ الْقَرَارِ وَالْمَسْؤُولِيَّاتِ.
