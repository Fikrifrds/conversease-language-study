scenario_key: arabic_b2_opening_a_meeting_point
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي مَوْعِدِ تَسْلِيمِ الْمَشْرُوعِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
  تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk membuka topik rapat, memberi alasan, meminta keputusan, dan menutup dengan action
  item.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي مَوْعِدِ تَسْلِيمِ الْمَشْرُوعِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي مَوْعِدِ تَسْلِيمِ الْمَشْرُوعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ
    وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي مَوْعِدِ تَسْلِيمِ الْمَشْرُوعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Membuka topik rapat.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - مَوْعِدِ
  - تَسْلِيمِ
  - الْمَشْرُوعِ
  indonesian_explanation: Posisi saya adalah bahwa tenggat penyerahan proyek membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: لِأَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ قَبْلَ نِهَايَةِ الْيَوْمِ.'
  hint: 'Jawab dengan struktur B2 memakai: لِأَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ قَبْلَ نِهَايَةِ الْيَوْمِ.'
  sample_answer: لِأَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ قَبْلَ نِهَايَةِ الْيَوْمِ.
  focus: Memberi alasan rapat.
  expected_keywords:
  - لِأَنَّ
  - الْفَرِيقَ
  - يَحْتَاجُ
  - إِلَى
  - قَرَارٍ
  indonesian_explanation: Karena tim membutuhkan keputusan sebelum akhir hari.
- coach: 'استخدم الفكرة: نُحَدِّدُ الْمَوْعِدَ النِّهَائِيَّ وَمَنْ سَيُرَاجِعُ النُّسْخَةَ الأَخِيرَةَ.'
  hint: 'Jawab dengan struktur B2 memakai: نُحَدِّدُ الْمَوْعِدَ النِّهَائِيَّ وَمَنْ سَيُرَاجِعُ النُّسْخَةَ الأَخِيرَةَ.'
  sample_answer: نُحَدِّدُ الْمَوْعِدَ النِّهَائِيَّ وَمَنْ سَيُرَاجِعُ النُّسْخَةَ الأَخِيرَةَ.
  focus: Meminta keputusan konkret.
  expected_keywords:
  - نُحَدِّدُ
  - الْمَوْعِدَ
  - النِّهَائِيَّ
  - وَمَنْ
  - سَيُرَاجِعُ
  indonesian_explanation: Kita menentukan tenggat akhir dan siapa yang akan meninjau versi terakhir.
- coach: 'استخدم الفكرة: سَأُرْسِلُ مُلَخَّصًا قَصِيرًا مَعَ الْقَرَارِ وَالْمَسْؤُولِيَّاتِ.'
  hint: 'Jawab dengan struktur B2 memakai: سَأُرْسِلُ مُلَخَّصًا قَصِيرًا مَعَ الْقَرَارِ وَالْمَسْؤُولِيَّاتِ.'
  sample_answer: سَأُرْسِلُ مُلَخَّصًا قَصِيرًا مَعَ الْقَرَارِ وَالْمَسْؤُولِيَّاتِ.
  focus: Menutup dengan action item.
  expected_keywords:
  - سَأُرْسِلُ
  - مُلَخَّصًا
  - قَصِيرًا
  - مَعَ
  - الْقَرَارِ
  indonesian_explanation: Saya akan mengirim ringkasan singkat berisi keputusan dan tanggung jawab.
target_phrases:
- مَوْقِفِي فِي مَوْعِدِ تَسْلِيمِ الْمَشْرُوعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- لِأَنَّ الْفَرِيقَ يَحْتَاجُ إِلَى قَرَارٍ قَبْلَ نِهَايَةِ الْيَوْمِ.
- نُحَدِّدُ الْمَوْعِدَ النِّهَائِيَّ وَمَنْ سَيُرَاجِعُ النُّسْخَةَ الأَخِيرَةَ.
- سَأُرْسِلُ مُلَخَّصًا قَصِيرًا مَعَ الْقَرَارِ وَالْمَسْؤُولِيَّاتِ.
- لِنَحْصُرِ النِّقَاشَ فِي هَذِهِ النُّقْطَةِ أَوَّلًا.
