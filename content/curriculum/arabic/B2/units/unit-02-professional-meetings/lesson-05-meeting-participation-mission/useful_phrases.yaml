phrases:
- phrase: سَأَفْتَحُ الْمَوْضُوعَ بِجُمْلَةٍ قَصِيرَةٍ ثُمَّ أَسْأَلُ عَنِ النِّطَاقِ.
  meaning_id: Saya akan membuka topik dengan kalimat singkat lalu bertanya tentang scope.
  usage_note: Memulai bagian rapat.
- phrase: سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ مِثَالًا مُحَدَّدًا.
  meaning_id: Saya akan berterima kasih kepada pemberi masukan dan meminta contoh spesifik.
  usage_note: Merespons objection.
- phrase: سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً وَاحِدَةً.
  meaning_id: Saya akan membandingkan dua opsi lalu mengusulkan satu langkah.
  usage_note: Mengarahkan ke keputusan.
- phrase: سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ.
  meaning_id: Saya akan merangkum keputusan dan tanggung jawab lalu mengirimkannya setelah rapat.
  usage_note: Menutup rapat.
- phrase: كَيْفَ سَتَبْدَئِينَ؟
  meaning_id: Bagaimana kamu akan memulai?
  usage_note: Menyiapkan roleplay rapat.
