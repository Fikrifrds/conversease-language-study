prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan membuka topik dengan kalimat singkat lalu bertanya tentang
    scope.'
  target_response: سَأَفْتَحُ الْمَوْضُوعَ بِجُمْلَةٍ قَصِيرَةٍ ثُمَّ أَسْأَلُ عَنِ النِّطَاقِ.
  acceptable_responses:
  - سَأَفْتَحُ الْمَوْضُوعَ بِجُمْلَةٍ قَصِيرَةٍ ثُمَّ أَسْأَلُ عَنِ النِّطَاقِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan berterima kasih kepada pemberi masukan dan meminta contoh
    spesifik.'
  target_response: سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ مِثَالًا مُحَدَّدًا.
  acceptable_responses:
  - سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ مِثَالًا مُحَدَّدًا.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan membandingkan dua opsi lalu mengusulkan satu langkah.'
  target_response: سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً وَاحِدَةً.
  acceptable_responses:
  - سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً وَاحِدَةً.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan merangkum keputusan dan tanggung jawab lalu mengirimkannya
    setelah rapat.'
  target_response: سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ.
  acceptable_responses:
  - سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ.
