scenario_key: arabic_b2_meeting_participation_mission
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي إِدَارَةِ جُزْءٍ مِنَ الِاجْتِمَاعِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
  تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk berpartisipasi aktif dalam rapat profesional dari pembuka sampai ringkasan akhir.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي إِدَارَةِ جُزْءٍ مِنَ الِاجْتِمَاعِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ
    تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي إِدَارَةِ جُزْءٍ مِنَ الِاجْتِمَاعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ
    وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي إِدَارَةِ جُزْءٍ مِنَ الِاجْتِمَاعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Memulai bagian rapat.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - إِدَارَةِ
  - جُزْءٍ
  - مِنَ
  indonesian_explanation: Posisi saya adalah bahwa memimpin bagian dari rapat membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ مِثَالًا مُحَدَّدًا.'
  hint: 'Jawab dengan struktur B2 memakai: سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ مِثَالًا مُحَدَّدًا.'
  sample_answer: سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ مِثَالًا مُحَدَّدًا.
  focus: Merespons objection.
  expected_keywords:
  - سَأَشْكُرُ
  - صَاحِبَ
  - الْمُلَاحَظَةِ
  - وَأَطْلُبُ
  - مِثَالًا
  indonesian_explanation: Saya akan berterima kasih kepada pemberi masukan dan meminta contoh spesifik.
- coach: 'استخدم الفكرة: سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً وَاحِدَةً.'
  hint: 'Jawab dengan struktur B2 memakai: سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً وَاحِدَةً.'
  sample_answer: سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً وَاحِدَةً.
  focus: Mengarahkan ke keputusan.
  expected_keywords:
  - سَأُقَارِنُ
  - الْخِيَارَيْنِ
  - ثُمَّ
  - أَقْتَرِحُ
  - خُطْوَةً
  indonesian_explanation: Saya akan membandingkan dua opsi lalu mengusulkan satu langkah.
- coach: 'استخدم الفكرة: سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ.'
  hint: 'Jawab dengan struktur B2 memakai: سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ.'
  sample_answer: سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ.
  focus: Menutup rapat.
  expected_keywords:
  - سَأُلَخِّصُ
  - الْقَرَارَ
  - وَالْمَسْؤُولِيَّاتِ
  - وَأُرْسِلُهَا
  - بَعْدَ
  indonesian_explanation: Saya akan merangkum keputusan dan tanggung jawab lalu mengirimkannya setelah rapat.
target_phrases:
- مَوْقِفِي فِي إِدَارَةِ جُزْءٍ مِنَ الِاجْتِمَاعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ مِثَالًا مُحَدَّدًا.
- سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً وَاحِدَةً.
- سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ.
- كَيْفَ سَتَبْدَئِينَ؟
