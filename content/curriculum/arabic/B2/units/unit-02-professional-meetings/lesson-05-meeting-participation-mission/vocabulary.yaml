vocabulary:
- word: نِطَاقٌ
  meaning_id: cakupan
  usage_note: 'Dipakai untuk arti "cakupan". Contoh: "سَأَفْتَحُ الْمَوْضُوعَ بِجُمْلَةٍ قَصِيرَةٍ ثُمَّ
    أَسْأَلُ عَنِ النِّطَاقِ."'
- word: مُلَاحَظَةٌ
  meaning_id: catatan/masukan
  usage_note: 'Dipakai untuk arti "catatan/masukan". Contoh: "سَأَشْكُرُ صَاحِبَ الْمُلَاحَظَةِ وَأَطْلُبُ
    مِثَالًا مُحَدَّدًا."'
- word: أَقْتَرِحُ
  meaning_id: saya menyarankan
  usage_note: 'Dipakai untuk arti "saya menyarankan". Contoh: "سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ
    خُطْوَةً وَاحِدَةً."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً
    وَاحِدَةً."'
- word: وَاحِدَةٌ
  meaning_id: satu
  usage_note: 'Dipakai untuk arti "satu". Contoh: "سَأُقَارِنُ الْخِيَارَيْنِ ثُمَّ أَقْتَرِحُ خُطْوَةً
    وَاحِدَةً."'
- word: قَرَارٌ
  meaning_id: keputusan
  usage_note: 'Dipakai untuk arti "keputusan". Contoh: "سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ وَأُرْسِلُهَا
    بَعْدَ الِاجْتِمَاعِ."'
- word: اِجْتِمَاعٌ
  meaning_id: rapat/pertemuan
  usage_note: 'Dipakai untuk arti "rapat/pertemuan". Contoh: "سَأُلَخِّصُ الْقَرَارَ وَالْمَسْؤُولِيَّاتِ
    وَأُرْسِلُهَا بَعْدَ الِاجْتِمَاعِ."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ سَتَبْدَئِينَ؟"'
