vocabulary:
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ أَنْ أَبْدَأَ بِنُقْطَةٍ
    عَنْ تَوْضِيحُ نِطَاقِ النِّقَاشِ."'
- word: تَوْضِيحٌ
  meaning_id: klarifikasi/penjelasan
  usage_note: 'Dipakai untuk arti "klarifikasi/penjelasan". Contoh: "أُرِيدُ أَنْ
    أَبْدَأَ بِنُقْطَةٍ عَنْ تَوْضِيحُ نِطَاقِ النِّقَاشِ."'
- word: نِطَاقٌ
  meaning_id: cakupan
  usage_note: 'Dipakai untuk arti "cakupan". Contoh: "أُرِيدُ أَنْ أَبْدَأَ بِنُقْطَةٍ
    عَنْ تَوْضِيحُ نِطَاقِ النِّقَاشِ."'
- word: نِقَاشٌ
  meaning_id: diskusi
  usage_note: 'Dipakai untuk arti "diskusi". Contoh: "أُرِيدُ أَنْ أَبْدَأَ بِنُقْطَةٍ
    عَنْ تَوْضِيحُ نِطَاقِ النِّقَاشِ."'
- word: وَاضِحٌ
  meaning_id: jelas
  usage_note: 'Dipakai untuk arti "jelas". Contoh: "هَلْ نِطَاقُ النِّقَاشِ وَاضِحٌ
    لِلْجَمِيعِ؟"'
- word: عِنْدِي
  meaning_id: saya punya
  usage_note: 'Dipakai untuk arti "saya punya". Contoh: "عِنْدِي مُلَاحَظَةٌ بَنَّاءَةٌ
    عَلَى هَذَا الِاقْتِرَاحِ."'
- word: مُلَاحَظَةٌ
  meaning_id: catatan/masukan
  usage_note: 'Dipakai untuk arti "catatan/masukan". Contoh: "عِنْدِي مُلَاحَظَةٌ
    بَنَّاءَةٌ عَلَى هَذَا الِاقْتِرَاحِ."'
- word: بَنَّاءَةٌ
  meaning_id: konstruktif
  usage_note: 'Dipakai untuk arti "konstruktif". Contoh: "عِنْدِي مُلَاحَظَةٌ بَنَّاءَةٌ
    عَلَى هَذَا الِاقْتِرَاحِ."'
