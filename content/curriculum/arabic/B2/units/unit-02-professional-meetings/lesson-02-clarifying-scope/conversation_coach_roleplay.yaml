scenario_key: arabic_b2_clarifying_scope
mode: lesson_practice_coach
level_code: B2
opening_line: قَبْلَ أَنْ نُكْمِلَ، هَلِ النِّطَاقُ وَاضِحٌ؟
learner_goal: Latih percakapan Arab B2 untuk memperjelas scope rapat, menetapkan batasan, dan mengonfirmasi
  tindak lanjut.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: قَبْلَ أَنْ نُكْمِلَ، هَلِ النِّطَاقُ وَاضِحٌ؟
  hint: 'Jawab dengan struktur B2 memakai: لَيْسَ النِّطَاقُ وَاضِحًا تَمَامًا.'
  sample_answer: لَيْسَ النِّطَاقُ وَاضِحًا تَمَامًا.
  focus: Membuka klarifikasi scope.
  expected_keywords:
  - لَيْسَ
  - النِّطَاقُ
  - وَاضِحًا
  - تَمَامًا
  indonesian_explanation: Cakupannya belum sepenuhnya jelas.
- coach: 'استخدم الفكرة: نُدْخِلُ الصَّفْحَةَ الرَّئِيسِيَّةَ وَنُؤَجِّلُ التَّقَارِيرَ.'
  hint: 'Jawab dengan struktur B2 memakai: نُدْخِلُ الصَّفْحَةَ الرَّئِيسِيَّةَ وَنُؤَجِّلُ التَّقَارِيرَ.'
  sample_answer: نُدْخِلُ الصَّفْحَةَ الرَّئِيسِيَّةَ وَنُؤَجِّلُ التَّقَارِيرَ.
  focus: Membatasi scope.
  expected_keywords:
  - نُدْخِلُ
  - الصَّفْحَةَ
  - الرَّئِيسِيَّةَ
  - وَنُؤَجِّلُ
  - التَّقَارِيرَ
  indonesian_explanation: Kita memasukkan halaman utama dan menunda laporan.
- coach: 'استخدم الفكرة: هَذَا يُبْقِي الْمَوْعِدَ وَاقِعِيًّا وَيُقَلِّلُ الْمَخَاطِرَ.'
  hint: 'Jawab dengan struktur B2 memakai: هَذَا يُبْقِي الْمَوْعِدَ وَاقِعِيًّا وَيُقَلِّلُ الْمَخَاطِرَ.'
  sample_answer: هَذَا يُبْقِي الْمَوْعِدَ وَاقِعِيًّا وَيُقَلِّلُ الْمَخَاطِرَ.
  focus: Memberi alasan batasan.
  expected_keywords:
  - هَذَا
  - يُبْقِي
  - الْمَوْعِدَ
  - وَاقِعِيًّا
  - وَيُقَلِّلُ
  indonesian_explanation: Ini membuat tenggat tetap realistis dan mengurangi risiko.
- coach: 'استخدم الفكرة: سَأُؤَكِّدُ ذَلِكَ فِي رِسَالَةٍ قَصِيرَةٍ بَعْدَ الِاجْتِمَاعِ.'
  hint: 'Jawab dengan struktur B2 memakai: سَأُؤَكِّدُ ذَلِكَ فِي رِسَالَةٍ قَصِيرَةٍ بَعْدَ الِاجْتِمَاعِ.'
  sample_answer: سَأُؤَكِّدُ ذَلِكَ فِي رِسَالَةٍ قَصِيرَةٍ بَعْدَ الِاجْتِمَاعِ.
  focus: Mengonfirmasi follow-up.
  expected_keywords:
  - سَأُؤَكِّدُ
  - ذَلِكَ
  - فِي
  - رِسَالَةٍ
  - قَصِيرَةٍ
  indonesian_explanation: Saya akan mengonfirmasi itu dalam pesan singkat setelah rapat.
target_phrases:
- لَيْسَ النِّطَاقُ وَاضِحًا تَمَامًا.
- نُدْخِلُ الصَّفْحَةَ الرَّئِيسِيَّةَ وَنُؤَجِّلُ التَّقَارِيرَ.
- هَذَا يُبْقِي الْمَوْعِدَ وَاقِعِيًّا وَيُقَلِّلُ الْمَخَاطِرَ.
- سَأُؤَكِّدُ ذَلِكَ فِي رِسَالَةٍ قَصِيرَةٍ بَعْدَ الِاجْتِمَاعِ.
- مَا يَدْخُلُ فِي الْمَرْحَلَةِ الأُولَى؟
