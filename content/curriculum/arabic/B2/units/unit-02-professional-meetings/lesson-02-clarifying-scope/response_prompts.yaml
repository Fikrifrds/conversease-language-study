prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saya ingin mulai dengan poin tentang memperjelas scope diskusi.'
  target_response: أُرِيدُ أَنْ أَبْدَأَ بِنُقْطَةٍ عَنْ تَوْضِيحُ نِطَاقِ النِّقَاشِ.
  acceptable_responses:
  - أُرِيدُ أَنْ أَبْدَأَ بِنُقْطَةٍ عَنْ تَوْضِيحُ نِطَاقِ النِّقَاشِ.
- prompt: 'Ucapkan dalam bahasa Arab: Apakah cakupan diskusi jelas untuk semua orang?'
  target_response: هَلْ نِطَاقُ النِّقَاشِ وَاضِحٌ لِلْجَمِيعِ؟
  acceptable_responses:
  - هَلْ نِطَاقُ النِّقَاشِ وَاضِحٌ لِلْجَمِيعِ؟
- prompt: 'Ucapkan dalam bahasa Arab: Saya punya masukan konstruktif untuk usulan ini.'
  target_response: عِنْدِي مُلَاحَظَةٌ بَنَّاءَةٌ عَلَى هَذَا الِاقْتِرَاحِ.
  acceptable_responses:
  - عِنْدِي مُلَاحَظَةٌ بَنَّاءَةٌ عَلَى هَذَا الِاقْتِرَاحِ.
- prompt: 'Ucapkan dalam bahasa Arab: Keputusan utamanya adalah kita menyelesaikan langkah berikutnya.'
  target_response: الْقَرَارُ الْأَسَاسِيُّ هُوَ أَنْ نُكْمِلَ الْخُطْوَةَ التَّالِيَةَ.
  acceptable_responses:
  - الْقَرَارُ الْأَسَاسِيُّ هُوَ أَنْ نُكْمِلَ الْخُطْوَةَ التَّالِيَةَ.
