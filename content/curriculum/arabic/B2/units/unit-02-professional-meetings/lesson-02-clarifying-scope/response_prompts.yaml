prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Cakupannya belum sepenuhnya jelas.'
  target_response: لَيْسَ النِّطَاقُ وَاضِحًا تَمَامًا.
  acceptable_responses:
  - لَيْسَ النِّطَاقُ وَاضِحًا تَمَامًا.
- prompt: 'Ucapkan dalam bahasa Arab: Kita memasukkan halaman utama dan menunda laporan.'
  target_response: نُدْخِلُ الصَّفْحَةَ الرَّئِيسِيَّةَ وَنُؤَجِّلُ التَّقَارِيرَ.
  acceptable_responses:
  - نُدْخِلُ الصَّفْحَةَ الرَّئِيسِيَّةَ وَنُؤَجِّلُ التَّقَارِيرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Ini membuat tenggat tetap realistis dan mengurangi risiko.'
  target_response: هَذَا يُبْقِي الْمَوْعِدَ وَاقِعِيًّا وَيُقَلِّلُ الْمَخَاطِرَ.
  acceptable_responses:
  - هَذَا يُبْقِي الْمَوْعِدَ وَاقِعِيًّا وَيُقَلِّلُ الْمَخَاطِرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan mengonfirmasi itu dalam pesan singkat setelah rapat.'
  target_response: سَأُؤَكِّدُ ذَلِكَ فِي رِسَالَةٍ قَصِيرَةٍ بَعْدَ الِاجْتِمَاعِ.
  acceptable_responses:
  - سَأُؤَكِّدُ ذَلِكَ فِي رِسَالَةٍ قَصِيرَةٍ بَعْدَ الِاجْتِمَاعِ.
