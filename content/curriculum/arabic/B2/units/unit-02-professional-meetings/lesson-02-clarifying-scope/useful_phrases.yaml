phrases:
- phrase: أُرِيدُ أَنْ أَبْدَأَ بِنُقْطَةٍ عَنْ تَوْضِيحُ نِطَاقِ النِّقَاشِ.
  meaning_id: Saya ingin mulai dengan poin tentang memperjelas scope diskusi.
  usage_note: Membuka kontribusi rapat.
- phrase: هَلْ نِطَاقُ النِّقَاشِ وَاضِحٌ لِلْجَمِيعِ؟
  meaning_id: Apakah cakupan diskusi jelas untuk semua orang?
  usage_note: Memastikan scope.
- phrase: عِنْدِي مُلَاحَظَةٌ بَنَّاءَةٌ عَلَى هَذَا الِاقْتِرَاحِ.
  meaning_id: Saya punya masukan konstruktif untuk usulan ini.
  usage_note: Memberi feedback profesional.
- phrase: الْقَرَارُ الْأَسَاسِيُّ هُوَ أَنْ نُكْمِلَ الْخُطْوَةَ التَّالِيَةَ.
  meaning_id: Keputusan utamanya adalah kita menyelesaikan langkah berikutnya.
  usage_note: Merangkum keputusan.
- phrase: سَأُرْسِلُ مُلَخَّصًا قَصِيرًا بَعْدَ الِاجْتِمَاعِ.
  meaning_id: Saya akan mengirim ringkasan singkat setelah rapat.
  usage_note: Menutup dengan action item.
