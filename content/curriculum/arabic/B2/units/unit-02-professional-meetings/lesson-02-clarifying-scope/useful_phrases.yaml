phrases:
- phrase: لَيْسَ النِّطَاقُ وَاضِحًا تَمَامًا.
  meaning_id: Cakupannya belum sepenuhnya jelas.
  usage_note: Membuka klarifikasi scope.
- phrase: نُدْخِلُ الصَّفْحَةَ الرَّئِيسِيَّةَ وَنُؤَجِّلُ التَّقَارِيرَ.
  meaning_id: Kita memasukkan halaman utama dan menunda laporan.
  usage_note: Membatasi scope.
- phrase: هَذَا يُبْقِي الْمَوْعِدَ وَاقِعِيًّا وَيُقَلِّلُ الْمَخَاطِرَ.
  meaning_id: Ini membuat tenggat tetap realistis dan mengurangi risiko.
  usage_note: Memberi alasan batasan.
- phrase: سَأُؤَكِّدُ ذَلِكَ فِي رِسَالَةٍ قَصِيرَةٍ بَعْدَ الِاجْتِمَاعِ.
  meaning_id: Saya akan mengonfirmasi itu dalam pesan singkat setelah rapat.
  usage_note: Mengonfirmasi follow-up.
- phrase: مَا يَدْخُلُ فِي الْمَرْحَلَةِ الأُولَى؟
  meaning_id: Apa yang masuk fase pertama?
  usage_note: Bertanya batas scope.
