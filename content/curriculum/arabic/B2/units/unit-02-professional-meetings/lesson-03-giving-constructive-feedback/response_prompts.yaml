prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Strukturnya bagus, tetapi pembuka membutuhkan tujuan yang lebih
    jelas.'
  target_response: الْهَيْكَلُ جَيِّدٌ، وَلَكِنَّ الْمُقَدِّمَةَ تَحْتَاجُ إِلَى هَدَفٍ أَوْضَحَ.
  acceptable_responses:
  - الْهَيْكَلُ جَيِّدٌ، وَلَكِنَّ الْمُقَدِّمَةَ تَحْتَاجُ إِلَى هَدَفٍ أَوْضَحَ.
- prompt: 'Ucapkan dalam bahasa Arab: Idenya kuat, dan menambahkan satu tujuan akan membuatnya lebih kuat.'
  target_response: الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا أَقْوَى.
  acceptable_responses:
  - الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا أَقْوَى.
- prompt: 'Ucapkan dalam bahasa Arab: Kita sebutkan bagaimana klien akan mengukur keberhasilan setelah
    satu bulan.'
  target_response: نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ بَعْدَ شَهْرٍ.
  acceptable_responses:
  - نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ بَعْدَ شَهْرٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya mengirim komentar dengan saran kecil untuk merumuskan ulang.'
  target_response: أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ الصِّيَاغَةِ.
  acceptable_responses:
  - أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ الصِّيَاغَةِ.
