scenario_key: arabic_b2_giving_constructive_feedback
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي مُسَوَّدَةِ الِاقْتِرَاحِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk memberi feedback konstruktif, menyebut kekuatan, memberi saran, dan menawarkan
  perbaikan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي مُسَوَّدَةِ الِاقْتِرَاحِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي مُسَوَّدَةِ الِاقْتِرَاحِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي مُسَوَّدَةِ الِاقْتِرَاحِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Memberi feedback seimbang.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - مُسَوَّدَةِ
  - الِاقْتِرَاحِ
  indonesian_explanation: Posisi saya adalah bahwa draft proposal membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا أَقْوَى.'
  hint: 'Jawab dengan struktur B2 memakai: الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا أَقْوَى.'
  sample_answer: الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا أَقْوَى.
  focus: Membuat feedback konstruktif.
  expected_keywords:
  - الْفِكْرَةُ
  - قَوِيَّةٌ،
  - وَإِضَافَةُ
  - هَدَفٍ
  - وَاحِدٍ
  indonesian_explanation: Idenya kuat, dan menambahkan satu tujuan akan membuatnya lebih kuat.
- coach: 'استخدم الفكرة: نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ بَعْدَ شَهْرٍ.'
  hint: 'Jawab dengan struktur B2 memakai: نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ بَعْدَ شَهْرٍ.'
  sample_answer: نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ بَعْدَ شَهْرٍ.
  focus: Memberi contoh konkret.
  expected_keywords:
  - نَذْكُرُ
  - كَيْفَ
  - سَيَقِيسُ
  - الْعَمِيلُ
  - النَّجَاحَ
  indonesian_explanation: Kita sebutkan bagaimana klien akan mengukur keberhasilan setelah satu bulan.
- coach: 'استخدم الفكرة: أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ الصِّيَاغَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ الصِّيَاغَةِ.'
  sample_answer: أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ الصِّيَاغَةِ.
  focus: Menutup feedback dengan bantuan.
  expected_keywords:
  - أُرْسِلُ
  - التَّعْلِيقَ
  - مَعَ
  - اقْتِرَاحٍ
  - صَغِيرٍ
  indonesian_explanation: Saya mengirim komentar dengan saran kecil untuk merumuskan ulang.
target_phrases:
- مَوْقِفِي فِي مُسَوَّدَةِ الِاقْتِرَاحِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا أَقْوَى.
- نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ بَعْدَ شَهْرٍ.
- أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ الصِّيَاغَةِ.
- كَيْفَ نَقُولُ ذَلِكَ بِطَرِيقَةٍ بَنَّاءَةٍ؟
