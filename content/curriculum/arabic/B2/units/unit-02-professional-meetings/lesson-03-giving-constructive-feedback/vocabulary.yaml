vocabulary:
- word: مُقَدِّمَةٌ
  meaning_id: pembuka/pengantar
  usage_note: 'Dipakai untuk arti "pembuka/pengantar". Contoh: "الْهَيْكَلُ جَيِّدٌ، وَلَكِنَّ الْمُقَدِّمَةَ
    تَحْتَاجُ إِلَى هَدَفٍ أَوْضَحَ."'
- word: هَدَفٌ
  meaning_id: tujuan
  usage_note: 'Dipakai untuk arti "tujuan". Contoh: "الْهَيْكَلُ جَيِّدٌ، وَلَكِنَّ الْمُقَدِّمَةَ تَحْتَاجُ
    إِلَى هَدَفٍ أَوْضَحَ."'
- word: وَاحِدٌ
  meaning_id: satu
  usage_note: 'Dipakai untuk arti "satu". Contoh: "الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا
    أَقْوَى."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ
    بَعْدَ شَهْرٍ."'
- word: عَمِيلٌ
  meaning_id: klien/pelanggan
  usage_note: 'Dipakai untuk arti "klien/pelanggan". Contoh: "نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ
    بَعْدَ شَهْرٍ."'
- word: اِقْتِرَاحٌ
  meaning_id: usulan
  usage_note: 'Dipakai untuk arti "usulan". Contoh: "أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ
    الصِّيَاغَةِ."'
- word: صَغِيرٌ
  meaning_id: kecil
  usage_note: 'Dipakai untuk arti "kecil". Contoh: "أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ
    الصِّيَاغَةِ."'
- word: بَنَّاءَةٌ
  meaning_id: konstruktif
  usage_note: 'Dipakai untuk arti "konstruktif". Contoh: "كَيْفَ نَقُولُ ذَلِكَ بِطَرِيقَةٍ بَنَّاءَةٍ؟"'
