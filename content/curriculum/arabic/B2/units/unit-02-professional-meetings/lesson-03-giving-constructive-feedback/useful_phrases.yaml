phrases:
- phrase: الْهَيْكَلُ جَيِّدٌ، وَلَكِنَّ الْمُقَدِّمَةَ تَحْتَاجُ إِلَى هَدَفٍ أَوْضَحَ.
  meaning_id: Strukturnya bagus, tetapi pembuka membutuhkan tujuan yang lebih jelas.
  usage_note: Memberi feedback seimbang.
- phrase: الْفِكْرَةُ قَوِيَّةٌ، وَإِضَافَةُ هَدَفٍ وَاحِدٍ سَتَجْعَلُهَا أَقْوَى.
  meaning_id: Idenya kuat, dan menambahkan satu tujuan akan membuatnya lebih kuat.
  usage_note: Membuat feedback konstruktif.
- phrase: نَذْكُرُ كَيْفَ سَيَقِيسُ الْعَمِيلُ النَّجَاحَ بَعْدَ شَهْرٍ.
  meaning_id: Kita sebutkan bagaimana klien akan mengukur keberhasilan setelah satu bulan.
  usage_note: Memberi contoh konkret.
- phrase: أُرْسِلُ التَّعْلِيقَ مَعَ اقْتِرَاحٍ صَغِيرٍ لِإِعَادَةِ الصِّيَاغَةِ.
  meaning_id: Saya mengirim komentar dengan saran kecil untuk merumuskan ulang.
  usage_note: Menutup feedback dengan bantuan.
- phrase: كَيْفَ نَقُولُ ذَلِكَ بِطَرِيقَةٍ بَنَّاءَةٍ؟
  meaning_id: Bagaimana kita mengatakan itu secara konstruktif?
  usage_note: Menjaga nada feedback.
