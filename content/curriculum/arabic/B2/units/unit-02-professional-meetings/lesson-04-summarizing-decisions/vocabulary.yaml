vocabulary:
- word: اِتَّفَقْنَا
  meaning_id: kami sepakat
  usage_note: 'Dipakai untuk arti "kami sepakat". Contoh: "اتَّفَقْنَا عَلَى تَسْلِيمِ النُّسْخَةِ الأُولَى
    يَوْمَ الْخَمِيسِ."'
- word: يَوْمٌ
  meaning_id: hari
  usage_note: 'Dipakai untuk arti "hari". Contoh: "اتَّفَقْنَا عَلَى تَسْلِيمِ النُّسْخَةِ الأُولَى يَوْمَ
    الْخَمِيسِ."'
- word: أُرَاجِعُ
  meaning_id: saya meninjau kembali
  usage_note: 'Dipakai untuk arti "saya meninjau kembali". Contoh: "أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ
    تُرَاجِعُ التَّصْمِيمَ."'
- word: عَمِيلٌ
  meaning_id: klien/pelanggan
  usage_note: 'Dipakai untuk arti "klien/pelanggan". Contoh: "نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى
    الصُّوَرِ."'
- word: قَرَارٌ
  meaning_id: keputusan
  usage_note: 'Dipakai untuk arti "keputusan". Contoh: "سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ،
    وَالْمَوْعِدَ."'
- word: اِجْتِمَاعٌ
  meaning_id: rapat/pertemuan
  usage_note: 'Dipakai untuk arti "rapat/pertemuan". Contoh: "قَبْلَ أَنْ نُنْهِيَ الِاجْتِمَاعَ، مَا
    الَّذِي اتَّفَقْنَا عَلَيْهِ؟"'
- word: جُزْءٌ
  meaning_id: bagian
  usage_note: 'Dipakai untuk arti "bagian". Contoh: "وَمَنْ الْمَسْؤُولُ عَنْ كُلِّ جُزْءٍ؟"'
- word: نُقْطَةٌ
  meaning_id: titik
  usage_note: 'Dipakai untuk arti "titik". Contoh: "هَلْ هُنَاكَ نُقْطَةٌ غَيْرُ مَحْسُومَةٍ؟"'
