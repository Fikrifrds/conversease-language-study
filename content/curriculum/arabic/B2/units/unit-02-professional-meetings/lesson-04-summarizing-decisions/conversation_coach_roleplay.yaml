scenario_key: arabic_b2_summarizing_decisions
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي قَرَارَاتِ الِاجْتِمَاعِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk merangkum keputusan rapat dengan jelas dan bisa ditindaklanjuti.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي قَرَارَاتِ الِاجْتِمَاعِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ وَخُطْوَةٍ تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي قَرَارَاتِ الِاجْتِمَاعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي قَرَارَاتِ الِاجْتِمَاعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Menyebut keputusan.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - قَرَارَاتِ
  - الِاجْتِمَاعِ
  indonesian_explanation: Posisi saya adalah bahwa keputusan rapat membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ تُرَاجِعُ التَّصْمِيمَ.'
  hint: 'Jawab dengan struktur B2 memakai: أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ تُرَاجِعُ التَّصْمِيمَ.'
  sample_answer: أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ تُرَاجِعُ التَّصْمِيمَ.
  focus: Menyebut tanggung jawab.
  expected_keywords:
  - أَنَا
  - أُرَاجِعُ
  - النَّصَّ،
  - وَفَاطِمَةُ
  - تُرَاجِعُ
  indonesian_explanation: Saya meninjau teks, dan Fatimah meninjau desain.
- coach: 'استخدم الفكرة: نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى الصُّوَرِ.'
  hint: 'Jawab dengan struktur B2 memakai: نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى الصُّوَرِ.'
  sample_answer: نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى الصُّوَرِ.
  focus: Menyebut poin terbuka.
  expected_keywords:
  - نَحْتَاجُ
  - إِلَى
  - مُوَافَقَةِ
  - الْعَمِيلِ
  - عَلَى
  indonesian_explanation: Kita membutuhkan persetujuan klien untuk gambar.
- coach: 'استخدم الفكرة: سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ، وَالْمَوْعِدَ.'
  hint: 'Jawab dengan struktur B2 memakai: سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ، وَالْمَوْعِدَ.'
  sample_answer: 'سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ، وَالْمَوْعِدَ.'
  focus: Merangkum action items.
  expected_keywords:
  - سَأَكْتُبُ
  - ثَلَاثَ
  - 'نِقَاطٍ:'
  - الْقَرَارَ،
  - الْمَسْؤُولَ،
  indonesian_explanation: 'Saya akan menulis tiga poin: keputusan, penanggung jawab, dan tenggat.'
target_phrases:
- مَوْقِفِي فِي قَرَارَاتِ الِاجْتِمَاعِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ تُرَاجِعُ التَّصْمِيمَ.
- نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى الصُّوَرِ.
- 'سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ، وَالْمَوْعِدَ.'
- مَا الَّذِي اتَّفَقْنَا عَلَيْهِ؟
