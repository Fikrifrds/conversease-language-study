prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Kita sepakat menyerahkan versi pertama pada hari Kamis.'
  target_response: اتَّفَقْنَا عَلَى تَسْلِيمِ النُّسْخَةِ الأُولَى يَوْمَ الْخَمِيسِ.
  acceptable_responses:
  - اتَّفَقْنَا عَلَى تَسْلِيمِ النُّسْخَةِ الأُولَى يَوْمَ الْخَمِيسِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya meninjau teks, dan Fatimah meninjau desain.'
  target_response: أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ تُرَاجِعُ التَّصْمِيمَ.
  acceptable_responses:
  - أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ تُرَاجِعُ التَّصْمِيمَ.
- prompt: 'Ucapkan dalam bahasa Arab: Kita membutuhkan persetujuan klien untuk gambar.'
  target_response: نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى الصُّوَرِ.
  acceptable_responses:
  - نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى الصُّوَرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan menulis tiga poin: keputusan, penanggung jawab, dan tenggat.'
  target_response: 'سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ، وَالْمَوْعِدَ.'
  acceptable_responses:
  - 'سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ، وَالْمَوْعِدَ.'
