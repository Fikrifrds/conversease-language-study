phrases:
- phrase: اتَّفَقْنَا عَلَى تَسْلِيمِ النُّسْخَةِ الأُولَى يَوْمَ الْخَمِيسِ.
  meaning_id: Kita sepakat menyerahkan versi pertama pada hari Kamis.
  usage_note: Menyebut keputusan.
- phrase: أَنَا أُرَاجِعُ النَّصَّ، وَفَاطِمَةُ تُرَاجِعُ التَّصْمِيمَ.
  meaning_id: Saya meninjau teks, dan Fatimah meninjau desain.
  usage_note: Menyebut tanggung jawab.
- phrase: نَحْتَاجُ إِلَى مُوَافَقَةِ الْعَمِيلِ عَلَى الصُّوَرِ.
  meaning_id: Kita membutuhkan persetujuan klien untuk gambar.
  usage_note: Menyebut poin terbuka.
- phrase: 'سَأَكْتُبُ ثَلَاثَ نِقَاطٍ: الْقَرَارَ، الْمَسْؤُولَ، وَالْمَوْعِدَ.'
  meaning_id: 'Saya akan menulis tiga poin: keputusan, penanggung jawab, dan tenggat.'
  usage_note: Merangkum action items.
- phrase: مَا الَّذِي اتَّفَقْنَا عَلَيْهِ؟
  meaning_id: Apa yang sudah kita sepakati?
  usage_note: Membuka ringkasan.
