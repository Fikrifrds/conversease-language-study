vocabulary:
- word: اِقْتِرَاحٌ
  meaning_id: usulan
  usage_note: 'Dipakai untuk arti "usulan". Contoh: "أُقَدِّمُ الِاقْتِرَاحَ التَّالِيَ كَحَلٍّ عَمَلِيٍّ."'
- word: أَفْهَمُ
  meaning_id: saya paham
  usage_note: 'Dipakai untuk arti "saya paham". Contoh: "أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ
    آخَرُ."'
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ آخَرُ."'
- word: آخَرُ
  meaning_id: lain
  usage_note: 'Dipakai untuk arti "lain". Contoh: "أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ آخَرُ."'
- word: حَلٌّ
  meaning_id: solusi
  usage_note: 'Dipakai untuk arti "solusi". Contoh: "يُمْكِنُنَا أَنْ نَصِلَ إِلَى حَلٍّ وَسَطٍ."'
- word: وَسَطٌ
  meaning_id: tengah
  usage_note: 'Dipakai untuk arti "tengah". Contoh: "يُمْكِنُنَا أَنْ نَصِلَ إِلَى حَلٍّ وَسَطٍ."'
- word: اِتَّفَقْنَا
  meaning_id: kami sepakat
  usage_note: 'Dipakai untuk arti "kami sepakat". Contoh: "إِذَا اتَّفَقْنَا عَلَى ذَلِكَ، فَالْخُطْوَةُ
    التَّالِيَةُ وَاضِحَةٌ."'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "مَا أَوْلَوِيَّتُكَ فِي هَذَا الِاتِّفَاقِ؟ أُرِيدُ
    أَنْ أُرَكِّزَ عَلَى التَّعَامُلُ مَعَ الِاع..."'
