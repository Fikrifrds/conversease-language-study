phrases:
- phrase: أَوْلَوِيَّتِي هِيَ أَنْ يَبْقَى تَقْدِيمُ اِقْتِرَاحٍ عَمَلِيٍّ وَاضِحًا.
  meaning_id: Prioritas saya adalah agar mengajukan usulan praktis tetap jelas.
  usage_note: Menyatakan prioritas.
- phrase: أُقَدِّمُ الِاقْتِرَاحَ التَّالِيَ كَحَلٍّ عَمَلِيٍّ.
  meaning_id: Saya mengajukan usulan berikut sebagai solusi praktis.
  usage_note: Membuat proposal.
- phrase: أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ آخَرُ.
  meaning_id: Saya memahami kekhawatiranmu, tetapi kita punya pilihan lain.
  usage_note: Menangani objection.
- phrase: يُمْكِنُنَا أَنْ نَصِلَ إِلَى حَلٍّ وَسَطٍ.
  meaning_id: Kita bisa mencapai solusi tengah.
  usage_note: Mencari kompromi.
- phrase: إِذَا اتَّفَقْنَا عَلَى ذَلِكَ، فَالْخُطْوَةُ التَّالِيَةُ وَاضِحَةٌ.
  meaning_id: Jika kita sepakat tentang itu, langkah berikutnya jelas.
  usage_note: Menutup negosiasi.
