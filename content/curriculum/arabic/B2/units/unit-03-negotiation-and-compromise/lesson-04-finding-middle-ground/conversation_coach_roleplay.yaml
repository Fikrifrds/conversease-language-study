scenario_key: arabic_b2_finding_middle_ground
mode: lesson_practice_coach
level_code: B2
opening_line: مَا رَأْيُكَ فِي الْوُصُولِ إِلَى حَلٍّ وَسَطٍ فِي الْمِيزَانِيَّةِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ
  وَخُطْوَةٍ تَالِيَةٍ.
learner_goal: Latih percakapan Arab B2 untuk mencari jalan tengah dengan alasan, contoh, respons, dan rekomendasi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي الْوُصُولِ إِلَى حَلٍّ وَسَطٍ فِي الْمِيزَانِيَّةِ؟ دَعْنَا نُدَرِّبْ الْجَوَابَ بِسَبَبٍ وَمِثَالٍ
    وَخُطْوَةٍ تَالِيَةٍ.
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي فِي الْوُصُولِ إِلَى حَلٍّ وَسَطٍ فِي الْمِيزَانِيَّةِ أَنَّنَا نَحْتَاجُ
    إِلَى قَرَارٍ وَاضِحٍ.'
  sample_answer: مَوْقِفِي فِي الْوُصُولِ إِلَى حَلٍّ وَسَطٍ فِي الْمِيزَانِيَّةِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
  focus: Menyatakan prioritas.
  expected_keywords:
  - مَوْقِفِي
  - أَنَّ
  - الْوُصُولِ
  - إِلَى
  - حَلٍّ
  indonesian_explanation: Posisi saya adalah bahwa mencari jalan tengah dalam anggaran membutuhkan keputusan yang jelas.
- coach: 'استخدم الفكرة: أُقَدِّمُ الِاقْتِرَاحَ التَّالِيَ كَحَلٍّ عَمَلِيٍّ.'
  hint: 'Jawab dengan struktur B2 memakai: أُقَدِّمُ الِاقْتِرَاحَ التَّالِيَ كَحَلٍّ عَمَلِيٍّ.'
  sample_answer: أُقَدِّمُ الِاقْتِرَاحَ التَّالِيَ كَحَلٍّ عَمَلِيٍّ.
  focus: Membuat proposal.
  expected_keywords:
  - أُقَدِّمُ
  - الِاقْتِرَاحَ
  - التَّالِيَ
  - كَحَلٍّ
  - عَمَلِيٍّ
  indonesian_explanation: Saya mengajukan usulan berikut sebagai solusi praktis.
- coach: 'استخدم الفكرة: أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ آخَرُ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ آخَرُ.'
  sample_answer: أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ آخَرُ.
  focus: Menangani objection.
  expected_keywords:
  - أَفْهَمُ
  - قَلَقَكَ،
  - وَلَكِنْ
  - لَدَيْنَا
  - خِيَارٌ
  indonesian_explanation: Saya memahami kekhawatiranmu, tetapi kita punya pilihan lain.
- coach: 'استخدم الفكرة: يُمْكِنُنَا أَنْ نَصِلَ إِلَى حَلٍّ وَسَطٍ.'
  hint: 'Jawab dengan struktur B2 memakai: يُمْكِنُنَا أَنْ نَصِلَ إِلَى حَلٍّ وَسَطٍ.'
  sample_answer: يُمْكِنُنَا أَنْ نَصِلَ إِلَى حَلٍّ وَسَطٍ.
  focus: Mencari kompromi.
  expected_keywords:
  - يُمْكِنُنَا
  - أَنْ
  - نَصِلَ
  - إِلَى
  - حَلٍّ
  indonesian_explanation: Kita bisa mencapai solusi tengah.
target_phrases:
- مَوْقِفِي فِي الْوُصُولِ إِلَى حَلٍّ وَسَطٍ فِي الْمِيزَانِيَّةِ أَنَّنَا نَحْتَاجُ إِلَى قَرَارٍ وَاضِحٍ.
- أُقَدِّمُ الِاقْتِرَاحَ التَّالِيَ كَحَلٍّ عَمَلِيٍّ.
- أَفْهَمُ قَلَقَكَ، وَلَكِنْ لَدَيْنَا خِيَارٌ آخَرُ.
- يُمْكِنُنَا أَنْ نَصِلَ إِلَى حَلٍّ وَسَطٍ.
- إِذَا اتَّفَقْنَا عَلَى ذَلِكَ، فَالْخُطْوَةُ التَّالِيَةُ وَاضِحَةٌ.
