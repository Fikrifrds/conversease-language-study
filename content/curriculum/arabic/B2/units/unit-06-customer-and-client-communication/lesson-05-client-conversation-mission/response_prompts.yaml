prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku mulai dengan pertanyaan soal prioritas nyata klien.'
  target_response: أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.
  acceptable_responses:
  - أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Lalu aku tawarkan dua opsi dan mendengar kekhawatirannya.'
  target_response: ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.
  acceptable_responses:
  - ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham kekhawatiran ini, dan akan menjelaskan detailnya.'
  target_response: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
  acceptable_responses:
  - أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku tutup dengan langkah kecil yang tidak terlalu mengikatnya.'
  target_response: أَخْتِمُ بِخُطْوَةٍ صَغِيرَةٍ لَا تُلْزِمُهُ كَثِيرًا.
  acceptable_responses:
  - أَخْتِمُ بِخُطْوَةٍ صَغِيرَةٍ لَا تُلْزِمُهُ كَثِيرًا.
