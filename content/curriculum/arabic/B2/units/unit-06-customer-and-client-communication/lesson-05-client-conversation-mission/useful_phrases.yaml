phrases:
- phrase: أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.
  meaning_id: Aku mulai dengan pertanyaan soal prioritas nyata klien.
  usage_note: Membuka dengan kebutuhan.
- phrase: ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.
  meaning_id: Lalu aku tawarkan dua opsi dan mendengar kekhawatirannya.
  usage_note: Menyajikan opsi sambil mendengar.
- phrase: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
  meaning_id: Aku paham kekhawatiran ini, dan akan menjelaskan detailnya.
  usage_note: Menanggapi keberatan.
- phrase: أَخْتِمُ بِخُطْوَةٍ صَغِيرَةٍ لَا تُلْزِمُهُ كَثِيرًا.
  meaning_id: Aku tutup dengan langkah kecil yang tidak terlalu mengikatnya.
  usage_note: Menutup dengan langkah ringan.
- phrase: سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بِالْخُطْوَةِ الْأُولَى وَالْمَوْعِدِ.
  meaning_id: Aku akan kirim konfirmasi tertulis berisi langkah pertama dan tenggat.
  usage_note: Menutup dengan tindak lanjut.
