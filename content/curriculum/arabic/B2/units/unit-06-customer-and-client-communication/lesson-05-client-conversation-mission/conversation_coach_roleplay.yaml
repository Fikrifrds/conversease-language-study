scenario_key: arabic_b2_client_conversation_mission
mode: lesson_practice_coach
level_code: B2
opening_line: سَتُكَلِّمِينَ عَمِيلًا مُتَرَدِّدًا الْيَوْمَ. مِنْ أَيْنَ تَبْدَئِينَ؟
learner_goal: Latih percakapan Arab B2 untuk memandu percakapan klien yang ragu dari kebutuhan sampai
  langkah kecil.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: سَتُكَلِّمِينَ عَمِيلًا مُتَرَدِّدًا الْيَوْمَ. مِنْ أَيْنَ تَبْدَئِينَ؟
  hint: 'Jawab dengan struktur B2 memakai: أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.'
  sample_answer: أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.
  focus: Membuka dengan kebutuhan.
  expected_keywords:
  - أَبْدَأُ
  - بِسُؤَالٍ
  - عَنْ
  - أَوْلَوِيَّةِ
  - الْعَمِيلِ
  indonesian_explanation: Aku mulai dengan pertanyaan soal prioritas nyata klien.
- coach: 'استخدم الفكرة: ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.'
  hint: 'Jawab dengan struktur B2 memakai: ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.'
  sample_answer: ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.
  focus: Menyajikan opsi sambil mendengar.
  expected_keywords:
  - ثُمَّ
  - أَعْرِضُ
  - خِيَارَيْنِ
  - وَأَسْمَعُ
  - قَلَقَهُ
  indonesian_explanation: Lalu aku tawarkan dua opsi dan mendengar kekhawatirannya.
- coach: 'استخدم الفكرة: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.'
  sample_answer: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
  focus: Menanggapi keberatan.
  expected_keywords:
  - أَفْهَمُ
  - هَذَا
  - الِاهْتِمَامَ
  - وَسَأُوَضِّحُ
  - التَّفَاصِيلَ
  indonesian_explanation: Aku paham kekhawatiran ini, dan akan menjelaskan detailnya.
- coach: 'استخدم الفكرة: أَخْتِمُ بِخُطْوَةٍ صَغِيرَةٍ لَا تُلْزِمُهُ كَثِيرًا.'
  hint: 'Jawab dengan struktur B2 memakai: أَخْتِمُ بِخُطْوَةٍ صَغِيرَةٍ لَا تُلْزِمُهُ كَثِيرًا.'
  sample_answer: أَخْتِمُ بِخُطْوَةٍ صَغِيرَةٍ لَا تُلْزِمُهُ كَثِيرًا.
  focus: Menutup dengan langkah ringan.
  expected_keywords:
  - أَخْتِمُ
  - بِخُطْوَةٍ
  - صَغِيرَةٍ
  - لَا
  - تُلْزِمُهُ
  indonesian_explanation: Aku tutup dengan langkah kecil yang tidak terlalu mengikatnya.
target_phrases:
- أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.
- ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.
- أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
- أَخْتِمُ بِخُطْوَةٍ صَغِيرَةٍ لَا تُلْزِمُهُ كَثِيرًا.
- سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بِالْخُطْوَةِ الْأُولَى وَالْمَوْعِدِ.
