questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku mulai dengan pertanyaan soal prioritas nyata klien."?
  options:
  - أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.
  - ثُمَّ أَعْرِضُ خِيَارَيْنِ وَأَسْمَعُ قَلَقَهُ.
  - أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
  correct_answer: أَبْدَأُ بِسُؤَالٍ عَنْ أَوْلَوِيَّةِ الْعَمِيلِ الْحَقِيقِيَّةِ.
