phrases:
- phrase: أُرِيدُ أَنْ أَفْهَمَ اِحْتِيَاجَ الْعَمِيلِ حَوْلَ شَرْحُ الْخِيَارَاتِ.
  meaning_id: Saya ingin memahami kebutuhan klien tentang menjelaskan opsi.
  usage_note: Memahami kebutuhan klien.
- phrase: لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
  meaning_id: Kita punya dua opsi, dan setiap opsi memiliki manfaat.
  usage_note: Menjelaskan opsi.
- phrase: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
  meaning_id: Saya memahami kekhawatiran ini, dan saya akan menjelaskan detailnya.
  usage_note: Menangani concern.
- phrase: الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
  meaning_id: Langkah berikutnya adalah meninjau kesepakatan.
  usage_note: Mengonfirmasi next step.
- phrase: سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بَعْدَ هَذِهِ الْمُكَالَمَةِ.
  meaning_id: Saya akan mengirim konfirmasi tertulis setelah panggilan ini.
  usage_note: Menutup dengan profesional.
