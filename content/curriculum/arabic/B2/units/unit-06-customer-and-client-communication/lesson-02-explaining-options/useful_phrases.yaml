phrases:
- phrase: لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
  meaning_id: Kita punya dua opsi, dan tiap opsi punya manfaatnya.
  usage_note: Membuka pilihan.
- phrase: الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
  meaning_id: Yang pertama lebih cepat, yang kedua lebih lengkap.
  usage_note: Membandingkan opsi.
- phrase: أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.
  meaning_id: Aku jelaskan biaya dan apa yang didapat di tiap opsi.
  usage_note: Menjelaskan detail.
- phrase: أَيُّهُمَا يُنَاسِبُ حَاجَتَكَ أَكْثَرَ؟
  meaning_id: Mana yang lebih sesuai kebutuhanmu?
  usage_note: Mengaitkan ke kebutuhan.
- phrase: سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بِالْخِيَارِ الَّذِي تَخْتَارُهُ.
  meaning_id: Aku akan kirim konfirmasi tertulis berisi opsi yang kamu pilih.
  usage_note: Menutup dengan tindak lanjut.
