prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Kita punya dua opsi, dan tiap opsi punya manfaatnya.'
  target_response: لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
  acceptable_responses:
  - لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Yang pertama lebih cepat, yang kedua lebih lengkap.'
  target_response: الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
  acceptable_responses:
  - الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku jelaskan biaya dan apa yang didapat di tiap opsi.'
  target_response: أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.
  acceptable_responses:
  - أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.
- prompt: 'Ucapkan dalam bahasa Arab: Mana yang lebih sesuai kebutuhanmu?'
  target_response: أَيُّهُمَا يُنَاسِبُ حَاجَتَكَ أَكْثَرَ؟
  acceptable_responses:
  - أَيُّهُمَا يُنَاسِبُ حَاجَتَكَ أَكْثَرَ؟
