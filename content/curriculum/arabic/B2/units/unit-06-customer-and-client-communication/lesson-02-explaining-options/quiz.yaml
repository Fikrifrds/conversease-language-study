questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Kita punya dua opsi, dan tiap opsi punya manfaatnya."?
  options:
  - لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
  - الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
  - أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.
  correct_answer: لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Yang pertama lebih cepat, yang kedua lebih lengkap."?
  options:
  - الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
  - لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
  - أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.
  correct_answer: الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
