scenario_key: arabic_b2_explaining_options
mode: lesson_practice_coach
level_code: B2
opening_line: الْعَمِيلُ يَسْأَلُ عَنْ خِدْمَةِ الدَّعْمِ. مَاذَا نَعْرِضُ؟
learner_goal: Latih percakapan Arab B2 untuk menjelaskan beberapa opsi ke klien beserta manfaat masing-masing.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: الْعَمِيلُ يَسْأَلُ عَنْ خِدْمَةِ الدَّعْمِ. مَاذَا نَعْرِضُ؟
  hint: 'Jawab dengan struktur B2 memakai: لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.'
  sample_answer: لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
  focus: Membuka pilihan.
  expected_keywords:
  - لَدَيْنَا
  - خِيَارَانِ
  - وَكُلُّ
  - خِيَارٍ
  - لَهُ
  indonesian_explanation: Kita punya dua opsi, dan tiap opsi punya manfaatnya.
- coach: 'استخدم الفكرة: الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.'
  hint: 'Jawab dengan struktur B2 memakai: الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.'
  sample_answer: الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
  focus: Membandingkan opsi.
  expected_keywords:
  - الْأَوَّلُ
  - أَسْرَعُ
  - وَالثَّانِي
  - أَشْمَلُ
  indonesian_explanation: Yang pertama lebih cepat, yang kedua lebih lengkap.
- coach: 'استخدم الفكرة: أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.'
  hint: 'Jawab dengan struktur B2 memakai: أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.'
  sample_answer: أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.
  focus: Menjelaskan detail.
  expected_keywords:
  - أُوَضِّحُ
  - التَّكْلِفَةَ
  - وَمَا
  - يَحْصُلُ
  - عَلَيْهِ
  indonesian_explanation: Aku jelaskan biaya dan apa yang didapat di tiap opsi.
- coach: 'استخدم الفكرة: أَيُّهُمَا يُنَاسِبُ حَاجَتَكَ أَكْثَرَ؟'
  hint: 'Jawab dengan struktur B2 memakai: أَيُّهُمَا يُنَاسِبُ حَاجَتَكَ أَكْثَرَ؟'
  sample_answer: أَيُّهُمَا يُنَاسِبُ حَاجَتَكَ أَكْثَرَ؟
  focus: Mengaitkan ke kebutuhan.
  expected_keywords:
  - أَيُّهُمَا
  - يُنَاسِبُ
  - حَاجَتَكَ
  - أَكْثَرَ
  indonesian_explanation: Mana yang lebih sesuai kebutuhanmu?
target_phrases:
- لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
- الْأَوَّلُ أَسْرَعُ، وَالثَّانِي أَشْمَلُ.
- أُوَضِّحُ التَّكْلِفَةَ وَمَا يَحْصُلُ عَلَيْهِ فِي كُلٍّ مِنْهُمَا.
- أَيُّهُمَا يُنَاسِبُ حَاجَتَكَ أَكْثَرَ؟
- سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بِالْخِيَارِ الَّذِي تَخْتَارُهُ.
