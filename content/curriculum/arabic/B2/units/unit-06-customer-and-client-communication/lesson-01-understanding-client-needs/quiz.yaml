questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Coba aku pahami dulu apa yang penting bagi klien."?
  options:
  - دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
  - مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
  - هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟
  correct_answer: دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
- key: phrase_2
  prompt: Frasa mana yang berarti "Bagian mana yang paling penting untukmu?"?
  options:
  - مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
  - دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
  - هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟
  correct_answer: مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
