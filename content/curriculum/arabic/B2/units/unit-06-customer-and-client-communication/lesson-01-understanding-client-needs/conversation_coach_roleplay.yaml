scenario_key: arabic_b2_understanding_client_needs
mode: lesson_practice_coach
level_code: B2
opening_line: الْعَمِيلُ يَطْلُبُ تَقْرِيرًا أَسْرَعَ. كَيْفَ نَبْدَأُ؟
learner_goal: Latih percakapan Arab B2 untuk menggali kebutuhan klien sebelum menawarkan solusi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: الْعَمِيلُ يَطْلُبُ تَقْرِيرًا أَسْرَعَ. كَيْفَ نَبْدَأُ؟
  hint: 'Jawab dengan struktur B2 memakai: دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.'
  sample_answer: دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
  focus: Membuka dengan menggali kebutuhan.
  expected_keywords:
  - دَعْنِي
  - أَفْهَمُ
  - مَا
  - يَهُمُّ
  - الْعَمِيلَ
  indonesian_explanation: Coba aku pahami dulu apa yang penting bagi klien.
- coach: 'استخدم الفكرة: مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟'
  hint: 'Jawab dengan struktur B2 memakai: مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟'
  sample_answer: مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
  focus: Bertanya prioritas.
  expected_keywords:
  - مَا
  - الْجُزْءُ
  - الْأَهَمُّ
  - بِالنِّسْبَةِ
  - لَكَ
  indonesian_explanation: Bagian mana yang paling penting untukmu?
- coach: 'استخدم الفكرة: هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟'
  hint: 'Jawab dengan struktur B2 memakai: هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟'
  sample_answer: هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟
  focus: Mengonfirmasi pemahaman.
  expected_keywords:
  - هَلْ
  - فَهِمْتُ
  - طَلَبَكَ
  - صَحِيحًا
  indonesian_explanation: Apa aku sudah paham permintaanmu dengan benar?
- coach: 'استخدم الفكرة: قَدْ لَا تَحْتَاجُ إِلَى كُلِّ التَّفَاصِيلِ الْآنَ.'
  hint: 'Jawab dengan struktur B2 memakai: قَدْ لَا تَحْتَاجُ إِلَى كُلِّ التَّفَاصِيلِ الْآنَ.'
  sample_answer: قَدْ لَا تَحْتَاجُ إِلَى كُلِّ التَّفَاصِيلِ الْآنَ.
  focus: Menyaring kebutuhan.
  expected_keywords:
  - قَدْ
  - لَا
  - تَحْتَاجُ
  - إِلَى
  - كُلِّ
  indonesian_explanation: Mungkin kamu tidak butuh semua detail sekarang.
target_phrases:
- دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
- مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
- هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟
- قَدْ لَا تَحْتَاجُ إِلَى كُلِّ التَّفَاصِيلِ الْآنَ.
- سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بَعْدَ هَذِهِ الْمُكَالَمَةِ.
