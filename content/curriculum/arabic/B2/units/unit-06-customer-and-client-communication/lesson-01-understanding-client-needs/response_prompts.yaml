prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Coba aku pahami dulu apa yang penting bagi klien.'
  target_response: دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
  acceptable_responses:
  - دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Bagian mana yang paling penting untukmu?'
  target_response: مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
  acceptable_responses:
  - مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
- prompt: 'Ucapkan dalam bahasa Arab: Apa aku sudah paham permintaanmu dengan benar?'
  target_response: هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟
  acceptable_responses:
  - هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟
- prompt: 'Ucapkan dalam bahasa Arab: Mungkin kamu tidak butuh semua detail sekarang.'
  target_response: قَدْ لَا تَحْتَاجُ إِلَى كُلِّ التَّفَاصِيلِ الْآنَ.
  acceptable_responses:
  - قَدْ لَا تَحْتَاجُ إِلَى كُلِّ التَّفَاصِيلِ الْآنَ.
