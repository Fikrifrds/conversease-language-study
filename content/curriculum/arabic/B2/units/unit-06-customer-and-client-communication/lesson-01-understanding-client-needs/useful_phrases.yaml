phrases:
- phrase: دَعْنِي أَفْهَمُ مَا يَهُمُّ الْعَمِيلَ أَوَّلًا.
  meaning_id: Coba aku pahami dulu apa yang penting bagi klien.
  usage_note: Membuka dengan menggali kebutuhan.
- phrase: مَا الْجُزْءُ الْأَهَمُّ بِالنِّسْبَةِ لَكَ؟
  meaning_id: Bagian mana yang paling penting untukmu?
  usage_note: Bertanya prioritas.
- phrase: هَلْ فَهِمْتُ طَلَبَكَ صَحِيحًا؟
  meaning_id: Apa aku sudah paham permintaanmu dengan benar?
  usage_note: Mengonfirmasi pemahaman.
- phrase: قَدْ لَا تَحْتَاجُ إِلَى كُلِّ التَّفَاصِيلِ الْآنَ.
  meaning_id: Mungkin kamu tidak butuh semua detail sekarang.
  usage_note: Menyaring kebutuhan.
- phrase: سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بَعْدَ هَذِهِ الْمُكَالَمَةِ.
  meaning_id: Aku akan kirim konfirmasi tertulis setelah panggilan ini.
  usage_note: Menutup dengan tindak lanjut.
