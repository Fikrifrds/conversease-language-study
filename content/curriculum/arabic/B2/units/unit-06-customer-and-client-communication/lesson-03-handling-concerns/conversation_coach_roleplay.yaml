scenario_key: arabic_b2_handling_concerns
mode: lesson_practice_coach
level_code: B2
opening_line: الْعَمِيلُ قَلِقٌ مِنْ تَأْخِيرِ التَّسْلِيمِ. كَيْفَ نَرُدُّ؟
learner_goal: Latih percakapan Arab B2 untuk menangani kekhawatiran klien dengan empati lalu solusi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: الْعَمِيلُ قَلِقٌ مِنْ تَأْخِيرِ التَّسْلِيمِ. كَيْفَ نَرُدُّ؟
  hint: 'Jawab dengan struktur B2 memakai: أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.'
  sample_answer: أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.
  focus: Mengakui kekhawatiran.
  expected_keywords:
  - أَعْتَرِفُ
  - بِقَلَقِكَ
  - قَبْلَ
  - أَيِّ
  - شَرْحٍ
  indonesian_explanation: Aku akui kekhawatiranmu sebelum penjelasan apa pun.
- coach: 'استخدم الفكرة: التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.'
  hint: 'Jawab dengan struktur B2 memakai: التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.'
  sample_answer: التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.
  focus: Menjelaskan penyebab.
  expected_keywords:
  - التَّأْخِيرُ
  - جَاءَ
  - مِنْ
  - مُرَاجَعَةِ
  - الْأَمَانِ
  indonesian_explanation: Keterlambatannya karena review keamanan.
- coach: 'استخدم الفكرة: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.'
  sample_answer: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.
  focus: Menenangkan dan menjelaskan.
  expected_keywords:
  - أَفْهَمُ
  - هَذَا
  - الِاهْتِمَامَ
  - وَسَأُوَضِّحُ
  - التَّفَاصِيلَ
  indonesian_explanation: Aku paham kekhawatiran ini, dan akan menjelaskan detailnya dengan tenang.
- coach: 'استخدم الفكرة: إِلَيْكَ الْحَلُّ: مَوْعِدٌ مُحَافِظٌ مَعَ تَحْدِيثٍ يَوْمِيٍّ.'
  hint: 'Jawab dengan struktur B2 memakai: إِلَيْكَ الْحَلُّ: مَوْعِدٌ مُحَافِظٌ مَعَ تَحْدِيثٍ يَوْمِيٍّ.'
  sample_answer: 'إِلَيْكَ الْحَلُّ: مَوْعِدٌ مُحَافِظٌ مَعَ تَحْدِيثٍ يَوْمِيٍّ.'
  focus: Menawarkan solusi.
  expected_keywords:
  - إِلَيْكَ
  - 'الْحَلُّ:'
  - مَوْعِدٌ
  - مُحَافِظٌ
  - مَعَ
  indonesian_explanation: 'Ini solusinya: tenggat konservatif dengan update harian.'
target_phrases:
- أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.
- التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.
- أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.
- 'إِلَيْكَ الْحَلُّ: مَوْعِدٌ مُحَافِظٌ مَعَ تَحْدِيثٍ يَوْمِيٍّ.'
- سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بِالْمَوْعِدِ وَخُطَّةِ التَّحْدِيثِ.
