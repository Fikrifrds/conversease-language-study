questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku akui kekhawatiranmu sebelum penjelasan apa pun."?
  options:
  - أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.
  - التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.
  - أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.
  correct_answer: أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.
