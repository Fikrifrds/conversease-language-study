phrases:
- phrase: أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.
  meaning_id: Aku akui kekhawatiranmu sebelum penjelasan apa pun.
  usage_note: Mengakui kekhawatiran.
- phrase: التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.
  meaning_id: Keterlambatannya karena review keamanan.
  usage_note: Menjelaskan penyebab.
- phrase: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.
  meaning_id: Aku paham kekhawatiran ini, dan akan menjelaskan detailnya dengan tenang.
  usage_note: Menenangkan dan menjelaskan.
- phrase: 'إِلَيْكَ الْحَلُّ: مَوْعِدٌ مُحَافِظٌ مَعَ تَحْدِيثٍ يَوْمِيٍّ.'
  meaning_id: 'Ini solusinya: tenggat konservatif dengan update harian.'
  usage_note: Menawarkan solusi.
- phrase: سَأُرْسِلُ تَأْكِيدًا مَكْتُوبًا بِالْمَوْعِدِ وَخُطَّةِ التَّحْدِيثِ.
  meaning_id: Aku akan kirim konfirmasi tertulis berisi tenggat dan rencana update.
  usage_note: Menutup dengan tindak lanjut.
