prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku akui kekhawatiranmu sebelum penjelasan apa pun.'
  target_response: أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.
  acceptable_responses:
  - أَعْتَرِفُ بِقَلَقِكَ قَبْلَ أَيِّ شَرْحٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Keterlambatannya karena review keamanan.'
  target_response: التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.
  acceptable_responses:
  - التَّأْخِيرُ جَاءَ مِنْ مُرَاجَعَةِ الْأَمَانِ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku paham kekhawatiran ini, dan akan menjelaskan detailnya dengan
    tenang.'
  target_response: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.
  acceptable_responses:
  - أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ بِهُدُوءٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Ini solusinya: tenggat konservatif dengan update harian.'
  target_response: 'إِلَيْكَ الْحَلُّ: مَوْعِدٌ مُحَافِظٌ مَعَ تَحْدِيثٍ يَوْمِيٍّ.'
  acceptable_responses:
  - 'إِلَيْكَ الْحَلُّ: مَوْعِدٌ مُحَافِظٌ مَعَ تَحْدِيثٍ يَوْمِيٍّ.'
