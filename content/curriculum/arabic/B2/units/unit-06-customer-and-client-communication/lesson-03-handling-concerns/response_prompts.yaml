prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saya ingin memahami kebutuhan klien tentang menangani concern klien.'
  target_response: أُرِيدُ أَنْ أَفْهَمَ اِحْتِيَاجَ الْعَمِيلِ حَوْلَ التَّعَامُلُ مَعَ اهْتِمَامَاتِ
    الْعَمِيلِ.
  acceptable_responses:
  - أُرِيدُ أَنْ أَفْهَمَ اِحْتِيَاجَ الْعَمِيلِ حَوْلَ التَّعَامُلُ مَعَ اهْتِمَامَاتِ الْعَمِيلِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kita punya dua opsi, dan setiap opsi memiliki manfaat.'
  target_response: لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
  acceptable_responses:
  - لَدَيْنَا خِيَارَانِ، وَكُلُّ خِيَارٍ لَهُ فَائِدَةٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya memahami kekhawatiran ini, dan saya akan menjelaskan detailnya.'
  target_response: أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
  acceptable_responses:
  - أَفْهَمُ هَذَا الِاهْتِمَامَ، وَسَأُوَضِّحُ التَّفَاصِيلَ.
- prompt: 'Ucapkan dalam bahasa Arab: Langkah berikutnya adalah meninjau kesepakatan.'
  target_response: الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
  acceptable_responses:
  - الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
