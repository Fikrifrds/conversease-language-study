scenario_key: arabic_b2_confirming_next_steps
mode: lesson_practice_coach
level_code: B2
opening_line: انْتَهَتِ الْمُكَالَمَةُ مَعَ الْعَمِيلِ. مَا الْخُطْوَةُ الْآنَ؟
learner_goal: Latih percakapan Arab B2 untuk mengonfirmasi langkah berikutnya di akhir percakapan dengan
  klien.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: انْتَهَتِ الْمُكَالَمَةُ مَعَ الْعَمِيلِ. مَا الْخُطْوَةُ الْآنَ؟
  hint: 'Jawab dengan struktur B2 memakai: لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.'
  sample_answer: لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.
  focus: Membuka ringkasan.
  expected_keywords:
  - لِنُلَخِّصْ
  - مَا
  - اتَّفَقْنَا
  - عَلَيْهِ
  - بِاخْتِصَارٍ
  indonesian_explanation: Mari rangkum yang sudah kita sepakati singkat.
- coach: 'استخدم الفكرة: الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.'
  hint: 'Jawab dengan struktur B2 memakai: الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.'
  sample_answer: الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
  focus: Menyebut langkah berikutnya.
  expected_keywords:
  - الْخُطْوَةُ
  - التَّالِيَةُ
  - هِيَ
  - مُرَاجَعَةُ
  - الِاتِّفَاقِ
  indonesian_explanation: Langkah berikutnya adalah meninjau kesepakatan.
- coach: 'استخدم الفكرة: أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.'
  hint: 'Jawab dengan struktur B2 memakai: أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.'
  sample_answer: أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.
  focus: Memperjelas tanggung jawab.
  expected_keywords:
  - أَذْكُرُ
  - الْمُسْتَنَدَ
  - وَالْمَوْعِدَ
  - وَصَاحِبَ
  - الْمَهَمَّةِ
  indonesian_explanation: Aku sebut dokumen, tenggat, dan pemilik tugas.
- coach: 'استخدم الفكرة: إِنْ بَقِيَ شَيْءٌ غَيْرُ وَاضِحٍ، نُوَضِّحُهُ الْآنَ.'
  hint: 'Jawab dengan struktur B2 memakai: إِنْ بَقِيَ شَيْءٌ غَيْرُ وَاضِحٍ، نُوَضِّحُهُ الْآنَ.'
  sample_answer: إِنْ بَقِيَ شَيْءٌ غَيْرُ وَاضِحٍ، نُوَضِّحُهُ الْآنَ.
  focus: Menutup celah.
  expected_keywords:
  - إِنْ
  - بَقِيَ
  - شَيْءٌ
  - غَيْرُ
  - وَاضِحٍ
  indonesian_explanation: Kalau ada yang belum jelas, kita perjelas sekarang.
target_phrases:
- لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.
- الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
- أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.
- إِنْ بَقِيَ شَيْءٌ غَيْرُ وَاضِحٍ، نُوَضِّحُهُ الْآنَ.
- سَأُؤَكِّدُ ذَلِكَ كِتَابَةً بَعْدَ خَمْسِ دَقَائِقَ.
