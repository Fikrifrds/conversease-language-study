phrases:
- phrase: لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.
  meaning_id: Mari rangkum yang sudah kita sepakati singkat.
  usage_note: Membuka ringkasan.
- phrase: الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
  meaning_id: Langkah berikutnya adalah meninjau kesepakatan.
  usage_note: Menyebut langkah berikutnya.
- phrase: أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.
  meaning_id: Aku sebut dokumen, tenggat, dan pemilik tugas.
  usage_note: Memperjelas tanggung jawab.
- phrase: إِنْ بَقِيَ شَيْءٌ غَيْرُ وَاضِحٍ، نُوَضِّحُهُ الْآنَ.
  meaning_id: Kalau ada yang belum jelas, kita perjelas sekarang.
  usage_note: Menutup celah.
- phrase: سَأُؤَكِّدُ ذَلِكَ كِتَابَةً بَعْدَ خَمْسِ دَقَائِقَ.
  meaning_id: Aku akan mengonfirmasinya tertulis dalam lima menit.
  usage_note: Menutup dengan tindak lanjut.
