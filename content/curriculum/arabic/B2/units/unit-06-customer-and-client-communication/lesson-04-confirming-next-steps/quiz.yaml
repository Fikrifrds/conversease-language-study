questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Mari rangkum yang sudah kita sepakati singkat."?
  options:
  - لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.
  - الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
  - أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.
  correct_answer: لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.
- key: phrase_2
