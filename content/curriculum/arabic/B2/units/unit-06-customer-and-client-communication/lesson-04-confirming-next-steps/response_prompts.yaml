prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Mari rangkum yang sudah kita sepakati singkat.'
  target_response: لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.
  acceptable_responses:
  - لِنُلَخِّصْ مَا اتَّفَقْنَا عَلَيْهِ بِاخْتِصَارٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Langkah berikutnya adalah meninjau kesepakatan.'
  target_response: الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
  acceptable_responses:
  - الْخُطْوَةُ التَّالِيَةُ هِيَ مُرَاجَعَةُ الِاتِّفَاقِ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku sebut dokumen, tenggat, dan pemilik tugas.'
  target_response: أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.
  acceptable_responses:
  - أَذْكُرُ الْمُسْتَنَدَ وَالْمَوْعِدَ وَصَاحِبَ الْمَهَمَّةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau ada yang belum jelas, kita perjelas sekarang.'
  target_response: إِنْ بَقِيَ شَيْءٌ غَيْرُ وَاضِحٍ، نُوَضِّحُهُ الْآنَ.
  acceptable_responses:
  - إِنْ بَقِيَ شَيْءٌ غَيْرُ وَاضِحٍ، نُوَضِّحُهُ الْآنَ.
