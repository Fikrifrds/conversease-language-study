scenario_key: arabic_b2_framing_the_problem
mode: lesson_practice_coach
level_code: B2
opening_line: انْخَفَضَ اسْتِخْدَامُ التَّطْبِيقِ. هَلْ هِيَ مُشْكِلَةُ تَصْمِيمٍ؟
learner_goal: Latih percakapan Arab B2 untuk membingkai masalah dengan tepat sebelum melompat ke solusi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: انْخَفَضَ اسْتِخْدَامُ التَّطْبِيقِ. هَلْ هِيَ مُشْكِلَةُ تَصْمِيمٍ؟
  hint: 'Jawab dengan struktur B2 memakai: أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.'
  sample_answer: أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.
  focus: Membingkai masalah lebih luas.
  expected_keywords:
  - أَرَى
  - أَنَّ
  - هَذِهِ
  - النُّقْطَةَ
  - جُزْءٌ
  indonesian_explanation: Menurutku poin ini bagian dari masalah yang lebih besar.
- coach: 'استخدم الفكرة: لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.'
  sample_answer: لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.
  focus: Menahan solusi prematur.
  expected_keywords:
  - لَا
  - نَبْدَأُ
  - بِالْحَلِّ
  - قَبْلَ
  - تَعْرِيفِ
  indonesian_explanation: Kita tidak mulai dari solusi sebelum mendefinisikan masalah.
- coach: 'استخدم الفكرة: نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.'
  hint: 'Jawab dengan struktur B2 memakai: نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.'
  sample_answer: نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.
  focus: Menetapkan pertanyaan inti.
  expected_keywords:
  - نُحَدِّدُ
  - السُّؤَالَ
  - الصَّحِيحَ
  - أَوَّلًا
  indonesian_explanation: Kita tentukan pertanyaan yang tepat dulu.
- coach: 'استخدم الفكرة: الْأَعْرَاضُ كَثِيرَةٌ، لَكِنَّ السَّبَبَ وَاحِدٌ غَالِبًا.'
  hint: 'Jawab dengan struktur B2 memakai: الْأَعْرَاضُ كَثِيرَةٌ، لَكِنَّ السَّبَبَ وَاحِدٌ غَالِبًا.'
  sample_answer: الْأَعْرَاضُ كَثِيرَةٌ، لَكِنَّ السَّبَبَ وَاحِدٌ غَالِبًا.
  focus: Membedakan gejala dan sebab.
  expected_keywords:
  - الْأَعْرَاضُ
  - كَثِيرَةٌ
  - لَكِنَّ
  - السَّبَبَ
  - وَاحِدٌ
  indonesian_explanation: Gejalanya banyak, tapi penyebabnya sering satu.
target_phrases:
- أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.
- لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.
- نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.
- الْأَعْرَاضُ كَثِيرَةٌ، لَكِنَّ السَّبَبَ وَاحِدٌ غَالِبًا.
- لِذَلِكَ نَبْدَأُ بِقِيَاسِ النُّقْطَةِ الْأَهَمِّ.
