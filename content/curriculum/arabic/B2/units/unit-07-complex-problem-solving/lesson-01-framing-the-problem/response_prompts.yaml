prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Menurutku poin ini bagian dari masalah yang lebih besar.'
  target_response: أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.
  acceptable_responses:
  - أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Kita tidak mulai dari solusi sebelum mendefinisikan masalah.'
  target_response: لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.
  acceptable_responses:
  - لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kita tentukan pertanyaan yang tepat dulu.'
  target_response: نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.
  acceptable_responses:
  - نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Gejalanya banyak, tapi penyebabnya sering satu.'
  target_response: الْأَعْرَاضُ كَثِيرَةٌ، لَكِنَّ السَّبَبَ وَاحِدٌ غَالِبًا.
  acceptable_responses:
  - الْأَعْرَاضُ كَثِيرَةٌ، لَكِنَّ السَّبَبَ وَاحِدٌ غَالِبًا.
