phrases:
- phrase: أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.
  meaning_id: Menurutku poin ini bagian dari masalah yang lebih besar.
  usage_note: Membingkai masalah lebih luas.
- phrase: لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.
  meaning_id: Kita tidak mulai dari solusi sebelum mendefinisikan masalah.
  usage_note: Menahan solusi prematur.
- phrase: نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.
  meaning_id: Kita tentukan pertanyaan yang tepat dulu.
  usage_note: Menetapkan pertanyaan inti.
- phrase: الْأَعْرَاضُ كَثِيرَةٌ، لَكِنَّ السَّبَبَ وَاحِدٌ غَالِبًا.
  meaning_id: Gejalanya banyak, tapi penyebabnya sering satu.
  usage_note: Membedakan gejala dan sebab.
- phrase: لِذَلِكَ نَبْدَأُ بِقِيَاسِ النُّقْطَةِ الْأَهَمِّ.
  meaning_id: Karena itu kita mulai dengan mengukur titik terpenting.
  usage_note: Menutup dengan langkah pertama.
