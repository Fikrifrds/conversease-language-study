questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Menurutku poin ini bagian dari masalah yang lebih besar."?
  options:
  - أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.
  - لَا نَبْدَأُ بِالْحَلِّ قَبْلَ تَعْرِيفِ الْمُشْكِلَةِ.
  - نُحَدِّدُ السُّؤَالَ الصَّحِيحَ أَوَّلًا.
  correct_answer: أَرَى أَنَّ هَذِهِ النُّقْطَةَ جُزْءٌ مِنْ مُشْكِلَةٍ أَكْبَرَ.
