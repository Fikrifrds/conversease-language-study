prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku rekomendasikan checklist singkat sebelum delivery.'
  target_response: أُوصِي بِقَائِمَةِ فَحْصٍ قَصِيرَةٍ قَبْلَ التَّسْلِيمِ.
  acceptable_responses:
  - أُوصِي بِقَائِمَةِ فَحْصٍ قَصِيرَةٍ قَبْلَ التَّسْلِيمِ.
- prompt: 'Ucapkan dalam bahasa Arab: Solusi ini sederhana dan bisa diuji.'
  target_response: هَذَا الْحَلُّ بَسِيطٌ وَقَابِلٌ لِلتَّجْرِبَةِ.
  acceptable_responses:
  - هَذَا الْحَلُّ بَسِيطٌ وَقَابِلٌ لِلتَّجْرِبَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kita coba sepekan lalu ukur jumlah error.'
  target_response: نُجَرِّبُهُ أُسْبُوعًا ثُمَّ نَقِيسُ عَدَدَ الْأَخْطَاءِ.
  acceptable_responses:
  - نُجَرِّبُهُ أُسْبُوعًا ثُمَّ نَقِيسُ عَدَدَ الْأَخْطَاءِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau tidak berguna, kita ubah dengan mudah.'
  target_response: إِنْ لَمْ يَنْفَعْ، نُعَدِّلُهُ بِسُهُولَةٍ.
  acceptable_responses:
  - إِنْ لَمْ يَنْفَعْ، نُعَدِّلُهُ بِسُهُولَةٍ.
