scenario_key: arabic_b2_recommending_a_solution
mode: lesson_practice_coach
level_code: B2
opening_line: تَتَكَرَّرُ الْأَخْطَاءُ قَبْلَ كُلِّ تَسْلِيمٍ. مَا الْحَلُّ؟
learner_goal: Latih percakapan Arab B2 untuk merekomendasikan solusi yang bisa diuji dan diukur.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: تَتَكَرَّرُ الْأَخْطَاءُ قَبْلَ كُلِّ تَسْلِيمٍ. مَا الْحَلُّ؟
  hint: 'Jawab dengan struktur B2 memakai: أُوصِي بِقَائِمَةِ فَحْصٍ قَصِيرَةٍ قَبْلَ التَّسْلِيمِ.'
  sample_answer: أُوصِي بِقَائِمَةِ فَحْصٍ قَصِيرَةٍ قَبْلَ التَّسْلِيمِ.
  focus: Memberi rekomendasi konkret.
  expected_keywords:
  - أُوصِي
  - بِقَائِمَةِ
  - فَحْصٍ
  - قَصِيرَةٍ
  - قَبْلَ
  indonesian_explanation: Aku rekomendasikan checklist singkat sebelum delivery.
- coach: 'استخدم الفكرة: هَذَا الْحَلُّ بَسِيطٌ وَقَابِلٌ لِلتَّجْرِبَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: هَذَا الْحَلُّ بَسِيطٌ وَقَابِلٌ لِلتَّجْرِبَةِ.'
  sample_answer: هَذَا الْحَلُّ بَسِيطٌ وَقَابِلٌ لِلتَّجْرِبَةِ.
  focus: Menekankan kelayakan.
  expected_keywords:
  - هَذَا
  - الْحَلُّ
  - بَسِيطٌ
  - وَقَابِلٌ
  - لِلتَّجْرِبَةِ
  indonesian_explanation: Solusi ini sederhana dan bisa diuji.
- coach: 'استخدم الفكرة: نُجَرِّبُهُ أُسْبُوعًا ثُمَّ نَقِيسُ عَدَدَ الْأَخْطَاءِ.'
  hint: 'Jawab dengan struktur B2 memakai: نُجَرِّبُهُ أُسْبُوعًا ثُمَّ نَقِيسُ عَدَدَ الْأَخْطَاءِ.'
  sample_answer: نُجَرِّبُهُ أُسْبُوعًا ثُمَّ نَقِيسُ عَدَدَ الْأَخْطَاءِ.
  focus: Menetapkan uji dan ukuran.
  expected_keywords:
  - نُجَرِّبُهُ
  - أُسْبُوعًا
  - ثُمَّ
  - نَقِيسُ
  - عَدَدَ
  indonesian_explanation: Kita coba sepekan lalu ukur jumlah error.
- coach: 'استخدم الفكرة: إِنْ لَمْ يَنْفَعْ، نُعَدِّلُهُ بِسُهُولَةٍ.'
  hint: 'Jawab dengan struktur B2 memakai: إِنْ لَمْ يَنْفَعْ، نُعَدِّلُهُ بِسُهُولَةٍ.'
  sample_answer: إِنْ لَمْ يَنْفَعْ، نُعَدِّلُهُ بِسُهُولَةٍ.
  focus: Menyiapkan rencana cadangan.
  expected_keywords:
  - إِنْ
  - لَمْ
  - يَنْفَعْ
  - نُعَدِّلُهُ
  - بِسُهُولَةٍ
  indonesian_explanation: Kalau tidak berguna, kita ubah dengan mudah.
target_phrases:
- أُوصِي بِقَائِمَةِ فَحْصٍ قَصِيرَةٍ قَبْلَ التَّسْلِيمِ.
- هَذَا الْحَلُّ بَسِيطٌ وَقَابِلٌ لِلتَّجْرِبَةِ.
- نُجَرِّبُهُ أُسْبُوعًا ثُمَّ نَقِيسُ عَدَدَ الْأَخْطَاءِ.
- إِنْ لَمْ يَنْفَعْ، نُعَدِّلُهُ بِسُهُولَةٍ.
- لِذَلِكَ أَقْتَرِحُ الْبَدْءَ بِهِ غَدًا.
