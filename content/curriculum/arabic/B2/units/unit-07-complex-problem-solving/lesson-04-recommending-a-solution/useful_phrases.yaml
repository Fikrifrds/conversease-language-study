phrases:
- phrase: أُوصِي بِقَائِمَةِ فَحْصٍ قَصِيرَةٍ قَبْلَ التَّسْلِيمِ.
  meaning_id: Aku rekomendasikan checklist singkat sebelum delivery.
  usage_note: Memberi rekomendasi konkret.
- phrase: هَذَا الْحَلُّ بَسِيطٌ وَقَابِلٌ لِلتَّجْرِبَةِ.
  meaning_id: Solusi ini sederhana dan bisa diuji.
  usage_note: Menekankan kelayakan.
- phrase: نُجَرِّبُهُ أُسْبُوعًا ثُمَّ نَقِيسُ عَدَدَ الْأَخْطَاءِ.
  meaning_id: Kita coba sepekan lalu ukur jumlah error.
  usage_note: Menetapkan uji dan ukuran.
- phrase: إِنْ لَمْ يَنْفَعْ، نُعَدِّلُهُ بِسُهُولَةٍ.
  meaning_id: Kalau tidak berguna, kita ubah dengan mudah.
  usage_note: Menyiapkan rencana cadangan.
- phrase: لِذَلِكَ أَقْتَرِحُ الْبَدْءَ بِهِ غَدًا.
  meaning_id: Karena itu aku usul mulai besok.
  usage_note: Menutup dengan langkah segera.
