questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Mari bedakan gejala dan akar penyebab."?
  options:
  - لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.
  - يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.
  - هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.
  correct_answer: لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.
