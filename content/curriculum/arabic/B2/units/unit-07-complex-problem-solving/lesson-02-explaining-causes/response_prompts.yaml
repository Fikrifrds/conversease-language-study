prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Mari bedakan gejala dan akar penyebab.'
  target_response: لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.
  acceptable_responses:
  - لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.
- prompt: 'Ucapkan dalam bahasa Arab: Keterlambatan itu karena lemahnya kategorisasi.'
  target_response: يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.
  acceptable_responses:
  - يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.
- prompt: 'Ucapkan dalam bahasa Arab: Ini bukan sekadar kurang jumlah.'
  target_response: هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.
  acceptable_responses:
  - هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.
- prompt: 'Ucapkan dalam bahasa Arab: Buktinya, masalah berulang di langkah yang sama.'
  target_response: الدَّلِيلُ أَنَّ الْمُشْكِلَةَ تَتَكَرَّرُ فِي نَفْسِ الْخُطْوَةِ.
  acceptable_responses:
  - الدَّلِيلُ أَنَّ الْمُشْكِلَةَ تَتَكَرَّرُ فِي نَفْسِ الْخُطْوَةِ.
