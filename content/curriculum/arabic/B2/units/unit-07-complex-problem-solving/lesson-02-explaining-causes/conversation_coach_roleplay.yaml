scenario_key: arabic_b2_explaining_causes
mode: lesson_practice_coach
level_code: B2
opening_line: الدَّعْمُ يَتَأَخَّرُ كَثِيرًا. لِمَاذَا؟
learner_goal: Latih percakapan Arab B2 untuk menjelaskan akar penyebab masalah, bukan gejalanya.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: الدَّعْمُ يَتَأَخَّرُ كَثِيرًا. لِمَاذَا؟
  hint: 'Jawab dengan struktur B2 memakai: لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.'
  sample_answer: لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.
  focus: Memisahkan gejala dan sebab.
  expected_keywords:
  - لِنُفَرِّقْ
  - بَيْنَ
  - الْعَرَضِ
  - وَالسَّبَبِ
  - الْجَذْرِيِّ
  indonesian_explanation: Mari bedakan gejala dan akar penyebab.
- coach: 'استخدم الفكرة: يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.'
  hint: 'Jawab dengan struktur B2 memakai: يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.'
  sample_answer: يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.
  focus: Menyebut akar penyebab.
  expected_keywords:
  - يَعُودُ
  - التَّأَخُّرُ
  - إِلَى
  - ضَعْفِ
  - التَّصْنِيفِ
  indonesian_explanation: Keterlambatan itu karena lemahnya kategorisasi.
- coach: 'استخدم الفكرة: هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.'
  hint: 'Jawab dengan struktur B2 memakai: هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.'
  sample_answer: هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.
  focus: Menolak penjelasan dangkal.
  expected_keywords:
  - هَذَا
  - لَيْسَ
  - مُجَرَّدَ
  - نَقْصٍ
  - فِي
  indonesian_explanation: Ini bukan sekadar kurang jumlah.
- coach: 'استخدم الفكرة: الدَّلِيلُ أَنَّ الْمُشْكِلَةَ تَتَكَرَّرُ فِي نَفْسِ الْخُطْوَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: الدَّلِيلُ أَنَّ الْمُشْكِلَةَ تَتَكَرَّرُ فِي نَفْسِ الْخُطْوَةِ.'
  sample_answer: الدَّلِيلُ أَنَّ الْمُشْكِلَةَ تَتَكَرَّرُ فِي نَفْسِ الْخُطْوَةِ.
  focus: Menopang dengan pola.
  expected_keywords:
  - الدَّلِيلُ
  - أَنَّ
  - الْمُشْكِلَةَ
  - تَتَكَرَّرُ
  - فِي
  indonesian_explanation: Buktinya, masalah berulang di langkah yang sama.
target_phrases:
- لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.
- يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.
- هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.
- الدَّلِيلُ أَنَّ الْمُشْكِلَةَ تَتَكَرَّرُ فِي نَفْسِ الْخُطْوَةِ.
- لِذَلِكَ نُعَالِجُ السَّبَبَ قَبْلَ زِيَادَةِ الْفَرِيقِ.
