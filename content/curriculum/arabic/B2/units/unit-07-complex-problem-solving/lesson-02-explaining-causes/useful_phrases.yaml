phrases:
- phrase: لِنُفَرِّقْ بَيْنَ الْعَرَضِ وَالسَّبَبِ الْجَذْرِيِّ.
  meaning_id: Mari bedakan gejala dan akar penyebab.
  usage_note: Memisahkan gejala dan sebab.
- phrase: يَعُودُ التَّأَخُّرُ إِلَى ضَعْفِ التَّصْنِيفِ.
  meaning_id: Keterlambatan itu karena lemahnya kategorisasi.
  usage_note: Menyebut akar penyebab.
- phrase: هَذَا لَيْسَ مُجَرَّدَ نَقْصٍ فِي الْعَدَدِ.
  meaning_id: Ini bukan sekadar kurang jumlah.
  usage_note: Menolak penjelasan dangkal.
- phrase: الدَّلِيلُ أَنَّ الْمُشْكِلَةَ تَتَكَرَّرُ فِي نَفْسِ الْخُطْوَةِ.
  meaning_id: Buktinya, masalah berulang di langkah yang sama.
  usage_note: Menopang dengan pola.
- phrase: لِذَلِكَ نُعَالِجُ السَّبَبَ قَبْلَ زِيَادَةِ الْفَرِيقِ.
  meaning_id: Karena itu kita atasi penyebabnya sebelum menambah tim.
  usage_note: Menutup dengan urutan tindakan.
