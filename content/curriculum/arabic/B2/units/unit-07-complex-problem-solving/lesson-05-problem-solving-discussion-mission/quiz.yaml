questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku mulai dengan mendefinisikan masalah, bukan solusi."?
  options:
  - أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
  - ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
  - أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.
  correct_answer: أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Lalu aku tanya penyebab, dampak, dan tradeoff."?
  options:
  - ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
  - أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
  - أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.
  correct_answer: ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
