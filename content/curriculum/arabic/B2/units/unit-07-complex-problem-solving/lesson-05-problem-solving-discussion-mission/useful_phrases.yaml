phrases:
- phrase: أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
  meaning_id: Aku mulai dengan mendefinisikan masalah, bukan solusi.
  usage_note: Membuka dengan definisi.
- phrase: ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
  meaning_id: Lalu aku tanya penyebab, dampak, dan tradeoff.
  usage_note: Menggali secara terstruktur.
- phrase: أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.
  meaning_id: Aku ingatkan tim agar tidak lompat ke rekomendasi cepat.
  usage_note: Menjaga proses.
- phrase: أُرَتِّبُ النِّقَاشَ حَوْلَ مِعْيَارٍ وَاحِدٍ وَاضِحٍ.
  meaning_id: Aku susun diskusi di seputar satu kriteria yang jelas.
  usage_note: Memberi fokus keputusan.
- phrase: وَنَخْرُجُ بِخُطْوَةٍ وَاحِدَةٍ قَابِلَةٍ لِلتَّجْرِبَةِ.
  meaning_id: Dan kita keluar dengan satu langkah yang bisa diuji.
  usage_note: Menutup dengan langkah konkret.
