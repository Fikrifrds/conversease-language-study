prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku mulai dengan mendefinisikan masalah, bukan solusi.'
  target_response: أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
  acceptable_responses:
  - أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
- prompt: 'Ucapkan dalam bahasa Arab: Lalu aku tanya penyebab, dampak, dan tradeoff.'
  target_response: ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
  acceptable_responses:
  - ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku ingatkan tim agar tidak lompat ke rekomendasi cepat.'
  target_response: أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.
  acceptable_responses:
  - أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku susun diskusi di seputar satu kriteria yang jelas.'
  target_response: أُرَتِّبُ النِّقَاشَ حَوْلَ مِعْيَارٍ وَاحِدٍ وَاضِحٍ.
  acceptable_responses:
  - أُرَتِّبُ النِّقَاشَ حَوْلَ مِعْيَارٍ وَاحِدٍ وَاضِحٍ.
