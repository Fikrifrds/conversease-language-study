scenario_key: arabic_b2_problem_solving_discussion_mission
mode: lesson_practice_coach
level_code: B2
opening_line: عِنْدَنَا مُشْكِلَةٌ مُعَقَّدَةٌ فِي الْفَرِيقِ. كَيْفَ نَصِلُ إِلَى قَرَارٍ؟
learner_goal: 'Latih percakapan Arab B2 untuk mengubah masalah kompleks menjadi keputusan: definisi, penyebab,
  tradeoff, lalu langkah uji.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: عِنْدَنَا مُشْكِلَةٌ مُعَقَّدَةٌ فِي الْفَرِيقِ. كَيْفَ نَصِلُ إِلَى قَرَارٍ؟
  hint: 'Jawab dengan struktur B2 memakai: أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.'
  sample_answer: أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
  focus: Membuka dengan definisi.
  expected_keywords:
  - أَبْدَأُ
  - بِتَعْرِيفِ
  - الْمُشْكِلَةِ
  - لَا
  - بِالْحَلِّ
  indonesian_explanation: Aku mulai dengan mendefinisikan masalah, bukan solusi.
- coach: 'استخدم الفكرة: ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.'
  hint: 'Jawab dengan struktur B2 memakai: ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.'
  sample_answer: ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
  focus: Menggali secara terstruktur.
  expected_keywords:
  - ثُمَّ
  - أَسْأَلُ
  - عَنِ
  - السَّبَبِ
  - وَالْأَثَرِ
  indonesian_explanation: Lalu aku tanya penyebab, dampak, dan tradeoff.
- coach: 'استخدم الفكرة: أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.'
  sample_answer: أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.
  focus: Menjaga proses.
  expected_keywords:
  - أُذَكِّرُ
  - الْفَرِيقَ
  - أَلَّا
  - يَقْفِزَ
  - إِلَى
  indonesian_explanation: Aku ingatkan tim agar tidak lompat ke rekomendasi cepat.
- coach: 'استخدم الفكرة: أُرَتِّبُ النِّقَاشَ حَوْلَ مِعْيَارٍ وَاحِدٍ وَاضِحٍ.'
  hint: 'Jawab dengan struktur B2 memakai: أُرَتِّبُ النِّقَاشَ حَوْلَ مِعْيَارٍ وَاحِدٍ وَاضِحٍ.'
  sample_answer: أُرَتِّبُ النِّقَاشَ حَوْلَ مِعْيَارٍ وَاحِدٍ وَاضِحٍ.
  focus: Memberi fokus keputusan.
  expected_keywords:
  - أُرَتِّبُ
  - النِّقَاشَ
  - حَوْلَ
  - مِعْيَارٍ
  - وَاحِدٍ
  indonesian_explanation: Aku susun diskusi di seputar satu kriteria yang jelas.
target_phrases:
- أَبْدَأُ بِتَعْرِيفِ الْمُشْكِلَةِ لَا بِالْحَلِّ.
- ثُمَّ أَسْأَلُ عَنِ السَّبَبِ وَالْأَثَرِ وَالْمُقَايَضَةِ.
- أُذَكِّرُ الْفَرِيقَ أَلَّا يَقْفِزَ إِلَى تَوْصِيَةٍ سَرِيعَةٍ.
- أُرَتِّبُ النِّقَاشَ حَوْلَ مِعْيَارٍ وَاحِدٍ وَاضِحٍ.
- وَنَخْرُجُ بِخُطْوَةٍ وَاحِدَةٍ قَابِلَةٍ لِلتَّجْرِبَةِ.
