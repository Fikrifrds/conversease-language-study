prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Tradeoff di sini antara kecepatan dan kualitas.'
  target_response: الْمُقَايَضَةُ هُنَا بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  acceptable_responses:
  - الْمُقَايَضَةُ هُنَا بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Di satu sisi, kecepatan memberi peluang.'
  target_response: مِنْ نَاحِيَةٍ، السُّرْعَةُ تُعْطِينَا فُرْصَةً.
  acceptable_responses:
  - مِنْ نَاحِيَةٍ، السُّرْعَةُ تُعْطِينَا فُرْصَةً.
- prompt: 'Ucapkan dalam bahasa Arab: Di sisi lain, mengancam kepercayaan.'
  target_response: وَمِنْ نَاحِيَةٍ أُخْرَى، تُهَدِّدُ الثِّقَةَ.
  acceptable_responses:
  - وَمِنْ نَاحِيَةٍ أُخْرَى، تُهَدِّدُ الثِّقَةَ.
- prompt: 'Ucapkan dalam bahasa Arab: Keputusan bergantung pada risiko bagian yang dikirim.'
  target_response: الْقَرَارُ يَعْتَمِدُ عَلَى خَطَرِ الْجُزْءِ الْمُرْسَلِ.
  acceptable_responses:
  - الْقَرَارُ يَعْتَمِدُ عَلَى خَطَرِ الْجُزْءِ الْمُرْسَلِ.
