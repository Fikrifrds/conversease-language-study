phrases:
- phrase: الْمُقَايَضَةُ هُنَا بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  meaning_id: Tradeoff di sini antara kecepatan dan kualitas.
  usage_note: Menamai tradeoff.
- phrase: مِنْ نَاحِيَةٍ، السُّرْعَةُ تُعْطِينَا فُرْصَةً.
  meaning_id: Di satu sisi, kecepatan memberi peluang.
  usage_note: Sisi pertama.
- phrase: وَمِنْ نَاحِيَةٍ أُخْرَى، تُهَدِّدُ الثِّقَةَ.
  meaning_id: Di sisi lain, mengancam kepercayaan.
  usage_note: Sisi kedua.
- phrase: الْقَرَارُ يَعْتَمِدُ عَلَى خَطَرِ الْجُزْءِ الْمُرْسَلِ.
  meaning_id: Keputusan bergantung pada risiko bagian yang dikirim.
  usage_note: Mengaitkan ke kriteria.
- phrase: لِذَلِكَ نَضَعُ حَدًّا زَمَنِيًّا وَمِعْيَارًا لِلْجَوْدَةِ.
  meaning_id: Karena itu kita tetapkan batas waktu dan ukuran kualitas.
  usage_note: Menutup dengan aturan main.
