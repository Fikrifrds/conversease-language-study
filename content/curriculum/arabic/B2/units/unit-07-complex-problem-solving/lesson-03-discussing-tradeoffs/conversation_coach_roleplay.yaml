scenario_key: arabic_b2_discussing_tradeoffs
mode: lesson_practice_coach
level_code: B2
opening_line: نُرِيدُ التَّسْلِيمَ بِسُرْعَةٍ، لَكِنَّ الْجَوْدَةَ مُهِمَّةٌ.
learner_goal: Latih percakapan Arab B2 untuk membahas tradeoff antara dua pilihan secara seimbang.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: نُرِيدُ التَّسْلِيمَ بِسُرْعَةٍ، لَكِنَّ الْجَوْدَةَ مُهِمَّةٌ.
  hint: 'Jawab dengan struktur B2 memakai: الْمُقَايَضَةُ هُنَا بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.'
  sample_answer: الْمُقَايَضَةُ هُنَا بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  focus: Menamai tradeoff.
  expected_keywords:
  - الْمُقَايَضَةُ
  - هُنَا
  - بَيْنَ
  - السُّرْعَةِ
  - وَالْجَوْدَةِ
  indonesian_explanation: Tradeoff di sini antara kecepatan dan kualitas.
- coach: 'استخدم الفكرة: مِنْ نَاحِيَةٍ، السُّرْعَةُ تُعْطِينَا فُرْصَةً.'
  hint: 'Jawab dengan struktur B2 memakai: مِنْ نَاحِيَةٍ، السُّرْعَةُ تُعْطِينَا فُرْصَةً.'
  sample_answer: مِنْ نَاحِيَةٍ، السُّرْعَةُ تُعْطِينَا فُرْصَةً.
  focus: Sisi pertama.
  expected_keywords:
  - مِنْ
  - نَاحِيَةٍ
  - السُّرْعَةُ
  - تُعْطِينَا
  - فُرْصَةً
  indonesian_explanation: Di satu sisi, kecepatan memberi peluang.
- coach: 'استخدم الفكرة: وَمِنْ نَاحِيَةٍ أُخْرَى، تُهَدِّدُ الثِّقَةَ.'
  hint: 'Jawab dengan struktur B2 memakai: وَمِنْ نَاحِيَةٍ أُخْرَى، تُهَدِّدُ الثِّقَةَ.'
  sample_answer: وَمِنْ نَاحِيَةٍ أُخْرَى، تُهَدِّدُ الثِّقَةَ.
  focus: Sisi kedua.
  expected_keywords:
  - وَمِنْ
  - نَاحِيَةٍ
  - أُخْرَى
  - تُهَدِّدُ
  - الثِّقَةَ
  indonesian_explanation: Di sisi lain, mengancam kepercayaan.
- coach: 'استخدم الفكرة: الْقَرَارُ يَعْتَمِدُ عَلَى خَطَرِ الْجُزْءِ الْمُرْسَلِ.'
  hint: 'Jawab dengan struktur B2 memakai: الْقَرَارُ يَعْتَمِدُ عَلَى خَطَرِ الْجُزْءِ الْمُرْسَلِ.'
  sample_answer: الْقَرَارُ يَعْتَمِدُ عَلَى خَطَرِ الْجُزْءِ الْمُرْسَلِ.
  focus: Mengaitkan ke kriteria.
  expected_keywords:
  - الْقَرَارُ
  - يَعْتَمِدُ
  - عَلَى
  - خَطَرِ
  - الْجُزْءِ
  indonesian_explanation: Keputusan bergantung pada risiko bagian yang dikirim.
target_phrases:
- الْمُقَايَضَةُ هُنَا بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
- مِنْ نَاحِيَةٍ، السُّرْعَةُ تُعْطِينَا فُرْصَةً.
- وَمِنْ نَاحِيَةٍ أُخْرَى، تُهَدِّدُ الثِّقَةَ.
- الْقَرَارُ يَعْتَمِدُ عَلَى خَطَرِ الْجُزْءِ الْمُرْسَلِ.
- لِذَلِكَ نَضَعُ حَدًّا زَمَنِيًّا وَمِعْيَارًا لِلْجَوْدَةِ.
