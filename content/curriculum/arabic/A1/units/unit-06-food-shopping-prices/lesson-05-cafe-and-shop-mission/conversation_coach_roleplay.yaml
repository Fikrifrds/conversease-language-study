scenario_key: arabic_cafe_and_shop_mission
mode: lesson_practice_coach
level_code: A1
opening_line: ماذا تريد؟
learner_goal: Combine ordering, price, and buying phrases in one short conversation.
max_turns: 4
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: ماذا تريد؟
  hint: 'Jawab dengan pola: أريد ماءً'
  sample_answer: أريد ماءً
  focus: Order a drink.
  expected_keywords:
  - أريد
  - ماءً
  indonesian_explanation: Saya ingin air.
- coach: 'استخدم: كم السعر؟'
  hint: 'Jawab dengan pola: كم السعر؟'
  sample_answer: كم السعر؟
  focus: Ask price.
  expected_keywords:
  - كم
  - السعر
  indonesian_explanation: Berapa harganya?
- coach: 'استخدم: السعر مناسب'
  hint: 'Jawab dengan pola: السعر مناسب'
  sample_answer: السعر مناسب
  focus: Accept price.
  expected_keywords:
  - السعر
  - مناسب
  indonesian_explanation: Harganya cocok.
target_phrases:
- أريد ماءً
- كم السعر؟
- السعر مناسب
- آخذ واحدًا
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
