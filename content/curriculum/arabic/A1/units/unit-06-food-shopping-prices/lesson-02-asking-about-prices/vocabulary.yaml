vocabulary:
- word: كَمْ
  meaning_id: berapa
  usage_note: 'Dipakai untuk arti "berapa". Contoh: "كَمِ السِّعْرُ؟"'
- word: سِعْرٌ
  meaning_id: harga
  usage_note: 'Dipakai untuk arti "harga". Contoh: "كَمِ السِّعْرُ؟"'
- word: خَمْسَةٌ
  meaning_id: lima
  usage_note: 'Dipakai untuk arti "lima". Contoh: "السِّعْرُ خَمْسَةُ رِيَالَاتٍ"'
- word: رِيَالَاتٌ
  meaning_id: riyal
  usage_note: 'Dipakai untuk arti "riyal". Contoh: "السِّعْرُ خَمْسَةُ رِيَالَاتٍ"'
- word: مُنَاسِبٌ
  meaning_id: cocok/sesuai
  usage_note: 'Dipakai untuk arti "cocok/sesuai". Contoh: "مُنَاسِبٌ"'
- word: قَلَمٌ
  meaning_id: pena
  usage_note: 'Dipakai untuk arti "pena". Contoh: "كَمْ سِعْرُ الْقَلَمِ؟"'
- word: آخُذُ
  meaning_id: saya ambil
  usage_note: 'Dipakai untuk arti "saya ambil". Contoh: "نَعَمْ، آخُذُ وَاحِدًا."'
