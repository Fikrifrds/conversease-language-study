phrases:
- phrase: كَمِ السِّعْرُ؟
  meaning_id: Berapa harganya?
  usage_note: 'Gunakan saat ingin mengatakan: Berapa harganya?'
- phrase: السِّعْرُ خَمْسَةُ رِيَالَاتٍ
  meaning_id: Harganya lima riyal.
  usage_note: 'Gunakan saat ingin mengatakan: Harganya lima riyal.'
- phrase: غَالٍ
  meaning_id: Mahal
  usage_note: 'Gunakan saat ingin mengatakan: Mahal'
- phrase: رَخِيصٌ
  meaning_id: Murah
  usage_note: 'Gunakan saat ingin mengatakan: Murah'
- phrase: مُنَاسِبٌ
  meaning_id: Cocok/pas
  usage_note: 'Gunakan saat ingin mengatakan: Cocok/pas'
