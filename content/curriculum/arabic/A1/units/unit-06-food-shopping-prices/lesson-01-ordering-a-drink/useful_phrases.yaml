phrases:
- phrase: أُرِيدُ مَاءً
  meaning_id: Saya ingin air.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin air.'
- phrase: أُرِيدُ قَهْوَةً
  meaning_id: Saya ingin kopi.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin kopi.'
- phrase: من فضلك
  meaning_id: Tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Tolong.'
- phrase: هَلْ عِنْدَكُمْ شَايٌ؟
  meaning_id: Apakah kalian punya teh?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kalian punya teh?'
- phrase: تَفَضَّلْ
  meaning_id: Silakan.
  usage_note: 'Gunakan saat ingin mengatakan: Silakan.'
