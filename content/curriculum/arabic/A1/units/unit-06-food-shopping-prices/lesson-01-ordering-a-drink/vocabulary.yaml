vocabulary:
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ مَاءً"'
- word: مَاءٌ
  meaning_id: air
  usage_note: 'Dipakai untuk arti "air". Contoh: "أُرِيدُ مَاءً"'
- word: قَهْوَةٌ
  meaning_id: kopi
  usage_note: 'Dipakai untuk arti "kopi". Contoh: "أُرِيدُ قَهْوَةً"'
- word: مَرْحَبًا
  meaning_id: halo
  usage_note: 'Dipakai untuk arti "halo". Contoh: "مَرْحَبًا."'
- word: مَاذَا
  meaning_id: apa
  usage_note: 'Dipakai untuk arti "apa". Contoh: "مَرْحَبًا، مَاذَا تُرِيدُ؟"'
- word: شُكْرًا
  meaning_id: terima kasih
  usage_note: 'Dipakai untuk arti "terima kasih". Contoh: "شُكْرًا."'
