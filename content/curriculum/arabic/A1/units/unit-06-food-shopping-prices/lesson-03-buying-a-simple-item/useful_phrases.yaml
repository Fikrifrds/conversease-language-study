phrases:
- phrase: هل عندكم قلم؟
  meaning_id: Apakah kalian punya pena?
  usage_note: Ask item availability.
- phrase: نعم، موجود
  meaning_id: Ya, ada.
  usage_note: Confirm availability.
- phrase: أريد هذا
  meaning_id: Saya ingin ini.
  usage_note: Choose an item.
- phrase: آخذ واحدًا
  meaning_id: Saya ambil satu.
  usage_note: Buy one.
- phrase: الحساب من فضلك
  meaning_id: Tagihannya, tolong.
  usage_note: Ask for the bill.
