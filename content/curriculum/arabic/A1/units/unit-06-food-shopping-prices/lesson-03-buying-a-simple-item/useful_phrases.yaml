phrases:
- phrase: هَلْ عِنْدَكُمْ قَلَمٌ؟
  meaning_id: Apakah kalian punya pena?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kalian punya pena?'
- phrase: نَعَمْ، مَوْجُودٌ
  meaning_id: Ya, ada.
  usage_note: 'Gunakan saat ingin mengatakan: Ya, ada.'
- phrase: أُرِيدُ هَذَا
  meaning_id: Saya ingin ini.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin ini.'
- phrase: آخُذُ وَاحِدًا
  meaning_id: Saya ambil satu.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ambil satu.'
- phrase: الْحِسَابُ مِنْ فَضْلِكَ
  meaning_id: Tagihannya, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Tagihannya, tolong.'
