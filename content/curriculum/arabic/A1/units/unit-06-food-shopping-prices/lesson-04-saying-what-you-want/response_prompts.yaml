prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Apa yang kamu inginkan?'
  target_response: مَاذَا تُرِيدُ؟
  acceptable_responses:
  - مَاذَا تُرِيدُ؟
- prompt: 'Ucapkan dalam bahasa Arab: Saya ingin buku.'
  target_response: أُرِيدُ كِتَابًا
  acceptable_responses:
  - أُرِيدُ كِتَابًا
- prompt: 'Ucapkan dalam bahasa Arab: Saya tidak ingin kopi.'
  target_response: لَا أُرِيدُ قَهْوَةً
  acceptable_responses:
  - لَا أُرِيدُ قَهْوَةً
