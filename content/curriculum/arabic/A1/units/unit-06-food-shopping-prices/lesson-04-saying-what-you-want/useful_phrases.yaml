phrases:
- phrase: مَاذَا تُرِيدُ؟
  meaning_id: Apa yang kamu inginkan?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu inginkan?'
- phrase: أُرِيدُ كِتَابًا
  meaning_id: Saya ingin buku.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin buku.'
- phrase: لَا أُرِيدُ قَهْوَةً
  meaning_id: Saya tidak ingin kopi.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak ingin kopi.'
- phrase: أَحْتَاجُ قَلَمًا
  meaning_id: Saya butuh pena.
  usage_note: 'Gunakan saat ingin mengatakan: Saya butuh pena.'
- phrase: فَقَطْ
  meaning_id: Saja
  usage_note: 'Gunakan saat ingin mengatakan: Saja'
