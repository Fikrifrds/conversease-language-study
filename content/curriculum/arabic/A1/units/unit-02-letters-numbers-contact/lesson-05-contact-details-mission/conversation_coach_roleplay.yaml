  indonesian_explanation: Saya menulis nama saya ...
- coach: 'استخدم: رقمي ...'
  hint: 'Jawab dengan pola: رقمي ...'
  sample_answer: رقمي ...
  focus: Give your number.
  expected_keywords:
  - رقمي
  indonesian_explanation: Nomor saya ...
target_phrases:
- اسمي ...
- أكتب اسمي ...
- رقمي ...
- بريدي الإلكتروني ...
