phrases:
- phrase: كَيْفَ تَكْتُبُ اِسْمَكَ؟
  meaning_id: Bagaimana kamu menulis namamu?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana kamu menulis namamu?'
- phrase: أَكْتُبُ اسْمِي ...
  meaning_id: Saya menulis nama saya ...
  usage_note: 'Gunakan saat ingin mengatakan: Saya menulis nama saya ...'
- phrase: هَذَا حَرْفُ ...
  meaning_id: Ini huruf ...
  usage_note: 'Gunakan saat ingin mengatakan: Ini huruf ...'
- phrase: هَلْ هَذَا صَحِيحٌ؟
  meaning_id: Apakah ini benar?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah ini benar?'
