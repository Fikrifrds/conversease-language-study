vocabulary:
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ تَكْتُبُ اِسْمَكَ؟"'
- word: اُكْتُبْ
  meaning_id: tulislah
  usage_note: 'Dipakai untuk arti "tulislah". Contoh: "أَكْتُبُ اسْمِي ..."'
- word: اِسْمِي
  meaning_id: nama saya
  usage_note: 'Dipakai untuk arti "nama saya". Contoh: "أَكْتُبُ اسْمِي ..."'
- word: حَرْفٌ
  meaning_id: huruf
  usage_note: 'Dipakai untuk arti "huruf". Contoh: "هَذَا حَرْفُ ..."'
- word: صَحِيحٌ
  meaning_id: benar
  usage_note: 'Dipakai untuk arti "benar". Contoh: "هَلْ هَذَا صَحِيحٌ؟"'
- word: أَلْفٌ
  meaning_id: seribu
  usage_note: 'Dipakai untuk arti "seribu". Contoh: "هَذَا حَرْفُ الْأَلِفِ، وَهَذَا
    حَرْفُ الْحَاءِ."'
