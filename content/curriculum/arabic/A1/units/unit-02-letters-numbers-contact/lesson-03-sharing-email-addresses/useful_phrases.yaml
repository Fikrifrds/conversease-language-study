phrases:
- phrase: ما بريدك الإلكتروني؟
  meaning_id: Apa alamat emailmu?
  usage_note: Ask for an email address.
- phrase: بريدي الإلكتروني ...
  meaning_id: Email saya ...
  usage_note: Share your email.
- phrase: اكتب من فضلك
  meaning_id: Tulis, tolong.
  usage_note: Ask someone to write it.
- phrase: نقطة
  meaning_id: Titik
  usage_note: Say dot in an address.
- phrase: شرطة
  meaning_id: Tanda hubung
  usage_note: Say dash in an address.
