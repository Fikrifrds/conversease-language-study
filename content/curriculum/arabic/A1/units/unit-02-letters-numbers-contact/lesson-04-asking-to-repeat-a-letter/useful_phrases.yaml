phrases:
- phrase: لم أَسْمَعُ الْحَرْفَ
  meaning_id: Saya tidak mendengar hurufnya.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak mendengar hurufnya.'
- phrase: بِبُطْءٍ مِنْ فَضْلِكَ
  meaning_id: Pelan-pelan, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Pelan-pelan, tolong.'
- phrase: هَلْ قُلْتَ بَاءً؟
  meaning_id: Apakah Anda mengatakan ba?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah Anda mengatakan ba?'
- phrase: نَعَمْ، قُلْتُ بَاءً
  meaning_id: Ya, saya mengatakan ba.
  usage_note: 'Gunakan saat ingin mengatakan: Ya, saya mengatakan ba.'
