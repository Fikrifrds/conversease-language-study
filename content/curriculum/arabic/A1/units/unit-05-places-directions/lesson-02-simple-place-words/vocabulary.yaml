vocabulary:
- word: بَيْتٌ
  meaning_id: rumah
  usage_note: 'Dipakai untuk arti "rumah". Contoh: "الْبَيْتُ"'
- word: مَدْرَسَةٌ
  meaning_id: sekolah
  usage_note: 'Dipakai untuk arti "sekolah". Contoh: "الْمَدْرَسَةُ"'
- word: سُوقٌ
  meaning_id: pasar
  usage_note: 'Dipakai untuk arti "pasar". Contoh: "السُّوقُ"'
- word: مَكْتَبٌ
  meaning_id: kantor/meja kerja
