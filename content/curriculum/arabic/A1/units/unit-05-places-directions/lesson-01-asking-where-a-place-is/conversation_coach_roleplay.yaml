scenario_key: arabic_asking_where_a_place_is
mode: lesson_practice_coach
level_code: A1
opening_line: أين المكتبة؟
learner_goal: Ask where a place is and understand here/there.
max_turns: 4
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: أين المكتبة؟
  hint: 'Jawab dengan pola: أين المكتبة؟'
