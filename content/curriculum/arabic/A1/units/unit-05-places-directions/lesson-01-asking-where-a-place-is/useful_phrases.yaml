phrases:
- phrase: أَيْنَ الْمَكْتَبَةُ؟
  meaning_id: Di mana perpustakaan?
  usage_note: 'Gunakan saat ingin mengatakan: Di mana perpustakaan?'
- phrase: الْمَكْتَبَةُ هُنَا
  meaning_id: Perpustakaan di sini.
  usage_note: 'Gunakan saat ingin mengatakan: Perpustakaan di sini.'
- phrase: هُنَاكَ
  meaning_id: Di sana
  usage_note: 'Gunakan saat ingin mengatakan: Di sana'
- phrase: قَرِيبَةٌ
  meaning_id: Dekat
  usage_note: 'Gunakan saat ingin mengatakan: Dekat'
- phrase: بَعِيدَةٌ
  meaning_id: Jauh
  usage_note: 'Gunakan saat ingin mengatakan: Jauh'
