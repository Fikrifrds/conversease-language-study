vocabulary:
- word: مَرْحَبًا
  meaning_id: halo
  usage_note: 'Dipakai untuk arti "halo". Contoh: "مَرْحَبًا"'
- word: اِسْمِي
  meaning_id: nama saya
  usage_note: 'Dipakai untuk arti "nama saya". Contoh: "اِسْمِي ..."'
- word: أَدْرُسُ
  meaning_id: saya belajar
  usage_note: 'Dipakai untuk arti "saya belajar". Contoh: "أَدْرُسُ الْعَرَبِيَّةَ"'
- word: الْعَرَبِيَّةُ
  meaning_id: bahasa Arab
  usage_note: 'Dipakai untuk arti "bahasa Arab". Contoh: "أَدْرُسُ الْعَرَبِيَّةَ"'
- word: أَيْنَ
  meaning_id: di mana
  usage_note: 'Dipakai untuk arti "di mana". Contoh: "أَيْنَ الْمَكْتَبَةُ؟"'
- word: مَكْتَبَةٌ
  meaning_id: perpustakaan
  usage_note: 'Dipakai untuk arti "perpustakaan". Contoh: "أَيْنَ الْمَكْتَبَةُ؟"'
- word: أَحْتَاجُ
  meaning_id: saya butuh
  usage_note: 'Dipakai untuk arti "saya butuh". Contoh: "أَحْتَاجُ مُسَاعَدَةً"'
- word: مُسَاعَدَةٌ
  meaning_id: bantuan
  usage_note: 'Dipakai untuk arti "bantuan". Contoh: "أَحْتَاجُ مُسَاعَدَةً"'
