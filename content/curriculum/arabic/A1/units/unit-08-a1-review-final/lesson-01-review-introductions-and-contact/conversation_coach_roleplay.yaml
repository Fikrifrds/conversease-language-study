  focus: 'Latihan frasa: Nama saya Ahmad.'
  expected_keywords:
  - اِسْمِي
  - أَحْمَدُ
  indonesian_explanation: Nama saya Ahmad.
- coach: 'استخدم: أنا من إندونيسيا'
  hint: 'Jawab dengan pola: أنا من إندونيسيا'
  sample_answer: أنا من إندونيسيا
  focus: 'Latihan frasa: Saya dari Indonesia.'
  expected_keywords:
  - أنا
  - من
  - إندونيسيا
  indonesian_explanation: Saya dari Indonesia.
- coach: 'استخدم: أَكْتُبُ اسْمِي'
  hint: 'Jawab dengan pola: أَكْتُبُ اسْمِي'
  sample_answer: أَكْتُبُ اسْمِي
  focus: 'Latihan frasa: Saya menulis nama saya.'
  expected_keywords:
  - أَكْتُبُ
  - اسْمِي
  indonesian_explanation: Saya menulis nama saya.
target_phrases:
- اِسْمِي أَحْمَدُ
- أنا من إندونيسيا
- أَكْتُبُ اسْمِي
- رَقْمِي ...
