scenario_key: arabic_review_introductions_and_contact
mode: lesson_practice_coach
level_code: A1
opening_line: مَا اسْمُكَ؟
learner_goal: 'Latih percakapan Arab sederhana untuk situasi ini: Kamu mengulang perkenalan, asal, ejaan
  nama, dan informasi kontak sederhana.'
max_turns: 4
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا اسْمُكَ؟
  hint: 'Jawab dengan pola: اِسْمِي أَحْمَدُ'
