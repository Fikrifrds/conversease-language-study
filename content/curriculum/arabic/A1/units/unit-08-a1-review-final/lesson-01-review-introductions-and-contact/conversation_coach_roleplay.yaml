scenario_key: arabic_review_introductions_and_contact
mode: lesson_practice_coach
level_code: A1
opening_line: ما اسمك ومن أين أنت؟
learner_goal: Review introductions and contact details in one smooth exchange.
max_turns: 4
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: ما اسمك ومن أين أنت؟
  hint: 'Jawab dengan pola: اسمي أحمد'
  sample_answer: اسمي أحمد
  focus: Say your name.
  expected_keywords:
  - اسمي
  - أحمد
  indonesian_explanation: Nama saya Ahmad.
- coach: 'استخدم: أنا من إندونيسيا'
  hint: 'Jawab dengan pola: أنا من إندونيسيا'
  sample_answer: أنا من إندونيسيا
  focus: Say origin.
  expected_keywords:
  - أنا
  - من
  - إندونيسيا
  indonesian_explanation: Saya dari Indonesia.
- coach: 'استخدم: أكتب اسمي'
  hint: 'Jawab dengan pola: أكتب اسمي'
  sample_answer: أكتب اسمي
  focus: Spell your name.
  expected_keywords:
  - أكتب
  - اسمي
  indonesian_explanation: Saya menulis nama saya.
target_phrases:
- اسمي أحمد
- أنا من إندونيسيا
- أكتب اسمي
- رقمي ...
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
