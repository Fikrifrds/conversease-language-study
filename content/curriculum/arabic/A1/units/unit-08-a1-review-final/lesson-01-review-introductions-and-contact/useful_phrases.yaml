phrases:
- phrase: اِسْمِي أَحْمَدُ
  meaning_id: Nama saya Ahmad.
  usage_note: 'Gunakan saat ingin mengatakan: Nama saya Ahmad.'
- phrase: أَنَا مِنْ إِنْدُونِيسِيَا
  meaning_id: Saya dari Indonesia.
  usage_note: 'Gunakan saat ingin mengatakan: Saya dari Indonesia.'
- phrase: أَكْتُبُ اسْمِي
  meaning_id: Saya menulis nama saya.
  usage_note: 'Gunakan saat ingin mengatakan: Saya menulis nama saya.'
- phrase: رَقْمِي ...
  meaning_id: Nomor saya ...
  usage_note: 'Gunakan saat ingin mengatakan: Nomor saya ...'
- phrase: بَرِيدِي الْإِلِكْتُرُونِيُّ ...
  meaning_id: Email saya ...
  usage_note: 'Gunakan saat ingin mengatakan: Email saya ...'
