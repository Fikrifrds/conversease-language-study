phrases:
- phrase: أنا من إندونيسيا
  meaning_id: Saya dari Indonesia.
  usage_note: 'Gunakan saat ingin mengatakan: Saya dari Indonesia.'
- phrase: عِنْدِي دَرْسٌ
  meaning_id: Saya punya pelajaran.
  usage_note: 'Gunakan saat ingin mengatakan: Saya punya pelajaran.'
- phrase: أُرِيدُ كِتَابًا
  meaning_id: Saya ingin buku.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin buku.'
- phrase: لَا أَفْهَمُ
  meaning_id: Saya tidak paham.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak paham.'
- phrase: أَعِدْ مِنْ فَضْلِكَ
  meaning_id: Ulangi, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Ulangi, tolong.'
