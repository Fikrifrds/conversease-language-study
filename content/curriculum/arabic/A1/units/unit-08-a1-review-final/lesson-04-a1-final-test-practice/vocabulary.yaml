vocabulary:
- word: إِنْدُونِيسِيَا
  meaning_id: Indonesia
  usage_note: 'Dipakai untuk arti "Indonesia". Contoh: "أَنَا مِنْ إِنْدُونِيسِيَا"'
- word: عِنْدِي
  meaning_id: saya punya
  usage_note: 'Dipakai untuk arti "saya punya". Contoh: "عِنْدِي دَرْسٌ"'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ كِتَابًا"'
- word: كِتَابٌ
  meaning_id: buku
  usage_note: 'Dipakai untuk arti "buku". Contoh: "أُرِيدُ كِتَابًا"'
- word: أَفْهَمُ
  meaning_id: saya paham
  usage_note: 'Dipakai untuk arti "saya paham". Contoh: "لَا أَفْهَمُ"'
- word: أَيْنَ
  meaning_id: di mana
  usage_note: 'Dipakai untuk arti "di mana". Contoh: "مِنْ أَيْنَ أَنْتِ؟"'
- word: الدَّرْسُ
  meaning_id: pelajaran
  usage_note: 'Dipakai untuk arti "pelajaran". Contoh: "مَتَى الدَّرْسُ؟"'
- word: سَاعَةٌ
  meaning_id: jam
  usage_note: 'Dipakai untuk arti "jam". Contoh: "الدَّرْسُ السَّاعَةَ الثَّامِنَةَ."'
