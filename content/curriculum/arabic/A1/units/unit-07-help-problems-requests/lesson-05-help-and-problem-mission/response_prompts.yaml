- prompt: 'Ucapkan dalam bahasa Arab: Pelan-pelan, tolong.'
  target_response: بِبُطْءٍ مِنْ فَضْلِكَ
  acceptable_responses:
  - بِبُطْءٍ مِنْ فَضْلِكَ
