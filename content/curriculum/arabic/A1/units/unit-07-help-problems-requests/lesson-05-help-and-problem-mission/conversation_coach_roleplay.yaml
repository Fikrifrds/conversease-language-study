scenario_key: arabic_help_and_problem_mission
mode: lesson_practice_coach
level_code: A1
opening_line: اقرئي الجملة.
learner_goal: Combine not understanding, asking for help, and thanking in one conversation.
max_turns: 4
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: اقرئي الجملة.
  hint: 'Jawab dengan pola: لا أفهم'
  sample_answer: لا أفهم
  focus: Explain the problem.
  expected_keywords:
  - لا
  - أفهم
  indonesian_explanation: Saya tidak paham.
- coach: 'استخدم: هل تساعدني؟'
  hint: 'Jawab dengan pola: هل تساعدني؟'
  sample_answer: هل تساعدني؟
  focus: Ask for help.
  expected_keywords:
  - هل
  - تساعدني
  indonesian_explanation: Bisakah Anda membantu saya?
- coach: 'استخدم: ببطء من فضلك'
  hint: 'Jawab dengan pola: ببطء من فضلك'
  sample_answer: ببطء من فضلك
  focus: Ask for slower speech.
  expected_keywords:
  - ببطء
  - من
  - فضلك
  indonesian_explanation: Pelan-pelan, tolong.
target_phrases:
- لا أفهم
- هل تساعدني؟
- ببطء من فضلك
- أعد مرة أخرى
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
