questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya tidak paham."?
  options:
  - لَا أَفْهَمُ
  - لَا أَعْرِفُ الْكَلِمَةَ
  - مَاذَا يَعْنِي هَذَا؟
  correct_answer: لَا أَفْهَمُ
