phrases:
- phrase: لا أفهم
  meaning_id: Saya tidak paham.
  usage_note: State lack of understanding.
- phrase: لا أعرف الكلمة
  meaning_id: Saya tidak tahu katanya.
  usage_note: Identify the problem.
- phrase: ماذا يعني هذا؟
  meaning_id: Apa arti ini?
  usage_note: Ask meaning.
- phrase: ببطء من فضلك
  meaning_id: Pelan-pelan, tolong.
  usage_note: Ask for slower speech.
- phrase: مرة أخرى
  meaning_id: Sekali lagi
  usage_note: Ask repetition.
