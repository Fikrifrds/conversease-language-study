phrases:
- phrase: لَا أَفْهَمُ
  meaning_id: Saya tidak paham.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak paham.'
- phrase: لَا أَعْرِفُ الْكَلِمَةَ
  meaning_id: Saya tidak tahu katanya.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak tahu katanya.'
- phrase: مَاذَا يَعْنِي هَذَا؟
  meaning_id: Apa arti ini?
  usage_note: 'Gunakan saat ingin mengatakan: Apa arti ini?'
- phrase: بِبُطْءٍ مِنْ فَضْلِكَ
  meaning_id: Pelan-pelan, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Pelan-pelan, tolong.'
- phrase: مَرَّةً أُخْرَى
  meaning_id: Sekali lagi
  usage_note: 'Gunakan saat ingin mengatakan: Sekali lagi'
