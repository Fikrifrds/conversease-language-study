prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Bisakah Anda membantu saya?'
  target_response: هَلْ تُسَاعِدُنِي؟
  acceptable_responses:
  - هَلْ تُسَاعِدُنِي؟
- prompt: 'Ucapkan dalam bahasa Arab: Saya butuh bantuan.'
  target_response: أَحْتَاجُ مُسَاعَدَةً
  acceptable_responses:
  - أَحْتَاجُ مُسَاعَدَةً
- prompt: 'Ucapkan dalam bahasa Arab: Di mana saya menemukan pelajaran?'
  target_response: أَيْنَ أَجِدُ الدَّرْسَ؟
  acceptable_responses:
  - أَيْنَ أَجِدُ الدَّرْسَ؟
