phrases:
- phrase: هَذِهِ عَائِلَتِي
  meaning_id: Ini keluarga saya.
  usage_note: 'Gunakan saat ingin mengatakan: Ini keluarga saya.'
- phrase: أنا طالب
  meaning_id: Saya pelajar.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pelajar.'
- phrase: أَدْرُسُ الْعَرَبِيَّةَ
  meaning_id: Saya belajar bahasa Arab.
  usage_note: 'Gunakan saat ingin mengatakan: Saya belajar bahasa Arab.'
- phrase: أَعْمَلُ فِي مَكْتَبٍ
  meaning_id: Saya bekerja di kantor.
  usage_note: 'Gunakan saat ingin mengatakan: Saya bekerja di kantor.'
- phrase: أُحِبُّ الْقِرَاءَةَ
  meaning_id: Saya suka membaca.
  usage_note: 'Gunakan saat ingin mengatakan: Saya suka membaca.'
