vocabulary:
- word: عَائِلَتِي
  meaning_id: keluarga saya
  usage_note: 'Dipakai untuk arti "keluarga saya". Contoh: "هَذِهِ عَائِلَتِي"'
- word: أَدْرُسُ
  meaning_id: saya belajar
  usage_note: 'Dipakai untuk arti "saya belajar". Contoh: "أَدْرُسُ الْعَرَبِيَّةَ"'
- word: الْعَرَبِيَّةُ
  meaning_id: bahasa Arab
  usage_note: 'Dipakai untuk arti "bahasa Arab". Contoh: "أَدْرُسُ الْعَرَبِيَّةَ"'
- word: أَعْمَلُ
  meaning_id: saya bekerja
  usage_note: 'Dipakai untuk arti "saya bekerja". Contoh: "أَعْمَلُ فِي مَكْتَبٍ"'
- word: مَكْتَبٌ
  meaning_id: kantor/meja kerja
  usage_note: 'Dipakai untuk arti "kantor/meja kerja". Contoh: "أَعْمَلُ فِي مَكْتَبٍ"'
- word: أُحِبُّ
  meaning_id: saya suka
  usage_note: 'Dipakai untuk arti "saya suka". Contoh: "أُحِبُّ الْقِرَاءَةَ"'
- word: قِرَاءَةٌ
  meaning_id: membaca
  usage_note: 'Dipakai untuk arti "membaca". Contoh: "أُحِبُّ الْقِرَاءَةَ"'
- word: اِسْمِي
  meaning_id: nama saya
  usage_note: 'Dipakai untuk arti "nama saya". Contoh: "اِسْمِي لَيْلَى، وهَذِهِ عَائِلَتِي."'
