  sample_answer: أنا طالب
  focus: Say study identity.
  expected_keywords:
  - أنا
  - طالب
  indonesian_explanation: Saya pelajar.
- coach: 'استخدم: أدرس العربية'
  hint: 'Jawab dengan pola: أدرس العربية'
  sample_answer: أدرس العربية
  focus: Say study topic.
  expected_keywords:
  - أدرس
  - العربية
  indonesian_explanation: Saya belajar bahasa Arab.
target_phrases:
- هذه عائلتي
- أنا طالب
- أدرس العربية
