scenario_key: arabic_family_work_study_mission
mode: lesson_practice_coach
level_code: A1
opening_line: حدثيني عن نفسك.
learner_goal: Combine family, work/study, and likes in one short formal conversation.
max_turns: 4
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: حدثيني عن نفسك.
  hint: 'Jawab dengan pola: هذه عائلتي'
