prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Di mana kamu belajar?'
  target_response: أَيْنَ تَدْرُسُ؟
  acceptable_responses:
  - أَيْنَ تَدْرُسُ؟
- prompt: 'Ucapkan dalam bahasa Arab: Apa yang kamu pelajari?'
  target_response: مَاذَا تَدْرُسُ؟
  acceptable_responses:
  - مَاذَا تَدْرُسُ؟
- prompt: 'Ucapkan dalam bahasa Arab: Saya belajar bahasa Arab.'
  target_response: أَدْرُسُ اللُّغَةَ الْعَرَبِيَّةَ
  acceptable_responses:
  - أَدْرُسُ اللُّغَةَ الْعَرَبِيَّةَ
