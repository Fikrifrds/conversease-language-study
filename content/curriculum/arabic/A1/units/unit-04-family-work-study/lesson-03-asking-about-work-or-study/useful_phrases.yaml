phrases:
- phrase: أَيْنَ تَدْرُسُ؟
  meaning_id: Di mana kamu belajar?
  usage_note: 'Gunakan saat ingin mengatakan: Di mana kamu belajar?'
- phrase: مَاذَا تَدْرُسُ؟
  meaning_id: Apa yang kamu pelajari?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu pelajari?'
- phrase: أَدْرُسُ اللُّغَةَ الْعَرَبِيَّةَ
  meaning_id: Saya belajar bahasa Arab.
  usage_note: 'Gunakan saat ingin mengatakan: Saya belajar bahasa Arab.'
- phrase: هل تعمل؟
  meaning_id: Apakah kamu bekerja?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kamu bekerja?'
- phrase: نَعَمْ، أَعْمَلُ
  meaning_id: Ya, saya bekerja.
  usage_note: 'Gunakan saat ingin mengatakan: Ya, saya bekerja.'
