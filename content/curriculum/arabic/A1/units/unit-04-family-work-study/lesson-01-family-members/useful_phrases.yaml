phrases:
- phrase: مَنْ هَذَا؟
  meaning_id: Siapa ini?
  usage_note: 'Gunakan saat ingin mengatakan: Siapa ini?'
- phrase: هَذَا أَبِي
  meaning_id: Ini ayah saya.
  usage_note: 'Gunakan saat ingin mengatakan: Ini ayah saya.'
- phrase: هَذِهِ أُمِّي
  meaning_id: Ini ibu saya.
  usage_note: 'Gunakan saat ingin mengatakan: Ini ibu saya.'
- phrase: هَذَا أَخِي
  meaning_id: Ini saudara laki-laki saya.
  usage_note: 'Gunakan saat ingin mengatakan: Ini saudara laki-laki saya.'
- phrase: هَذِهِ عَائِلَتِي
  meaning_id: Ini keluarga saya.
  usage_note: 'Gunakan saat ingin mengatakan: Ini keluarga saya.'
