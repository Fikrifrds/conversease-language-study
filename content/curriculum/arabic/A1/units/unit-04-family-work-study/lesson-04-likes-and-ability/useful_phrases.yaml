phrases:
- phrase: أُحِبُّ الْقِرَاءَةَ
  meaning_id: Saya suka membaca.
  usage_note: 'Gunakan saat ingin mengatakan: Saya suka membaca.'
- phrase: لَا أُحِبُّ الِانْتِظَارَ
  meaning_id: Saya tidak suka menunggu.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak suka menunggu.'
- phrase: أَسْتَطِيعُ الْقِرَاءَةَ
  meaning_id: Saya bisa membaca.
  usage_note: 'Gunakan saat ingin mengatakan: Saya bisa membaca.'
- phrase: لَا أَسْتَطِيعُ الْآنَ
  meaning_id: Saya belum bisa sekarang.
  usage_note: 'Gunakan saat ingin mengatakan: Saya belum bisa sekarang.'
- phrase: قَلِيلًا
  meaning_id: Sedikit
  usage_note: 'Gunakan saat ingin mengatakan: Sedikit'
