phrases:
  - phrase: ما اسمُكَ؟
    meaning_id: Siapa namamu?
    usage_note: Gunakan untuk menanyakan nama seseorang.
  - phrase: اسمي ...
    meaning_id: Nama saya ...
    usage_note: Gunakan untuk menyebutkan nama.
  - phrase: من أين أنتَ؟
    meaning_id: Dari mana kamu?
    usage_note: Gunakan untuk menanyakan asal seseorang.
  - phrase: أنا من إندونيسيا
    meaning_id: Saya dari Indonesia.
    usage_note: Gunakan untuk menyebutkan asal negara.
  - phrase: وأنتَ؟
    meaning_id: Dan kamu/Anda?
    usage_note: Gunakan untuk bertanya balik.
