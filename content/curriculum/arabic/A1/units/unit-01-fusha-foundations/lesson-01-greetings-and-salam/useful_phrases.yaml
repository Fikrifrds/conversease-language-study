phrases:
  - phrase: مرحبًا
    meaning_id: Halo.
    usage_note: Gunakan sebagai sapaan umum yang netral.
  - phrase: أهلًا وسهلًا
    meaning_id: Selamat datang / halo juga.
    usage_note: Gunakan sebagai jawaban formal yang hangat.
  - phrase: كيف حالك؟
    meaning_id: Bagaimana kabarmu?
    usage_note: Gunakan untuk menanyakan kabar satu orang.
  - phrase: أنا بخير، شكرًا
    meaning_id: Saya baik, terima kasih.
    usage_note: Gunakan sebagai jawaban sopan yang sederhana.
  - phrase: أحسنت
    meaning_id: Bagus sekali.
    usage_note: Ucapan guru untuk jawaban yang baik.
