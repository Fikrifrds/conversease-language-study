scenario_key: arabic_greetings_and_salam
mode: lesson_practice_coach
level_code: A1
opening_line: مرحبًا. كيف حالك اليوم؟
learner_goal: Reply to a formal greeting and answer how you are in simple Arabic Fusha.
max_turns: 3
feedback_level:
  free: basic
  pro: detailed
turns:
  - coach: مرحبًا.
    hint: Jawab sapaan dengan أهلًا وسهلًا.
    sample_answer: أهلًا وسهلًا.
    focus: Reply to greeting
    expected_keywords:
      - أهلًا
      - وسهلًا
    indonesian_explanation: Untuk membalas sapaan formal, gunakan أهلًا وسهلًا.
  - coach: كيف حالك اليوم؟
    hint: Jawab kabar dengan أنا بخير، شكرًا.
    sample_answer: أنا بخير، شكرًا.
    focus: Answer how you are
    expected_keywords:
      - أنا
      - بخير
      - شكرًا
    indonesian_explanation: Jawaban pendek yang sopan adalah أنا بخير، شكرًا.
target_phrases:
  - مرحبًا
  - أهلًا وسهلًا
  - أنا بخير، شكرًا
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
