scenario_key: arabic_greetings_and_salam
mode: lesson_practice_coach
level_code: A1
opening_line: مرحبًا. كيف حالك اليوم؟
learner_goal: Latih menjawab sapaan formal dan pertanyaan kabar sederhana.
max_turns: 3
feedback_level:
  free: basic
  pro: detailed
turns:
  - coach: مرحبًا.
    hint: Jawab sapaan dengan أهلًا وسهلًا.
    sample_answer: أهلًا وسهلًا.
    focus: Menjawab sapaan
    expected_keywords:
      - أهلًا
      - وسهلًا
    indonesian_explanation: Untuk membalas sapaan formal, gunakan أهلًا وسهلًا.
  - coach: كيف حالك اليوم؟
    hint: Jawab kabar dengan أنا بخير، شكرًا.
    sample_answer: أنا بخير، شكرًا.
    focus: Menjawab pertanyaan kabar
    expected_keywords:
      - أنا
      - بخير
      - شكرًا
    indonesian_explanation: Jawaban pendek yang sopan adalah أنا بخير، شكرًا.
  - coach: والآن اسألني عن حالي.
    hint: Tanyakan kabar balik dengan كيف حالك؟
    sample_answer: كيف حالك؟
    focus: Bertanya kabar balik
    expected_keywords:
      - كيف
      - حالك
    indonesian_explanation: Setelah menjawab sapaan, tanyakan kabar balik agar percakapan terasa utuh.
target_phrases:
  - مرحبًا
  - أهلًا وسهلًا
  - كيف حالك؟
  - أنا بخير، شكرًا
rubric:
  speaking:
    minimum_score: 60
  relevance:
    minimum_score: 60
  grammar:
    minimum_score: 55
