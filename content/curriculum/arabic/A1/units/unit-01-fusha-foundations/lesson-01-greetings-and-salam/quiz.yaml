questions:
  - key: reply_to_salam
    prompt: Which phrase can reply to مرحبًا?
    options:
      - أهلًا وسهلًا
      - أنا بخير
      - كيف حالك؟
    correct_answer: أهلًا وسهلًا
  - key: how_are_you
    prompt: What does كيف حالك؟ mean?
    options:
      - Bagaimana kabarmu?
      - Siapa namamu?
      - Dari mana kamu?
    correct_answer: Bagaimana kabarmu?
