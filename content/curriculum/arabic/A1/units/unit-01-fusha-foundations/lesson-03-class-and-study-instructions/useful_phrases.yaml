phrases:
  - phrase: اِقرأْ
    meaning_id: Bacalah.
    usage_note: Instruksi guru untuk membaca.
  - phrase: اِستمعْ
    meaning_id: Dengarkan.
    usage_note: Instruksi guru sebelum mendengarkan.
  - phrase: أَعِدْ
    meaning_id: Ulangilah.
    usage_note: Gunakan untuk meminta seseorang mengulangi.
  - phrase: اُكتبْ
    meaning_id: Tulislah.
    usage_note: Instruksi guru untuk menulis.
  - phrase: نعم يا مُعَلِّم
    meaning_id: Baik, Pak Guru.
    usage_note: Respons sopan kepada guru laki-laki di kelas.
