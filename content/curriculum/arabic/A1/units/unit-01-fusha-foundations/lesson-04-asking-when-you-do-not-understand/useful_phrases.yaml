phrases:
  - phrase: لا أفهم
    meaning_id: Saya tidak paham.
    usage_note: Gunakan saat kamu belum paham.
  - phrase: أَعِدْ مِنْ فَضْلِكَ
    meaning_id: Ulangi, tolong.
    usage_note: Gunakan untuk meminta seseorang mengulangi dengan sopan.
  - phrase: بِبُطْءٍ مِنْ فَضْلِكَ
    meaning_id: Pelan-pelan, tolong.
    usage_note: Gunakan untuk meminta seseorang berbicara pelan.
  - phrase: ما معنى ...؟
    meaning_id: Apa makna ...?
    usage_note: Gunakan untuk bertanya makna kata atau frasa.
  - phrase: الكلمة
    meaning_id: Kata itu.
    usage_note: Kata kelas sederhana untuk bertanya makna.
