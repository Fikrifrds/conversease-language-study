prompts:
  - prompt: "Ucapkan dalam bahasa Arab: Saya tidak paham."
    target_response: لا أفهم
    acceptable_responses:
      - لا أفهم
  - prompt: Minta seseorang mengulangi.
    target_response: أَعِدْ مِنْ فَضْلِكَ
    acceptable_responses:
      - أَعِدْ مِنْ فَضْلِكَ
  - prompt: Tanyakan arti الكلمة.
    target_response: ما معنى الكلمة؟
    acceptable_responses:
      - ما معنى الكلمة؟
