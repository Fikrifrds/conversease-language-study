phrases:
  - phrase: مرحبًا
    meaning_id: Halo.
    usage_note: Start the conversation politely with a general greeting.
  - phrase: اسمي ...
    meaning_id: Nama saya ...
    usage_note: Introduce your name.
  - phrase: أنا من إندونيسيا
    meaning_id: Saya dari Indonesia.
    usage_note: Say your country.
  - phrase: لا أفهم
    meaning_id: Saya tidak paham.
    usage_note: Use when you are lost.
  - phrase: أعد من فضلك
    meaning_id: Ulangi, tolong.
    usage_note: Ask for repetition politely.
