vocabulary:
- word: مَرْحَبًا
  meaning_id: halo
  usage_note: 'Dipakai untuk arti "halo". Contoh: "مرحبًا"'
- word: اِسْمِي
  meaning_id: nama saya
  usage_note: 'Dipakai untuk arti "nama saya". Contoh: "اسمي ..."'
- word: إِنْدُونِيسِيَا
  meaning_id: Indonesia
  usage_note: 'Dipakai untuk arti "Indonesia". Contoh: "أنا من إندونيسيا"'
- word: أَفْهَمُ
  meaning_id: saya paham
  usage_note: 'Dipakai untuk arti "saya paham". Contoh: "لا أفهم"'
- word: أَيْنَ
  meaning_id: di mana
  usage_note: 'Dipakai untuk arti "di mana". Contoh: "مِنْ أَيْنَ أَنْتَ؟"'
- word: جُمْلَةٌ
  meaning_id: kalimat
  usage_note: 'Dipakai untuk arti "kalimat". Contoh: "اِقْرَأِ الْجُمْلَةَ."'
- word: مَرَّةٌ
  meaning_id: sekali/kali
  usage_note: 'Dipakai untuk arti "sekali/kali". Contoh: "حَسَنًا، أَقْرَؤُهَا مَرَّةً
    أُخْرَى."'
