prompts:
  - prompt: Sapa dan sebutkan namamu.
    target_response: مرحبًا. اسمي أحمد.
    acceptable_responses:
      - مرحبًا. اسمي أحمد.
      - أهلًا. اسمي أحمد.
  - prompt: Sebutkan negaramu.
    target_response: أنا من إندونيسيا.
    acceptable_responses:
      - أنا من إندونيسيا.
  - prompt: Katakan bahwa kamu belum paham dan minta pengulangan.
    target_response: لا أفهم. أَعِدْ مِنْ فَضْلِكَ.
    acceptable_responses:
      - لا أفهم. أَعِدْ مِنْ فَضْلِكَ.
      - عفوًا، لا أفهم. أَعِدْ مِنْ فَضْلِكَ.
