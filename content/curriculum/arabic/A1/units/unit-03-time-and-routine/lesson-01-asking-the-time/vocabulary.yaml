vocabulary:
- word: كَمْ
  meaning_id: berapa
  usage_note: 'Dipakai untuk arti "berapa". Contoh: "كَمِ السَّاعَةُ؟"'
- word: سَاعَةٌ
  meaning_id: jam
  usage_note: 'Dipakai untuk arti "jam". Contoh: "كَمِ السَّاعَةُ؟"'
- word: الثَّامِنَةُ
  meaning_id: jam delapan/kedelapan
  usage_note: 'Dipakai untuk arti "jam delapan/kedelapan". Contoh: "السَّاعَةُ الثَّامِنَةُ"'
- word: مَسَاءٌ
  meaning_id: sore/malam
  usage_note: 'Dipakai untuk arti "sore/malam". Contoh: "مَسَاءً"'
- word: الدَّرْسُ
  meaning_id: pelajaran
  usage_note: 'Dipakai untuk arti "pelajaran". Contoh: "مَتَى الدَّرْسُ؟"'
- word: التَّاسِعَةُ
  meaning_id: jam sembilan/kesembilan
  usage_note: 'Dipakai untuk arti "jam sembilan/kesembilan". Contoh: "الدَّرْسُ السَّاعَةَ
    التَّاسِعَةَ."'
- word: شُكْرًا
  meaning_id: terima kasih
  usage_note: 'Dipakai untuk arti "terima kasih". Contoh: "شُكْرًا."'
