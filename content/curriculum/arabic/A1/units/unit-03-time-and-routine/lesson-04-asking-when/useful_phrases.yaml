phrases:
- phrase: مَتَى الدَّرْسُ؟
  meaning_id: Kapan pelajarannya?
  usage_note: 'Gunakan saat ingin mengatakan: Kapan pelajarannya?'
- phrase: فِي الصَّبَاحِ
  meaning_id: Pada pagi hari
  usage_note: 'Gunakan saat ingin mengatakan: Pada pagi hari'
- phrase: بَعْدَ الظُّهْرِ
  meaning_id: Setelah tengah hari
  usage_note: 'Gunakan saat ingin mengatakan: Setelah tengah hari'
- phrase: قَبْلَ الدَّرْسِ
  meaning_id: Sebelum pelajaran
  usage_note: 'Gunakan saat ingin mengatakan: Sebelum pelajaran'
- phrase: بَعْدَ الدَّرْسِ
  meaning_id: Setelah pelajaran
  usage_note: 'Gunakan saat ingin mengatakan: Setelah pelajaran'
