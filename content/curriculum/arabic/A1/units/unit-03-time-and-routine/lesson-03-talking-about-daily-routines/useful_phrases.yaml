phrases:
- phrase: مَاذَا تَفْعَلُ صَبَاحًا؟
  meaning_id: Apa yang kamu lakukan pagi hari?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu lakukan pagi hari?'
- phrase: أقرأ
  meaning_id: Saya membaca.
  usage_note: 'Gunakan saat ingin mengatakan: Saya membaca.'
- phrase: أكتب
  meaning_id: Saya menulis.
  usage_note: 'Gunakan saat ingin mengatakan: Saya menulis.'
- phrase: أَدْرُسُ الْعَرَبِيَّةَ
  meaning_id: Saya belajar bahasa Arab.
  usage_note: 'Gunakan saat ingin mengatakan: Saya belajar bahasa Arab.'
- phrase: ثُمَّ أَعْمَلُ
  meaning_id: Lalu saya bekerja.
  usage_note: 'Gunakan saat ingin mengatakan: Lalu saya bekerja.'
