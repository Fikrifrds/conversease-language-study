phrases:
- phrase: أي يَوْمَ الْيَوْمُ؟
  meaning_id: Hari apa hari ini?
  usage_note: 'Gunakan saat ingin mengatakan: Hari apa hari ini?'
- phrase: الْيَوْمُ الْإِثْنَيْنِ
  meaning_id: Hari ini Senin.
  usage_note: 'Gunakan saat ingin mengatakan: Hari ini Senin.'
- phrase: غَدًا الثُّلَاثَاءُ
  meaning_id: Besok Selasa.
  usage_note: 'Gunakan saat ingin mengatakan: Besok Selasa.'
- phrase: عِنْدِي دَرْسٌ
  meaning_id: Saya punya pelajaran.
  usage_note: 'Gunakan saat ingin mengatakan: Saya punya pelajaran.'
- phrase: فِي يَوْمِ ...
  meaning_id: Pada hari ...
  usage_note: 'Gunakan saat ingin mengatakan: Pada hari ...'
