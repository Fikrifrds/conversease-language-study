phrases:
- phrase: سَأَصِفُ مُجْتَمَعِي بِاخْتِصَارٍ.
  meaning_id: Saya akan menjelaskan komunitas saya dengan singkat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: تُوجَدُ عَادَةٌ مُهِمَّةٌ عِنْدَنَا.
  meaning_id: Ada kebiasaan penting di tempat kami.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُرِيدُ أَنْ أَفْهَمَ عَادَتَكُمْ أَيْضًا.
  meaning_id: Saya ingin memahami kebiasaan kalian juga.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَا اخْتَلَفْنَا، نَسْأَلُ بِاحْتِرَامٍ.
  meaning_id: Jika kita berbeda, kita bertanya dengan hormat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَكَذَا يَصِيرُ التَّوَاصُلُ أَفْضَلَ.
  meaning_id: Dengan begitu komunikasi menjadi lebih baik.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
