scenario_key: arabic_b1_being_polite_with_differences
mode: lesson_practice_coach
level_code: B1
opening_line: لِنَتَدَرَّبْ عَلَى الِاخْتِلَافِ فِي طَرِيقَةِ التَّحِيَّةِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: being polite with differences, dengan jawaban
  yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: لِنَتَدَرَّبْ عَلَى الِاخْتِلَافِ فِي طَرِيقَةِ التَّحِيَّةِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
  hint: 'Jawab dengan kalimat terhubung memakai: أَفْهَمُ أَنَّ الْعَادَاتِ تَخْتَلِفُ.'
  sample_answer: أَفْهَمُ أَنَّ الْعَادَاتِ تَخْتَلِفُ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - أَفْهَمُ
  - أَنَّ
  - الْعَادَاتِ
  - تَخْتَلِفُ
  indonesian_explanation: Saya paham bahwa kebiasaan berbeda-beda.
- coach: 'استخدم الفكرة: لَا أُرِيدُ أَنْ أُسِيءَ الْفَهْمَ.'
  hint: 'Jawab dengan kalimat terhubung memakai: لَا أُرِيدُ أَنْ أُسِيءَ الْفَهْمَ.'
  sample_answer: لَا أُرِيدُ أَنْ أُسِيءَ الْفَهْمَ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - لَا
  - أُرِيدُ
  - أَنْ
  - أُسِيءَ
  indonesian_explanation: Saya tidak ingin salah paham.
- coach: 'استخدم الفكرة: مِنَ الْأَفْضَلِ أَنْ نَسْأَلَ بِأَدَبٍ.'
  hint: 'Jawab dengan kalimat terhubung memakai: مِنَ الْأَفْضَلِ أَنْ نَسْأَلَ بِأَدَبٍ.'
  sample_answer: مِنَ الْأَفْضَلِ أَنْ نَسْأَلَ بِأَدَبٍ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - مِنَ
  - الْأَفْضَلِ
  - أَنْ
  - نَسْأَلَ
  indonesian_explanation: Lebih baik bertanya dengan sopan.
target_phrases:
- أَفْهَمُ أَنَّ الْعَادَاتِ تَخْتَلِفُ.
- لَا أُرِيدُ أَنْ أُسِيءَ الْفَهْمَ.
- مِنَ الْأَفْضَلِ أَنْ نَسْأَلَ بِأَدَبٍ.
- أَحْتَرِمُ اخْتِلَافَ الطُّرُقِ.
- هَذَا يَجْعَلُ الْحِوَارَ أَسْهَلَ.
