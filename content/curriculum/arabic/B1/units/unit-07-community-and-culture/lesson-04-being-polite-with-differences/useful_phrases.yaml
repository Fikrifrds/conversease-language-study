phrases:
- phrase: أَفْهَمُ أَنَّ الْعَادَاتِ تَخْتَلِفُ.
  meaning_id: Saya paham bahwa kebiasaan berbeda-beda.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لَا أُرِيدُ أَنْ أُسِيءَ الْفَهْمَ.
  meaning_id: Saya tidak ingin salah paham.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: مِنَ الْأَفْضَلِ أَنْ نَسْأَلَ بِأَدَبٍ.
  meaning_id: Lebih baik bertanya dengan sopan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَحْتَرِمُ اخْتِلَافَ الطُّرُقِ.
  meaning_id: Saya menghormati perbedaan cara.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذَا يَجْعَلُ الْحِوَارَ أَسْهَلَ.
  meaning_id: Ini membuat dialog lebih mudah.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
