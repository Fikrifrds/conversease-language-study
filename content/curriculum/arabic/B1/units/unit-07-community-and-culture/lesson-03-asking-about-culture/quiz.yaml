questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Bolehkah saya bertanya tentang kebiasaan ini?"?
  options:
  - هَلْ يُمْكِنُ أَنْ أَسْأَلَ عَنْ هَذِهِ الْعَادَةِ؟
  - أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ.
  - هَلْ هَذَا أَمْرٌ رَسْمِيٌّ أَمْ عَادِيٌّ؟
  correct_answer: هَلْ يُمْكِنُ أَنْ أَسْأَلَ عَنْ هَذِهِ الْعَادَةِ؟
