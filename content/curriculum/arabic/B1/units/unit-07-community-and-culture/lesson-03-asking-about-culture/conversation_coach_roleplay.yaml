scenario_key: arabic_b1_asking_about_culture
mode: lesson_practice_coach
level_code: B1
opening_line: مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ الْمَوْقِفِ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: asking about culture,
  dengan jawaban yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ الْمَوْقِفِ؟
  hint: 'Jawab dengan kalimat terhubung memakai: هَلْ يُمْكِنُ أَنْ أَسْأَلَ عَنْ هَذِهِ الْعَادَةِ؟'
  sample_answer: هَلْ يُمْكِنُ أَنْ أَسْأَلَ عَنْ هَذِهِ الْعَادَةِ؟
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - هَلْ
  - يُمْكِنُ
  - أَنْ
  - أَسْأَلَ
  indonesian_explanation: Bolehkah saya bertanya tentang kebiasaan ini?
- coach: 'استخدم الفكرة: أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ.'
  hint: 'Jawab dengan kalimat terhubung memakai: أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ.'
  sample_answer: أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - أُرِيدُ
  - أَنْ
  - أَفْهَمَ
  - السِّبَاقَ
  indonesian_explanation: Saya ingin memahami konteks budaya.
- coach: 'استخدم الفكرة: هَلْ هَذَا أَمْرٌ رَسْمِيٌّ أَمْ عَادِيٌّ؟'
  hint: 'Jawab dengan kalimat terhubung memakai: هَلْ هَذَا أَمْرٌ رَسْمِيٌّ أَمْ عَادِيٌّ؟'
  sample_answer: هَلْ هَذَا أَمْرٌ رَسْمِيٌّ أَمْ عَادِيٌّ؟
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - هَلْ
  - هَذَا
  - أَمْرٌ
  - رَسْمِيٌّ
  indonesian_explanation: Apakah ini hal resmi atau biasa?
target_phrases:
- هَلْ يُمْكِنُ أَنْ أَسْأَلَ عَنْ هَذِهِ الْعَادَةِ؟
- أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ.
- هَلْ هَذَا أَمْرٌ رَسْمِيٌّ أَمْ عَادِيٌّ؟
- شُكْرًا عَلَى التَّوْضِيحِ.
- سَأَتَصَرَّفُ بِاحْتِرَامٍ.
