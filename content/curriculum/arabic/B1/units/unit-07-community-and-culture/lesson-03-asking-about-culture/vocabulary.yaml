vocabulary:
- word: عَادَةٌ
  meaning_id: kebiasaan
  usage_note: 'Dipakai untuk arti "kebiasaan". Contoh: "هَلْ يُمْكِنُ أَنْ أَسْأَلَ عَنْ هَذِهِ الْعَادَةِ؟"'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ."'
- word: أَفْهَمُ
  meaning_id: saya paham
  usage_note: 'Dipakai untuk arti "saya paham". Contoh: "أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ."'
- word: ثَقَافِيٌّ
  meaning_id: budaya
  usage_note: 'Dipakai untuk arti "budaya". Contoh: "أُرِيدُ أَنْ أَفْهَمَ السِّبَاقَ الثَّقَافِيَّ."'
- word: رَسْمِيٌّ
  meaning_id: resmi
  usage_note: 'Dipakai untuk arti "resmi". Contoh: "هَلْ هَذَا أَمْرٌ رَسْمِيٌّ أَمْ عَادِيٌّ؟"'
- word: شُكْرًا
  meaning_id: terima kasih
  usage_note: 'Dipakai untuk arti "terima kasih". Contoh: "شُكْرًا عَلَى التَّوْضِيحِ."'
- word: تَوْضِيحٌ
  meaning_id: klarifikasi/penjelasan
  usage_note: 'Dipakai untuk arti "klarifikasi/penjelasan". Contoh: "شُكْرًا عَلَى التَّوْضِيحِ."'
- word: فَهْمٌ
  meaning_id: pemahaman
  usage_note: 'Dipakai untuk arti "pemahaman". Contoh: "مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ
    الْمَوْقِفِ؟"'
