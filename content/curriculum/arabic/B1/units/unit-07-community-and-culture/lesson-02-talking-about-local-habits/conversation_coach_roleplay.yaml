scenario_key: arabic_b1_talking_about_local_habits
mode: lesson_practice_coach
level_code: B1
opening_line: مَا النُّقْطَةُ الْأَسَاسِيَّةُ فِي هَذَا الْمَوْضُوعِ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: talking about local
  habits, dengan jawaban yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا النُّقْطَةُ الْأَسَاسِيَّةُ فِي هَذَا الْمَوْضُوعِ؟
  hint: 'Jawab dengan kalimat terhubung memakai: مِنَ الْعَادَةِ أَنْ نُحَيِّيَ الْجِيرَانَ.'
  sample_answer: مِنَ الْعَادَةِ أَنْ نُحَيِّيَ الْجِيرَانَ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - مِنَ
  - الْعَادَةِ
  - أَنْ
  - نُحَيِّيَ
  indonesian_explanation: Biasanya kami menyapa tetangga.
- coach: 'استخدم الفكرة: فِي الصَّبَاحِ، يَكُونُ الشَّارِعُ نَشِيطًا.'
  hint: 'Jawab dengan kalimat terhubung memakai: فِي الصَّبَاحِ، يَكُونُ الشَّارِعُ نَشِيطًا.'
  sample_answer: فِي الصَّبَاحِ، يَكُونُ الشَّارِعُ نَشِيطًا.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - فِي
  - الصَّبَاحِ،
  - يَكُونُ
  - الشَّارِعُ
  indonesian_explanation: Pada pagi hari, jalan menjadi aktif.
- coach: 'استخدم الفكرة: بَعْضُ النَّاسِ يَفْضِّلُونَ الْهُدُوءَ.'
  hint: 'Jawab dengan kalimat terhubung memakai: بَعْضُ النَّاسِ يَفْضِّلُونَ الْهُدُوءَ.'
  sample_answer: بَعْضُ النَّاسِ يَفْضِّلُونَ الْهُدُوءَ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - بَعْضُ
  - النَّاسِ
  - يَفْضِّلُونَ
  - الْهُدُوءَ
  indonesian_explanation: Sebagian orang lebih suka ketenangan.
target_phrases:
- مِنَ الْعَادَةِ أَنْ نُحَيِّيَ الْجِيرَانَ.
