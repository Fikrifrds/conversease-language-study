questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Biasanya kami menyapa tetangga."?
  options:
  - مِنَ الْعَادَةِ أَنْ نُحَيِّيَ الْجِيرَانَ.
  - فِي الصَّبَاحِ، يَكُونُ الشَّارِعُ نَشِيطًا.
  - بَعْضُ النَّاسِ يَفْضِّلُونَ الْهُدُوءَ.
  correct_answer: مِنَ الْعَادَةِ أَنْ نُحَيِّيَ الْجِيرَانَ.
