phrases:
- phrase: مِنَ الْعَادَةِ أَنْ نُحَيِّيَ الْجِيرَانَ.
  meaning_id: Biasanya kami menyapa tetangga.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: فِي الصَّبَاحِ، يَكُونُ الشَّارِعُ نَشِيطًا.
  meaning_id: Pada pagi hari, jalan menjadi aktif.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: بَعْضُ النَّاسِ يَفْضِّلُونَ الْهُدُوءَ.
  meaning_id: Sebagian orang lebih suka ketenangan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذِهِ الْعَادَةُ تُسَاعِدُ عَلَى الِاحْتِرَامِ.
  meaning_id: Kebiasaan ini membantu penghormatan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَحْتَرِمُ هَذِهِ الطَّرِيقَةَ.
  meaning_id: Saya menghormati cara ini.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
