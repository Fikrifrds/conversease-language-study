vocabulary:
- word: عَادَةٌ
  meaning_id: kebiasaan
  usage_note: 'Dipakai untuk arti "kebiasaan". Contoh: "مِنَ الْعَادَةِ أَنْ نُحَيِّيَ الْجِيرَانَ."'
- word: الصَّبَاحُ
  meaning_id: pagi
  usage_note: 'Dipakai untuk arti "pagi". Contoh: "فِي الصَّبَاحِ، يَكُونُ الشَّارِعُ نَشِيطًا."'
- word: النَّاسُ
  meaning_id: orang-orang
  usage_note: 'Dipakai untuk arti "orang-orang". Contoh: "بَعْضُ النَّاسِ يَفْضِّلُونَ الْهُدُوءَ."'
- word: اِحْتِرَامٌ
  meaning_id: penghormatan
  usage_note: 'Dipakai untuk arti "penghormatan". Contoh: "هَذِهِ الْعَادَةُ تُسَاعِدُ عَلَى الِاحْتِرَامِ."'
