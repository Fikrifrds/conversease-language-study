phrases:
- phrase: أَعِيشُ فِي مُجْتَمَعٍ هَادِئٍ.
  meaning_id: Saya tinggal di komunitas yang tenang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: النَّاسُ يَتَعَاوَنُونَ فِي الْأَعْمَالِ الْيَوْمِيَّةِ.
  meaning_id: Orang-orang saling membantu dalam pekerjaan harian.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: تُوجَدُ عَادَاتٌ جَمِيلَةٌ فِي الْحَيِّ.
  meaning_id: Ada kebiasaan indah di lingkungan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَشْعُرُ بِالِانْتِمَاءِ إِلَى هَذَا الْمَكَانِ.
  meaning_id: Saya merasa memiliki tempat ini.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذَا يُؤَثِّرُ عَلَى حَيَاتِي.
  meaning_id: Ini memengaruhi hidup saya.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
