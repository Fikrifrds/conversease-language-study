vocabulary:
- word: وَاضِحٌ
  meaning_id: jelas
  usage_note: 'Dipakai untuk arti "jelas". Contoh: "هَدَفِي وَاضِحٌ لِهَذَا الشَّهْرِ."'
- word: أَكْبَرُ
  meaning_id: lebih besar
  usage_note: 'Dipakai untuk arti "lebih besar". Contoh: "أَكْبَرُ تَحَدٍّ هُوَ التَّرَدُّدُ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "أَكْبَرُ تَحَدٍّ هُوَ التَّرَدُّدُ."'
- word: تَرَدُّدٌ
  meaning_id: keraguan
  usage_note: 'Dipakai untuk arti "keraguan". Contoh: "أَكْبَرُ تَحَدٍّ هُوَ التَّرَدُّدُ."'
- word: نَتِيجَةٌ
  meaning_id: hasil
  usage_note: 'Dipakai untuk arti "hasil". Contoh: "سَأُرَاجِعُ النَّتِيجَةَ بَعْدَ أُسْبُوعٍ."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ تُنْهِي الْحِوَارَ بِخُطْوَةٍ تَالِيَةٍ؟"'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "مَا الْخُطْوَةُ التَّالِيَةُ بَعْدَ ذَلِكَ؟"'
