phrases:
- phrase: هَدَفِي وَاضِحٌ لِهَذَا الشَّهْرِ.
  meaning_id: Tujuan saya jelas untuk bulan ini.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: تَقَدَّمْتُ فِي الِاسْتِمَاعِ، وَلَكِنَّ الْكَلَامَ أَصْعَبُ.
  meaning_id: Saya maju dalam listening, tetapi speaking lebih sulit.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَكْبَرُ تَحَدٍّ هُوَ التَّرَدُّدُ.
  meaning_id: Tantangan terbesar adalah keraguan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأَتَدَرَّبُ عَلَى إِجَابَاتٍ قَصِيرَةٍ.
  meaning_id: Saya akan berlatih jawaban pendek.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُرَاجِعُ النَّتِيجَةَ بَعْدَ أُسْبُوعٍ.
  meaning_id: Saya akan meninjau hasilnya setelah seminggu.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
