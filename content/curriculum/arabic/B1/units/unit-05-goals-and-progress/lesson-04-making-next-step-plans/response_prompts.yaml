prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Langkah berikutnya adalah latihan harian.'
  target_response: الْخُطْوَةُ التَّالِيَةُ هِيَ التَّدْرِيبُ الْيَوْمِيُّ.
  acceptable_responses:
  - الْخُطْوَةُ التَّالِيَةُ هِيَ التَّدْرِيبُ الْيَوْمِيُّ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan meninjau lima frasa setiap hari.'
  target_response: سَأُرَاجِعُ خَمْسَ عِبَارَاتٍ كُلَّ يَوْمٍ.
  acceptable_responses:
  - سَأُرَاجِعُ خَمْسَ عِبَارَاتٍ كُلَّ يَوْمٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan merekam suara saya satu kali.'
  target_response: سَأُسَجِّلُ صَوْتِي مَرَّةً وَاحِدَةً.
  acceptable_responses:
  - سَأُسَجِّلُ صَوْتِي مَرَّةً وَاحِدَةً.
