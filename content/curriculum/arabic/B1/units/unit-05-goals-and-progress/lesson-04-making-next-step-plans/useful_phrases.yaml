phrases:
- phrase: الْخُطْوَةُ التَّالِيَةُ هِيَ التَّدْرِيبُ الْيَوْمِيُّ.
  meaning_id: Langkah berikutnya adalah latihan harian.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُرَاجِعُ خَمْسَ عِبَارَاتٍ كُلَّ يَوْمٍ.
  meaning_id: Saya akan meninjau lima frasa setiap hari.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُسَجِّلُ صَوْتِي مَرَّةً وَاحِدَةً.
  meaning_id: Saya akan merekam suara saya satu kali.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: بَعْدَ أُسْبُوعٍ، سَأُقَيِّمُ النَّتِيجَةَ.
  meaning_id: Setelah seminggu, saya akan menilai hasilnya.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَا احْتَجْتُ، سَأُغَيِّرُ الْخُطَّةَ.
  meaning_id: Jika perlu, saya akan mengubah rencana.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
