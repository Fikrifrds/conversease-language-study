vocabulary:
- word: أَكْبَرُ
  meaning_id: lebih besar
  usage_note: 'Dipakai untuk arti "lebih besar". Contoh: "أَكْبَرُ تَحَدٍّ هُوَ السُّرْعَةُ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "أَكْبَرُ تَحَدٍّ هُوَ السُّرْعَةُ."'
- word: أَحْتَاجُ
  meaning_id: saya butuh
  usage_note: 'Dipakai untuk arti "saya butuh". Contoh: "أَحْتَاجُ إِلَى وَقْتٍ لِلتَّفْكِيرِ."'
- word: وَقْتٌ
  meaning_id: waktu
  usage_note: 'Dipakai untuk arti "waktu". Contoh: "أَحْتَاجُ إِلَى وَقْتٍ لِلتَّفْكِيرِ."'
- word: الْكَلِمَاتُ
  meaning_id: kata-kata
  usage_note: 'Dipakai untuk arti "kata-kata". Contoh: "أَحْيَانًا أَنْسَى الْكَلِمَاتِ الْمُنَاسِبَةَ."'
- word: مُنَاسِبَةٌ
  meaning_id: cocok/sesuai
  usage_note: 'Dipakai untuk arti "cocok/sesuai". Contoh: "أَحْيَانًا أَنْسَى الْكَلِمَاتِ الْمُنَاسِبَةَ."'
- word: طَلَاقَةٌ
  meaning_id: kelancaran
  usage_note: 'Dipakai untuk arti "kelancaran". Contoh: "هَذَا يُسَاعِدُنِي عَلَى الطَّلَاقَةِ."'
- word: فَهْمٌ
  meaning_id: pemahaman
  usage_note: 'Dipakai untuk arti "pemahaman". Contoh: "مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ
    الْمَوْقِفِ؟"'
