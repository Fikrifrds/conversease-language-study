phrases:
- phrase: أَكْبَرُ تَحَدٍّ هُوَ السُّرْعَةُ.
  meaning_id: Tantangan terbesar adalah kecepatan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَحْتَاجُ إِلَى وَقْتٍ لِلتَّفْكِيرِ.
  meaning_id: Saya butuh waktu untuk berpikir.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَحْيَانًا أَنْسَى الْكَلِمَاتِ الْمُنَاسِبَةَ.
  meaning_id: Kadang saya lupa kata yang cocok.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُقَلِّلُ الْجُمَلَ الطَّوِيلَةَ.
  meaning_id: Saya akan mengurangi kalimat panjang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذَا يُسَاعِدُنِي عَلَى الطَّلَاقَةِ.
  meaning_id: Ini membantu saya pada kelancaran.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
