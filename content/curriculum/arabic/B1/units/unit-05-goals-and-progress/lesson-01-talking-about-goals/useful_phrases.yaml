phrases:
- phrase: هَدَفِي هُوَ تَحْسِينُ الْمُحَادَثَةِ.
  meaning_id: Tujuan saya adalah memperbaiki percakapan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُرِيدُ أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
  meaning_id: Saya ingin berbicara dengan lebih percaya diri.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لِذَلِكَ أَتَدَرَّبُ كُلَّ يَوْمٍ.
  meaning_id: Karena itu saya berlatih setiap hari.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَقِيسُ التَّقَدُّمَ بِالْمُرَاجَعَةِ.
  meaning_id: Saya mengukur kemajuan dengan peninjauan ulang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذَا الْهَدَفُ مُهِمٌّ لِي.
  meaning_id: Tujuan ini penting bagi saya.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
