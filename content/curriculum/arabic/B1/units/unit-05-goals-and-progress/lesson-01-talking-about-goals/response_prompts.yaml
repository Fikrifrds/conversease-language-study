prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Tujuan saya adalah memperbaiki percakapan.'
  target_response: هَدَفِي هُوَ تَحْسِينُ الْمُحَادَثَةِ.
  acceptable_responses:
  - هَدَفِي هُوَ تَحْسِينُ الْمُحَادَثَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya ingin berbicara dengan lebih percaya diri.'
  target_response: أُرِيدُ أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
  acceptable_responses:
  - أُرِيدُ أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Karena itu saya berlatih setiap hari.'
  target_response: لِذَلِكَ أَتَدَرَّبُ كُلَّ يَوْمٍ.
  acceptable_responses:
  - لِذَلِكَ أَتَدَرَّبُ كُلَّ يَوْمٍ.
