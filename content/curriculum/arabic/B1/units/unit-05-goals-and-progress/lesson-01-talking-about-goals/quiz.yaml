questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Tujuan saya adalah memperbaiki percakapan."?
  options:
  - هَدَفِي هُوَ تَحْسِينُ الْمُحَادَثَةِ.
  - أُرِيدُ أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
  - لِذَلِكَ أَتَدَرَّبُ كُلَّ يَوْمٍ.
  correct_answer: هَدَفِي هُوَ تَحْسِينُ الْمُحَادَثَةِ.
