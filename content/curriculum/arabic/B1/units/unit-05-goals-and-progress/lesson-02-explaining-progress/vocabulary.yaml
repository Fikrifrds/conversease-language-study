vocabulary:
- word: قَلِيلًا
  meaning_id: sedikit
  usage_note: 'Dipakai untuk arti "sedikit". Contoh: "تَقَدَّمْتُ قَلِيلًا هَذَا الشَّهْرَ."'
- word: أَفْهَمُ
  meaning_id: saya paham
  usage_note: 'Dipakai untuk arti "saya paham". Contoh: "أَصْبَحْتُ أَفْهَمُ الْحِوَارَ أَسْرَعَ."'
- word: تَحَسُّنٌ
  meaning_id: perbaikan
  usage_note: 'Dipakai untuk arti "perbaikan". Contoh: "لَكِنَّ التَّحَسُّنَ وَاضِحٌ."'
- word: وَاضِحٌ
  meaning_id: jelas
  usage_note: 'Dipakai untuk arti "jelas". Contoh: "لَكِنَّ التَّحَسُّنَ وَاضِحٌ."'
- word: تَدْرِيبٌ
  meaning_id: coaching/latihan
  usage_note: 'Dipakai untuk arti "coaching/latihan". Contoh: "سَأُوَاصِلُ التَّدْرِيبَ."'
