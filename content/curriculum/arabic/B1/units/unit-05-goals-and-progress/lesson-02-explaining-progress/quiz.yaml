  prompt: Frasa mana yang berarti "Saya sedikit maju bulan ini."?
  options:
  - تَقَدَّمْتُ قَلِيلًا هَذَا الشَّهْرَ.
  - أَصْبَحْتُ أَفْهَمُ الْحِوَارَ أَسْرَعَ.
  - مَا زِلْتُ أُخْطِئُ فِي بَعْضِ الْجُمَلِ.
  correct_answer: تَقَدَّمْتُ قَلِيلًا هَذَا الشَّهْرَ.
