phrases:
- phrase: أَوَّلًا، وَصَلْتُ إِلَى الْمَكَانِ مُبَكِّرًا.
  meaning_id: Pertama, saya tiba di tempat itu lebih awal.
  usage_note: Memulai urutan kejadian.
- phrase: ثُمَّ انْتَظَرْتُ صَدِيقِي قَلِيلًا.
  meaning_id: Lalu saya menunggu teman saya sebentar.
  usage_note: Menyebut kejadian berikutnya.
- phrase: بَعْدَ ذَلِكَ، تَحَدَّثْنَا عَنِ الْخُطَّةِ.
  meaning_id: Setelah itu, kami berbicara tentang rencana.
  usage_note: Menyambung urutan.
- phrase: وَأَخِيرًا، اتَّفَقْنَا عَلَى الْخُطْوَةِ التَّالِيَةِ.
  meaning_id: Akhirnya, kami sepakat pada langkah berikutnya.
  usage_note: Menutup urutan.
- phrase: هَكَذَا صَارَتِ الْقِصَّةُ وَاضِحَةً.
  meaning_id: Dengan begitu ceritanya menjadi jelas.
  usage_note: Menjelaskan hasil cerita.
