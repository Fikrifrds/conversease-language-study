phrases:
- phrase: فِي الْأُسْبُوعِ الْمَاضِي، كُنْتُ فِي الْمَكْتَبَةِ.
  meaning_id: Minggu lalu, saya berada di perpustakaan.
  usage_note: Membuka cerita dengan waktu dan tempat.
- phrase: كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.
  meaning_id: Saya bersama teman saya pada waktu itu.
  usage_note: Menyebut siapa yang ikut.
- phrase: كَانَ الْمَكَانُ هَادِئًا وَمُنَاسِبًا.
  meaning_id: Tempatnya tenang dan cocok.
  usage_note: Memberi suasana cerita.
- phrase: هَذَا يُسَاعِدُ عَلَى فَهْمِ الْقِصَّةِ.
  meaning_id: Ini membantu memahami ceritanya.
  usage_note: Menjelaskan fungsi konteks.
- phrase: بَعْدَ ذَلِكَ، بَدَأَ الْحَدَثُ الْأَسَاسِيُّ.
  meaning_id: Setelah itu, kejadian utamanya dimulai.
  usage_note: Masuk ke urutan cerita.
