questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Minggu lalu, saya berada di perpustakaan."?
  options:
  - فِي الْأُسْبُوعِ الْمَاضِي، كُنْتُ فِي الْمَكْتَبَةِ.
  - كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.
  - كَانَ الْمَكَانُ هَادِئًا وَمُنَاسِبًا.
  correct_answer: فِي الْأُسْبُوعِ الْمَاضِي، كُنْتُ فِي الْمَكْتَبَةِ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Saya bersama teman saya pada waktu itu."?
  options:
  - كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.
  - فِي الْأُسْبُوعِ الْمَاضِي، كُنْتُ فِي الْمَكْتَبَةِ.
  - كَانَ الْمَكَانُ هَادِئًا وَمُنَاسِبًا.
  correct_answer: كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.
