scenario_key: arabic_b1_setting_the_scene
mode: lesson_practice_coach
level_code: B1
opening_line: كَيْفَ تَبْدَأُ قِصَّةً شَخْصِيَّةً؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu membuka cerita pendek dengan waktu, tempat,
  dan orang yang terlibat sebelum masuk ke kejadian utama.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تَبْدَأُ قِصَّةً شَخْصِيَّةً؟
  hint: 'Jawab dengan kalimat terhubung memakai: فِي الْأُسْبُوعِ الْمَاضِي، كُنْتُ فِي الْمَكْتَبَةِ.'
  sample_answer: فِي الْأُسْبُوعِ الْمَاضِي، كُنْتُ فِي الْمَكْتَبَةِ.
  focus: Membuka cerita dengan waktu dan tempat.
  expected_keywords:
  - فِي
  - الْأُسْبُوعِ
  - الْمَاضِي،
  - كُنْتُ
  indonesian_explanation: Minggu lalu, saya berada di perpustakaan.
- coach: 'استخدم الفكرة: كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.'
  hint: 'Jawab dengan kalimat terhubung memakai: كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.'
  sample_answer: كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.
  focus: Menyebut siapa yang ikut.
  expected_keywords:
  - كُنْتُ
  - مَعَ
  - صَدِيقِي
  - فِي
  indonesian_explanation: Saya bersama teman saya pada waktu itu.
- coach: 'استخدم الفكرة: كَانَ الْمَكَانُ هَادِئًا وَمُنَاسِبًا.'
  hint: 'Jawab dengan kalimat terhubung memakai: كَانَ الْمَكَانُ هَادِئًا وَمُنَاسِبًا.'
  sample_answer: كَانَ الْمَكَانُ هَادِئًا وَمُنَاسِبًا.
  focus: Memberi suasana cerita.
  expected_keywords:
  - كَانَ
  - الْمَكَانُ
  - هَادِئًا
  - وَمُنَاسِبًا
  indonesian_explanation: Tempatnya tenang dan cocok.
target_phrases:
- فِي الْأُسْبُوعِ الْمَاضِي، كُنْتُ فِي الْمَكْتَبَةِ.
- كُنْتُ مَعَ صَدِيقِي فِي ذَلِكَ الْوَقْتِ.
- كَانَ الْمَكَانُ هَادِئًا وَمُنَاسِبًا.
- هَذَا يُسَاعِدُ عَلَى فَهْمِ الْقِصَّةِ.
- بَعْدَ ذَلِكَ، بَدَأَ الْحَدَثُ الْأَسَاسِيُّ.
