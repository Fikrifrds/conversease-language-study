phrases:
- phrase: شَعَرْتُ بِالْقَلَقِ فِي الْبِدَايَةِ.
  meaning_id: Saya merasa khawatir di awal.
  usage_note: Menyebut perasaan awal.
- phrase: لِأَنَّ الْمَوْقِفَ كَانَ جَدِيدًا عَلَيَّ.
  meaning_id: Karena situasinya baru bagi saya.
  usage_note: Memberi alasan perasaan.
- phrase: بَعْدَ قَلِيلٍ، شَعَرْتُ بِالرَّاحَةِ.
  meaning_id: Setelah sebentar, saya merasa nyaman.
  usage_note: Menunjukkan perubahan perasaan.
- phrase: هَذَا التَّغْيِيرُ كَانَ مُهِمًّا فِي الْقِصَّةِ.
  meaning_id: Perubahan ini penting dalam cerita.
  usage_note: Menjelaskan makna perasaan.
- phrase: فِي النِّهَايَةِ، كُنْتُ سَعِيدًا بِالنَّتِيجَةِ.
  meaning_id: Pada akhirnya, saya senang dengan hasilnya.
  usage_note: Menutup cerita dengan perasaan akhir.
