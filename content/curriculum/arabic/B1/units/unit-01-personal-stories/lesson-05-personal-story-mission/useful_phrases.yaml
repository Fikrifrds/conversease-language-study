phrases:
- phrase: فِي الْبِدَايَةِ، كَانَ الْمَوْقِفُ غَيْرَ وَاضِحٍ.
  meaning_id: Di awal, situasinya belum jelas.
  usage_note: Membuka cerita dengan masalah ringan.
- phrase: ثُمَّ سَأَلْتُ صَدِيقِي عَنْ التَّفَاصِيلِ.
  meaning_id: Lalu saya bertanya kepada teman saya tentang detailnya.
  usage_note: Menyebut tindakan.
- phrase: بَعْدَ ذَلِكَ، فَهِمْتُ السَّبَبَ.
  meaning_id: Setelah itu, saya memahami alasannya.
  usage_note: Menunjukkan perkembangan cerita.
- phrase: شَعَرْتُ بِالرَّاحَةِ لِأَنَّ الْأَمْرَ صَارَ وَاضِحًا.
  meaning_id: Saya merasa nyaman karena masalahnya menjadi jelas.
  usage_note: Menghubungkan perasaan dan alasan.
- phrase: فِي النِّهَايَةِ، تَعَلَّمْتُ دَرْسًا مُفِيدًا.
  meaning_id: Pada akhirnya, saya belajar pelajaran yang bermanfaat.
  usage_note: Menutup cerita.
