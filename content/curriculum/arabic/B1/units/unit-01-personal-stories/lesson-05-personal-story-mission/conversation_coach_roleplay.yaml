scenario_key: arabic_b1_personal_story_mission
mode: lesson_practice_coach
level_code: B1
opening_line: لِنَتَدَرَّبْ عَلَى الْمَدِينَةِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu menggabungkan konteks, urutan kejadian, perasaan, dan pertanyaan
  lanjutan dalam satu cerita.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: لِنَتَدَرَّبْ عَلَى الْمَدِينَةِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
  hint: 'Jawab dengan kalimat terhubung memakai: فِي الْبِدَايَةِ، كَانَ الْمَوْقِفُ غَيْرَ وَاضِحٍ.'
  sample_answer: فِي الْبِدَايَةِ، كَانَ الْمَوْقِفُ غَيْرَ وَاضِحٍ.
  focus: Membuka cerita dengan masalah ringan.
  expected_keywords:
  - فِي
  - الْبِدَايَةِ،
  - كَانَ
  - الْمَوْقِفُ
  indonesian_explanation: Di awal, situasinya belum jelas.
- coach: 'استخدم الفكرة: ثُمَّ سَأَلْتُ صَدِيقِي عَنْ التَّفَاصِيلِ.'
  hint: 'Jawab dengan kalimat terhubung memakai: ثُمَّ سَأَلْتُ صَدِيقِي عَنْ التَّفَاصِيلِ.'
  sample_answer: ثُمَّ سَأَلْتُ صَدِيقِي عَنْ التَّفَاصِيلِ.
  focus: Menyebut tindakan.
  expected_keywords:
  - ثُمَّ
  - سَأَلْتُ
  - صَدِيقِي
  - عَنْ
  indonesian_explanation: Lalu saya bertanya kepada teman saya tentang detailnya.
- coach: 'استخدم الفكرة: بَعْدَ ذَلِكَ، فَهِمْتُ السَّبَبَ.'
  hint: 'Jawab dengan kalimat terhubung memakai: بَعْدَ ذَلِكَ، فَهِمْتُ السَّبَبَ.'
  sample_answer: بَعْدَ ذَلِكَ، فَهِمْتُ السَّبَبَ.
  focus: Menunjukkan perkembangan cerita.
  expected_keywords:
  - بَعْدَ
  - ذَلِكَ،
  - فَهِمْتُ
  - السَّبَبَ
  indonesian_explanation: Setelah itu, saya memahami alasannya.
target_phrases:
- فِي الْبِدَايَةِ، كَانَ الْمَوْقِفُ غَيْرَ وَاضِحٍ.
- ثُمَّ سَأَلْتُ صَدِيقِي عَنْ التَّفَاصِيلِ.
- بَعْدَ ذَلِكَ، فَهِمْتُ السَّبَبَ.
- شَعَرْتُ بِالرَّاحَةِ لِأَنَّ الْأَمْرَ صَارَ وَاضِحًا.
- فِي النِّهَايَةِ، تَعَلَّمْتُ دَرْسًا مُفِيدًا.
rubric:
  speaking:
    minimum_score: 70
  relevance:
