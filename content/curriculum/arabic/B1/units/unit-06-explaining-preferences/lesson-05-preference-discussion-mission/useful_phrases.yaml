phrases:
- phrase: سَأُقَارِنُ بَيْنَ خِيَارَيْنِ.
  meaning_id: Saya akan membandingkan dua pilihan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُفَضِّلُ الْخِيَارَ الْأَوَّلَ لِأَنَّهُ أَسْهَلُ.
  meaning_id: Saya lebih memilih pilihan pertama karena lebih mudah.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لَكِنَّ الْخِيَارَ الثَّانِي أَقْوَى.
  meaning_id: Tetapi pilihan kedua lebih kuat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: نَحْتَاجُ إِلَى تَوَازُنٍ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  meaning_id: Kita perlu keseimbangan antara kecepatan dan kualitas.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَنْ، نَخْتَارُ الْحَلَّ الْمُتَوَازِنَ.
  meaning_id: Kalau begitu, kita pilih solusi yang seimbang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
