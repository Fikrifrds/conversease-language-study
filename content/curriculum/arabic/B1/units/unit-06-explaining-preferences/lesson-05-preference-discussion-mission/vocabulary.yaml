vocabulary:
- word: أُفَضِّلُ
  meaning_id: saya lebih memilih
  usage_note: 'Dipakai untuk arti "saya lebih memilih". Contoh: "أُفَضِّلُ الْخِيَارَ الْأَوَّلَ لِأَنَّهُ
    أَسْهَلُ."'
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "أُفَضِّلُ الْخِيَارَ الْأَوَّلَ لِأَنَّهُ أَسْهَلُ."'
- word: تَوَازُنٌ
  meaning_id: keseimbangan
  usage_note: 'Dipakai untuk arti "keseimbangan". Contoh: "نَحْتَاجُ إِلَى تَوَازُنٍ بَيْنَ السُّرْعَةِ
    وَالْجَوْدَةِ."'
- word: حَلٌّ
  meaning_id: solusi
  usage_note: 'Dipakai untuk arti "solusi". Contoh: "إِذَنْ، نَخْتَارُ الْحَلَّ الْمُتَوَازِنَ."'
- word: مُتَوَازِنٌ
  meaning_id: seimbang
  usage_note: 'Dipakai untuk arti "seimbang". Contoh: "إِذَنْ، نَخْتَارُ الْحَلَّ الْمُتَوَازِنَ."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ تُنْهِي الْحِوَارَ بِخُطْوَةٍ تَالِيَةٍ؟"'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "مَا الْخُطْوَةُ التَّالِيَةُ بَعْدَ ذَلِكَ؟"'
