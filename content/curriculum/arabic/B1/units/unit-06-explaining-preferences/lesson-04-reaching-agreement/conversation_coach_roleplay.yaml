scenario_key: arabic_b1_reaching_agreement
mode: lesson_practice_coach
level_code: B1
opening_line: مَا النُّقْطَةُ الْأَسَاسِيَّةُ فِي هَذَا الْمَوْضُوعِ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: reaching agreement,
  dengan jawaban yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا النُّقْطَةُ الْأَسَاسِيَّةُ فِي هَذَا الْمَوْضُوعِ؟
  hint: 'Jawab dengan kalimat terhubung memakai: أَتَّفِقُ مَعَكِ فِي النُّقْطَةِ الْأُولَى.'
  sample_answer: أَتَّفِقُ مَعَكِ فِي النُّقْطَةِ الْأُولَى.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - أَتَّفِقُ
  - مَعَكِ
  - فِي
  - النُّقْطَةِ
  indonesian_explanation: Saya setuju denganmu pada poin pertama.
- coach: 'استخدم الفكرة: لَكِنَّنِي أَرَى خِيَارًا آخَرَ.'
  hint: 'Jawab dengan kalimat terhubung memakai: لَكِنَّنِي أَرَى خِيَارًا آخَرَ.'
  sample_answer: لَكِنَّنِي أَرَى خِيَارًا آخَرَ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - لَكِنَّنِي
  - أَرَى
  - خِيَارًا
  - آخَرَ
  indonesian_explanation: Tetapi saya melihat pilihan lain.
- coach: 'استخدم الفكرة: مُمْكِنٌ أَنْ نَجْمَعَ بَيْنَ الْفِكْرَتَيْنِ.'
  hint: 'Jawab dengan kalimat terhubung memakai: مُمْكِنٌ أَنْ نَجْمَعَ بَيْنَ الْفِكْرَتَيْنِ.'
  sample_answer: مُمْكِنٌ أَنْ نَجْمَعَ بَيْنَ الْفِكْرَتَيْنِ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - مُمْكِنٌ
  - أَنْ
  - نَجْمَعَ
  - بَيْنَ
  indonesian_explanation: Mungkin kita bisa menggabungkan dua ide.
target_phrases:
- أَتَّفِقُ مَعَكِ فِي النُّقْطَةِ الْأُولَى.
- لَكِنَّنِي أَرَى خِيَارًا آخَرَ.
- مُمْكِنٌ أَنْ نَجْمَعَ بَيْنَ الْفِكْرَتَيْنِ.
- هَذَا حَلٌّ مُتَوَازِنٌ.
- إِذَنْ، نَتَّفِقُ عَلَى هَذِهِ الْخُطَّةِ.
