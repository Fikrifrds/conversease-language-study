questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya setuju denganmu pada poin pertama."?
  options:
  - أَتَّفِقُ مَعَكِ فِي النُّقْطَةِ الْأُولَى.
  - لَكِنَّنِي أَرَى خِيَارًا آخَرَ.
  - مُمْكِنٌ أَنْ نَجْمَعَ بَيْنَ الْفِكْرَتَيْنِ.
  correct_answer: أَتَّفِقُ مَعَكِ فِي النُّقْطَةِ الْأُولَى.
