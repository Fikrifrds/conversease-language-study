phrases:
- phrase: أُفَضِّلُ هَذَا الْخِيَارَ لِأَنَّهُ أَوْضَحُ.
  meaning_id: Saya lebih memilih pilihan ini karena lebih jelas.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: يُنَاسِبُ هَدَفَنَا أَكْثَرَ.
  meaning_id: Ini lebih cocok dengan tujuan kita.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: رَغْمَ أَنَّهُ أَغْلَى قَلِيلًا.
  meaning_id: Meskipun sedikit lebih mahal.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لَكِنَّهُ يُوَفِّرُ وَقْتًا.
  meaning_id: Tetapi ini menghemat waktu.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لِذَلِكَ أَرَاهُ أَفْضَلَ.
  meaning_id: Karena itu saya melihatnya lebih baik.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
