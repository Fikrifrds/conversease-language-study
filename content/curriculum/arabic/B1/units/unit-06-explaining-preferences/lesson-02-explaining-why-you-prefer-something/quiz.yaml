questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya lebih memilih pilihan ini karena lebih jelas."?
  options:
  - أُفَضِّلُ هَذَا الْخِيَارَ لِأَنَّهُ أَوْضَحُ.
  - يُنَاسِبُ هَدَفَنَا أَكْثَرَ.
  - رَغْمَ أَنَّهُ أَغْلَى قَلِيلًا.
  correct_answer: أُفَضِّلُ هَذَا الْخِيَارَ لِأَنَّهُ أَوْضَحُ.
- key: phrase_2
