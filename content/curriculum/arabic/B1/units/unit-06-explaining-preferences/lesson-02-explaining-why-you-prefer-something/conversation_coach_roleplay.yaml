scenario_key: arabic_b1_explaining_why_you_prefer_something
mode: lesson_practice_coach
level_code: B1
opening_line: مَا أَوَّلُ تَفْصِيلٍ يَحْتَاجُ إِلَى شَرْحٍ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: explaining why you
  prefer something, dengan jawaban yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا أَوَّلُ تَفْصِيلٍ يَحْتَاجُ إِلَى شَرْحٍ؟
  hint: 'Jawab dengan kalimat terhubung memakai: أُفَضِّلُ هَذَا الْخِيَارَ لِأَنَّهُ أَوْضَحُ.'
  sample_answer: أُفَضِّلُ هَذَا الْخِيَارَ لِأَنَّهُ أَوْضَحُ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - أُفَضِّلُ
  - هَذَا
  - الْخِيَارَ
  - لِأَنَّهُ
  indonesian_explanation: Saya lebih memilih pilihan ini karena lebih jelas.
- coach: 'استخدم الفكرة: يُنَاسِبُ هَدَفَنَا أَكْثَرَ.'
  hint: 'Jawab dengan kalimat terhubung memakai: يُنَاسِبُ هَدَفَنَا أَكْثَرَ.'
  sample_answer: يُنَاسِبُ هَدَفَنَا أَكْثَرَ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - يُنَاسِبُ
  - هَدَفَنَا
  - أَكْثَرَ
  indonesian_explanation: Ini lebih cocok dengan tujuan kita.
- coach: 'استخدم الفكرة: رَغْمَ أَنَّهُ أَغْلَى قَلِيلًا.'
  hint: 'Jawab dengan kalimat terhubung memakai: رَغْمَ أَنَّهُ أَغْلَى قَلِيلًا.'
  sample_answer: رَغْمَ أَنَّهُ أَغْلَى قَلِيلًا.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - رَغْمَ
  - أَنَّهُ
  - أَغْلَى
  - قَلِيلًا
  indonesian_explanation: Meskipun sedikit lebih mahal.
target_phrases:
- أُفَضِّلُ هَذَا الْخِيَارَ لِأَنَّهُ أَوْضَحُ.
- يُنَاسِبُ هَدَفَنَا أَكْثَرَ.
- رَغْمَ أَنَّهُ أَغْلَى قَلِيلًا.
- لَكِنَّهُ يُوَفِّرُ وَقْتًا.
- لِذَلِكَ أَرَاهُ أَفْضَلَ.
