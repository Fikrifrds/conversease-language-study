phrases:
- phrase: مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟
  meaning_id: Apa kelebihan pilihan ini?
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟
  meaning_id: Dan apa kemungkinan kekurangannya?
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَلِ الْمَزَايَا أَكْثَرُ مِنَ الْمَشَاكِلِ؟
  meaning_id: Apakah kelebihannya lebih banyak dari masalahnya?
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُرِيدُ أَنْ أَفْهَمَ الصُّورَةَ كَامِلَةً.
  meaning_id: Saya ingin memahami gambaran lengkap.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: بَعْدَ ذَلِكَ، نَقْرِّرُ.
  meaning_id: Setelah itu, kita putuskan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
