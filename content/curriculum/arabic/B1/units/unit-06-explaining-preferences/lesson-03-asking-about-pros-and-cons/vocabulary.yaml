vocabulary:
- word: إِيجَابِيَّاتٌ
  meaning_id: kelebihan
  usage_note: 'Dipakai untuk arti "kelebihan". Contoh: "مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟"'
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟"'
- word: سَلْبِيَّاتٌ
  meaning_id: kekurangan
  usage_note: 'Dipakai untuk arti "kekurangan". Contoh: "وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟"'
- word: مَزَايَا
  meaning_id: kelebihan
  usage_note: 'Dipakai untuk arti "kelebihan". Contoh: "هَلِ الْمَزَايَا أَكْثَرُ مِنَ الْمَشَاكِلِ؟"'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ أَنْ أَفْهَمَ الصُّورَةَ كَامِلَةً."'
- word: أَفْهَمُ
  meaning_id: saya paham
  usage_note: 'Dipakai untuk arti "saya paham". Contoh: "أُرِيدُ أَنْ أَفْهَمَ الصُّورَةَ كَامِلَةً."'
- word: فَهْمٌ
  meaning_id: pemahaman
  usage_note: 'Dipakai untuk arti "pemahaman". Contoh: "مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ
    الْمَوْقِفِ؟"'
- word: مَوْقِفٌ
  meaning_id: posisi/sikap
  usage_note: 'Dipakai untuk arti "posisi/sikap". Contoh: "مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ
    الْمَوْقِفِ؟"'
