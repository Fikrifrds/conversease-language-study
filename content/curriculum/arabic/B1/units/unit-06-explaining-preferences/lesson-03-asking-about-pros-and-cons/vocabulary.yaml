vocabulary:
- word: إِيجَابِيَّاتٌ
  meaning_id: kelebihan
  usage_note: 'Dipakai untuk arti "kelebihan". Contoh: "مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟"'
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟"'
- word: سَلْبِيَّاتٌ
  meaning_id: kekurangan
  usage_note: 'Dipakai untuk arti "kekurangan". Contoh: "وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟"'
- word: مَزَايَا
  meaning_id: kelebihan
  usage_note: 'Dipakai untuk arti "kelebihan". Contoh: "هَلِ الْمَزَايَا أَكْثَرُ
    مِنَ الْمَشَاكِلِ؟"'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ أَنْ أَفْهَمَ الصُّورَةَ
    كَامِلَةً."'
- word: أَفْهَمُ
  meaning_id: saya paham
  usage_note: 'Dipakai untuk arti "saya paham". Contoh: "أُرِيدُ أَنْ أَفْهَمَ الصُّورَةَ
    كَامِلَةً."'
- word: نُقْطَةٌ
  meaning_id: titik
  usage_note: 'Dipakai untuk arti "titik". Contoh: "مَا النُّقْطَةُ الْأَسَاسِيَّةُ
    فِي هَذَا الْمَوْضُوعِ؟"'
