questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Apa kelebihan pilihan ini?"?
  options:
  - مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟
  - وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟
  - هَلِ الْمَزَايَا أَكْثَرُ مِنَ الْمَشَاكِلِ؟
  correct_answer: مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟
