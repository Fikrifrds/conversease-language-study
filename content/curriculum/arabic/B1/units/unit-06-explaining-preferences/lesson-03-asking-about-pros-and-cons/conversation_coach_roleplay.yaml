scenario_key: arabic_b1_asking_about_pros_and_cons
mode: lesson_practice_coach
level_code: B1
opening_line: لِنَتَدَرَّبْ عَلَى إِيجَابِيَّاتِ وَسَلْبِيَّاتِ السَّكَنِ قُرْبَ الْعَمَلِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: asking about pros and cons, dengan jawaban
  yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: لِنَتَدَرَّبْ عَلَى إِيجَابِيَّاتِ وَسَلْبِيَّاتِ السَّكَنِ قُرْبَ الْعَمَلِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
  hint: 'Jawab dengan kalimat terhubung memakai: مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟'
  sample_answer: مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - مَا
  - إِيجَابِيَّاتُ
  - هَذَا
  - الْخِيَارِ
  indonesian_explanation: Apa kelebihan pilihan ini?
- coach: 'استخدم الفكرة: وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟'
  hint: 'Jawab dengan kalimat terhubung memakai: وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟'
  sample_answer: وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - وَمَا
  - السَّلْبِيَّاتُ
  - الْمُمْكِنَةُ
  indonesian_explanation: Dan apa kemungkinan kekurangannya?
- coach: 'استخدم الفكرة: هَلِ الْمَزَايَا أَكْثَرُ مِنَ الْمَشَاكِلِ؟'
  hint: 'Jawab dengan kalimat terhubung memakai: هَلِ الْمَزَايَا أَكْثَرُ مِنَ الْمَشَاكِلِ؟'
  sample_answer: هَلِ الْمَزَايَا أَكْثَرُ مِنَ الْمَشَاكِلِ؟
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - هَلِ
  - الْمَزَايَا
  - أَكْثَرُ
  - مِنَ
  indonesian_explanation: Apakah kelebihannya lebih banyak dari masalahnya?
target_phrases:
- مَا إِيجَابِيَّاتُ هَذَا الْخِيَارِ؟
- وَمَا السَّلْبِيَّاتُ الْمُمْكِنَةُ؟
- هَلِ الْمَزَايَا أَكْثَرُ مِنَ الْمَشَاكِلِ؟
- أُرِيدُ أَنْ أَفْهَمَ الصُّورَةَ كَامِلَةً.
- بَعْدَ ذَلِكَ، نَقْرِّرُ.
