phrases:
- phrase: عِنْدَنَا خِيَارَانِ مُخْتَلِفَانِ.
  meaning_id: Kita punya dua pilihan berbeda.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: الْخِيَارُ الْأَوَّلُ أَسْرَعُ.
  meaning_id: Pilihan pertama lebih cepat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: الْخِيَارُ الثَّانِي أَرْخَصُ.
  meaning_id: Pilihan kedua lebih murah.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لَكِنَّ الْجَوْدَةَ مُهِمَّةٌ أَيْضًا.
  meaning_id: Tetapi kualitas juga penting.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: نَحْتَاجُ إِلَى مُقَارَنَةٍ هَادِئَةٍ.
  meaning_id: Kita perlu perbandingan yang tenang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
