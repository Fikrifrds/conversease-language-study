- coach: 'استخدم الفكرة: يَهُمُّنِي أَنْ يَكُونَ السِّعْرُ مُنَاسِبًا.'
  hint: 'Jawab dengan kalimat terhubung memakai: يَهُمُّنِي أَنْ يَكُونَ السِّعْرُ مُنَاسِبًا.'
  sample_answer: يَهُمُّنِي أَنْ يَكُونَ السِّعْرُ مُنَاسِبًا.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - يَهُمُّنِي
  - أَنْ
  - يَكُونَ
  - السِّعْرُ
  indonesian_explanation: Penting bagi saya agar harganya cocok.
target_phrases:
