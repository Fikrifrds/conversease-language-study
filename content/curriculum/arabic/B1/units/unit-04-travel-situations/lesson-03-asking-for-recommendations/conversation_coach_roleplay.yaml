- coach: 'استخدم الفكرة: أُفَضِّلُ مَكَانًا هَادِئًا.'
  hint: 'Jawab dengan kalimat terhubung memakai: أُفَضِّلُ مَكَانًا هَادِئًا.'
  sample_answer: أُفَضِّلُ مَكَانًا هَادِئًا.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - أُفَضِّلُ
