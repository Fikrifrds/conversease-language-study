scenario_key: arabic_b1_asking_for_recommendations
mode: lesson_practice_coach
level_code: B1
opening_line: لِنَتَدَرَّبْ عَلَى طَلَبِ تَوْصِيَةٍ لِمَطْعَمٍ قَرِيبٍ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: asking for recommendations, dengan jawaban
  yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: لِنَتَدَرَّبْ عَلَى طَلَبِ تَوْصِيَةٍ لِمَطْعَمٍ قَرِيبٍ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
