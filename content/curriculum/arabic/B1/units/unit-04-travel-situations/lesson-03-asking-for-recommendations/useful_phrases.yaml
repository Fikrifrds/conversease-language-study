phrases:
- phrase: هَلْ تُوصِي بِمَطْعَمٍ قَرِيبٍ؟
  meaning_id: Apakah kamu merekomendasikan restoran dekat?
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُفَضِّلُ مَكَانًا هَادِئًا.
  meaning_id: Saya lebih suka tempat yang tenang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: يَهُمُّنِي أَنْ يَكُونَ السِّعْرُ مُنَاسِبًا.
  meaning_id: Penting bagi saya agar harganya cocok.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: مَا أَفْضَلُ خِيَارٍ فِي رَأْيِكَ؟
  meaning_id: Apa pilihan terbaik menurutmu?
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: شُكْرًا، سَأُجَرِّبُ هَذَا الْمَكَانَ.
  meaning_id: Terima kasih, saya akan mencoba tempat ini.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
