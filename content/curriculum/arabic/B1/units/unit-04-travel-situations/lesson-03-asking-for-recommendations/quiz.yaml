questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Apakah kamu merekomendasikan restoran dekat?"?
  options:
  - هَلْ تُوصِي بِمَطْعَمٍ قَرِيبٍ؟
  - أُفَضِّلُ مَكَانًا هَادِئًا.
  - يَهُمُّنِي أَنْ يَكُونَ السِّعْرُ مُنَاسِبًا.
  correct_answer: هَلْ تُوصِي بِمَطْعَمٍ قَرِيبٍ؟
