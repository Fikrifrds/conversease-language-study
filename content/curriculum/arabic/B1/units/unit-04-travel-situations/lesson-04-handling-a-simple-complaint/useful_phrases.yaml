phrases:
- phrase: أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.
  meaning_id: Saya ingin menjelaskan masalah kecil.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.
  meaning_id: Kamarnya tidak sepenuhnya bersih.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟
  meaning_id: Bisakah kalian mengirim seseorang?
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُقَدِّرُ مُسَاعَدَتَكُمْ.
  meaning_id: Saya menghargai bantuan kalian.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَا أَمْكَنَ، أُرِيدُ حَلًّا الْيَوْمَ.
  meaning_id: Jika memungkinkan, saya ingin solusi hari ini.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
