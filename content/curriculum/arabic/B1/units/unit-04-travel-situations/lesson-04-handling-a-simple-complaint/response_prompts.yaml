prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saya ingin menjelaskan masalah kecil.'
  target_response: أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.
  acceptable_responses:
  - أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.
- prompt: 'Ucapkan dalam bahasa Arab: Kamarnya tidak sepenuhnya bersih.'
  target_response: الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.
  acceptable_responses:
  - الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.
- prompt: 'Ucapkan dalam bahasa Arab: Bisakah kalian mengirim seseorang?'
  target_response: هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟
  acceptable_responses:
  - هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟
