scenario_key: arabic_b1_handling_a_simple_complaint
mode: lesson_practice_coach
level_code: B1
opening_line: لِنَتَدَرَّبْ عَلَى غُرْفَةِ الْفُنْدُقِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: handling a simple complaint, dengan jawaban
  yang lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: لِنَتَدَرَّبْ عَلَى غُرْفَةِ الْفُنْدُقِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
  hint: 'Jawab dengan kalimat terhubung memakai: أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.'
  sample_answer: أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - أُرِيدُ
  - أَنْ
  - أُوَضِّحَ
  - مُشْكِلَةً
  indonesian_explanation: Saya ingin menjelaskan masalah kecil.
- coach: 'استخدم الفكرة: الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.'
  hint: 'Jawab dengan kalimat terhubung memakai: الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.'
  sample_answer: الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - الْغُرْفَةُ
  - غَيْرُ
  - نَظِيفَةٍ
  - تَمَامًا
  indonesian_explanation: Kamarnya tidak sepenuhnya bersih.
- coach: 'استخدم الفكرة: هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟'
  hint: 'Jawab dengan kalimat terhubung memakai: هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟'
  sample_answer: هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - هَلْ
  - يُمْكِنُ
  - أَنْ
  - تُرْسِلُوا
  indonesian_explanation: Bisakah kalian mengirim seseorang?
target_phrases:
- أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.
- الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.
- هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟
- أُقَدِّرُ مُسَاعَدَتَكُمْ.
- إِذَا أَمْكَنَ، أُرِيدُ حَلًّا الْيَوْمَ.
