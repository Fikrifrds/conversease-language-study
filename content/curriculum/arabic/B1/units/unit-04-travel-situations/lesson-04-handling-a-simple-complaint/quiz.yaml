questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya ingin menjelaskan masalah kecil."?
  options:
  - أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.
  - الْغُرْفَةُ غَيْرُ نَظِيفَةٍ تَمَامًا.
  - هَلْ يُمْكِنُ أَنْ تُرْسِلُوا أَحَدًا؟
  correct_answer: أُرِيدُ أَنْ أُوَضِّحَ مُشْكِلَةً صَغِيرَةً.
