phrases:
- phrase: عِنْدِي حَجْزٌ وَلَكِنَّنِي تَأَخَّرْتُ.
  meaning_id: Saya punya reservasi tetapi terlambat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُرِيدُ أَنْ أُؤَكِّدَ الْوُصُولَ.
  meaning_id: Saya ingin mengonfirmasi kedatangan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَلْ تُوصِي بِمَكَانٍ قَرِيبٍ لِلطَّعَامِ؟
  meaning_id: Apakah kamu merekomendasikan tempat makan dekat?
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لَدَيَّ مُشْكِلَةٌ صَغِيرَةٌ فِي الْغُرْفَةِ.
  meaning_id: Saya punya masalah kecil di kamar.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: شُكْرًا عَلَى سُرْعَةِ الْمُسَاعَدَةِ.
  meaning_id: Terima kasih atas cepatnya bantuan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
