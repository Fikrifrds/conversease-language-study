vocabulary:
- word: عِنْدِي
  meaning_id: saya punya
  usage_note: 'Dipakai untuk arti "saya punya". Contoh: "عِنْدِي حَجْزٌ وَلَكِنَّنِي تَأَخَّرْتُ."'
- word: حَجْزٌ
  meaning_id: reservasi
  usage_note: 'Dipakai untuk arti "reservasi". Contoh: "عِنْدِي حَجْزٌ وَلَكِنَّنِي تَأَخَّرْتُ."'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ أَنْ أُؤَكِّدَ الْوُصُولَ."'
- word: تُوصِي
  meaning_id: merekomendasikan
  usage_note: 'Dipakai untuk arti "merekomendasikan". Contoh: "هَلْ تُوصِي بِمَكَانٍ قَرِيبٍ لِلطَّعَامِ؟"'
- word: قَرِيبٌ
  meaning_id: dekat
  usage_note: 'Dipakai untuk arti "dekat". Contoh: "هَلْ تُوصِي بِمَكَانٍ قَرِيبٍ لِلطَّعَامِ؟"'
- word: طَعَامٌ
  meaning_id: makanan
  usage_note: 'Dipakai untuk arti "makanan". Contoh: "هَلْ تُوصِي بِمَكَانٍ قَرِيبٍ لِلطَّعَامِ؟"'
- word: مُشْكِلَةٌ
  meaning_id: masalah
  usage_note: 'Dipakai untuk arti "masalah". Contoh: "لَدَيَّ مُشْكِلَةٌ صَغِيرَةٌ فِي الْغُرْفَةِ."'
- word: صَغِيرَةٌ
  meaning_id: kecil
  usage_note: 'Dipakai untuk arti "kecil". Contoh: "لَدَيَّ مُشْكِلَةٌ صَغِيرَةٌ فِي الْغُرْفَةِ."'
