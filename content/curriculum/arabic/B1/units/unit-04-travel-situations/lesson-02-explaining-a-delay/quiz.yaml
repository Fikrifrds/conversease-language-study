questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Perjalanannya sedikit terlambat."?
  options:
  - تَأَخَّرَتِ الرِّحْلَةُ قَلِيلًا.
  - السَّبَبُ هُوَ الِازْدِحَامُ فِي الطَّرِيقِ.
  - سَأَصِلُ بَعْدَ ثَلَاثِينَ دَقِيقَةً.
  correct_answer: تَأَخَّرَتِ الرِّحْلَةُ قَلِيلًا.
