phrases:
- phrase: تَأَخَّرَتِ الرِّحْلَةُ قَلِيلًا.
  meaning_id: Perjalanannya sedikit terlambat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: السَّبَبُ هُوَ الِازْدِحَامُ فِي الطَّرِيقِ.
  meaning_id: Alasannya adalah kemacetan di jalan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأَصِلُ بَعْدَ ثَلَاثِينَ دَقِيقَةً.
  meaning_id: Saya akan tiba setelah tiga puluh menit.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: آسِفٌ عَلَى التَّأْخِيرِ.
  meaning_id: Maaf atas keterlambatannya.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُخْبِرُكَ إِذَا تَغَيَّرَ الْوَقْتُ.
  meaning_id: Saya akan memberitahumu jika waktunya berubah.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
