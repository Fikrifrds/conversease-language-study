questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya punya reservasi atas nama Ahmad."?
  options:
  - لَدَيَّ حَجْزٌ بِاسْمِ أَحْمَدَ.
  - أُرِيدُ أَنْ أُؤَكِّدَ التَّفَاصِيلَ.
  - هَلِ الْغُرْفَةُ جَاهِزَةٌ الآنَ؟
  correct_answer: لَدَيَّ حَجْزٌ بِاسْمِ أَحْمَدَ.
