scenario_key: arabic_b1_b1_final_test_practice
mode: lesson_practice_coach
level_code: B1
opening_line: 'سُؤَالٌ كَالِاخْتِبَارِ: هَلِ التَّدْرِيبُ الْيَوْمِيُّ مُهِمٌّ؟'
learner_goal: 'Latih percakapan Arab B1 untuk menjawab pertanyaan ujian sederhana: jawaban, alasan, lalu
  contoh.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: 'سُؤَالٌ كَالِاخْتِبَارِ: هَلِ التَّدْرِيبُ الْيَوْمِيُّ مُهِمٌّ؟'
  hint: 'Jawab dengan struktur B2 memakai: فِي رَأْيِي، التَّدْرِيبُ الْيَوْمِيُّ مُفِيدٌ.'
  sample_answer: فِي رَأْيِي، التَّدْرِيبُ الْيَوْمِيُّ مُفِيدٌ.
  focus: Memberi jawaban.
  expected_keywords:
  - فِي
  - رَأْيِي
  - التَّدْرِيبُ
  - الْيَوْمِيُّ
  - مُفِيدٌ
  indonesian_explanation: Menurutku, latihan harian itu bermanfaat.
- coach: 'استخدم الفكرة: لِأَنَّهُ يُسَاعِدُ عَلَى تَذَكُّرِ الْكَلِمَاتِ.'
  hint: 'Jawab dengan struktur B2 memakai: لِأَنَّهُ يُسَاعِدُ عَلَى تَذَكُّرِ الْكَلِمَاتِ.'
  sample_answer: لِأَنَّهُ يُسَاعِدُ عَلَى تَذَكُّرِ الْكَلِمَاتِ.
  focus: Memberi alasan.
  expected_keywords:
  - لِأَنَّهُ
  - يُسَاعِدُ
  - عَلَى
  - تَذَكُّرِ
  - الْكَلِمَاتِ
  indonesian_explanation: Karena itu membantu mengingat kata.
- coach: 'استخدم الفكرة: مَثَلًا، أُرَاجِعُ خَمْسَ جُمَلٍ كُلَّ مَسَاءٍ.'
  hint: 'Jawab dengan struktur B2 memakai: مَثَلًا، أُرَاجِعُ خَمْسَ جُمَلٍ كُلَّ مَسَاءٍ.'
  sample_answer: مَثَلًا، أُرَاجِعُ خَمْسَ جُمَلٍ كُلَّ مَسَاءٍ.
  focus: Memberi contoh.
  expected_keywords:
  - مَثَلًا
  - أُرَاجِعُ
  - خَمْسَ
  - جُمَلٍ
  - كُلَّ
  indonesian_explanation: Misalnya, aku tinjau lima kalimat tiap malam.
- coach: 'استخدم الفكرة: إِذَا لَمْ أَفْهَمِ السُّؤَالَ، أَطْلُبُ إِعَادَتَهُ.'
  hint: 'Jawab dengan struktur B2 memakai: إِذَا لَمْ أَفْهَمِ السُّؤَالَ، أَطْلُبُ إِعَادَتَهُ.'
  sample_answer: إِذَا لَمْ أَفْهَمِ السُّؤَالَ، أَطْلُبُ إِعَادَتَهُ.
  focus: Mengatasi kebingungan.
  expected_keywords:
  - إِذَا
  - لَمْ
  - أَفْهَمِ
  - السُّؤَالَ
  - أَطْلُبُ
  indonesian_explanation: Kalau tidak paham pertanyaannya, aku minta diulang.
target_phrases:
- فِي رَأْيِي، التَّدْرِيبُ الْيَوْمِيُّ مُفِيدٌ.
- لِأَنَّهُ يُسَاعِدُ عَلَى تَذَكُّرِ الْكَلِمَاتِ.
- مَثَلًا، أُرَاجِعُ خَمْسَ جُمَلٍ كُلَّ مَسَاءٍ.
- إِذَا لَمْ أَفْهَمِ السُّؤَالَ، أَطْلُبُ إِعَادَتَهُ.
- وَأُجِيبُ بِهُدُوءٍ دُونَ عَجَلَةٍ.
