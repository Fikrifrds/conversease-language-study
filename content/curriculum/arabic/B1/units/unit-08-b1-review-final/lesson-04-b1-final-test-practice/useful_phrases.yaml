phrases:
- phrase: فِي رَأْيِي، التَّدْرِيبُ الْيَوْمِيُّ مُفِيدٌ.
  meaning_id: Menurutku, latihan harian itu bermanfaat.
  usage_note: Memberi jawaban.
- phrase: لِأَنَّهُ يُسَاعِدُ عَلَى تَذَكُّرِ الْكَلِمَاتِ.
  meaning_id: Karena itu membantu mengingat kata.
  usage_note: Memberi alasan.
- phrase: مَثَلًا، أُرَاجِعُ خَمْسَ جُمَلٍ كُلَّ مَسَاءٍ.
  meaning_id: Misalnya, aku tinjau lima kalimat tiap malam.
  usage_note: Memberi contoh.
- phrase: إِذَا لَمْ أَفْهَمِ السُّؤَالَ، أَطْلُبُ إِعَادَتَهُ.
  meaning_id: Kalau tidak paham pertanyaannya, aku minta diulang.
  usage_note: Mengatasi kebingungan.
- phrase: وَأُجِيبُ بِهُدُوءٍ دُونَ عَجَلَةٍ.
  meaning_id: Dan aku jawab dengan tenang tanpa terburu.
  usage_note: Menutup.
