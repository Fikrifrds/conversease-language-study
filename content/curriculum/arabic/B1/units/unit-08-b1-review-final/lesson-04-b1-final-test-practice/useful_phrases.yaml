phrases:
- phrase: سَأُجِيبُ بِجُمَلٍ مُتَرَابِطَةٍ.
  meaning_id: Saya akan menjawab dengan kalimat yang terhubung.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَذْكُرُ السِّبَاقَ وَالسَّبَبَ وَالنَّتِيجَةَ.
  meaning_id: Saya menyebut konteks, alasan, dan hasil.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَا لَمْ أَفْهَمْ، أَطْلُبُ تَوْضِيحًا.
  meaning_id: Jika saya tidak paham, saya meminta klarifikasi.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُحَافِظُ عَلَى الْهُدُوءِ وَالسُّرْعَةِ الْمُنَاسِبَةِ.
  meaning_id: Saya menjaga ketenangan dan kecepatan yang sesuai.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذَا يُسَاعِدُنِي فِي الِاخْتِبَارِ.
  meaning_id: Ini membantu saya dalam tes.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
