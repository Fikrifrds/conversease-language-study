prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Menurutku, latihan harian itu bermanfaat.'
  target_response: فِي رَأْيِي، التَّدْرِيبُ الْيَوْمِيُّ مُفِيدٌ.
  acceptable_responses:
  - فِي رَأْيِي، التَّدْرِيبُ الْيَوْمِيُّ مُفِيدٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Karena itu membantu mengingat kata.'
  target_response: لِأَنَّهُ يُسَاعِدُ عَلَى تَذَكُّرِ الْكَلِمَاتِ.
  acceptable_responses:
  - لِأَنَّهُ يُسَاعِدُ عَلَى تَذَكُّرِ الْكَلِمَاتِ.
- prompt: 'Ucapkan dalam bahasa Arab: Misalnya, aku tinjau lima kalimat tiap malam.'
  target_response: مَثَلًا، أُرَاجِعُ خَمْسَ جُمَلٍ كُلَّ مَسَاءٍ.
  acceptable_responses:
  - مَثَلًا، أُرَاجِعُ خَمْسَ جُمَلٍ كُلَّ مَسَاءٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau tidak paham pertanyaannya, aku minta diulang.'
  target_response: إِذَا لَمْ أَفْهَمِ السُّؤَالَ، أَطْلُبُ إِعَادَتَهُ.
  acceptable_responses:
  - إِذَا لَمْ أَفْهَمِ السُّؤَالَ، أَطْلُبُ إِعَادَتَهُ.
