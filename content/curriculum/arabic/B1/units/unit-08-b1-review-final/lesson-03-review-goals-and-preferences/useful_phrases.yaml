phrases:
- phrase: هَدَفِي وَاضِحٌ وَلَكِنَّ التَّحَدِّي مَوْجُودٌ.
  meaning_id: Tujuan saya jelas tetapi tantangannya ada.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُفَضِّلُ خُطَّةً بَسِيطَةً وَمُسْتَمِرَّةً.
  meaning_id: Saya lebih memilih rencana sederhana dan berkelanjutan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُقَارِنُ بَيْنَ خِيَارَيْنِ.
  meaning_id: Saya akan membandingkan dua pilihan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: السَّبَبُ الرَّئِيسِيُّ هُوَ الْجَوْدَةُ.
  meaning_id: Alasan utamanya adalah kualitas.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: بَعْدَ ذَلِكَ، أَتَّخِذُ قَرَارًا.
  meaning_id: Setelah itu, saya mengambil keputusan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
