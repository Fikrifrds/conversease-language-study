phrases:
- phrase: هَدَفِي أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
  meaning_id: Tujuanku berbicara dengan lebih percaya diri.
  usage_note: Menyatakan tujuan.
- phrase: أُفَضِّلُ خُطَّةً بَسِيطَةً لِأَنَّهَا أَسْهَلُ.
  meaning_id: Aku lebih pilih rencana sederhana karena lebih mudah.
  usage_note: Menjelaskan pilihan.
- phrase: الْخِيَارُ الْآخَرُ أَقْوَى لَكِنَّهُ يَأْخُذُ وَقْتًا.
  meaning_id: Pilihan lain lebih kuat tapi makan waktu.
  usage_note: Membandingkan.
- phrase: الْأَهَمُّ عِنْدِي هُوَ الِاسْتِمْرَارُ.
  meaning_id: Yang terpenting bagiku adalah konsistensi.
  usage_note: Menyebut prioritas.
- phrase: إِذَنْ سَأَبْدَأُ بِالْخُطَّةِ الْبَسِيطَةِ غَدًا.
  meaning_id: Kalau begitu aku mulai dengan rencana sederhana besok.
  usage_note: Menutup dengan keputusan.
