scenario_key: arabic_b1_review_goals_and_preferences
mode: lesson_practice_coach
level_code: B1
opening_line: مَا هَدَفُكَ هَذَا الشَّهْرَ؟
learner_goal: Latih percakapan Arab B1 untuk membicarakan tujuan dan menjelaskan pilihan dengan alasan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا هَدَفُكَ هَذَا الشَّهْرَ؟
  hint: 'Jawab dengan struktur B2 memakai: هَدَفِي أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.'
  sample_answer: هَدَفِي أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
  focus: Menyatakan tujuan.
  expected_keywords:
  - هَدَفِي
  - أَنْ
  - أَتَكَلَّمَ
  - بِثِقَةٍ
  - أَكْبَرَ
  indonesian_explanation: Tujuanku berbicara dengan lebih percaya diri.
- coach: 'استخدم الفكرة: أُفَضِّلُ خُطَّةً بَسِيطَةً لِأَنَّهَا أَسْهَلُ.'
  hint: 'Jawab dengan struktur B2 memakai: أُفَضِّلُ خُطَّةً بَسِيطَةً لِأَنَّهَا أَسْهَلُ.'
  sample_answer: أُفَضِّلُ خُطَّةً بَسِيطَةً لِأَنَّهَا أَسْهَلُ.
  focus: Menjelaskan pilihan.
  expected_keywords:
  - أُفَضِّلُ
  - خُطَّةً
  - بَسِيطَةً
  - لِأَنَّهَا
  - أَسْهَلُ
  indonesian_explanation: Aku lebih pilih rencana sederhana karena lebih mudah.
- coach: 'استخدم الفكرة: الْخِيَارُ الْآخَرُ أَقْوَى لَكِنَّهُ يَأْخُذُ وَقْتًا.'
  hint: 'Jawab dengan struktur B2 memakai: الْخِيَارُ الْآخَرُ أَقْوَى لَكِنَّهُ يَأْخُذُ وَقْتًا.'
  sample_answer: الْخِيَارُ الْآخَرُ أَقْوَى لَكِنَّهُ يَأْخُذُ وَقْتًا.
  focus: Membandingkan.
  expected_keywords:
  - الْخِيَارُ
  - الْآخَرُ
  - أَقْوَى
  - لَكِنَّهُ
  - يَأْخُذُ
  indonesian_explanation: Pilihan lain lebih kuat tapi makan waktu.
- coach: 'استخدم الفكرة: الْأَهَمُّ عِنْدِي هُوَ الِاسْتِمْرَارُ.'
  hint: 'Jawab dengan struktur B2 memakai: الْأَهَمُّ عِنْدِي هُوَ الِاسْتِمْرَارُ.'
  sample_answer: الْأَهَمُّ عِنْدِي هُوَ الِاسْتِمْرَارُ.
  focus: Menyebut prioritas.
  expected_keywords:
  - الْأَهَمُّ
  - عِنْدِي
  - هُوَ
  - الِاسْتِمْرَارُ
  indonesian_explanation: Yang terpenting bagiku adalah konsistensi.
target_phrases:
- هَدَفِي أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
- أُفَضِّلُ خُطَّةً بَسِيطَةً لِأَنَّهَا أَسْهَلُ.
- الْخِيَارُ الْآخَرُ أَقْوَى لَكِنَّهُ يَأْخُذُ وَقْتًا.
- الْأَهَمُّ عِنْدِي هُوَ الِاسْتِمْرَارُ.
- إِذَنْ سَأَبْدَأُ بِالْخُطَّةِ الْبَسِيطَةِ غَدًا.
