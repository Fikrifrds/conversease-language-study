- coach: 'استخدم الفكرة: أُفَضِّلُ خُطَّةً بَسِيطَةً وَمُسْتَمِرَّةً.'
  hint: 'Jawab dengan kalimat terhubung memakai: أُفَضِّلُ خُطَّةً بَسِيطَةً وَمُسْتَمِرَّةً.'
  sample_answer: أُفَضِّلُ خُطَّةً بَسِيطَةً وَمُسْتَمِرَّةً.
