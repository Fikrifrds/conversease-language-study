questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Tujuanku berbicara dengan lebih percaya diri."?
  options:
  - هَدَفِي أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
  - أُفَضِّلُ خُطَّةً بَسِيطَةً لِأَنَّهَا أَسْهَلُ.
  - الْخِيَارُ الْآخَرُ أَقْوَى لَكِنَّهُ يَأْخُذُ وَقْتًا.
  correct_answer: هَدَفِي أَنْ أَتَكَلَّمَ بِثِقَةٍ أَكْبَرَ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Aku lebih pilih rencana sederhana karena lebih mudah."?
