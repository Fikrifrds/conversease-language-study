questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Tujuan saya jelas tetapi tantangannya ada."?
  options:
  - هَدَفِي وَاضِحٌ وَلَكِنَّ التَّحَدِّي مَوْجُودٌ.
  - أُفَضِّلُ خُطَّةً بَسِيطَةً وَمُسْتَمِرَّةً.
  - سَأُقَارِنُ بَيْنَ خِيَارَيْنِ.
  correct_answer: هَدَفِي وَاضِحٌ وَلَكِنَّ التَّحَدِّي مَوْجُودٌ.
- key: phrase_2
