prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Ada masalah kecil di reservasi.'
  target_response: حَدَثَتْ مُشْكِلَةٌ صَغِيرَةٌ فِي الْحَجْزِ.
  acceptable_responses:
  - حَدَثَتْ مُشْكِلَةٌ صَغِيرَةٌ فِي الْحَجْزِ.
- prompt: 'Ucapkan dalam bahasa Arab: Sebabnya, namanya salah tulis.'
  target_response: السَّبَبُ أَنَّ الِاسْمَ كُتِبَ خَطَأً.
  acceptable_responses:
  - السَّبَبُ أَنَّ الِاسْمَ كُتِبَ خَطَأً.
- prompt: 'Ucapkan dalam bahasa Arab: Aku usul kita telepon hotel sekarang.'
  target_response: أَقْتَرِحُ أَنْ نَتَّصِلَ بِالْفُنْدُقِ الْآنَ.
  acceptable_responses:
  - أَقْتَرِحُ أَنْ نَتَّصِلَ بِالْفُنْدُقِ الْآنَ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau tidak diangkat, kita datang lebih awal.'
  target_response: إِذَا لَمْ يَرُدُّوا، نَذْهَبُ مُبَكِّرًا.
  acceptable_responses:
  - إِذَا لَمْ يَرُدُّوا، نَذْهَبُ مُبَكِّرًا.
