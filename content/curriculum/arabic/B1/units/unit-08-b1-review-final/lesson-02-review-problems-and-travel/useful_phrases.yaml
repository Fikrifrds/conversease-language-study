phrases:
- phrase: حَدَثَتْ مُشْكِلَةٌ صَغِيرَةٌ فِي الْحَجْزِ.
  meaning_id: Ada masalah kecil di reservasi.
  usage_note: Membuka masalah.
- phrase: السَّبَبُ أَنَّ الِاسْمَ كُتِبَ خَطَأً.
  meaning_id: Sebabnya, namanya salah tulis.
  usage_note: Menjelaskan penyebab.
- phrase: أَقْتَرِحُ أَنْ نَتَّصِلَ بِالْفُنْدُقِ الْآنَ.
  meaning_id: Aku usul kita telepon hotel sekarang.
  usage_note: Mengusulkan solusi.
- phrase: إِذَا لَمْ يَرُدُّوا، نَذْهَبُ مُبَكِّرًا.
  meaning_id: Kalau tidak diangkat, kita datang lebih awal.
  usage_note: Menyiapkan rencana cadangan.
- phrase: سَأُخْبِرُكَ إِذَا تَغَيَّرَ شَيْءٌ.
  meaning_id: Aku kabari kamu kalau ada yang berubah.
  usage_note: Menutup dengan tindak lanjut.
