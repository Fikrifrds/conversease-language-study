phrases:
- phrase: سَأَشْرَحُ مُشْكِلَةً ثُمَّ أَقْتَرِحُ حَلًّا.
  meaning_id: Saya akan menjelaskan masalah lalu menyarankan solusi.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: فِي السَّفَرِ، أَحْتَاجُ إِلَى تَفَاصِيلَ وَاضِحَةٍ.
  meaning_id: Dalam perjalanan, saya butuh detail jelas.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَا حَدَثَ تَأْخِيرٌ، سَأُخْبِرُ الطَّرَفَ الْآخَرَ.
  meaning_id: Jika terjadi keterlambatan, saya akan memberi tahu pihak lain.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُفَضِّلُ حَلًّا سَرِيعًا وَمُهَذَّبًا.
  meaning_id: Saya lebih memilih solusi cepat dan sopan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: فِي النِّهَايَةِ، أُؤَكِّدُ الْخُطْوَةَ التَّالِيَةَ.
  meaning_id: Pada akhir, saya memastikan langkah berikutnya.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
