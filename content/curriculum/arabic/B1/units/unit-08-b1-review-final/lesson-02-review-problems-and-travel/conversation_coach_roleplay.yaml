turns:
- coach: لِنَتَدَرَّبْ عَلَى مُرَاجَعَةِ مُشْكِلَةٍ فِي السَّفَرِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
  hint: 'Jawab dengan kalimat terhubung memakai: سَأَشْرَحُ مُشْكِلَةً ثُمَّ أَقْتَرِحُ حَلًّا.'
  sample_answer: سَأَشْرَحُ مُشْكِلَةً ثُمَّ أَقْتَرِحُ حَلًّا.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - سَأَشْرَحُ
  - مُشْكِلَةً
  - ثُمَّ
  - أَقْتَرِحُ
  indonesian_explanation: Saya akan menjelaskan masalah lalu menyarankan solusi.
- coach: 'استخدم الفكرة: فِي السَّفَرِ، أَحْتَاجُ إِلَى تَفَاصِيلَ وَاضِحَةٍ.'
  hint: 'Jawab dengan kalimat terhubung memakai: فِي السَّفَرِ، أَحْتَاجُ إِلَى تَفَاصِيلَ وَاضِحَةٍ.'
  sample_answer: فِي السَّفَرِ، أَحْتَاجُ إِلَى تَفَاصِيلَ وَاضِحَةٍ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - فِي
  - السَّفَرِ،
  - أَحْتَاجُ
  - إِلَى
  indonesian_explanation: Dalam perjalanan, saya butuh detail jelas.
- coach: 'استخدم الفكرة: إِذَا حَدَثَ تَأْخِيرٌ، سَأُخْبِرُ الطَّرَفَ الْآخَرَ.'
  hint: 'Jawab dengan kalimat terhubung memakai: إِذَا حَدَثَ تَأْخِيرٌ، سَأُخْبِرُ الطَّرَفَ الْآخَرَ.'
  sample_answer: إِذَا حَدَثَ تَأْخِيرٌ، سَأُخْبِرُ الطَّرَفَ الْآخَرَ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - إِذَا
  - حَدَثَ
  - تَأْخِيرٌ،
  - سَأُخْبِرُ
  indonesian_explanation: Jika terjadi keterlambatan, saya akan memberi tahu pihak lain.
target_phrases:
- سَأَشْرَحُ مُشْكِلَةً ثُمَّ أَقْتَرِحُ حَلًّا.
