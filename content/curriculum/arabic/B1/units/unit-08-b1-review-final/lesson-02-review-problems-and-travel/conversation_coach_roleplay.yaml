scenario_key: arabic_b1_review_problems_and_travel
mode: lesson_practice_coach
level_code: B1
opening_line: هَلْ كُلُّ شَيْءٍ جَاهِزٌ لِلرِّحْلَةِ؟
learner_goal: Latih percakapan Arab B1 untuk menjelaskan masalah perjalanan singkat lalu menyepakati langkah.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: هَلْ كُلُّ شَيْءٍ جَاهِزٌ لِلرِّحْلَةِ؟
  hint: 'Jawab dengan struktur B2 memakai: حَدَثَتْ مُشْكِلَةٌ صَغِيرَةٌ فِي الْحَجْزِ.'
  sample_answer: حَدَثَتْ مُشْكِلَةٌ صَغِيرَةٌ فِي الْحَجْزِ.
  focus: Membuka masalah.
  expected_keywords:
  - حَدَثَتْ
  - مُشْكِلَةٌ
  - صَغِيرَةٌ
  - فِي
  - الْحَجْزِ
  indonesian_explanation: Ada masalah kecil di reservasi.
- coach: 'استخدم الفكرة: السَّبَبُ أَنَّ الِاسْمَ كُتِبَ خَطَأً.'
  hint: 'Jawab dengan struktur B2 memakai: السَّبَبُ أَنَّ الِاسْمَ كُتِبَ خَطَأً.'
  sample_answer: السَّبَبُ أَنَّ الِاسْمَ كُتِبَ خَطَأً.
  focus: Menjelaskan penyebab.
  expected_keywords:
  - السَّبَبُ
  - أَنَّ
  - الِاسْمَ
  - كُتِبَ
  - خَطَأً
  indonesian_explanation: Sebabnya, namanya salah tulis.
- coach: 'استخدم الفكرة: أَقْتَرِحُ أَنْ نَتَّصِلَ بِالْفُنْدُقِ الْآنَ.'
  hint: 'Jawab dengan struktur B2 memakai: أَقْتَرِحُ أَنْ نَتَّصِلَ بِالْفُنْدُقِ الْآنَ.'
  sample_answer: أَقْتَرِحُ أَنْ نَتَّصِلَ بِالْفُنْدُقِ الْآنَ.
  focus: Mengusulkan solusi.
  expected_keywords:
  - أَقْتَرِحُ
  - أَنْ
  - نَتَّصِلَ
  - بِالْفُنْدُقِ
  - الْآنَ
  indonesian_explanation: Aku usul kita telepon hotel sekarang.
- coach: 'استخدم الفكرة: إِذَا لَمْ يَرُدُّوا، نَذْهَبُ مُبَكِّرًا.'
  hint: 'Jawab dengan struktur B2 memakai: إِذَا لَمْ يَرُدُّوا، نَذْهَبُ مُبَكِّرًا.'
  sample_answer: إِذَا لَمْ يَرُدُّوا، نَذْهَبُ مُبَكِّرًا.
  focus: Menyiapkan rencana cadangan.
  expected_keywords:
  - إِذَا
  - لَمْ
  - يَرُدُّوا
  - نَذْهَبُ
  - مُبَكِّرًا
  indonesian_explanation: Kalau tidak diangkat, kita datang lebih awal.
target_phrases:
- حَدَثَتْ مُشْكِلَةٌ صَغِيرَةٌ فِي الْحَجْزِ.
- السَّبَبُ أَنَّ الِاسْمَ كُتِبَ خَطَأً.
- أَقْتَرِحُ أَنْ نَتَّصِلَ بِالْفُنْدُقِ الْآنَ.
- إِذَا لَمْ يَرُدُّوا، نَذْهَبُ مُبَكِّرًا.
- سَأُخْبِرُكَ إِذَا تَغَيَّرَ شَيْءٌ.
