questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya akan mulai dengan cerita singkat."?
  options:
  - سَأَبْدَأُ بِقِصَّةٍ قَصِيرَةٍ.
  - بَعْدَ ذَلِكَ، أُعْطِي تَحْدِيثًا عَنِ الْعَمَلِ.
  - أَحْتَاجُ إِلَى تَوْضِيحٍ فِي نُقْطَةٍ وَاحِدَةٍ.
  correct_answer: سَأَبْدَأُ بِقِصَّةٍ قَصِيرَةٍ.
