  - وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.
  - الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.
  correct_answer: أَمْسِ تَأَخَّرْتُ عَنِ الِاجْتِمَاعِ بِسَبَبِ الْحَافِلَةِ.
