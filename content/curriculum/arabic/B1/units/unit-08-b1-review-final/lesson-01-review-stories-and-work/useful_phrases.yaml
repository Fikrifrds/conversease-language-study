phrases:
- phrase: سَأَبْدَأُ بِقِصَّةٍ قَصِيرَةٍ.
  meaning_id: Saya akan mulai dengan cerita singkat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: بَعْدَ ذَلِكَ، أُعْطِي تَحْدِيثًا عَنِ الْعَمَلِ.
  meaning_id: Setelah itu, saya memberi update tentang pekerjaan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَحْتَاجُ إِلَى تَوْضِيحٍ فِي نُقْطَةٍ وَاحِدَةٍ.
  meaning_id: Saya butuh klarifikasi pada satu poin.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُرْسِلُ مُلَخَّصًا فِي النِّهَايَةِ.
  meaning_id: Saya akan mengirim ringkasan di akhir.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذَا يُظْهِرُ التَّرَابُطَ فِي الْحِوَارِ.
  meaning_id: Ini menunjukkan keterhubungan dalam dialog.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
