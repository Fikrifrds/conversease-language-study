phrases:
- phrase: أَمْسِ تَأَخَّرْتُ عَنِ الِاجْتِمَاعِ بِسَبَبِ الْحَافِلَةِ.
  meaning_id: Kemarin aku telat rapat karena bus.
  usage_note: Membuka cerita singkat.
- phrase: وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.
  meaning_id: Lalu aku minta maaf dan menyelesaikan kerjaku.
  usage_note: Menyambung kejadian.
- phrase: الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.
  meaning_id: Sekarang aku mengerjakan laporan kecil.
  usage_note: Memberi kabar pekerjaan.
- phrase: عِنْدِي سُؤَالٌ وَاحِدٌ عَنِ الْمَوْعِدِ.
  meaning_id: Aku punya satu pertanyaan soal tenggat.
  usage_note: Meminta klarifikasi.
- phrase: سَأُرْسِلُ مُلَخَّصًا قَبْلَ الْمَسَاءِ.
  meaning_id: Aku kirim ringkasan sebelum sore.
  usage_note: Menutup dengan tindak lanjut.
