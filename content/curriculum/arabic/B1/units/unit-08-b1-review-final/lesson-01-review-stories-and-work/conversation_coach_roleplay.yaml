scenario_key: arabic_b1_review_stories_and_work
mode: lesson_practice_coach
level_code: B1
opening_line: كَيْفَ كَانَ يَوْمُكَ أَمْسِ؟
learner_goal: Latih percakapan Arab B1 untuk menceritakan kejadian singkat lalu memberi kabar pekerjaan
  dengan jelas.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ كَانَ يَوْمُكَ أَمْسِ؟
  hint: 'Jawab dengan struktur B2 memakai: أَمْسِ تَأَخَّرْتُ عَنِ الِاجْتِمَاعِ بِسَبَبِ الْحَافِلَةِ.'
  sample_answer: أَمْسِ تَأَخَّرْتُ عَنِ الِاجْتِمَاعِ بِسَبَبِ الْحَافِلَةِ.
  focus: Membuka cerita singkat.
  expected_keywords:
  - أَمْسِ
  - تَأَخَّرْتُ
  - عَنِ
  - الِاجْتِمَاعِ
  - بِسَبَبِ
  indonesian_explanation: Kemarin aku telat rapat karena bus.
- coach: 'استخدم الفكرة: وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.'
  hint: 'Jawab dengan struktur B2 memakai: وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.'
  sample_answer: وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.
  focus: Menyambung kejadian.
  expected_keywords:
  - وَبَعْدَ
  - ذَلِكَ
  - اعْتَذَرْتُ
  - وَأَكْمَلْتُ
  - عَمَلِي
  indonesian_explanation: Lalu aku minta maaf dan menyelesaikan kerjaku.
- coach: 'استخدم الفكرة: الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.'
  hint: 'Jawab dengan struktur B2 memakai: الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.'
  sample_answer: الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.
  focus: Memberi kabar pekerjaan.
  expected_keywords:
  - الْآنَ
  - أَعْمَلُ
  - عَلَى
  - تَقْرِيرٍ
  - صَغِيرٍ
  indonesian_explanation: Sekarang aku mengerjakan laporan kecil.
- coach: 'استخدم الفكرة: عِنْدِي سُؤَالٌ وَاحِدٌ عَنِ الْمَوْعِدِ.'
  hint: 'Jawab dengan struktur B2 memakai: عِنْدِي سُؤَالٌ وَاحِدٌ عَنِ الْمَوْعِدِ.'
  sample_answer: عِنْدِي سُؤَالٌ وَاحِدٌ عَنِ الْمَوْعِدِ.
  focus: Meminta klarifikasi.
  expected_keywords:
  - عِنْدِي
  - سُؤَالٌ
  - وَاحِدٌ
  - عَنِ
  - الْمَوْعِدِ
  indonesian_explanation: Aku punya satu pertanyaan soal tenggat.
target_phrases:
- أَمْسِ تَأَخَّرْتُ عَنِ الِاجْتِمَاعِ بِسَبَبِ الْحَافِلَةِ.
- وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.
- الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.
- عِنْدِي سُؤَالٌ وَاحِدٌ عَنِ الْمَوْعِدِ.
- سَأُرْسِلُ مُلَخَّصًا قَبْلَ الْمَسَاءِ.
