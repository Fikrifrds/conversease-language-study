  hint: 'Jawab dengan kalimat terhubung memakai: بَعْدَ ذَلِكَ، أُعْطِي تَحْدِيثًا عَنِ الْعَمَلِ.'
  sample_answer: بَعْدَ ذَلِكَ، أُعْطِي تَحْدِيثًا عَنِ الْعَمَلِ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
