prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Kemarin aku telat rapat karena bus.'
  target_response: أَمْسِ تَأَخَّرْتُ عَنِ الِاجْتِمَاعِ بِسَبَبِ الْحَافِلَةِ.
  acceptable_responses:
  - أَمْسِ تَأَخَّرْتُ عَنِ الِاجْتِمَاعِ بِسَبَبِ الْحَافِلَةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Lalu aku minta maaf dan menyelesaikan kerjaku.'
  target_response: وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.
  acceptable_responses:
  - وَبَعْدَ ذَلِكَ اعْتَذَرْتُ وَأَكْمَلْتُ عَمَلِي.
- prompt: 'Ucapkan dalam bahasa Arab: Sekarang aku mengerjakan laporan kecil.'
  target_response: الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.
  acceptable_responses:
  - الْآنَ أَعْمَلُ عَلَى تَقْرِيرٍ صَغِيرٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku punya satu pertanyaan soal tenggat.'
  target_response: عِنْدِي سُؤَالٌ وَاحِدٌ عَنِ الْمَوْعِدِ.
  acceptable_responses:
  - عِنْدِي سُؤَالٌ وَاحِدٌ عَنِ الْمَوْعِدِ.
