phrases:
- phrase: سَأَتَحَدَّثُ عَنْ تَجْرِبَةٍ شَخْصِيَّةٍ.
  meaning_id: Saya akan berbicara tentang pengalaman pribadi.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: ثُمَّ أَشْرَحُ مُشْكِلَةً وَحَلًّا.
  meaning_id: Lalu saya menjelaskan masalah dan solusi.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: بَعْدَ ذَلِكَ، أُبَيِّنُ رَأْيِي بِسَبَبٍ.
  meaning_id: Setelah itu, saya menjelaskan pendapat saya dengan alasan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَسْأَلُ سُؤَالًا لِأُبْقِيَ الْحِوَارَ حَيًّا.
  meaning_id: Saya bertanya agar dialog tetap hidup.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: فِي النِّهَايَةِ، أُلَخِّصُ النُّقَاطَ الْمُهِمَّةَ.
  meaning_id: Pada akhir, saya merangkum poin penting.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
