phrases:
- phrase: مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
  meaning_id: Suatu kali aku tersesat di kota baru.
  usage_note: Membuka cerita pribadi.
- phrase: سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
  meaning_id: Aku bertanya ke seseorang dengan sopan dan dia membantu.
  usage_note: Menyebut solusi.
- phrase: فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.
  meaning_id: Menurutku, bertanya lebih baik daripada cemas.
  usage_note: Memberi pendapat.
- phrase: وَأَنْتَ، هَلْ مَرَّ بِكَ مَوْقِفٌ مِثْلُهُ؟
  meaning_id: Dan kamu, pernah mengalami yang seperti itu?
  usage_note: Menjaga obrolan hidup.
- phrase: لِذَلِكَ تَعَلَّمْتُ أَنْ أَسْأَلَ مُبَكِّرًا.
  meaning_id: Karena itu aku belajar untuk bertanya lebih awal.
  usage_note: Menutup dengan pelajaran.
