- coach: 'استخدم الفكرة: ثُمَّ أَشْرَحُ مُشْكِلَةً وَحَلًّا.'
  hint: 'Jawab dengan kalimat terhubung memakai: ثُمَّ أَشْرَحُ مُشْكِلَةً وَحَلًّا.'
  sample_answer: ثُمَّ أَشْرَحُ مُشْكِلَةً وَحَلًّا.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - ثُمَّ
  - أَشْرَحُ
  - مُشْكِلَةً
  - وَحَلًّا
