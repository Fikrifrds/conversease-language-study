scenario_key: arabic_b1_b1_final_conversation
mode: lesson_practice_coach
level_code: B1
opening_line: احْكِ لِي تَجْرِبَةً مَرَّتْ بِكَ.
learner_goal: Latih percakapan Arab B1 untuk bercerita lalu memberi pendapat dengan alasan dalam satu
  obrolan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: احْكِ لِي تَجْرِبَةً مَرَّتْ بِكَ.
  hint: 'Jawab dengan struktur B2 memakai: مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.'
  sample_answer: مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
  focus: Membuka cerita pribadi.
  expected_keywords:
  - مَرَّةً
  - ضِعْتُ
  - فِي
  - مَدِينَةٍ
  - جَدِيدَةٍ
  indonesian_explanation: Suatu kali aku tersesat di kota baru.
- coach: 'استخدم الفكرة: سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.'
  hint: 'Jawab dengan struktur B2 memakai: سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.'
  sample_answer: سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
  focus: Menyebut solusi.
  expected_keywords:
  - سَأَلْتُ
  - شَخْصًا
  - بِأَدَبٍ
  - فَسَاعَدَنِي
  indonesian_explanation: Aku bertanya ke seseorang dengan sopan dan dia membantu.
- coach: 'استخدم الفكرة: فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.'
  hint: 'Jawab dengan struktur B2 memakai: فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.'
  sample_answer: فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.
  focus: Memberi pendapat.
  expected_keywords:
  - فِي
  - رَأْيِي
  - السُّؤَالُ
  - أَفْضَلُ
  - مِنَ
  indonesian_explanation: Menurutku, bertanya lebih baik daripada cemas.
- coach: 'استخدم الفكرة: وَأَنْتَ، هَلْ مَرَّ بِكَ مَوْقِفٌ مِثْلُهُ؟'
  hint: 'Jawab dengan struktur B2 memakai: وَأَنْتَ، هَلْ مَرَّ بِكَ مَوْقِفٌ مِثْلُهُ؟'
  sample_answer: وَأَنْتَ، هَلْ مَرَّ بِكَ مَوْقِفٌ مِثْلُهُ؟
  focus: Menjaga obrolan hidup.
  expected_keywords:
  - وَأَنْتَ
  - هَلْ
  - مَرَّ
  - بِكَ
  - مَوْقِفٌ
  indonesian_explanation: Dan kamu, pernah mengalami yang seperti itu?
target_phrases:
- مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
- سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
- فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.
- وَأَنْتَ، هَلْ مَرَّ بِكَ مَوْقِفٌ مِثْلُهُ؟
- لِذَلِكَ تَعَلَّمْتُ أَنْ أَسْأَلَ مُبَكِّرًا.
