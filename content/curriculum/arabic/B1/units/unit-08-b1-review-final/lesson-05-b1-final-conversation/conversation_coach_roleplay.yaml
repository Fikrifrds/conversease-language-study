- coach: 'استخدم الفكرة: بَعْدَ ذَلِكَ، أُبَيِّنُ رَأْيِي بِسَبَبٍ.'
  hint: 'Jawab dengan kalimat terhubung memakai: بَعْدَ ذَلِكَ، أُبَيِّنُ رَأْيِي بِسَبَبٍ.'
  sample_answer: بَعْدَ ذَلِكَ، أُبَيِّنُ رَأْيِي بِسَبَبٍ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - بَعْدَ
