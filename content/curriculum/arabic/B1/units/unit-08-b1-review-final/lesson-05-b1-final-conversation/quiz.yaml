questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Suatu kali aku tersesat di kota baru."?
  options:
  - مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
  - سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
  - فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.
  correct_answer: مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Aku bertanya ke seseorang dengan sopan dan dia membantu."?
  options:
  - سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
  - مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
  - فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.
  correct_answer: سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
