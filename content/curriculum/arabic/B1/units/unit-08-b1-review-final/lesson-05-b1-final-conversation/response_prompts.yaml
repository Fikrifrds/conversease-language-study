prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Suatu kali aku tersesat di kota baru.'
  target_response: مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
  acceptable_responses:
  - مَرَّةً ضِعْتُ فِي مَدِينَةٍ جَدِيدَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku bertanya ke seseorang dengan sopan dan dia membantu.'
  target_response: سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
  acceptable_responses:
  - سَأَلْتُ شَخْصًا بِأَدَبٍ فَسَاعَدَنِي.
- prompt: 'Ucapkan dalam bahasa Arab: Menurutku, bertanya lebih baik daripada cemas.'
  target_response: فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.
  acceptable_responses:
  - فِي رَأْيِي، السُّؤَالُ أَفْضَلُ مِنَ الْقَلَقِ.
- prompt: 'Ucapkan dalam bahasa Arab: Dan kamu, pernah mengalami yang seperti itu?'
  target_response: وَأَنْتَ، هَلْ مَرَّ بِكَ مَوْقِفٌ مِثْلُهُ؟
  acceptable_responses:
  - وَأَنْتَ، هَلْ مَرَّ بِكَ مَوْقِفٌ مِثْلُهُ؟
