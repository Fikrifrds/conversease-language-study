phrases:
- phrase: أُرِيدُ أَنْ أُضِيفَ نُقْطَةً صَغِيرَةً.
  meaning_id: Saya ingin menambahkan poin kecil.
  usage_note: Masuk diskusi dengan sopan.
- phrase: أَقْتَرِحُ أَنْ نُرَاجِعَ الْخُطَّةَ أَوَّلًا.
  meaning_id: Saya menyarankan kita meninjau rencana dulu.
  usage_note: Memberi saran.
- phrase: هَذَا يُمْكِنُ أَنْ يُقَلِّلَ الْخَطَأَ.
  meaning_id: Ini bisa mengurangi kesalahan.
  usage_note: Memberi alasan saran.
- phrase: مَا الْخُطْوَةُ التَّالِيَةُ بَعْدَ ذَلِكَ؟
  meaning_id: Apa langkah berikutnya setelah itu?
  usage_note: Menanyakan tindak lanjut.
- phrase: سَأَكْتُبُ النِّقَاطَ الْمُهِمَّةَ.
  meaning_id: Saya akan menulis poin-poin penting.
  usage_note: Mengambil tanggung jawab.
