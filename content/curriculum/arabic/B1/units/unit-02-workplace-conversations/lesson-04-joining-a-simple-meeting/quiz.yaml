questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya ingin menambahkan poin kecil."?
  options:
  - أُرِيدُ أَنْ أُضِيفَ نُقْطَةً صَغِيرَةً.
  - أَقْتَرِحُ أَنْ نُرَاجِعَ الْخُطَّةَ أَوَّلًا.
  - هَذَا يُمْكِنُ أَنْ يُقَلِّلَ الْخَطَأَ.
  correct_answer: أُرِيدُ أَنْ أُضِيفَ نُقْطَةً صَغِيرَةً.
- key: phrase_2
