phrases:
- phrase: أَعْمَلُ عَلَى تَنْظِيمِ الْمَلَفَّاتِ.
  meaning_id: Saya mengerjakan pengaturan file.
  usage_note: Menjelaskan tugas.
- phrase: هَلْ تَقْصِدِينَ الْمَلَفَّاتِ الْجَدِيدَةَ فَقَطْ؟
  meaning_id: Apakah maksudmu hanya file baru?
  usage_note: Meminta klarifikasi.
- phrase: أَنْجَزْتُ نِصْفَ الْعَمَلِ حَتَّى الْآنَ.
  meaning_id: Saya sudah menyelesaikan setengah pekerjaan sampai sekarang.
  usage_note: Memberi progress.
- phrase: سَأُرْسِلُ مُلَخَّصًا قَبْلَ الْمَسَاءِ.
  meaning_id: Saya akan mengirim ringkasan sebelum sore.
  usage_note: Memberi komitmen.
- phrase: إِذَا ظَهَرَتْ مُشْكِلَةٌ، سَأُخْبِرُكِ.
  meaning_id: Jika muncul masalah, saya akan memberitahumu.
  usage_note: Menutup dengan mitigasi.
