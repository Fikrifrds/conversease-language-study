phrases:
- phrase: أَعْمَلُ عَلَى مَهَمَّةٍ جَدِيدَةٍ هَذَا الْأُسْبُوعَ.
  meaning_id: Saya mengerjakan tugas baru minggu ini.
  usage_note: Menjelaskan tugas utama.
- phrase: الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ.
  meaning_id: Tujuannya adalah memperbaiki pengaturan.
  usage_note: Menjelaskan tujuan.
- phrase: أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ أَوَّلًا.
  meaning_id: Saya perlu meninjau detailnya dulu.
  usage_note: Menjelaskan langkah awal.
- phrase: الْخُطْوَةُ التَّالِيَةُ هِيَ إِرْسَالُ مُلَخَّصٍ.
  meaning_id: Langkah berikutnya adalah mengirim ringkasan.
  usage_note: Menyebut tindakan berikutnya.
- phrase: سَأُكْمِلُ ذَلِكَ قَبْلَ نِهَايَةِ الْيَوْمِ.
  meaning_id: Saya akan menyelesaikan itu sebelum akhir hari.
  usage_note: Memberi batas waktu.
