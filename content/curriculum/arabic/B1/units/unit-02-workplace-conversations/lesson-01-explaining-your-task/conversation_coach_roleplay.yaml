scenario_key: arabic_b1_explaining_your_task
mode: lesson_practice_coach
level_code: B1
opening_line: مَا الْمَهَمَّةُ الَّتِي تَعْمَلِينَ عَلَيْهَا؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu menjelaskan tugas kerja atau belajar secara
  jelas: tujuan, langkah, dan hasil yang diharapkan.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا الْمَهَمَّةُ الَّتِي تَعْمَلِينَ عَلَيْهَا؟
  hint: 'Jawab dengan kalimat terhubung memakai: أَعْمَلُ عَلَى مَهَمَّةٍ جَدِيدَةٍ هَذَا الْأُسْبُوعَ.'
  sample_answer: أَعْمَلُ عَلَى مَهَمَّةٍ جَدِيدَةٍ هَذَا الْأُسْبُوعَ.
  focus: Menjelaskan tugas utama.
  expected_keywords:
  - أَعْمَلُ
  - عَلَى
  - مَهَمَّةٍ
  - جَدِيدَةٍ
  indonesian_explanation: Saya mengerjakan tugas baru minggu ini.
- coach: 'استخدم الفكرة: الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ.'
  hint: 'Jawab dengan kalimat terhubung memakai: الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ.'
  sample_answer: الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ.
  focus: Menjelaskan tujuan.
  expected_keywords:
  - الْهَدَفُ
  - هُوَ
  - تَحْسِينُ
  - التَّنْظِيمِ
  indonesian_explanation: Tujuannya adalah memperbaiki pengaturan.
- coach: 'استخدم الفكرة: أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ أَوَّلًا.'
  hint: 'Jawab dengan kalimat terhubung memakai: أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ أَوَّلًا.'
  sample_answer: أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ أَوَّلًا.
  focus: Menjelaskan langkah awal.
  expected_keywords:
  - أَحْتَاجُ
  - إِلَى
  - مَرَاجَعَةِ
  - التَّفَاصِيلِ
  indonesian_explanation: Saya perlu meninjau detailnya dulu.
target_phrases:
- أَعْمَلُ عَلَى مَهَمَّةٍ جَدِيدَةٍ هَذَا الْأُسْبُوعَ.
- الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ.
- أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ أَوَّلًا.
- الْخُطْوَةُ التَّالِيَةُ هِيَ إِرْسَالُ مُلَخَّصٍ.
- سَأُكْمِلُ ذَلِكَ قَبْلَ نِهَايَةِ الْيَوْمِ.
rubric:
  speaking:
    minimum_score: 70
  relevance:
    minimum_score: 70
  grammar:
    minimum_score: 68
