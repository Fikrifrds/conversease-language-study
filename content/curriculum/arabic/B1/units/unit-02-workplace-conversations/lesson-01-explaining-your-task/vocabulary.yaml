vocabulary:
- word: أَعْمَلُ
  meaning_id: saya bekerja
  usage_note: 'Dipakai untuk arti "saya bekerja". Contoh: "أَعْمَلُ عَلَى مَهَمَّةٍ جَدِيدَةٍ هَذَا الْأُسْبُوعَ."'
- word: مَهَمَّةٌ
  meaning_id: tugas
  usage_note: 'Dipakai untuk arti "tugas". Contoh: "أَعْمَلُ عَلَى مَهَمَّةٍ جَدِيدَةٍ هَذَا الْأُسْبُوعَ."'
- word: هَدَفٌ
  meaning_id: tujuan
  usage_note: 'Dipakai untuk arti "tujuan". Contoh: "الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ."'
- word: تَحْسِينٌ
  meaning_id: perbaikan
  usage_note: 'Dipakai untuk arti "perbaikan". Contoh: "الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ."'
- word: تَنْظِيمٌ
  meaning_id: pengaturan
  usage_note: 'Dipakai untuk arti "pengaturan". Contoh: "الْهَدَفُ هُوَ تَحْسِينُ التَّنْظِيمِ."'
- word: أَحْتَاجُ
  meaning_id: saya butuh
  usage_note: 'Dipakai untuk arti "saya butuh". Contoh: "أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ أَوَّلًا."'
- word: مُرَاجَعَةٌ
  meaning_id: peninjauan ulang/tinjauan
  usage_note: 'Dipakai untuk arti "peninjauan ulang/tinjauan". Contoh: "أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ
    أَوَّلًا."'
- word: تَفَاصِيلُ
  meaning_id: detail
  usage_note: 'Dipakai untuk arti "detail". Contoh: "أَحْتَاجُ إِلَى مَرَاجَعَةِ التَّفَاصِيلِ أَوَّلًا."'
