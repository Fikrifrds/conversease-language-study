questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya sudah menyelesaikan bagian pertama tugas."?
  options:
  - أَنْجَزْتُ الْجُزْءَ الْأَوَّلَ مِنَ الْمَهَمَّةِ.
  - مَا زِلْتُ أَعْمَلُ عَلَى التَّفَاصِيلِ.
  - لَا تُوجَدُ مُشْكِلَةٌ كَبِيرَةٌ حَتَّى الْآنَ.
  correct_answer: أَنْجَزْتُ الْجُزْءَ الْأَوَّلَ مِنَ الْمَهَمَّةِ.
