turns:
- coach: مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ الْمَوْقِفِ؟
  hint: 'Jawab dengan kalimat terhubung memakai: نَصِيحَتُكَ مُفِيدَةٌ.'
