scenario_key: arabic_b1_responding_to_advice
mode: lesson_practice_coach
level_code: B1
opening_line: مَا السُّؤَالُ الَّذِي يُسَاعِدُكَ عَلَى فَهْمِ الْمَوْقِفِ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: responding to advice,
  dengan jawaban yang lebih terhubung dan alasan yang jelas.'
