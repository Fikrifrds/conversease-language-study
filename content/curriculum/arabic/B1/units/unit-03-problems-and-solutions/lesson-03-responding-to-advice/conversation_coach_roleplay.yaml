- coach: 'استخدم الفكرة: سَأُجَرِّبُ ذَلِكَ الْيَوْمَ.'
  hint: 'Jawab dengan kalimat terhubung memakai: سَأُجَرِّبُ ذَلِكَ الْيَوْمَ.'
