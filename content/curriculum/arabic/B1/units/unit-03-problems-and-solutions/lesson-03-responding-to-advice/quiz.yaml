  prompt: Frasa mana yang berarti "Nasihatmu bermanfaat."?
  options:
  - نَصِيحَتُكَ مُفِيدَةٌ.
  - سَأُجَرِّبُ ذَلِكَ الْيَوْمَ.
  - أَتَّفِقُ مَعَكَ فِي هَذِهِ النُّقْطَةِ.
  correct_answer: نَصِيحَتُكَ مُفِيدَةٌ.
