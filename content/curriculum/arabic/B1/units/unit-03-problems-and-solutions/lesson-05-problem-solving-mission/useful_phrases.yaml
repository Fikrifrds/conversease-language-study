phrases:
- phrase: سَأَشْرَحُ الْمُشْكِلَةَ بِاخْتِصَارٍ.
  meaning_id: Saya akan menjelaskan masalahnya dengan singkat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: السَّبَبُ غَيْرُ وَاضِحٍ حَتَّى الْآنَ.
  meaning_id: Penyebabnya belum jelas sampai sekarang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَقْتَرِحُ أَنْ نُجَرِّبَ حَلًّا مُؤَقَّتًا.
  meaning_id: Saya menyarankan kita mencoba solusi sementara.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَا نَجَحَ، نُثَبِّتُهُ.
  meaning_id: Jika berhasil, kita tetapkan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: وَإِذَا لَمْ يَنْجَحْ، نَبْحَثُ عَنْ خِيَارٍ آخَرَ.
  meaning_id: Jika tidak berhasil, kita cari pilihan lain.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
