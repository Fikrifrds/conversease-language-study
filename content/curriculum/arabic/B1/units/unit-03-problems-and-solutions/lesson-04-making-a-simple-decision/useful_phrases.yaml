phrases:
- phrase: لَدَيْنَا خِيَارَانِ مُنَاسِبَانِ.
  meaning_id: Kita punya dua pilihan yang cocok.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: الْخِيَارُ الْأَوَّلُ أَسْهَلُ.
  meaning_id: Pilihan pertama lebih mudah.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: الْخِيَارُ الثَّانِي أَفْضَلُ عَلَى الْمَدَى الطَّوِيلِ.
  meaning_id: Pilihan kedua lebih baik untuk jangka panjang.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أُفَضِّلُ الْخِيَارَ الثَّانِي لِهَذَا السَّبَبِ.
  meaning_id: Saya memilih pilihan kedua karena alasan ini.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَنْ، نَبْدَأُ بِهِ غَدًا.
  meaning_id: Kalau begitu, kita mulai besok.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
