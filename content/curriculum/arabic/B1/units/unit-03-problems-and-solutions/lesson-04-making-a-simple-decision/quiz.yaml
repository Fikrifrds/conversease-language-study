questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Kita punya dua pilihan yang cocok."?
  options:
  - لَدَيْنَا خِيَارَانِ مُنَاسِبَانِ.
  - الْخِيَارُ الْأَوَّلُ أَسْهَلُ.
  - الْخِيَارُ الثَّانِي أَفْضَلُ عَلَى الْمَدَى الطَّوِيلِ.
  correct_answer: لَدَيْنَا خِيَارَانِ مُنَاسِبَانِ.
