prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Kita punya dua pilihan yang cocok.'
  target_response: لَدَيْنَا خِيَارَانِ مُنَاسِبَانِ.
  acceptable_responses:
  - لَدَيْنَا خِيَارَانِ مُنَاسِبَانِ.
- prompt: 'Ucapkan dalam bahasa Arab: Pilihan pertama lebih mudah.'
  target_response: الْخِيَارُ الْأَوَّلُ أَسْهَلُ.
  acceptable_responses:
  - الْخِيَارُ الْأَوَّلُ أَسْهَلُ.
- prompt: 'Ucapkan dalam bahasa Arab: Pilihan kedua lebih baik untuk jangka panjang.'
  target_response: الْخِيَارُ الثَّانِي أَفْضَلُ عَلَى الْمَدَى الطَّوِيلِ.
  acceptable_responses:
  - الْخِيَارُ الثَّانِي أَفْضَلُ عَلَى الْمَدَى الطَّوِيلِ.
