phrases:
- phrase: أَقْتَرِحُ أَنْ نُجَرِّبَ حَلًّا بَسِيطًا.
  meaning_id: Saya menyarankan kita mencoba solusi sederhana.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: يُمْكِنُنَا أَنْ نُغَيِّرَ الْخُطَّةَ قَلِيلًا.
  meaning_id: Kita bisa mengubah rencana sedikit.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: هَذَا الْحَلُّ أَسْرَعُ مِنَ الْخِيَارِ الْآخَرِ.
  meaning_id: Solusi ini lebih cepat dari pilihan lain.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: لَكِنَّهُ يَحْتَاجُ إِلَى مُرَاجَعَةٍ.
  meaning_id: Tetapi perlu tinjauan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: إِذَا نَجَحَ، نَسْتَمِرُّ عَلَيْهِ.
  meaning_id: Jika berhasil, kita lanjutkan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
