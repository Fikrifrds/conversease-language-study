vocabulary:
- word: أَقْتَرِحُ
  meaning_id: saya menyarankan
  usage_note: 'Dipakai untuk arti "saya menyarankan". Contoh: "أَقْتَرِحُ أَنْ نُجَرِّبَ حَلًّا بَسِيطًا."'
- word: خُطَّةٌ
  meaning_id: rencana
  usage_note: 'Dipakai untuk arti "rencana". Contoh: "يُمْكِنُنَا أَنْ نُغَيِّرَ الْخُطَّةَ قَلِيلًا."'
- word: قَلِيلًا
  meaning_id: sedikit
  usage_note: 'Dipakai untuk arti "sedikit". Contoh: "يُمْكِنُنَا أَنْ نُغَيِّرَ الْخُطَّةَ قَلِيلًا."'
- word: حَلٌّ
  meaning_id: solusi
  usage_note: 'Dipakai untuk arti "solusi". Contoh: "هَذَا الْحَلُّ أَسْرَعُ مِنَ الْخِيَارِ الْآخَرِ."'
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "هَذَا الْحَلُّ أَسْرَعُ مِنَ الْخِيَارِ الْآخَرِ."'
- word: آخَرُ
  meaning_id: lain
  usage_note: 'Dipakai untuk arti "lain". Contoh: "هَذَا الْحَلُّ أَسْرَعُ مِنَ الْخِيَارِ الْآخَرِ."'
- word: مُرَاجَعَةٌ
  meaning_id: peninjauan ulang/tinjauan
  usage_note: 'Dipakai untuk arti "peninjauan ulang/tinjauan". Contoh: "لَكِنَّهُ يَحْتَاجُ إِلَى مُرَاجَعَةٍ."'
