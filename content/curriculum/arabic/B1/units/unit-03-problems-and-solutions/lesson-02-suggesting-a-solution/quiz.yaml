questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya menyarankan kita mencoba solusi sederhana."?
  options:
  - أَقْتَرِحُ أَنْ نُجَرِّبَ حَلًّا بَسِيطًا.
  - يُمْكِنُنَا أَنْ نُغَيِّرَ الْخُطَّةَ قَلِيلًا.
  - هَذَا الْحَلُّ أَسْرَعُ مِنَ الْخِيَارِ الْآخَرِ.
  correct_answer: أَقْتَرِحُ أَنْ نُجَرِّبَ حَلًّا بَسِيطًا.
- key: phrase_2
