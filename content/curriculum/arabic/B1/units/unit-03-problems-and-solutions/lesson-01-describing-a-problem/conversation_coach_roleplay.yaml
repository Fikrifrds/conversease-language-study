- coach: 'استخدم الفكرة: الْمُشْكِلَةُ بَدَأَتْ مُنْذُ الصَّبَاحِ.'
  hint: 'Jawab dengan kalimat terhubung memakai: الْمُشْكِلَةُ بَدَأَتْ مُنْذُ الصَّبَاحِ.'
  sample_answer: الْمُشْكِلَةُ بَدَأَتْ مُنْذُ الصَّبَاحِ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
  - الْمُشْكِلَةُ
  - بَدَأَتْ
  - مُنْذُ
  - الصَّبَاحِ
