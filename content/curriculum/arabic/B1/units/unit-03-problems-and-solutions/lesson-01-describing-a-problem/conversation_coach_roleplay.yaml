- coach: 'استخدم الفكرة: أَثَّرَ ذَلِكَ عَلَى الْعَمَلِ.'
  hint: 'Jawab dengan kalimat terhubung memakai: أَثَّرَ ذَلِكَ عَلَى الْعَمَلِ.'
  sample_answer: أَثَّرَ ذَلِكَ عَلَى الْعَمَلِ.
  focus: Gunakan untuk percakapan B1 yang lebih terhubung.
  expected_keywords:
