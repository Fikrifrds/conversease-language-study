scenario_key: arabic_b1_describing_a_problem
mode: lesson_practice_coach
level_code: B1
opening_line: لِنَتَدَرَّبْ عَلَى تَأَخُّرِ الطَّلَبِ فِي النِّظَامِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
learner_goal: 'Latih percakapan Arab B1 untuk situasi ini: Kamu berlatih topik B1: describing a problem, dengan jawaban yang
  lebih terhubung dan alasan yang jelas.'
max_turns: 6
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: لِنَتَدَرَّبْ عَلَى تَأَخُّرِ الطَّلَبِ فِي النِّظَامِ. كَيْفَ تَبْدَأُ الْحِوَارَ؟
