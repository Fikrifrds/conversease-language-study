phrases:
- phrase: تُوجَدُ مُشْكِلَةٌ فِي الْخِدْمَةِ.
  meaning_id: Ada masalah pada layanan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: الْمُشْكِلَةُ بَدَأَتْ مُنْذُ الصَّبَاحِ.
  meaning_id: Masalahnya mulai sejak pagi.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَثَّرَ ذَلِكَ عَلَى الْعَمَلِ.
  meaning_id: Itu memengaruhi pekerjaan.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: أَحْتَاجُ إِلَى حَلٍّ سَرِيعٍ.
  meaning_id: Saya butuh solusi cepat.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
- phrase: سَأُرَاجِعُ السَّبَبَ أَوَّلًا.
  meaning_id: Saya akan meninjau penyebabnya dulu.
  usage_note: Gunakan untuk percakapan B1 yang lebih terhubung.
