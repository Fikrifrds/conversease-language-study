phrases:
- phrase: مَاذَا تَفْعَلُ بَعْدَ الدَّرْسِ؟
  meaning_id: Apa yang kamu lakukan setelah pelajaran?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu lakukan setelah pelajaran?'
- phrase: لِمَاذَا؟
  meaning_id: Mengapa?
  usage_note: 'Gunakan saat ingin mengatakan: Mengapa?'
- phrase: لِأَنَّنِي أُرِيدُ أَنْ أَتَدَرَّبَ.
  meaning_id: Karena saya ingin berlatih.
  usage_note: 'Gunakan saat ingin mengatakan: Karena saya ingin berlatih.'
- phrase: هَذَا جَيِّدٌ.
  meaning_id: Itu bagus.
  usage_note: 'Gunakan saat ingin mengatakan: Itu bagus.'
- phrase: وَأَنْتَ؟
  meaning_id: Dan kamu?
  usage_note: 'Gunakan saat ingin mengatakan: Dan kamu?'
