scenario_key: arabic_talking_about_the_weekend
mode: lesson_practice_coach
level_code: A2
opening_line: مَاذَا فَعَلْتَ فِي نِهَايَةِ الْأُسْبُوعِ؟
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu menceritakan kegiatan akhir pekan secara
  pendek: ke mana pergi, dengan siapa, dan bagaimana rasanya.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَاذَا فَعَلْتَ فِي نِهَايَةِ الْأُسْبُوعِ؟
  hint: 'Jawab dengan pola: مَاذَا فَعَلْتَ فِي نِهَايَةِ الْأُسْبُوعِ؟'
  sample_answer: مَاذَا فَعَلْتَ فِي نِهَايَةِ الْأُسْبُوعِ؟
  focus: 'Latihan frasa: Apa yang kamu lakukan pada akhir pekan?'
  expected_keywords:
  - مَاذَا
  - فَعَلْتَ
  - فِي
  indonesian_explanation: Apa yang kamu lakukan pada akhir pekan?
- coach: 'استخدم: ذَهَبْتُ إِلَى الْحَدِيقَةِ.'
  hint: 'Jawab dengan pola: ذَهَبْتُ إِلَى الْحَدِيقَةِ.'
  sample_answer: ذَهَبْتُ إِلَى الْحَدِيقَةِ.
  focus: 'Latihan frasa: Saya pergi ke taman.'
  expected_keywords:
  - ذَهَبْتُ
  - إِلَى
  - الْحَدِيقَةِ
  indonesian_explanation: Saya pergi ke taman.
- coach: 'استخدم: مَعَ أُسْرَتِي.'
  hint: 'Jawab dengan pola: مَعَ أُسْرَتِي.'
  sample_answer: مَعَ أُسْرَتِي.
  focus: 'Latihan frasa: Bersama keluarga saya.'
  expected_keywords:
  - مَعَ
  - أُسْرَتِي
  indonesian_explanation: Bersama keluarga saya.
target_phrases:
- مَاذَا فَعَلْتَ فِي نِهَايَةِ الْأُسْبُوعِ؟
- ذَهَبْتُ إِلَى الْحَدِيقَةِ.
- مَعَ أُسْرَتِي.
- كَانَ الْمَكَانُ جَمِيلًا.
