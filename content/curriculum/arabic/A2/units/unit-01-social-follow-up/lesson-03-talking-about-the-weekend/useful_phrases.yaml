phrases:
- phrase: مَاذَا فَعَلْتَ فِي نِهَايَةِ الْأُسْبُوعِ؟
  meaning_id: Apa yang kamu lakukan pada akhir pekan?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu lakukan pada akhir pekan?'
- phrase: ذَهَبْتُ إِلَى الْحَدِيقَةِ.
  meaning_id: Saya pergi ke taman.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pergi ke taman.'
- phrase: مَعَ أُسْرَتِي.
  meaning_id: Bersama keluarga saya.
  usage_note: 'Gunakan saat ingin mengatakan: Bersama keluarga saya.'
- phrase: كَانَ الْمَكَانُ جَمِيلًا.
  meaning_id: Tempatnya indah.
  usage_note: 'Gunakan saat ingin mengatakan: Tempatnya indah.'
- phrase: وَمَاذَا فَعَلْتَ أَنْتَ؟
  meaning_id: Dan apa yang kamu lakukan?
  usage_note: 'Gunakan saat ingin mengatakan: Dan apa yang kamu lakukan?'
