  focus: 'Latihan frasa: Pelajarannya bagus.'
  expected_keywords:
  - كَانَ
  - الدَّرْسُ
  - جَيِّدًا
  indonesian_explanation: Pelajarannya bagus.
target_phrases:
- كَيْفَ حَالُكَ؟
- أَنَا بِخَيْرٍ، وَأَنْتَ؟
