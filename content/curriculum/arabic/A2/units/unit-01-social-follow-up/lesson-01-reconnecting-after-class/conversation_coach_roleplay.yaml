scenario_key: arabic_reconnecting_after_class
mode: lesson_practice_coach
level_code: A2
opening_line: السَّلَامُ عَلَيْكِ يَا مَرْيَمُ.
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu bertemu teman setelah kelas bahasa Arab
  dan membuka percakapan singkat dengan kabar, kelas, dan rencana belajar.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: السَّلَامُ عَلَيْكِ يَا مَرْيَمُ.
  hint: 'Jawab dengan pola: كَيْفَ حَالُكَ؟'
  sample_answer: كَيْفَ حَالُكَ؟
  focus: 'Latihan frasa: Apa kabarmu?'
  expected_keywords:
