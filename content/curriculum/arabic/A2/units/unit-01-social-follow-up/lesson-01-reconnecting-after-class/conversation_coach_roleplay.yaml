  - بِخَيْرٍ،
  - وَأَنْتَ
  indonesian_explanation: Saya baik, dan kamu?
- coach: 'استخدم: كَانَ الدَّرْسُ جَيِّدًا.'
  hint: 'Jawab dengan pola: كَانَ الدَّرْسُ جَيِّدًا.'
