phrases:
- phrase: كَيْفَ حَالُكَ؟
  meaning_id: Apa kabarmu?
  usage_note: 'Gunakan saat ingin mengatakan: Apa kabarmu?'
- phrase: أَنَا بِخَيْرٍ، وَأَنْتَ؟
  meaning_id: Saya baik, dan kamu?
  usage_note: 'Gunakan saat ingin mengatakan: Saya baik, dan kamu?'
- phrase: كَانَ الدَّرْسُ جَيِّدًا.
  meaning_id: Pelajarannya bagus.
  usage_note: 'Gunakan saat ingin mengatakan: Pelajarannya bagus.'
- phrase: سَأُرَاجِعُ الْكَلِمَاتِ.
  meaning_id: Saya akan mengulang kosakata.
  usage_note: 'Gunakan saat ingin mengatakan: Saya akan mengulang kosakata.'
- phrase: إِلَى اللِّقَاءِ غَدًا.
  meaning_id: Sampai bertemu besok.
  usage_note: 'Gunakan saat ingin mengatakan: Sampai bertemu besok.'
