phrases:
- phrase: لَا أَسْتَطِيعُ فِي هَذَا الْوَقْتِ.
  meaning_id: Saya tidak bisa pada waktu ini.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak bisa pada waktu ini.'
- phrase: هَلْ يُمْكِنُ أَنْ نُغَيِّرَ الْمَوْعِدَ؟
  meaning_id: Bisakah kita mengubah jadwalnya?
  usage_note: 'Gunakan saat ingin mengatakan: Bisakah kita mengubah jadwalnya?'
- phrase: مَاذَا عَنِ السَّاعَةِ الْخَامِسَةِ؟
  meaning_id: Bagaimana dengan jam lima?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana dengan jam lima?'
- phrase: الْوَقْتُ مُنَاسِبٌ.
  meaning_id: Waktunya cocok.
  usage_note: 'Gunakan saat ingin mengatakan: Waktunya cocok.'
- phrase: شُكْرًا عَلَى التَّفَهُّمِ.
  meaning_id: Terima kasih atas pengertiannya.
  usage_note: 'Gunakan saat ingin mengatakan: Terima kasih atas pengertiannya.'
