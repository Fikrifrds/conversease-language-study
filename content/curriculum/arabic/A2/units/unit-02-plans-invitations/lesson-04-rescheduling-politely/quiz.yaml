questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya tidak bisa pada waktu ini."?
  options:
  - لَا أَسْتَطِيعُ فِي هَذَا الْوَقْتِ.
  - هَلْ يُمْكِنُ أَنْ نُغَيِّرَ الْمَوْعِدَ؟
  - مَاذَا عَنِ السَّاعَةِ الْخَامِسَةِ؟
  correct_answer: لَا أَسْتَطِيعُ فِي هَذَا الْوَقْتِ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Bisakah kita mengubah jadwalnya?"?
