prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Ya, saya bisa.'
  target_response: نَعَمْ، أَسْتَطِيعُ.
  acceptable_responses:
  - نَعَمْ، أَسْتَطِيعُ.
- prompt: 'Ucapkan dalam bahasa Arab: Maaf, saya tidak bisa.'
  target_response: آسِفٌ، لَا أَسْتَطِيعُ.
  acceptable_responses:
  - آسِفٌ، لَا أَسْتَطِيعُ.
- prompt: 'Ucapkan dalam bahasa Arab: Karena saya punya janji.'
  target_response: لِأَنَّ لَدَيَّ مَوْعِدًا.
  acceptable_responses:
  - لِأَنَّ لَدَيَّ مَوْعِدًا.
