scenario_key: arabic_inviting_someone
mode: lesson_practice_coach
level_code: A2
opening_line: هَلْ تُرِيدِينَ أَنْ تَدْرُسِي مَعِي الْيَوْمَ؟
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu mengajak teman ikut belajar bersama dan
  menjelaskan alasan singkat mengapa kegiatan itu bermanfaat.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: هَلْ تُرِيدِينَ أَنْ تَدْرُسِي مَعِي الْيَوْمَ؟
  hint: 'Jawab dengan pola: هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟'
  sample_answer: هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟
  focus: 'Latihan frasa: Apakah kamu ingin belajar bersama saya?'
  expected_keywords:
  - هَلْ
  - تُرِيدُ
  - أَنْ
  indonesian_explanation: Apakah kamu ingin belajar bersama saya?
- coach: 'استخدم: لِأَنَّ الدَّرْسَ مُهِمٌّ.'
  hint: 'Jawab dengan pola: لِأَنَّ الدَّرْسَ مُهِمٌّ.'
  sample_answer: لِأَنَّ الدَّرْسَ مُهِمٌّ.
  focus: 'Latihan frasa: Karena pelajarannya penting.'
  expected_keywords:
  - لِأَنَّ
  - الدَّرْسَ
  - مُهِمٌّ
  indonesian_explanation: Karena pelajarannya penting.
- coach: 'استخدم: فِكْرَةٌ جَيِّدَةٌ.'
  hint: 'Jawab dengan pola: فِكْرَةٌ جَيِّدَةٌ.'
  sample_answer: فِكْرَةٌ جَيِّدَةٌ.
  focus: 'Latihan frasa: Ide yang bagus.'
  expected_keywords:
  - فِكْرَةٌ
  - جَيِّدَةٌ
  indonesian_explanation: Ide yang bagus.
target_phrases:
- هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟
- لِأَنَّ الدَّرْسَ مُهِمٌّ.
- فِكْرَةٌ جَيِّدَةٌ.
- أَنَا مَوْجُودٌ بَعْدَ الْعَصْرِ.
