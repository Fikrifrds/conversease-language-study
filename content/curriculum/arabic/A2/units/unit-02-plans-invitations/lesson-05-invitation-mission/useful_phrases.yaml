phrases:
- phrase: هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟
  meaning_id: Apakah kamu ingin belajar bersama saya?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kamu ingin belajar bersama saya?'
- phrase: لِأَنَّ الِاخْتِبَارَ قَرِيبٌ.
  meaning_id: Karena tesnya dekat.
  usage_note: 'Gunakan saat ingin mengatakan: Karena tesnya dekat.'
- phrase: هَلْ يُمْكِنُ أَنْ نُغَيِّرَ الْمَوْعِدَ؟
  meaning_id: Bisakah kita mengubah jadwalnya?
  usage_note: 'Gunakan saat ingin mengatakan: Bisakah kita mengubah jadwalnya?'
- phrase: نَلْتَقِي أَمَامَ الْمَرْكَزِ.
  meaning_id: Kita bertemu di depan pusat.
  usage_note: 'Gunakan saat ingin mengatakan: Kita bertemu di depan pusat.'
- phrase: إِلَى اللِّقَاءِ.
  meaning_id: Sampai bertemu.
  usage_note: 'Gunakan saat ingin mengatakan: Sampai bertemu.'
