vocabulary:
- word: مَاذَا
  meaning_id: apa
  usage_note: 'Dipakai untuk arti "apa". Contoh: "مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟"'
- word: فَعَلْتُ
  meaning_id: saya melakukan
  usage_note: 'Dipakai untuk arti "saya melakukan". Contoh: "مَاذَا فَعَلْتَ بَعْدَ
    الدَّرْسِ؟"'
- word: الدَّرْسُ
  meaning_id: pelajaran
  usage_note: 'Dipakai untuk arti "pelajaran". Contoh: "مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟"'
- word: ذَهَبْتُ
  meaning_id: saya pergi
  usage_note: 'Dipakai untuk arti "saya pergi". Contoh: "مَعَ مَنْ ذَهَبْتَ؟"'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ كَانَ الْمَكَانُ؟"'
- word: مَكَانٌ
  meaning_id: tempat
  usage_note: 'Dipakai untuk arti "tempat". Contoh: "كَيْفَ كَانَ الْمَكَانُ؟"'
- word: قَرِيبٌ
  meaning_id: dekat
  usage_note: 'Dipakai untuk arti "dekat". Contoh: "ذَهَبْتُ إِلَى مَقْهًى قَرِيبٍ."'
- word: رَجَعْتُ
  meaning_id: saya kembali
  usage_note: 'Dipakai untuk arti "saya kembali". Contoh: "رَجَعْتُ إِلَى الْبَيْتِ
    وَكَتَبْتُ وَاجِبِي."'
