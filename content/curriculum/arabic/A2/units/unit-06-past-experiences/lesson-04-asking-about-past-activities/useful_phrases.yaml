phrases:
- phrase: مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟
  meaning_id: Apa yang kamu lakukan setelah pelajaran?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu lakukan setelah pelajaran?'
- phrase: مَعَ مَنْ ذَهَبْتَ؟
  meaning_id: Dengan siapa kamu pergi?
  usage_note: 'Gunakan saat ingin mengatakan: Dengan siapa kamu pergi?'
- phrase: كَيْفَ كَانَ الْمَكَانُ؟
  meaning_id: Bagaimana tempatnya?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana tempatnya?'
- phrase: هَلْ أَعْجَبَكَ؟
  meaning_id: Apakah kamu menyukainya?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kamu menyukainya?'
- phrase: مَاذَا فَعَلْتَ بَعْدَ ذَلِكَ؟
  meaning_id: Apa yang kamu lakukan setelah itu?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu lakukan setelah itu?'
