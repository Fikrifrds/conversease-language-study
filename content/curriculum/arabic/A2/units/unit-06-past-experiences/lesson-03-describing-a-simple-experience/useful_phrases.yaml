phrases:
- phrase: كَانَتِ التَّجْرِبَةُ جَيِّدَةً.
  meaning_id: Pengalamannya baik.
  usage_note: 'Gunakan saat ingin mengatakan: Pengalamannya baik.'
- phrase: رَأَيْتُ مَكَانًا جَمِيلًا.
  meaning_id: Saya melihat tempat yang indah.
  usage_note: 'Gunakan saat ingin mengatakan: Saya melihat tempat yang indah.'
- phrase: أَعْجَبَنِي الطَّعَامُ.
  meaning_id: Saya suka makanannya.
  usage_note: 'Gunakan saat ingin mengatakan: Saya suka makanannya.'
- phrase: كَانَ الْمَكَانُ مُزْدَحِمًا.
  meaning_id: Tempatnya ramai.
  usage_note: 'Gunakan saat ingin mengatakan: Tempatnya ramai.'
- phrase: أُرِيدُ أَنْ أَذْهَبَ مَرَّةً أُخْرَى.
  meaning_id: Saya ingin pergi sekali lagi.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin pergi sekali lagi.'
