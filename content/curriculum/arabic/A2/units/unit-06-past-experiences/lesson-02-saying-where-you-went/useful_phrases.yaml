phrases:
- phrase: أَيْنَ ذَهَبْتَ؟
  meaning_id: Ke mana kamu pergi?
  usage_note: 'Gunakan saat ingin mengatakan: Ke mana kamu pergi?'
- phrase: ذَهَبْتُ إِلَى السُّوقِ.
  meaning_id: Saya pergi ke pasar.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pergi ke pasar.'
- phrase: ذَهَبْتُ مَعَ صَدِيقِي.
  meaning_id: Saya pergi bersama teman saya.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pergi bersama teman saya.'
- phrase: فِي الصَّبَاحِ.
  meaning_id: Pada pagi hari.
  usage_note: 'Gunakan saat ingin mengatakan: Pada pagi hari.'
- phrase: رَجَعْتُ فِي الْمَسَاءِ.
  meaning_id: Saya kembali pada sore hari.
  usage_note: 'Gunakan saat ingin mengatakan: Saya kembali pada sore hari.'
