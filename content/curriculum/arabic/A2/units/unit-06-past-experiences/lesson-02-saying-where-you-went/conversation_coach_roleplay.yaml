scenario_key: arabic_saying_where_you_went
mode: lesson_practice_coach
level_code: A2
opening_line: أَيْنَ ذَهَبْتَ فِي نِهَايَةِ الْأُسْبُوعِ يَا عُمَرُ؟
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu menceritakan tempat yang kamu datangi
  akhir pekan lalu: pasar, taman, rumah teman, atau pusat kota.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: أَيْنَ ذَهَبْتَ فِي نِهَايَةِ الْأُسْبُوعِ يَا عُمَرُ؟
  hint: 'Jawab dengan pola: أَيْنَ ذَهَبْتَ؟'
  sample_answer: أَيْنَ ذَهَبْتَ؟
  focus: 'Latihan frasa: Ke mana kamu pergi?'
  expected_keywords:
  - أَيْنَ
  - ذَهَبْتَ
  indonesian_explanation: Ke mana kamu pergi?
- coach: 'استخدم: ذَهَبْتُ إِلَى السُّوقِ.'
  hint: 'Jawab dengan pola: ذَهَبْتُ إِلَى السُّوقِ.'
  sample_answer: ذَهَبْتُ إِلَى السُّوقِ.
  focus: 'Latihan frasa: Saya pergi ke pasar.'
  expected_keywords:
  - ذَهَبْتُ
  - إِلَى
  - السُّوقِ
  indonesian_explanation: Saya pergi ke pasar.
- coach: 'استخدم: ذَهَبْتُ مَعَ صَدِيقِي.'
  hint: 'Jawab dengan pola: ذَهَبْتُ مَعَ صَدِيقِي.'
  sample_answer: ذَهَبْتُ مَعَ صَدِيقِي.
  focus: 'Latihan frasa: Saya pergi bersama teman saya.'
  expected_keywords:
  - ذَهَبْتُ
  - مَعَ
  - صَدِيقِي
  indonesian_explanation: Saya pergi bersama teman saya.
target_phrases:
- أَيْنَ ذَهَبْتَ؟
- ذَهَبْتُ إِلَى السُّوقِ.
- ذَهَبْتُ مَعَ صَدِيقِي.
- فِي الصَّبَاحِ.
