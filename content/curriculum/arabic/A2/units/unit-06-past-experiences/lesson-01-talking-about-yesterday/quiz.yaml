questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Apa yang kamu lakukan kemarin?"?
  options:
  - مَاذَا فَعَلْتَ أَمْسِ؟
  - ذَهَبْتُ إِلَى الْمَكْتَبَةِ.
  - دَرَسْتُ بَعْضَ الْعَرَبِيَّةِ.
  correct_answer: مَاذَا فَعَلْتَ أَمْسِ؟
