scenario_key: arabic_talking_about_yesterday
mode: lesson_practice_coach
level_code: A2
opening_line: مَاذَا فَعَلْتِ أَمْسِ يَا لَيْلَى؟
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu bertemu teman setelah kelas dan menceritakan
  kegiatan kemarin dengan kalimat pendek.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَاذَا فَعَلْتِ أَمْسِ يَا لَيْلَى؟
  hint: 'Jawab dengan pola: مَاذَا فَعَلْتَ أَمْسِ؟'
  sample_answer: مَاذَا فَعَلْتَ أَمْسِ؟
  focus: 'Latihan frasa: Apa yang kamu lakukan kemarin?'
  expected_keywords:
  - مَاذَا
  - فَعَلْتَ
  - أَمْسِ
  indonesian_explanation: Apa yang kamu lakukan kemarin?
- coach: 'استخدم: ذَهَبْتُ إِلَى الْمَكْتَبَةِ.'
  hint: 'Jawab dengan pola: ذَهَبْتُ إِلَى الْمَكْتَبَةِ.'
  sample_answer: ذَهَبْتُ إِلَى الْمَكْتَبَةِ.
  focus: 'Latihan frasa: Saya pergi ke perpustakaan.'
  expected_keywords:
  - ذَهَبْتُ
  - إِلَى
  - الْمَكْتَبَةِ
  indonesian_explanation: Saya pergi ke perpustakaan.
- coach: 'استخدم: دَرَسْتُ بَعْضَ الْعَرَبِيَّةِ.'
  hint: 'Jawab dengan pola: دَرَسْتُ بَعْضَ الْعَرَبِيَّةِ.'
  sample_answer: دَرَسْتُ بَعْضَ الْعَرَبِيَّةِ.
  focus: 'Latihan frasa: Saya belajar sedikit bahasa Arab.'
  expected_keywords:
  - دَرَسْتُ
  - بَعْضَ
  - الْعَرَبِيَّةِ
  indonesian_explanation: Saya belajar sedikit bahasa Arab.
target_phrases:
- مَاذَا فَعَلْتَ أَمْسِ؟
- ذَهَبْتُ إِلَى الْمَكْتَبَةِ.
- دَرَسْتُ بَعْضَ الْعَرَبِيَّةِ.
- بَعْدَ ذَلِكَ، رَجَعْتُ إِلَى الْبَيْتِ.
