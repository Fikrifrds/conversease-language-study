phrases:
- phrase: مَاذَا فَعَلْتَ أَمْسِ؟
  meaning_id: Apa yang kamu lakukan kemarin?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu lakukan kemarin?'
- phrase: ذَهَبْتُ إِلَى الْمَكْتَبَةِ.
  meaning_id: Saya pergi ke perpustakaan.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pergi ke perpustakaan.'
- phrase: دَرَسْتُ بَعْضَ الْعَرَبِيَّةِ.
  meaning_id: Saya belajar sedikit bahasa Arab.
  usage_note: 'Gunakan saat ingin mengatakan: Saya belajar sedikit bahasa Arab.'
- phrase: بَعْدَ ذَلِكَ، رَجَعْتُ إِلَى الْبَيْتِ.
  meaning_id: Setelah itu, saya kembali ke rumah.
  usage_note: 'Gunakan saat ingin mengatakan: Setelah itu, saya kembali ke rumah.'
- phrase: كَانَ الْيَوْمُ جَيِّدًا.
  meaning_id: Harinya baik.
  usage_note: 'Gunakan saat ingin mengatakan: Harinya baik.'
