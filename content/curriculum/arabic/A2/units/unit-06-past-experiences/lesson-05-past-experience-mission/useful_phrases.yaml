phrases:
- phrase: فِي نِهَايَةِ الْأُسْبُوعِ، ذَهَبْتُ إِلَى الْمَدِينَةِ.
  meaning_id: Pada akhir pekan, saya pergi ke kota.
  usage_note: 'Gunakan saat ingin mengatakan: Pada akhir pekan, saya pergi ke kota.'
- phrase: رَأَيْتُ مَكَانًا جَدِيدًا.
  meaning_id: Saya melihat tempat baru.
  usage_note: 'Gunakan saat ingin mengatakan: Saya melihat tempat baru.'
- phrase: اشْتَرَيْتُ شَيْئًا صَغِيرًا.
  meaning_id: Saya membeli sesuatu yang kecil.
  usage_note: 'Gunakan saat ingin mengatakan: Saya membeli sesuatu yang kecil.'
- phrase: بَعْدَ ذَلِكَ، رَجَعْتُ إِلَى الْبَيْتِ.
  meaning_id: Setelah itu, saya kembali ke rumah.
  usage_note: 'Gunakan saat ingin mengatakan: Setelah itu, saya kembali ke rumah.'
- phrase: كَانَتِ التَّجْرِبَةُ مُفِيدَةً.
  meaning_id: Pengalamannya bermanfaat.
  usage_note: 'Gunakan saat ingin mengatakan: Pengalamannya bermanfaat.'
