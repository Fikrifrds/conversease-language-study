questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Pada akhir pekan, saya pergi ke kota."?
  options:
  - فِي نِهَايَةِ الْأُسْبُوعِ، ذَهَبْتُ إِلَى الْمَدِينَةِ.
  - رَأَيْتُ مَكَانًا جَدِيدًا.
  - اشْتَرَيْتُ شَيْئًا صَغِيرًا.
  correct_answer: فِي نِهَايَةِ الْأُسْبُوعِ، ذَهَبْتُ إِلَى الْمَدِينَةِ.
