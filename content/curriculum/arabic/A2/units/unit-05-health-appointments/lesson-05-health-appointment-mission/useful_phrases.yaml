phrases:
- phrase: لَا أَشْعُرُ بِالرَّاحَةِ.
  meaning_id: Saya tidak merasa nyaman.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak merasa nyaman.'
- phrase: عِنْدِي أَلَمٌ خَفِيفٌ.
  meaning_id: Saya punya sakit ringan.
  usage_note: 'Gunakan saat ingin mengatakan: Saya punya sakit ringan.'
- phrase: أُرِيدُ مَوْعِدًا مَعَ الطَّبِيبِ.
  meaning_id: Saya ingin janji dengan dokter.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin janji dengan dokter.'
- phrase: السَّاعَةُ الْحَادِيَةَ عَشْرَةَ مُنَاسِبَةٌ.
  meaning_id: Jam sebelas cocok.
  usage_note: 'Gunakan saat ingin mengatakan: Jam sebelas cocok.'
- phrase: أُرِيدُ أَنْ أُؤَكِّدَ التَّفَاصِيلَ.
  meaning_id: Saya ingin mengonfirmasi detail.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin mengonfirmasi detail.'
