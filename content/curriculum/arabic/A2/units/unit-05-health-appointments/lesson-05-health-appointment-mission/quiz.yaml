questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya tidak merasa nyaman."?
  options:
  - لَا أَشْعُرُ بِالرَّاحَةِ.
  - عِنْدِي أَلَمٌ خَفِيفٌ.
  - أُرِيدُ مَوْعِدًا مَعَ الطَّبِيبِ.
  correct_answer: لَا أَشْعُرُ بِالرَّاحَةِ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Saya punya sakit ringan."?
  options:
  - عِنْدِي أَلَمٌ خَفِيفٌ.
  - لَا أَشْعُرُ بِالرَّاحَةِ.
  - أُرِيدُ مَوْعِدًا مَعَ الطَّبِيبِ.
  correct_answer: عِنْدِي أَلَمٌ خَفِيفٌ.
