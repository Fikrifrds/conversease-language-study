questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya punya sakit di tenggorokan."?
  options:
  - عِنْدِي أَلَمٌ فِي الْحَلْقِ.
  - لَدَيَّ سُعَالٌ خَفِيفٌ.
  - دَرَجَةُ حَرَارَتِي مُرْتَفِعَةٌ قَلِيلًا.
  correct_answer: عِنْدِي أَلَمٌ فِي الْحَلْقِ.
