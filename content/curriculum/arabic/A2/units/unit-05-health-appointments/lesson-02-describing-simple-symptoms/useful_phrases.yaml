phrases:
- phrase: عِنْدِي أَلَمٌ فِي الْحَلْقِ.
  meaning_id: Saya punya sakit di tenggorokan.
  usage_note: 'Gunakan saat ingin mengatakan: Saya punya sakit di tenggorokan.'
- phrase: لَدَيَّ سُعَالٌ خَفِيفٌ.
  meaning_id: Saya punya batuk ringan.
  usage_note: 'Gunakan saat ingin mengatakan: Saya punya batuk ringan.'
- phrase: دَرَجَةُ حَرَارَتِي مُرْتَفِعَةٌ قَلِيلًا.
  meaning_id: Suhu badan saya sedikit tinggi.
  usage_note: 'Gunakan saat ingin mengatakan: Suhu badan saya sedikit tinggi.'
- phrase: مُنْذُ يَوْمَيْنِ.
  meaning_id: Sejak dua hari.
  usage_note: 'Gunakan saat ingin mengatakan: Sejak dua hari.'
- phrase: الْأَلَمُ لَيْسَ شَدِيدًا.
  meaning_id: Rasanya tidak berat.
  usage_note: 'Gunakan saat ingin mengatakan: Rasanya tidak berat.'
