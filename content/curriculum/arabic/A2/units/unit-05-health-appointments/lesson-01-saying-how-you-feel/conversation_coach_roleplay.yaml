scenario_key: arabic_saying_how_you_feel
mode: lesson_practice_coach
level_code: A2
opening_line: مَرْحَبًا، لَا أَشْعُرُ بِالرَّاحَةِ.
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu datang ke klinik dan perlu mengatakan
  kondisi umum dengan sederhana sebelum petugas mencatat informasi awal.'
