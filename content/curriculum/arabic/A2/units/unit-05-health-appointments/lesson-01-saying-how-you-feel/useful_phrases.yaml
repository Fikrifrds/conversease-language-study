phrases:
- phrase: أَشْعُرُ بِتَعَبٍ.
  meaning_id: Saya merasa lelah.
  usage_note: 'Gunakan saat ingin mengatakan: Saya merasa lelah.'
- phrase: عِنْدِي صُدَاعٌ خَفِيفٌ.
  meaning_id: Saya punya sakit kepala ringan.
  usage_note: 'Gunakan saat ingin mengatakan: Saya punya sakit kepala ringan.'
- phrase: لَا أَشْعُرُ بِالرَّاحَةِ.
  meaning_id: Saya tidak merasa nyaman.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak merasa nyaman.'
- phrase: مُنْذُ هَذَا الصَّبَاحِ.
  meaning_id: Sejak pagi ini.
  usage_note: 'Gunakan saat ingin mengatakan: Sejak pagi ini.'
- phrase: هَلْ يُمْكِنُنِي أَنْ أَرَى الطَّبِيبَ؟
  meaning_id: Bisakah saya menemui dokter?
  usage_note: 'Gunakan saat ingin mengatakan: Bisakah saya menemui dokter?'
