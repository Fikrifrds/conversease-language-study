phrases:
- phrase: أُرِيدُ أَنْ أُؤَكِّدَ الْمَوْعِدَ.
  meaning_id: Saya ingin mengonfirmasi janji.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin mengonfirmasi janji.'
- phrase: هَلِ الْمَوْعِدُ غَدًا؟
  meaning_id: Apakah janjinya besok?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah janjinya besok?'
- phrase: فِي أَيِّ طَابِقٍ؟
  meaning_id: Di lantai berapa?
  usage_note: 'Gunakan saat ingin mengatakan: Di lantai berapa?'
- phrase: هَلْ رَقْمِي صَحِيحٌ؟
  meaning_id: Apakah nomor saya benar?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah nomor saya benar?'
- phrase: التَّفَاصِيلُ صَحِيحَةٌ.
  meaning_id: Detailnya benar.
  usage_note: 'Gunakan saat ingin mengatakan: Detailnya benar.'
