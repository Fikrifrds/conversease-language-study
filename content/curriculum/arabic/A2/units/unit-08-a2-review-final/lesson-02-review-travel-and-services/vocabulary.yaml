vocabulary:
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ تَذْكِرَةً إِلَى
    بَانْدُونْغ."'
- word: تَذْكِرَةٌ
  meaning_id: tiket
  usage_note: 'Dipakai untuk arti "tiket". Contoh: "أُرِيدُ تَذْكِرَةً إِلَى بَانْدُونْغ."'
- word: بَانْدُونْغ
  meaning_id: Bandung
  usage_note: 'Dipakai untuk arti "Bandung". Contoh: "أُرِيدُ تَذْكِرَةً إِلَى بَانْدُونْغ."'
- word: يُغَادِرُ
  meaning_id: berangkat
  usage_note: 'Dipakai untuk arti "berangkat". Contoh: "مَتَى يَغَادِرُ الْقِطَارُ؟"'
- word: قِطَارٌ
  meaning_id: kereta
  usage_note: 'Dipakai untuk arti "kereta". Contoh: "مَتَى يَغَادِرُ الْقِطَارُ؟"'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ؟"'
- word: رَصِيفٌ
  meaning_id: peron
  usage_note: 'Dipakai untuk arti "peron". Contoh: "كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ؟"'
- word: لَوْنٌ
  meaning_id: warna
  usage_note: 'Dipakai untuk arti "warna". Contoh: "هَلْ عِنْدَكُمْ لَوْنٌ آخَرُ؟"'
