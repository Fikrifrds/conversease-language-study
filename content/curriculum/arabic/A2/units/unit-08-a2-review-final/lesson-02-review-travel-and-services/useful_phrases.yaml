phrases:
- phrase: أُرِيدُ تَذْكِرَةً إِلَى بَانْدُونْغ.
  meaning_id: Saya ingin tiket ke Bandung.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin tiket ke Bandung.'
- phrase: مَتَى يَغَادِرُ الْقِطَارُ؟
  meaning_id: Kapan keretanya berangkat?
  usage_note: 'Gunakan saat ingin mengatakan: Kapan keretanya berangkat?'
- phrase: كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ؟
  meaning_id: Bagaimana saya pergi ke peron?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana saya pergi ke peron?'
- phrase: هَلْ عِنْدَكُمْ لَوْنٌ آخَرُ؟
  meaning_id: Apakah kalian punya warna lain?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kalian punya warna lain?'
- phrase: الْجِهَازُ لَا يَعْمَلُ.
  meaning_id: Perangkatnya tidak bekerja.
  usage_note: 'Gunakan saat ingin mengatakan: Perangkatnya tidak bekerja.'
