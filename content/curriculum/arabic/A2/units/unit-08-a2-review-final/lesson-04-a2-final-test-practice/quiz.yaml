questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Saya bisa berbicara tentang hari saya."?
  options:
  - أَسْتَطِيعُ أَنْ أَتَحَدَّثَ عَنْ يَوْمِي.
  - ذَهَبْتُ إِلَى مَكَانٍ جَدِيدٍ.
  - أُفَضِّلُ الصَّبَاحَ لِأَنَّهُ أَهْدَأُ.
  correct_answer: أَسْتَطِيعُ أَنْ أَتَحَدَّثَ عَنْ يَوْمِي.
- key: phrase_2
  prompt: Frasa mana yang berarti "Saya pergi ke tempat baru."?
  options:
  - ذَهَبْتُ إِلَى مَكَانٍ جَدِيدٍ.
  - أَسْتَطِيعُ أَنْ أَتَحَدَّثَ عَنْ يَوْمِي.
  - أُفَضِّلُ الصَّبَاحَ لِأَنَّهُ أَهْدَأُ.
  correct_answer: ذَهَبْتُ إِلَى مَكَانٍ جَدِيدٍ.
