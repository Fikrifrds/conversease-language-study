phrases:
- phrase: كَيْفَ كَانَتْ تَجْرِبَتُكَ؟
  meaning_id: Bagaimana pengalamanmu?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana pengalamanmu?'
- phrase: هَلْ تُرِيدُ أَنْ تَذْهَبَ مَعِي؟
  meaning_id: Apakah kamu ingin pergi bersama saya?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kamu ingin pergi bersama saya?'
- phrase: كَيْفَ أَذْهَبُ إِلَى الْمَرْكَزِ؟
  meaning_id: Bagaimana saya pergi ke pusat?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana saya pergi ke pusat?'
- phrase: أُرِيدُ أَنْ أُؤَكِّدَ الْمَوْعِدَ.
  meaning_id: Saya ingin mengonfirmasi janji.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin mengonfirmasi janji.'
- phrase: أَعْتَقِدُ أَنَّ الْخُطَّةَ جَيِّدَةٌ.
  meaning_id: Saya pikir rencananya baik.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pikir rencananya baik.'
