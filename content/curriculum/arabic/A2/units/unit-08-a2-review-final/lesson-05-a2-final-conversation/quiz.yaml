questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Bagaimana pengalamanmu?"?
  options:
  - كَيْفَ كَانَتْ تَجْرِبَتُكَ؟
  - هَلْ تُرِيدُ أَنْ تَذْهَبَ مَعِي؟
  - كَيْفَ أَذْهَبُ إِلَى الْمَرْكَزِ؟
  correct_answer: كَيْفَ كَانَتْ تَجْرِبَتُكَ؟
