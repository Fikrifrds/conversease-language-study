scenario_key: arabic_review_social_and_plans
mode: lesson_practice_coach
level_code: A2
opening_line: كَيْفَ كَانَ دَرْسُكَ الْيَوْمَ يَا كَرِيمُ؟
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu bertemu teman setelah kelas, bertanya
  kabar, menanyakan rencana, lalu menentukan waktu belajar bersama.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ كَانَ دَرْسُكَ الْيَوْمَ يَا كَرِيمُ؟
  hint: 'Jawab dengan pola: كَيْفَ كَانَ دَرْسُكَ؟'
  sample_answer: كَيْفَ كَانَ دَرْسُكَ؟
  focus: 'Latihan frasa: Bagaimana pelajaranmu?'
  expected_keywords:
  - كَيْفَ
  - كَانَ
  - دَرْسُكَ
  indonesian_explanation: Bagaimana pelajaranmu?
- coach: 'استخدم: مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟'
  hint: 'Jawab dengan pola: مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟'
