  focus: 'Latihan frasa: Apa yang kamu lakukan setelah pelajaran?'
  expected_keywords:
  - مَاذَا
  - فَعَلْتَ
  - بَعْدَ
  indonesian_explanation: Apa yang kamu lakukan setelah pelajaran?
- coach: 'استخدم: هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟'
  hint: 'Jawab dengan pola: هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟'
  sample_answer: هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟
  focus: 'Latihan frasa: Apakah kamu ingin belajar bersama saya?'
  expected_keywords:
  - هَلْ
  - تُرِيدُ
  - أَنْ
  indonesian_explanation: Apakah kamu ingin belajar bersama saya?
target_phrases:
