phrases:
- phrase: كَيْفَ كَانَ دَرْسُكَ؟
  meaning_id: Bagaimana pelajaranmu?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana pelajaranmu?'
- phrase: مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟
  meaning_id: Apa yang kamu lakukan setelah pelajaran?
  usage_note: 'Gunakan saat ingin mengatakan: Apa yang kamu lakukan setelah pelajaran?'
- phrase: هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟
  meaning_id: Apakah kamu ingin belajar bersama saya?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kamu ingin belajar bersama saya?'
- phrase: نَلْتَقِي السَّاعَةَ الْخَامِسَةَ.
  meaning_id: Kita bertemu jam lima.
  usage_note: 'Gunakan saat ingin mengatakan: Kita bertemu jam lima.'
- phrase: أَمَامَ الْمَرْكَزِ.
  meaning_id: Di depan pusat.
  usage_note: 'Gunakan saat ingin mengatakan: Di depan pusat.'
