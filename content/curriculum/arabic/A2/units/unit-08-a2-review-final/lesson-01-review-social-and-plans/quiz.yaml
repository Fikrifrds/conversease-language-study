questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Bagaimana pelajaranmu?"?
  options:
  - كَيْفَ كَانَ دَرْسُكَ؟
  - مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟
  - هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟
  correct_answer: كَيْفَ كَانَ دَرْسُكَ؟
- key: phrase_2
  prompt: Frasa mana yang berarti "Apa yang kamu lakukan setelah pelajaran?"?
  options:
  - مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟
  - كَيْفَ كَانَ دَرْسُكَ؟
  - هَلْ تُرِيدُ أَنْ تَدْرُسَ مَعِي؟
  correct_answer: مَاذَا فَعَلْتَ بَعْدَ الدَّرْسِ؟
