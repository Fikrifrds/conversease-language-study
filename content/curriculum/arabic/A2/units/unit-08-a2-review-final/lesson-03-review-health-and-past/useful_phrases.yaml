phrases:
- phrase: لَا أَشْعُرُ بِالرَّاحَةِ.
  meaning_id: Saya tidak merasa nyaman.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak merasa nyaman.'
- phrase: عِنْدِي أَلَمٌ خَفِيفٌ.
  meaning_id: Saya punya sakit ringan.
  usage_note: 'Gunakan saat ingin mengatakan: Saya punya sakit ringan.'
- phrase: مُنْذُ أَمْسِ.
  meaning_id: Sejak kemarin.
  usage_note: 'Gunakan saat ingin mengatakan: Sejak kemarin.'
- phrase: ذَهَبْتُ إِلَى الْمَدِينَةِ.
  meaning_id: Saya pergi ke kota.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pergi ke kota.'
- phrase: رَجَعْتُ فِي الْمَسَاءِ.
  meaning_id: Saya kembali pada sore hari.
  usage_note: 'Gunakan saat ingin mengatakan: Saya kembali pada sore hari.'
