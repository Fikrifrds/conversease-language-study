prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Bisakah Anda membantu saya?'
  target_response: هَلْ يُمْكِنُ أَنْ تُسَاعِدَنِي؟
  acceptable_responses:
  - هَلْ يُمْكِنُ أَنْ تُسَاعِدَنِي؟
- prompt: 'Ucapkan dalam bahasa Arab: Perangkatnya tidak bekerja.'
  target_response: الْجِهَازُ لَا يَعْمَلُ.
  acceptable_responses:
  - الْجِهَازُ لَا يَعْمَلُ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya membutuhkan perbaikan.'
  target_response: أَحْتَاجُ إِلَى إِصْلَاحٍ.
  acceptable_responses:
  - أَحْتَاجُ إِلَى إِصْلَاحٍ.
