  - عَنْ
  - حَقِيبَةٍ
  indonesian_explanation: Saya mencari tas kecil.
- coach: 'استخدم: هَلْ يُوجَدُ لَوْنٌ أَزْرَقُ؟'
  hint: 'Jawab dengan pola: هَلْ يُوجَدُ لَوْنٌ أَزْرَقُ؟'
  sample_answer: هَلْ يُوجَدُ لَوْنٌ أَزْرَقُ؟
  focus: 'Latihan frasa: Apakah ada warna biru?'
