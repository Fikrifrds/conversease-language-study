scenario_key: arabic_shopping_service_mission
mode: lesson_practice_coach
level_code: A2
opening_line: أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ.
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu memilih barang di toko, membandingkan
  pilihan, lalu berpindah ke bagian layanan untuk meminta bantuan perangkat.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ.
  hint: 'Jawab dengan pola: أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ.'
  sample_answer: أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ.
  focus: 'Latihan frasa: Saya mencari tas kecil.'
  expected_keywords:
