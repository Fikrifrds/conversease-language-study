  - هَلْ
  - يُوجَدُ
  - لَوْنٌ
  indonesian_explanation: Apakah ada warna biru?
- coach: 'استخدم: أَيُّهُمَا أَفْضَلُ؟'
  hint: 'Jawab dengan pola: أَيُّهُمَا أَفْضَلُ؟'
  sample_answer: أَيُّهُمَا أَفْضَلُ؟
  focus: 'Latihan frasa: Mana yang lebih baik?'
  expected_keywords:
  - أَيُّهُمَا
  - أَفْضَلُ
  indonesian_explanation: Mana yang lebih baik?
target_phrases:
- أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ.
