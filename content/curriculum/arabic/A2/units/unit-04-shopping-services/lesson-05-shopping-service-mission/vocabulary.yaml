vocabulary:
- word: حَقِيبَةٌ
  meaning_id: tas
  usage_note: 'Dipakai untuk arti "tas". Contoh: "أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ."'
- word: صَغِيرَةٌ
  meaning_id: kecil
  usage_note: 'Dipakai untuk arti "kecil". Contoh: "أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ."'
- word: لَوْنٌ
  meaning_id: warna
  usage_note: 'Dipakai untuk arti "warna". Contoh: "هَلْ يُوجَدُ لَوْنٌ أَزْرَقُ؟"'
- word: أَزْرَقُ
  meaning_id: biru
  usage_note: 'Dipakai untuk arti "biru". Contoh: "هَلْ يُوجَدُ لَوْنٌ أَزْرَقُ؟"'
- word: أُفَضِّلُ
  meaning_id: saya lebih memilih
  usage_note: 'Dipakai untuk arti "saya lebih memilih". Contoh: "أَيُّهُمَا أَفْضَلُ؟"'
- word: جِهَازٌ
  meaning_id: alat/perangkat
  usage_note: 'Dipakai untuk arti "alat/perangkat". Contoh: "الْجِهَازُ لَا يَعْمَلُ."'
- word: يَعْمَلُ
  meaning_id: berfungsi/bekerja
  usage_note: 'Dipakai untuk arti "berfungsi/bekerja". Contoh: "الْجِهَازُ لَا يَعْمَلُ."'
- word: أَسْوَدُ
  meaning_id: hitam
  usage_note: 'Dipakai untuk arti "hitam". Contoh: "عِنْدَنَا هَذِهِ الْحَقِيبَةُ
    بِاللَّوْنِ الْأَسْوَدِ."'
