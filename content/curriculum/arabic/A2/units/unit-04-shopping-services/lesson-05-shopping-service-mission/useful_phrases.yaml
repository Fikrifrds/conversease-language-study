phrases:
- phrase: أَبْحَثُ عَنْ حَقِيبَةٍ صَغِيرَةٍ.
  meaning_id: Saya mencari tas kecil.
  usage_note: 'Gunakan saat ingin mengatakan: Saya mencari tas kecil.'
- phrase: هَلْ يُوجَدُ لَوْنٌ أَزْرَقُ؟
  meaning_id: Apakah ada warna biru?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah ada warna biru?'
- phrase: أَيُّهُمَا أَفْضَلُ؟
  meaning_id: Mana yang lebih baik?
  usage_note: 'Gunakan saat ingin mengatakan: Mana yang lebih baik?'
- phrase: سَآخُذُ الْأَزْرَقَ.
  meaning_id: Saya akan mengambil yang biru.
  usage_note: 'Gunakan saat ingin mengatakan: Saya akan mengambil yang biru.'
- phrase: الْجِهَازُ لَا يَعْمَلُ.
  meaning_id: Perangkatnya tidak bekerja.
  usage_note: 'Gunakan saat ingin mengatakan: Perangkatnya tidak bekerja.'
