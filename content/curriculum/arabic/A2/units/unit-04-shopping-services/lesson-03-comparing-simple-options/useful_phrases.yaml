phrases:
- phrase: هَذَا أَرْخَصُ.
  meaning_id: Ini lebih murah.
  usage_note: 'Gunakan saat ingin mengatakan: Ini lebih murah.'
- phrase: هَذَا أَجْوَدُ.
  meaning_id: Ini lebih bagus kualitasnya.
  usage_note: 'Gunakan saat ingin mengatakan: Ini lebih bagus kualitasnya.'
- phrase: أَيُّهُمَا أَفْضَلُ؟
  meaning_id: Mana yang lebih baik?
  usage_note: 'Gunakan saat ingin mengatakan: Mana yang lebih baik?'
- phrase: أُفَضِّلُ هَذَا.
  meaning_id: Saya lebih memilih ini.
  usage_note: 'Gunakan saat ingin mengatakan: Saya lebih memilih ini.'
- phrase: السِّعْرُ مُنَاسِبٌ.
  meaning_id: Harganya cocok.
  usage_note: 'Gunakan saat ingin mengatakan: Harganya cocok.'
