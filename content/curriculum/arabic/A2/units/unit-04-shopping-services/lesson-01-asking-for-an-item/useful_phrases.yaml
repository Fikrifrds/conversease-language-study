phrases:
- phrase: أَبْحَثُ عَنْ قَلَمٍ أَزْرَقَ.
  meaning_id: Saya mencari pulpen biru.
  usage_note: 'Gunakan saat ingin mengatakan: Saya mencari pulpen biru.'
- phrase: هَلْ عِنْدَكُمْ هَذَا؟
  meaning_id: Apakah kalian punya ini?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kalian punya ini?'
- phrase: هَلْ يُوجَدُ لَوْنٌ آخَرُ؟
  meaning_id: Apakah ada warna lain?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah ada warna lain?'
- phrase: أُرِيدُ وَاحِدًا، مِنْ فَضْلِكَ.
  meaning_id: Saya ingin satu, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin satu, tolong.'
- phrase: سَآخُذُ هَذَا.
  meaning_id: Saya akan mengambil ini.
  usage_note: 'Gunakan saat ingin mengatakan: Saya akan mengambil ini.'
