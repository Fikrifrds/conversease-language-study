questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Apakah kalian punya ukuran yang lebih besar?"?
  options:
  - هَلْ عِنْدَكُمْ مَقَاسٌ أَكْبَرُ؟
  - أُرِيدُ اللَّوْنَ الْأَبْيَضَ.
  - هَذَا صَغِيرٌ جِدًّا.
  correct_answer: هَلْ عِنْدَكُمْ مَقَاسٌ أَكْبَرُ؟
- key: phrase_2
