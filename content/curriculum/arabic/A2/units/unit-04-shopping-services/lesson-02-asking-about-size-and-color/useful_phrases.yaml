phrases:
- phrase: هَلْ عِنْدَكُمْ مَقَاسٌ أَكْبَرُ؟
  meaning_id: Apakah kalian punya ukuran yang lebih besar?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah kalian punya ukuran yang lebih besar?'
- phrase: أُرِيدُ اللَّوْنَ الْأَبْيَضَ.
  meaning_id: Saya ingin warna putih.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin warna putih.'
- phrase: هَذَا صَغِيرٌ جِدًّا.
  meaning_id: Ini terlalu kecil.
  usage_note: 'Gunakan saat ingin mengatakan: Ini terlalu kecil.'
- phrase: هَذَا مُنَاسِبٌ.
  meaning_id: Ini cocok.
  usage_note: 'Gunakan saat ingin mengatakan: Ini cocok.'
- phrase: هَلْ أَسْتَطِيعُ أَنْ أُجَرِّبَهُ؟
  meaning_id: Bolehkah saya mencobanya?
  usage_note: 'Gunakan saat ingin mengatakan: Bolehkah saya mencobanya?'
