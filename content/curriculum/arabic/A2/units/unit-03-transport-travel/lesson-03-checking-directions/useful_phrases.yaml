phrases:
- phrase: كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ؟
  meaning_id: Bagaimana saya pergi ke peron?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana saya pergi ke peron?'
- phrase: اِمْشِ مُسْتَقِيمًا.
  meaning_id: Berjalan lurus.
  usage_note: 'Gunakan saat ingin mengatakan: Berjalan lurus.'
- phrase: ثُمَّ اِتَّجِهْ يَمِينًا.
  meaning_id: Lalu belok kanan.
  usage_note: 'Gunakan saat ingin mengatakan: Lalu belok kanan.'
- phrase: بِجَانِبِ الْمَصْعَدِ.
  meaning_id: Di samping lift.
  usage_note: 'Gunakan saat ingin mengatakan: Di samping lift.'
- phrase: هَلْ هَذَا صَحِيحٌ؟
  meaning_id: Apakah ini benar?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah ini benar?'
