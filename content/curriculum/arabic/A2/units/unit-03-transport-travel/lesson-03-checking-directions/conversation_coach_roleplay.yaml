scenario_key: arabic_checking_directions
mode: lesson_practice_coach
level_code: A2
opening_line: عَفْوًا، كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ الثَّالِثِ؟
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu berada di terminal dan ingin memastikan
  arah menuju pintu, peron, atau tempat tunggu tanpa salah jalur.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
