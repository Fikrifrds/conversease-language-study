  hint: 'Jawab dengan pola: كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ؟'
  sample_answer: كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ؟
  focus: 'Latihan frasa: Bagaimana saya pergi ke peron?'
