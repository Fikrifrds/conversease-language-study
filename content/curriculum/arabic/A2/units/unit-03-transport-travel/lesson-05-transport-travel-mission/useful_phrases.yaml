phrases:
- phrase: أُرِيدُ تَذْكِرَةً إِلَى الْمَدِينَةِ.
  meaning_id: Saya ingin tiket ke kota.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin tiket ke kota.'
- phrase: مَتَى يَغَادِرُ الْقِطَارُ؟
  meaning_id: Kapan keretanya berangkat?
  usage_note: 'Gunakan saat ingin mengatakan: Kapan keretanya berangkat?'
- phrase: كَيْفَ أَذْهَبُ إِلَى الرَّصِيفِ؟
  meaning_id: Bagaimana saya pergi ke peron?
  usage_note: 'Gunakan saat ingin mengatakan: Bagaimana saya pergi ke peron?'
- phrase: هَلْ هَذَا الْعُنْوَانُ صَحِيحٌ؟
  meaning_id: Apakah alamat ini benar?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah alamat ini benar?'
- phrase: تَوَقَّفْ هُنَا، مِنْ فَضْلِكَ.
  meaning_id: Berhenti di sini, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Berhenti di sini, tolong.'
