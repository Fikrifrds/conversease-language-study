phrases:
- phrase: إِلَى الْفُنْدُقِ، مِنْ فَضْلِكَ.
  meaning_id: Ke hotel, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Ke hotel, tolong.'
- phrase: هَلْ هَذَا الْعُنْوَانُ صَحِيحٌ؟
  meaning_id: Apakah alamat ini benar?
  usage_note: 'Gunakan saat ingin mengatakan: Apakah alamat ini benar?'
- phrase: كَمْ يَسْتَغْرِقُ الطَّرِيقُ؟
  meaning_id: Berapa lama perjalanannya?
  usage_note: 'Gunakan saat ingin mengatakan: Berapa lama perjalanannya?'
- phrase: حَوَالَيْ عِشْرِينَ دَقِيقَةً.
  meaning_id: Sekitar dua puluh menit.
  usage_note: 'Gunakan saat ingin mengatakan: Sekitar dua puluh menit.'
- phrase: تَوَقَّفْ هُنَا، مِنْ فَضْلِكَ.
  meaning_id: Berhenti di sini, tolong.
  usage_note: 'Gunakan saat ingin mengatakan: Berhenti di sini, tolong.'
