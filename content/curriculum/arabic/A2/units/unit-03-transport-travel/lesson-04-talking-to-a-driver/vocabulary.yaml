vocabulary:
- word: فُنْدُقٌ
  meaning_id: hotel
  usage_note: 'Dipakai untuk arti "hotel". Contoh: "إِلَى الْفُنْدُقِ، مِنْ فَضْلِكَ."'
- word: عُنْوَانٌ
  meaning_id: alamat
  usage_note: 'Dipakai untuk arti "alamat". Contoh: "هَلْ هَذَا الْعُنْوَانُ صَحِيحٌ؟"'
- word: صَحِيحٌ
  meaning_id: benar
  usage_note: 'Dipakai untuk arti "benar". Contoh: "هَلْ هَذَا الْعُنْوَانُ صَحِيحٌ؟"'
- word: كَمْ
  meaning_id: berapa
  usage_note: 'Dipakai untuk arti "berapa". Contoh: "كَمْ يَسْتَغْرِقُ الطَّرِيقُ؟"'
- word: طَرِيقٌ
  meaning_id: jalan
  usage_note: 'Dipakai untuk arti "jalan". Contoh: "كَمْ يَسْتَغْرِقُ الطَّرِيقُ؟"'
- word: مُزْدَحِمٌ
  meaning_id: ramai/padat
  usage_note: 'Dipakai untuk arti "ramai/padat". Contoh: "الطَّرِيقُ مُزْدَحِمٌ قَلِيلًا
    الْيَوْمَ."'
- word: قَلِيلًا
  meaning_id: sedikit
  usage_note: 'Dipakai untuk arti "sedikit". Contoh: "الطَّرِيقُ مُزْدَحِمٌ قَلِيلًا
    الْيَوْمَ."'
- word: الْيَوْمُ
  meaning_id: hari ini
  usage_note: 'Dipakai untuk arti "hari ini". Contoh: "الطَّرِيقُ مُزْدَحِمٌ قَلِيلًا
    الْيَوْمَ."'
