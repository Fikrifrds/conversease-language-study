phrases:
- phrase: مَتَى يَغَادِرُ الْقِطَارُ؟
  meaning_id: Kapan keretanya berangkat?
  usage_note: 'Gunakan saat ingin mengatakan: Kapan keretanya berangkat?'
- phrase: يُغَادِرُ السَّاعَةَ السَّابِعَةَ.
  meaning_id: Berangkat jam tujuh.
  usage_note: 'Gunakan saat ingin mengatakan: Berangkat jam tujuh.'
- phrase: مِنْ أَيِّ رَصِيفٍ؟
  meaning_id: Dari peron berapa?
  usage_note: 'Gunakan saat ingin mengatakan: Dari peron berapa?'
- phrase: مِنَ الرَّصِيفِ الثَّانِي.
  meaning_id: Dari peron dua.
  usage_note: 'Gunakan saat ingin mengatakan: Dari peron dua.'
- phrase: يَصِلُ السَّاعَةَ التَّاسِعَةَ.
  meaning_id: Tiba jam sembilan.
  usage_note: 'Gunakan saat ingin mengatakan: Tiba jam sembilan.'
