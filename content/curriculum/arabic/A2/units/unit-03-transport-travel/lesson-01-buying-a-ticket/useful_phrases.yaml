phrases:
- phrase: أُرِيدُ تَذْكِرَةً إِلَى جَاكَرْتَا.
  meaning_id: Saya ingin tiket ke Jakarta.
  usage_note: 'Gunakan saat ingin mengatakan: Saya ingin tiket ke Jakarta.'
- phrase: ذَهَابًا فَقَطْ.
  meaning_id: Sekali jalan saja.
  usage_note: 'Gunakan saat ingin mengatakan: Sekali jalan saja.'
- phrase: ذَهَابًا وَعَوْدَةً.
  meaning_id: Pulang pergi.
  usage_note: 'Gunakan saat ingin mengatakan: Pulang pergi.'
- phrase: الدَّرَجَةُ الِاقْتِصَادِيَّةُ.
  meaning_id: Kelas ekonomi.
  usage_note: 'Gunakan saat ingin mengatakan: Kelas ekonomi.'
- phrase: كَمِ السِّعْرُ؟
  meaning_id: Berapa harganya?
  usage_note: 'Gunakan saat ingin mengatakan: Berapa harganya?'
