prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saya setuju denganmu.'
  target_response: أُوَافِقُكَ.
  acceptable_responses:
  - أُوَافِقُكَ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya setuju denganmu dalam hal ini.'
  target_response: أُوَافِقُكِ فِي هَذَا.
  acceptable_responses:
  - أُوَافِقُكِ فِي هَذَا.
- prompt: 'Ucapkan dalam bahasa Arab: Saya tidak sepenuhnya setuju.'
  target_response: لَا أُوَافِقُ تَمَامًا.
  acceptable_responses:
  - لَا أُوَافِقُ تَمَامًا.
