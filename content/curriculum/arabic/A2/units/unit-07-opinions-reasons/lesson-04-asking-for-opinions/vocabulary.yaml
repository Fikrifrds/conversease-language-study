vocabulary:
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "مَا رَأْيُكَ فِي الْخِيَارِ
    الثَّانِي؟"'
- word: أُفَضِّلُ
  meaning_id: saya lebih memilih
  usage_note: 'Dipakai untuk arti "saya lebih memilih". Contoh: "أَيُّهُمَا أَفْضَلُ؟"'
- word: مُنَاسِبٌ
  meaning_id: cocok/sesuai
  usage_note: 'Dipakai untuk arti "cocok/sesuai". Contoh: "هَلْ تَعْتَقِدُ أَنَّ هَذَا
    مُنَاسِبٌ؟"'
- word: أُرِيدُ
  meaning_id: saya ingin
  usage_note: 'Dipakai untuk arti "saya ingin". Contoh: "أُرِيدُ رَأْيًا وَاضِحًا."'
- word: أَعْتَقِدُ
  meaning_id: saya pikir
  usage_note: 'Dipakai untuk arti "saya pikir". Contoh: "أَعْتَقِدُ أَنَّهُ جَيِّدٌ،
    وَلَكِنَّهُ طَوِيلٌ قَلِيلًا."'
- word: طَوِيلٌ
  meaning_id: panjang
  usage_note: 'Dipakai untuk arti "panjang". Contoh: "أَعْتَقِدُ أَنَّهُ جَيِّدٌ،
    وَلَكِنَّهُ طَوِيلٌ قَلِيلًا."'
- word: قَلِيلًا
  meaning_id: sedikit
  usage_note: 'Dipakai untuk arti "sedikit". Contoh: "أَعْتَقِدُ أَنَّهُ جَيِّدٌ،
    وَلَكِنَّهُ طَوِيلٌ قَلِيلًا."'
- word: الصَّبَاحُ
  meaning_id: pagi
  usage_note: 'Dipakai untuk arti "pagi". Contoh: "أَيُّهُمَا أَفْضَلُ: الصَّبَاحُ
    أَمِ الْمَسَاءُ؟"'
