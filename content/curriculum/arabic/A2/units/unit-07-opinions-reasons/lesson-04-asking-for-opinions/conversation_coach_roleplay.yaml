scenario_key: arabic_asking_for_opinions
mode: lesson_practice_coach
level_code: A2
opening_line: مَا رَأْيُكَ فِي هَذَا الْجَدْوَلِ يَا دِيمَاسُ؟
learner_goal: 'Latih percakapan Arab A2 untuk situasi ini: Kamu meminta pendapat teman sebelum memilih
  tempat, waktu, aktivitas, atau opsi sederhana.'
max_turns: 5
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا رَأْيُكَ فِي هَذَا الْجَدْوَلِ يَا دِيمَاسُ؟
  hint: 'Jawab dengan pola: مَا رَأْيُكَ فِي هَذَا؟'
  sample_answer: مَا رَأْيُكَ فِي هَذَا؟
  focus: 'Latihan frasa: Apa pendapatmu tentang ini?'
  expected_keywords:
  - مَا
  - رَأْيُكَ
  - فِي
  indonesian_explanation: Apa pendapatmu tentang ini?
- coach: 'استخدم: مَا رَأْيُكِ فِي الْخِيَارِ الثَّانِي؟'
  hint: 'Jawab dengan pola: مَا رَأْيُكِ فِي الْخِيَارِ الثَّانِي؟'
  sample_answer: مَا رَأْيُكِ فِي الْخِيَارِ الثَّانِي؟
  focus: 'Latihan frasa: Apa pendapatmu tentang pilihan kedua?'
  expected_keywords:
  - مَا
  - رَأْيُكِ
  - فِي
  indonesian_explanation: Apa pendapatmu tentang pilihan kedua?
- coach: 'استخدم: أَيُّهُمَا أَفْضَلُ؟'
  hint: 'Jawab dengan pola: أَيُّهُمَا أَفْضَلُ؟'
  sample_answer: أَيُّهُمَا أَفْضَلُ؟
  focus: 'Latihan frasa: Mana dari keduanya yang lebih baik?'
  expected_keywords:
  - أَيُّهُمَا
  - أَفْضَلُ
  indonesian_explanation: Mana dari keduanya yang lebih baik?
target_phrases:
- مَا رَأْيُكَ فِي هَذَا؟
- مَا رَأْيُكِ فِي الْخِيَارِ الثَّانِي؟
- أَيُّهُمَا أَفْضَلُ؟
- هَلْ تَعْتَقِدُ أَنَّ هَذَا مُنَاسِبٌ؟
rubric:
  speaking:
    minimum_score: 65
  relevance:
