questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Apa pendapatmu tentang ini?"?
  options:
  - مَا رَأْيُكَ فِي هَذَا؟
  - مَا رَأْيُكَ فِي الْخِيَارِ الثَّانِي؟
  - أَيُّهُمَا أَفْضَلُ؟
  correct_answer: مَا رَأْيُكَ فِي هَذَا؟
