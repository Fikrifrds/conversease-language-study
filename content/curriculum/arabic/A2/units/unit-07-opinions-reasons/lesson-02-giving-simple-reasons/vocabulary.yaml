vocabulary:
- word: أُحِبُّ
  meaning_id: saya suka
  usage_note: 'Dipakai untuk arti "saya suka". Contoh: "أُحِبُّ هَذَا لِأَنَّهُ سَهْلٌ."'
- word: سَهْلٌ
  meaning_id: mudah
  usage_note: 'Dipakai untuk arti "mudah". Contoh: "أُحِبُّ هَذَا لِأَنَّهُ سَهْلٌ."'
- word: أُفَضِّلُ
  meaning_id: saya lebih memilih
  usage_note: 'Dipakai untuk arti "saya lebih memilih". Contoh: "أُفَضِّلُ هَذَا لِأَنَّهُ
    قَرِيبٌ."'
- word: قَرِيبٌ
  meaning_id: dekat
  usage_note: 'Dipakai untuk arti "dekat". Contoh: "أُفَضِّلُ هَذَا لِأَنَّهُ قَرِيبٌ."'
- word: سَبَبٌ
  meaning_id: alasan
  usage_note: 'Dipakai untuk arti "alasan". Contoh: "السَّبَبُ بَسِيطٌ."'
- word: بَسِيطٌ
  meaning_id: sederhana
  usage_note: 'Dipakai untuk arti "sederhana". Contoh: "السَّبَبُ بَسِيطٌ."'
- word: وَقْتٌ
  meaning_id: waktu
  usage_note: 'Dipakai untuk arti "waktu". Contoh: "لِأَنَّ الْوَقْتَ مُنَاسِبٌ."'
- word: مُنَاسِبٌ
  meaning_id: cocok/sesuai
  usage_note: 'Dipakai untuk arti "cocok/sesuai". Contoh: "لِأَنَّ الْوَقْتَ مُنَاسِبٌ."'
