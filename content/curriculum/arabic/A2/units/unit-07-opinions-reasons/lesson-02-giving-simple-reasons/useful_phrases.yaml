phrases:
- phrase: أُحِبُّ هَذَا لِأَنَّهُ سَهْلٌ.
  meaning_id: Saya suka ini karena mudah.
  usage_note: 'Gunakan saat ingin mengatakan: Saya suka ini karena mudah.'
- phrase: أُفَضِّلُ هَذَا لِأَنَّهُ قَرِيبٌ.
  meaning_id: Saya lebih memilih ini karena dekat.
  usage_note: 'Gunakan saat ingin mengatakan: Saya lebih memilih ini karena dekat.'
- phrase: هُوَ جَيِّدٌ، وَلَكِنَّهُ غَالٍ.
  meaning_id: Itu bagus, tetapi mahal.
  usage_note: 'Gunakan saat ingin mengatakan: Itu bagus, tetapi mahal.'
- phrase: السَّبَبُ بَسِيطٌ.
  meaning_id: Alasannya sederhana.
  usage_note: 'Gunakan saat ingin mengatakan: Alasannya sederhana.'
- phrase: لِأَنَّ الْوَقْتَ مُنَاسِبٌ.
  meaning_id: Karena waktunya cocok.
  usage_note: 'Gunakan saat ingin mengatakan: Karena waktunya cocok.'
