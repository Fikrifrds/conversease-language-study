vocabulary:
- word: خُطَّةٌ
  meaning_id: rencana
  usage_note: 'Dipakai untuk arti "rencana". Contoh: "مَا رَأْيُكَ فِي هَذِهِ الْخُطَّةِ؟"'
- word: أَعْتَقِدُ
  meaning_id: saya pikir
  usage_note: 'Dipakai untuk arti "saya pikir". Contoh: "أَعْتَقِدُ أَنَّهَا جَيِّدَةٌ."'
- word: أُفَضِّلُ
  meaning_id: saya lebih memilih
  usage_note: 'Dipakai untuk arti "saya lebih memilih". Contoh: "أُفَضِّلُ الصَّبَاحَ
    لِأَنَّهُ أَهْدَأُ."'
- word: الصَّبَاحُ
  meaning_id: pagi
  usage_note: 'Dipakai untuk arti "pagi". Contoh: "أُفَضِّلُ الصَّبَاحَ لِأَنَّهُ
    أَهْدَأُ."'
- word: أُوَافِقُ
  meaning_id: saya setuju
  usage_note: 'Dipakai untuk arti "saya setuju". Contoh: "لَا أُوَافِقُ تَمَامًا."'
- word: وَقْتٌ
  meaning_id: waktu
  usage_note: 'Dipakai untuk arti "waktu". Contoh: "أَعْتَقِدُ أَنَّهَا جَيِّدَةٌ،
    وَلَكِنَّ الْوَقْتَ غَيْرُ مُنَاسِبٍ."'
- word: مُنَاسِبٌ
  meaning_id: cocok/sesuai
  usage_note: 'Dipakai untuk arti "cocok/sesuai". Contoh: "أَعْتَقِدُ أَنَّهَا جَيِّدَةٌ،
    وَلَكِنَّ الْوَقْتَ غَيْرُ مُنَاسِبٍ."'
- word: صَعْبٌ
  meaning_id: sulit
  usage_note: 'Dipakai untuk arti "sulit". Contoh: "لَا أُوَافِقُ تَمَامًا. الصَّبَاحُ
    صَعْبٌ لِي."'
