phrases:
- phrase: مَا رَأْيُكَ فِي هَذِهِ الْخُطَّةِ؟
  meaning_id: Apa pendapatmu tentang rencana ini?
  usage_note: 'Gunakan saat ingin mengatakan: Apa pendapatmu tentang rencana ini?'
- phrase: أَعْتَقِدُ أَنَّهَا جَيِّدَةٌ.
  meaning_id: Saya pikir itu baik.
  usage_note: 'Gunakan saat ingin mengatakan: Saya pikir itu baik.'
- phrase: أُفَضِّلُ الصَّبَاحَ لِأَنَّهُ أَهْدَأُ.
  meaning_id: Saya lebih memilih pagi karena lebih tenang.
  usage_note: 'Gunakan saat ingin mengatakan: Saya lebih memilih pagi karena lebih tenang.'
- phrase: لَا أُوَافِقُ تَمَامًا.
  meaning_id: Saya tidak sepenuhnya setuju.
  usage_note: 'Gunakan saat ingin mengatakan: Saya tidak sepenuhnya setuju.'
- phrase: إِذًا نَخْتَارُ هَذَا.
  meaning_id: Jadi kita memilih ini.
  usage_note: 'Gunakan saat ingin mengatakan: Jadi kita memilih ini.'
