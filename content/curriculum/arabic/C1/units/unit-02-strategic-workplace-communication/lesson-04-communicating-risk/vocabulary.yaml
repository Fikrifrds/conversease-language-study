vocabulary:
- word: مَخَاطِرُ
  meaning_id: risiko
  usage_note: 'Dipakai untuk arti "risiko". Contoh: "فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ
    بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ ا..."'
- word: أَوَّلًا
  meaning_id: pertama
  usage_note: 'Dipakai untuk arti "pertama". Contoh: "فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ
    بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ ا..."'
- word: فَهْمٌ
  meaning_id: pemahaman
  usage_note: 'Dipakai untuk arti "pemahaman". Contoh: "فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ
    بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ ا..."'
- word: أَطْرَافٌ
  meaning_id: pihak-pihak
  usage_note: 'Dipakai untuk arti "pihak-pihak". Contoh: "فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ
    بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ ا..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ شَرْحِ الْمَخَاطِرِ
    بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّ..."'
- word: أُفَضِّلُ
  meaning_id: saya lebih memilih
  usage_note: 'Dipakai untuk arti "saya lebih memilih". Contoh: "عِنْدَ تَطْبِيقِ
    شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّ..."'
- word: تَوَقُّعَاتٌ
  meaning_id: ekspektasi
  usage_note: 'Dipakai untuk arti "ekspektasi". Contoh: "عِنْدَ تَطْبِيقِ شَرْحِ الْمَخَاطِرِ
    بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّ..."'
- word: مُلَاحَظَةٌ
  meaning_id: catatan/masukan
  usage_note: 'Dipakai untuk arti "catatan/masukan". Contoh: "سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ
    بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ."'
