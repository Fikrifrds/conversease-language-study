prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam skill communicating risk without exaggeration, Pertama kita
    perlu menyatukan pemahaman pihak-pihak utama.'
  target_response: فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ
    فَهْمِ الْأَطْرَافِ الرَّئِيسِيَّةِ.
  acceptable_responses:
  - فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ الْأَطْرَافِ
    الرَّئِيسِيَّةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan communicating risk without exaggeration, Lebih baik
    kita mengelola ekspektasi sebelum menjanjikan sesuatu yang spesifik.'
  target_response: عِنْدَ تَطْبِيقِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ
    التَّوَقُّعَاتِ قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّعَاتِ
    قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan menyampaikan feedback ini dengan sensitif karena topiknya
    penting.'
  target_response: سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
  acceptable_responses:
  - سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika muncul tantangan dalam skill ini, Ada risiko potensial, tetapi
    kita bisa menguranginya dengan rencana yang jelas.'
  target_response: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا
    تَقْلِيلُهُ بِخُطَّةٍ وَاضِحَةٍ.
  acceptable_responses:
  - إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ
    بِخُطَّةٍ وَاضِحَةٍ.
