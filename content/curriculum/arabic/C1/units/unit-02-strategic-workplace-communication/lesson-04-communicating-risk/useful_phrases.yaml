phrases:
- phrase: فِي تَدْرِيبِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ
    الْأَطْرَافِ الرَّئِيسِيَّةِ.
  meaning_id: Dalam latihan penyampaian risiko tanpa berlebihan, pertama kita perlu menyatukan pemahaman
    pihak-pihak utama.
  usage_note: 'Menyelaraskan stakeholder. Fokus lesson: penyampaian risiko tanpa berlebihan.'
- phrase: عِنْدَ تَطْبِيقِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّعَاتِ
    قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
  meaning_id: Saat menerapkan penyampaian risiko tanpa berlebihan, lebih baik kita mengelola ekspektasi
    sebelum menjanjikan sesuatu yang spesifik.
  usage_note: Mengelola ekspektasi. Hubungkan dengan fokus lesson.
- phrase: سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
  meaning_id: Saya akan menyampaikan feedback ini dengan sensitif karena topiknya penting.
  usage_note: Memberi feedback sensitif. Pakai sebagai penghubung dalam penyampaian risiko tanpa berlebihan.
- phrase: يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ بِخُطَّةٍ وَاضِحَةٍ.
  meaning_id: Ada risiko potensial, tetapi kita bisa menguranginya dengan rencana yang jelas.
  usage_note: Mengomunikasikan risiko. Gunakan untuk repair dalam penyampaian risiko tanpa berlebihan.
- phrase: فِي خِتَامِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، إِذَا تَوَافَقْنَا عَلَى هَذَا الْإِطَارِ،
    فَسَيَكُونُ التَّنْفِيذُ أَسْهَلَ.
  meaning_id: Pada bagian akhir penyampaian risiko tanpa berlebihan, jika kita sepakat pada kerangka ini,
    implementasinya akan lebih mudah.
  usage_note: Menutup dengan alignment. Tutup percakapan sesuai fokus lesson.
