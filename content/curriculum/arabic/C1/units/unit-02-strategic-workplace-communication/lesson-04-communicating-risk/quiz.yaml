questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam skill communicating risk without exaggeration, Pertama kita perlu
    menyatukan pemahaman pihak-pihak utama."?
  options:
  - فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ الْأَطْرَافِ
    الرَّئِيسِيَّةِ.
  - عِنْدَ تَطْبِيقِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّعَاتِ
    قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
  - سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
  correct_answer: فِي مَهَارَةِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ
    فَهْمِ الْأَطْرَافِ الرَّئِيسِيَّةِ.
