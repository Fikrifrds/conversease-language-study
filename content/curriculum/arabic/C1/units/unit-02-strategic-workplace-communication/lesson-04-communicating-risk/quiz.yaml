  - سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
  correct_answer: عِنْدَ تَطْبِيقِ شَرْحِ الْمَخَاطِرِ بِدُونِ تَهْوِيلٍ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ
