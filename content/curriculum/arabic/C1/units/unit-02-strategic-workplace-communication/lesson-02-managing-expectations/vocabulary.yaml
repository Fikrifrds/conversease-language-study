vocabulary:
- word: تَوَقُّعَاتٌ
  meaning_id: ekspektasi
  usage_note: 'Dipakai untuk arti "ekspektasi". Contoh: "فِي مَهَارَةِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ،
    نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْ..."'
- word: أَوَّلًا
  meaning_id: pertama
  usage_note: 'Dipakai untuk arti "pertama". Contoh: "فِي مَهَارَةِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ،
    نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْ..."'
- word: فَهْمٌ
  meaning_id: pemahaman
  usage_note: 'Dipakai untuk arti "pemahaman". Contoh: "فِي مَهَارَةِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ،
    نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْ..."'
- word: أَطْرَافٌ
  meaning_id: pihak-pihak
  usage_note: 'Dipakai untuk arti "pihak-pihak". Contoh: "فِي مَهَارَةِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ،
    نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْ..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ،
    مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّو..."'
- word: أُفَضِّلُ
  meaning_id: saya lebih memilih
  usage_note: 'Dipakai untuk arti "saya lebih memilih". Contoh: "عِنْدَ تَطْبِيقِ إِدَارَةِ التَّوَقُّعَاتِ
    الْوَاقِعِيَّةِ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّو..."'
- word: مُلَاحَظَةٌ
  meaning_id: catatan/masukan
  usage_note: 'Dipakai untuk arti "catatan/masukan". Contoh: "سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ،
    لِأَنَّ الْمَوْضُوعَ مُهِمٌّ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
    يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَ..."'
