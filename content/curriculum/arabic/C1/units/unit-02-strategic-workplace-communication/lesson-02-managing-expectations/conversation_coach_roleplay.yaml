scenario_key: arabic_c1_managing_expectations
mode: lesson_practice_coach
level_code: C1
opening_line: مَا الطَّرِيقَةُ الأَدَقُّ لِاسْتِخْدَامِ مَهَارَةِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ؟
learner_goal: Latih percakapan Arab C1 untuk pengelolaan ekspektasi realistis dengan nuansa, struktur,
  presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا الطَّرِيقَةُ الأَدَقُّ لِاسْتِخْدَامِ مَهَارَةِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، نَحْتَاجُ
    أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ الْأَطْرَافِ الرَّئِيسِيَّةِ.'
  sample_answer: فِي تَدْرِيبِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ
    فَهْمِ الْأَطْرَافِ الرَّئِيسِيَّةِ.
  focus: 'Menyelaraskan stakeholder. Fokus lesson: pengelolaan ekspektasi realistis.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - إِدَارَةِ
  - التَّوَقُّعَاتِ
  - الْوَاقِعِيَّةِ،
  indonesian_explanation: Dalam latihan pengelolaan ekspektasi realistis, pertama kita perlu menyatukan
    pemahaman pihak-pihak utama.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، مِنَ الْأَفْضَلِ
    أَنْ نُدِيرَ التَّوَقُّعَاتِ قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ،
    مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّعَاتِ قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.'
  sample_answer: عِنْدَ تَطْبِيقِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ
    التَّوَقُّعَاتِ قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
  focus: Mengelola ekspektasi. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - إِدَارَةِ
  - التَّوَقُّعَاتِ
  - الْوَاقِعِيَّةِ،
  indonesian_explanation: Saat menerapkan pengelolaan ekspektasi realistis, lebih baik kita mengelola
    ekspektasi sebelum menjanjikan sesuatu yang spesifik.
- coach: 'استخدم الفكرة: سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.'
  hint: 'Jawab dengan struktur C1 memakai: سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ
    مُهِمٌّ.'
  sample_answer: سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
  focus: Memberi feedback sensitif. Pakai sebagai penghubung dalam pengelolaan ekspektasi realistis.
  expected_keywords:
  - سَأُقَدِّمُ
  - هَذِهِ
  - الْمُلَاحَظَةَ
  - بِحَسَاسِيَّةٍ،
  - لِأَنَّ
  indonesian_explanation: Saya akan menyampaikan feedback ini dengan sensitif karena topiknya penting.
- coach: 'استخدم الفكرة: يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ بِخُطَّةٍ وَاضِحَةٍ.'
  hint: 'Jawab dengan struktur C1 memakai: يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ
    بِخُطَّةٍ وَاضِحَةٍ.'
  sample_answer: يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ بِخُطَّةٍ وَاضِحَةٍ.
  focus: Mengomunikasikan risiko. Gunakan untuk repair dalam pengelolaan ekspektasi realistis.
  expected_keywords:
  - يُوجَدُ
  - خَطَرٌ
  - مُحْتَمَلٌ،
  - وَلَكِنْ
  - يُمْكِنُنَا
  indonesian_explanation: Ada risiko potensial, tetapi kita bisa menguranginya dengan rencana yang jelas.
