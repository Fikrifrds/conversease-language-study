prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam latihan pengelolaan ekspektasi realistis, pertama kita perlu
    menyatukan pemahaman pihak-pihak utama.'
  target_response: فِي تَدْرِيبِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ
    فَهْمِ الْأَطْرَافِ الرَّئِيسِيَّةِ.
  acceptable_responses:
  - فِي تَدْرِيبِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ فَهْمِ
    الْأَطْرَافِ الرَّئِيسِيَّةِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan pengelolaan ekspektasi realistis, lebih baik kita
    mengelola ekspektasi sebelum menjanjikan sesuatu yang spesifik.'
  target_response: عِنْدَ تَطْبِيقِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ
    التَّوَقُّعَاتِ قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ إِدَارَةِ التَّوَقُّعَاتِ الْوَاقِعِيَّةِ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ التَّوَقُّعَاتِ
    قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya akan menyampaikan feedback ini dengan sensitif karena topiknya
    penting.'
  target_response: سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
  acceptable_responses:
  - سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
- prompt: 'Ucapkan dalam bahasa Arab: Ada risiko potensial, tetapi kita bisa menguranginya dengan rencana
    yang jelas.'
  target_response: يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ بِخُطَّةٍ وَاضِحَةٍ.
  acceptable_responses:
  - يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ بِخُطَّةٍ وَاضِحَةٍ.
