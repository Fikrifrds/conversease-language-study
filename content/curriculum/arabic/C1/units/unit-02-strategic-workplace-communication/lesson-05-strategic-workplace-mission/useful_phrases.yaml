phrases:
- phrase: فِي تَدْرِيبِ إِدَارَةِ حِوَارٍ مِهَنِيٍّ اِسْتِرَاتِيجِيٍّ، نَحْتَاجُ أَوَّلًا إِلَى تَوْحِيدِ
    فَهْمِ الْأَطْرَافِ الرَّئِيسِيَّةِ.
  meaning_id: Dalam latihan pelaksanaan percakapan kerja strategis, pertama kita perlu menyatukan pemahaman
    pihak-pihak utama.
  usage_note: 'Menyelaraskan stakeholder. Fokus lesson: pelaksanaan percakapan kerja strategis.'
- phrase: عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ مِهَنِيٍّ اِسْتِرَاتِيجِيٍّ، مِنَ الْأَفْضَلِ أَنْ نُدِيرَ
    التَّوَقُّعَاتِ قَبْلَ أَنْ نَعِدَ بِشَيْءٍ مُحَدَّدٍ.
  meaning_id: Saat menerapkan pelaksanaan percakapan kerja strategis, lebih baik kita mengelola ekspektasi
    sebelum menjanjikan sesuatu yang spesifik.
  usage_note: Mengelola ekspektasi. Hubungkan dengan fokus lesson.
- phrase: سَأُقَدِّمُ هَذِهِ الْمُلَاحَظَةَ بِحَسَاسِيَّةٍ، لِأَنَّ الْمَوْضُوعَ مُهِمٌّ.
  meaning_id: Saya akan menyampaikan feedback ini dengan sensitif karena topiknya penting.
  usage_note: Memberi feedback sensitif. Pakai sebagai penghubung dalam pelaksanaan percakapan kerja strategis.
- phrase: يُوجَدُ خَطَرٌ مُحْتَمَلٌ، وَلَكِنْ يُمْكِنُنَا تَقْلِيلُهُ بِخُطَّةٍ وَاضِحَةٍ.
  meaning_id: Ada risiko potensial, tetapi kita bisa menguranginya dengan rencana yang jelas.
  usage_note: Mengomunikasikan risiko. Gunakan untuk repair dalam pelaksanaan percakapan kerja strategis.
- phrase: فِي خِتَامِ إِدَارَةِ حِوَارٍ مِهَنِيٍّ اِسْتِرَاتِيجِيٍّ، إِذَا تَوَافَقْنَا عَلَى هَذَا الْإِطَارِ،
    فَسَيَكُونُ التَّنْفِيذُ أَسْهَلَ.
  meaning_id: Pada bagian akhir pelaksanaan percakapan kerja strategis, jika kita sepakat pada kerangka
    ini, implementasinya akan lebih mudah.
  usage_note: Menutup dengan alignment. Tutup percakapan sesuai fokus lesson.
