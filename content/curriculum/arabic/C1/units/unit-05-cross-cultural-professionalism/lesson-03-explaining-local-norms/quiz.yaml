  - فِي تَدْرِيبِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ
