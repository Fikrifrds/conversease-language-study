questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan penjelasan norma lokal, sebelum merespons, kita harus
    membaca konteks dengan cermat."?
  options:
  - فِي تَدْرِيبِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ
    بِدِقَّةٍ.
  - عِنْدَ تَطْبِيقِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ
    لَبَاقَةً؟
  - فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  correct_answer: فِي تَدْرِيبِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ
    نَقْرَأَ السِّيَاقَ بِدِقَّةٍ.
