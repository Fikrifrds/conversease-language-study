phrases:
- phrase: فِي تَدْرِيبِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ
    السِّيَاقَ بِدِقَّةٍ.
  meaning_id: Dalam latihan penjelasan norma lokal, sebelum merespons, kita harus membaca konteks dengan
    cermat.
  usage_note: 'Membaca konteks. Fokus lesson: penjelasan norma lokal.'
- phrase: عِنْدَ تَطْبِيقِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ
    أَكْثَرَ لَبَاقَةً؟
  meaning_id: Saat menerapkan penjelasan norma lokal, bisakah saya bertanya dengan cara yang lebih tactful?
  usage_note: Bertanya dengan halus. Hubungkan dengan fokus lesson.
- phrase: فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  meaning_id: Di negara saya, norma ini dipahami dengan cara yang berbeda.
  usage_note: Menjelaskan norma lokal. Pakai sebagai penghubung dalam penjelasan norma lokal.
- phrase: يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُعِيدُ صِيَاغَةَ الْفِكْرَةِ.
  meaning_id: Sepertinya ada salah paham, jadi mari kita merumuskan ulang idenya.
  usage_note: Memperbaiki misunderstanding. Gunakan untuk repair dalam penjelasan norma lokal.
- phrase: فِي خِتَامِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، الْهَدَفُ هُوَ الْوُضُوحُ مَعَ الِاحْتِرَامِ،
    لَا مُجَرَّدُ الصَّحَّةِ اللُّغَوِيَّةِ.
  meaning_id: Pada bagian akhir penjelasan norma lokal, tujuannya adalah kejelasan dengan rasa hormat,
    bukan sekadar kebenaran bahasa.
  usage_note: Menutup dengan prinsip profesional. Tutup percakapan sesuai fokus lesson.
