prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam skill explaining local norms, Sebelum merespons, kita harus
    membaca konteks dengan cermat.'
  target_response: فِي مَهَارَةِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ
    نَقْرَأَ السِّيَاقَ بِدِقَّةٍ.
  acceptable_responses:
  - فِي مَهَارَةِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ
    بِدِقَّةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan explaining local norms, Bisakah saya bertanya dengan
    cara yang lebih tactful?'
  target_response: عِنْدَ تَطْبِيقِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ
    أَكْثَرَ لَبَاقَةً؟
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ شَرْحِ الْأَعْرَافِ الْمَحَلِّيَّةِ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ
    لَبَاقَةً؟
- prompt: 'Ucapkan dalam bahasa Arab: Di negara saya, norma ini dipahami dengan cara yang berbeda.'
  target_response: فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  acceptable_responses:
  - فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika muncul tantangan dalam skill ini, Sepertinya ada salah paham,
    jadi mari kita merumuskan ulang idenya.'
  target_response: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا
    نُعِيدُ صِيَاغَةَ الْفِكْرَةِ.
  acceptable_responses:
  - إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُعِيدُ
    صِيَاغَةَ الْفِكْرَةِ.
