vocabulary:
- word: إِصْلَاحٌ
  meaning_id: perbaikan
  usage_note: 'Dipakai untuk arti "perbaikan". Contoh: "فِي مَهَارَةِ إِصْلَاحِ سُوءِ الْفَهْمِ، قَبْلَ
    أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ بِ..."'
- word: سُوءٌ
  meaning_id: keburukan/salah
  usage_note: 'Dipakai untuk arti "keburukan/salah". Contoh: "فِي مَهَارَةِ إِصْلَاحِ سُوءِ الْفَهْمِ،
    قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ بِ..."'
- word: فَهْمٌ
  meaning_id: pemahaman
  usage_note: 'Dipakai untuk arti "pemahaman". Contoh: "فِي مَهَارَةِ إِصْلَاحِ سُوءِ الْفَهْمِ، قَبْلَ
    أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ بِ..."'
- word: السِّيَاقُ
  meaning_id: konteks
  usage_note: 'Dipakai untuk arti "konteks". Contoh: "فِي مَهَارَةِ إِصْلَاحِ سُوءِ الْفَهْمِ، قَبْلَ
    أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ بِ..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ إِصْلَاحِ سُوءِ الْفَهْمِ، هَلْ
    يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ لَب..."'
- word: لَبَاقَةٌ
  meaning_id: takt/kesantunan
  usage_note: 'Dipakai untuk arti "takt/kesantunan". Contoh: "عِنْدَ تَطْبِيقِ إِصْلَاحِ سُوءِ الْفَهْمِ،
    هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ لَب..."'
- word: مِعْيَارٌ
  meaning_id: norma/standar
  usage_note: 'Dipakai untuk arti "norma/standar". Contoh: "فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ
    مُخْتَلِفَةٍ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
    يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُع..."'
