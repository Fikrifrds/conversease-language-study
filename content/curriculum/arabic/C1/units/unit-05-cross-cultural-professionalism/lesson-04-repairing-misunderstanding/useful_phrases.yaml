phrases:
- phrase: قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ بِدِقَّةٍ.
  meaning_id: Sebelum merespons, kita harus membaca konteks dengan cermat.
  usage_note: Membaca konteks.
- phrase: هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ لَبَاقَةً؟
  meaning_id: Bisakah saya bertanya dengan cara yang lebih tactful?
  usage_note: Bertanya dengan halus.
- phrase: فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  meaning_id: Di negara saya, norma ini dipahami dengan cara yang berbeda.
  usage_note: Menjelaskan norma lokal.
- phrase: يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُعِيدُ صِيَاغَةَ الْفِكْرَةِ.
  meaning_id: Sepertinya ada salah paham, jadi mari kita merumuskan ulang idenya.
  usage_note: Memperbaiki misunderstanding.
- phrase: الْهَدَفُ هُوَ الْوُضُوحُ مَعَ الِاحْتِرَامِ، لَا مُجَرَّدُ الصَّحَّةِ اللُّغَوِيَّةِ.
  meaning_id: Tujuannya adalah kejelasan dengan rasa hormat, bukan sekadar kebenaran bahasa.
  usage_note: Menutup dengan prinsip profesional.
