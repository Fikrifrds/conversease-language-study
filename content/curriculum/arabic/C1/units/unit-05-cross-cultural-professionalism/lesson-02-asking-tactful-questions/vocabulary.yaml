vocabulary:
- word: أَسْئِلَةٌ
  meaning_id: pertanyaan-pertanyaan
  usage_note: 'Dipakai untuk arti "pertanyaan-pertanyaan". Contoh: "فِي مَهَارَةِ طَرْحِ أَسْئِلَةٍ لَبِقَةٍ،
    قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ ب..."'
- word: السِّيَاقُ
  meaning_id: konteks
  usage_note: 'Dipakai untuk arti "konteks". Contoh: "فِي مَهَارَةِ طَرْحِ أَسْئِلَةٍ لَبِقَةٍ، قَبْلَ
    أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ ب..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ طَرْحِ أَسْئِلَةٍ لَبِقَةٍ، هَلْ
    يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ لَ..."'
- word: لَبَاقَةٌ
  meaning_id: takt/kesantunan
  usage_note: 'Dipakai untuk arti "takt/kesantunan". Contoh: "عِنْدَ تَطْبِيقِ طَرْحِ أَسْئِلَةٍ لَبِقَةٍ،
    هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ لَ..."'
- word: مِعْيَارٌ
  meaning_id: norma/standar
  usage_note: 'Dipakai untuk arti "norma/standar". Contoh: "فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ
    مُخْتَلِفَةٍ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
    يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُع..."'
- word: سُوءٌ
  meaning_id: keburukan/salah
  usage_note: 'Dipakai untuk arti "keburukan/salah". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
