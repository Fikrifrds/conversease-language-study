vocabulary:
- word: تَدْرِيبٌ
  meaning_id: coaching/latihan
  usage_note: 'Dipakai untuk arti "coaching/latihan". Contoh: "فِي تَدْرِيبِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ،
    قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ ا..."'
- word: قِرَاءَةٌ
  meaning_id: membaca
  usage_note: 'Dipakai untuk arti "membaca". Contoh: "فِي تَدْرِيبِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ،
    قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ ا..."'
- word: السِّيَاقُ
  meaning_id: konteks
  usage_note: 'Dipakai untuk arti "konteks". Contoh: "فِي تَدْرِيبِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ،
    قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ ا..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ،
    هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ..."'
- word: لَبَاقَةٌ
  meaning_id: takt/kesantunan
  usage_note: 'Dipakai untuk arti "takt/kesantunan". Contoh: "عِنْدَ تَطْبِيقِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ،
    هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ..."'
- word: مِعْيَارٌ
  meaning_id: norma/standar
  usage_note: 'Dipakai untuk arti "norma/standar". Contoh: "فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ
    مُخْتَلِفَةٍ."'
- word: سُوءٌ
  meaning_id: keburukan/salah
  usage_note: 'Dipakai untuk arti "keburukan/salah". Contoh: "يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا
    نُعِيدُ صِيَاغَةَ الْفِكْرَةِ."'
- word: فَهْمٌ
  meaning_id: pemahaman
  usage_note: 'Dipakai untuk arti "pemahaman". Contoh: "يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا
    نُعِيدُ صِيَاغَةَ الْفِكْرَةِ."'
