prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam latihan pembacaan konteks sosial, sebelum merespons, kita
    harus membaca konteks dengan cermat.'
  target_response: فِي تَدْرِيبِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ
    نَقْرَأَ السِّيَاقَ بِدِقَّةٍ.
  acceptable_responses:
  - فِي تَدْرِيبِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ
    بِدِقَّةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan pembacaan konteks sosial, bisakah saya bertanya
    dengan cara yang lebih tactful?'
  target_response: عِنْدَ تَطْبِيقِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ
    بِطَرِيقَةٍ أَكْثَرَ لَبَاقَةً؟
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ
    لَبَاقَةً؟
- prompt: 'Ucapkan dalam bahasa Arab: Di negara saya, norma ini dipahami dengan cara yang berbeda.'
  target_response: فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  acceptable_responses:
  - فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Sepertinya ada salah paham, jadi mari kita merumuskan ulang idenya.'
  target_response: يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُعِيدُ صِيَاغَةَ الْفِكْرَةِ.
  acceptable_responses:
  - يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُعِيدُ صِيَاغَةَ الْفِكْرَةِ.
