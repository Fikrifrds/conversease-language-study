questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan pembacaan konteks sosial, sebelum merespons, kita harus
    membaca konteks dengan cermat."?
  options:
  - فِي تَدْرِيبِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ
    بِدِقَّةٍ.
  - عِنْدَ تَطْبِيقِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ
    لَبَاقَةً؟
  - فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  correct_answer: فِي تَدْرِيبِ قِرَاءَةِ السِّيَاقِ الِاجْتِمَاعِيِّ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ
    نَقْرَأَ السِّيَاقَ بِدِقَّةٍ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Saat menerapkan pembacaan konteks sosial, bisakah saya bertanya dengan
