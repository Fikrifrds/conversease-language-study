questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan percakapan lintas budaya, sebelum merespons, kita harus
    membaca konteks dengan cermat."?
  options:
  - فِي تَدْرِيبِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ السِّيَاقَ
    بِدِقَّةٍ.
  - عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ أَكْثَرَ
    لَبَاقَةً؟
  - فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  correct_answer: فِي تَدْرِيبِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ
    نَقْرَأَ السِّيَاقَ بِدِقَّةٍ.
