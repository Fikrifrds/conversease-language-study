phrases:
- phrase: فِي مَهَارَةِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ
    السِّيَاقَ بِدِقَّةٍ.
  meaning_id: Dalam skill running a cross-cultural conversation, Sebelum merespons, kita harus membaca
    konteks dengan cermat.
  usage_note: 'Membaca konteks. Fokus lesson: running a cross-cultural conversation.'
- phrase: عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ
    أَكْثَرَ لَبَاقَةً؟
  meaning_id: Saat menerapkan running a cross-cultural conversation, Bisakah saya bertanya dengan cara
    yang lebih tactful?
  usage_note: Bertanya dengan halus. Hubungkan dengan fokus lesson.
- phrase: فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  meaning_id: Di negara saya, norma ini dipahami dengan cara yang berbeda.
  usage_note: Menjelaskan norma lokal. Pakai sebagai penghubung dalam running a cross-cultural conversation.
- phrase: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا
    نُعِيدُ صِيَاغَةَ الْفِكْرَةِ.
  meaning_id: Jika muncul tantangan dalam skill ini, Sepertinya ada salah paham, jadi mari kita merumuskan
    ulang idenya.
  usage_note: Memperbaiki misunderstanding. Gunakan untuk repair dalam running a cross-cultural conversation.
- phrase: فِي الصِّيَاغَةِ النِّهَائِيَّةِ لِهَذِهِ الْمَهَارَةِ، الْهَدَفُ هُوَ الْوُضُوحُ مَعَ الِاحْتِرَامِ،
    لَا مُجَرَّدُ الصَّحَّةِ اللُّغَوِيَّةِ.
  meaning_id: Dalam final formulation untuk running a cross-cultural conversation, Tujuannya adalah kejelasan
    dengan rasa hormat, bukan sekadar kebenaran bahasa.
  usage_note: Menutup dengan prinsip profesional. Tutup percakapan sesuai fokus lesson.
