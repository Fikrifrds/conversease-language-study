phrases:
- phrase: فِي تَدْرِيبِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، قَبْلَ أَنْ نَرُدَّ، يَجِبُ أَنْ نَقْرَأَ
    السِّيَاقَ بِدِقَّةٍ.
  meaning_id: Dalam latihan percakapan lintas budaya, sebelum merespons, kita harus membaca konteks dengan
    cermat.
  usage_note: 'Membaca konteks. Fokus lesson: percakapan lintas budaya.'
- phrase: عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، هَلْ يُمْكِنُ أَنْ أَسْأَلَ بِطَرِيقَةٍ
    أَكْثَرَ لَبَاقَةً؟
  meaning_id: Saat menerapkan percakapan lintas budaya, bisakah saya bertanya dengan cara yang lebih tactful?
  usage_note: Bertanya dengan halus. Hubungkan dengan fokus lesson.
- phrase: فِي بَلَدِي، هَذَا الْمِعْيَارُ يُفْهَمُ بِطَرِيقَةٍ مُخْتَلِفَةٍ.
  meaning_id: Di negara saya, norma ini dipahami dengan cara yang berbeda.
  usage_note: Menjelaskan norma lokal. Pakai sebagai penghubung dalam percakapan lintas budaya.
- phrase: يَبْدُو أَنَّ هُنَاكَ سُوءَ فَهْمٍ، فَدَعِينَا نُعِيدُ صِيَاغَةَ الْفِكْرَةِ.
  meaning_id: Sepertinya ada salah paham, jadi mari kita merumuskan ulang idenya.
  usage_note: Memperbaiki misunderstanding. Gunakan untuk repair dalam percakapan lintas budaya.
- phrase: فِي خِتَامِ إِدَارَةِ حِوَارٍ عَبْرَ الثَّقَافَاتِ، الْهَدَفُ هُوَ الْوُضُوحُ مَعَ الِاحْتِرَامِ،
    لَا مُجَرَّدُ الصَّحَّةِ اللُّغَوِيَّةِ.
  meaning_id: Pada bagian akhir percakapan lintas budaya, tujuannya adalah kejelasan dengan rasa hormat,
    bukan sekadar kebenaran bahasa.
  usage_note: Menutup dengan prinsip profesional. Tutup percakapan sesuai fokus lesson.
