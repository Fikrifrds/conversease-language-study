vocabulary:
- word: تَوْجِيهٌ
  meaning_id: arahan
  usage_note: 'Dipakai untuk arti "arahan". Contoh: "فِي مَهَارَةِ تَوْجِيهِ قَرَارٍ
    جَمَاعِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَةٍ و..."'
- word: قَرَارٌ
  meaning_id: keputusan
  usage_note: 'Dipakai untuk arti "keputusan". Contoh: "فِي مَهَارَةِ تَوْجِيهِ قَرَارٍ
    جَمَاعِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَةٍ و..."'
- word: مَسَارٌ
  meaning_id: jalur/arah
  usage_note: 'Dipakai untuk arti "jalur/arah". Contoh: "فِي مَهَارَةِ تَوْجِيهِ قَرَارٍ
    جَمَاعِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَةٍ و..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ تَوْجِيهِ
    قَرَارٍ جَمَاعِيٍّ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا، س..."'
- word: مُلَاحَظَةٌ
  meaning_id: catatan/masukan
  usage_note: 'Dipakai untuk arti "catatan/masukan". Contoh: "الْمُلَاحَظَةُ الْمُفِيدَةُ
    هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "الْمُلَاحَظَةُ الْمُفِيدَةُ
    هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ
    الْمَهَارَةِ، عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ..."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ تُطَبِّقُ مَهَارَةَ
    تَوْجِيهِ قَرَارٍ جَمَاعِيٍّ فِي حِوَارٍ رَسْمِيٍّ؟"'
