prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam skill running a leadership coaching conversation, Hal pertama
    adalah menetapkan arah dengan jelas.'
  target_response: فِي مَهَارَةِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ
    الْمَسَارِ بِصُورَةٍ وَاضِحَةٍ.
  acceptable_responses:
  - فِي مَهَارَةِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ
    بِصُورَةٍ وَاضِحَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan running a leadership coaching conversation, Daripada
    memberi jawaban langsung, saya akan bertanya pertanyaan yang membuka pemikiran.'
  target_response: عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، بَدَلًا مِنْ أَنْ أُعْطِيَ
    جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا،
    سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
- prompt: 'Ucapkan dalam bahasa Arab: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat
    diterapkan.'
  target_response: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  acceptable_responses:
  - الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika muncul tantangan dalam skill ini, Saat mengambil keputusan,
    kita harus menyeimbangkan kecepatan dan kualitas.'
  target_response: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ
    نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  acceptable_responses:
  - إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ
    السُّرْعَةِ وَالْجَوْدَةِ.
