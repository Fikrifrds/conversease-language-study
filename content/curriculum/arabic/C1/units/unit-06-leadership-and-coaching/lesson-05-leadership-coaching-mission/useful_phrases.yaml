phrases:
- phrase: فِي مَهَارَةِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ
    بِصُورَةٍ وَاضِحَةٍ.
  meaning_id: Dalam skill running a leadership coaching conversation, Hal pertama adalah menetapkan arah
    dengan jelas.
  usage_note: 'Menetapkan direction. Fokus lesson: running a leadership coaching conversation.'
- phrase: عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا
    مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  meaning_id: Saat menerapkan running a leadership coaching conversation, Daripada memberi jawaban langsung,
    saya akan bertanya pertanyaan yang membuka pemikiran.
  usage_note: Coaching dengan pertanyaan. Hubungkan dengan fokus lesson.
- phrase: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  meaning_id: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat diterapkan.
  usage_note: Memberi actionable feedback. Pakai sebagai penghubung dalam running a leadership coaching
    conversation.
- phrase: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ
    بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  meaning_id: Jika muncul tantangan dalam skill ini, Saat mengambil keputusan, kita harus menyeimbangkan
    kecepatan dan kualitas.
  usage_note: Membimbing keputusan. Gunakan untuk repair dalam running a leadership coaching conversation.
- phrase: فِي الصِّيَاغَةِ النِّهَائِيَّةِ لِهَذِهِ الْمَهَارَةِ، سَأُغْلِقُ الْحِوَارَ بِتَوْضِيحِ الْمَسْؤُولِيَّةِ
    وَالْمَوْعِدِ.
  meaning_id: Dalam final formulation untuk running a leadership coaching conversation, Saya akan menutup
    percakapan dengan memperjelas tanggung jawab dan tenggat.
  usage_note: Menutup leadership conversation. Tutup percakapan sesuai fokus lesson.
