phrases:
- phrase: فِي تَدْرِيبِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ
    بِصُورَةٍ وَاضِحَةٍ.
  meaning_id: Dalam latihan percakapan coaching kepemimpinan, hal pertama adalah menetapkan arah dengan
    jelas.
  usage_note: 'Menetapkan direction. Fokus lesson: percakapan coaching kepemimpinan.'
- phrase: عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا
    مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  meaning_id: Saat menerapkan percakapan coaching kepemimpinan, daripada memberi jawaban langsung, saya
    akan bertanya pertanyaan yang membuka pemikiran.
  usage_note: Coaching dengan pertanyaan. Hubungkan dengan fokus lesson.
- phrase: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  meaning_id: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat diterapkan.
  usage_note: Memberi actionable feedback. Pakai sebagai penghubung dalam percakapan coaching kepemimpinan.
- phrase: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  meaning_id: Saat mengambil keputusan, kita harus menyeimbangkan kecepatan dan kualitas.
  usage_note: Membimbing keputusan. Gunakan untuk repair dalam percakapan coaching kepemimpinan.
- phrase: فِي خِتَامِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ، سَأُغْلِقُ الْحِوَارَ بِتَوْضِيحِ الْمَسْؤُولِيَّةِ
    وَالْمَوْعِدِ.
  meaning_id: Pada bagian akhir percakapan coaching kepemimpinan, saya akan menutup percakapan dengan
    memperjelas tanggung jawab dan tenggat.
  usage_note: Menutup leadership conversation. Tutup percakapan sesuai fokus lesson.
