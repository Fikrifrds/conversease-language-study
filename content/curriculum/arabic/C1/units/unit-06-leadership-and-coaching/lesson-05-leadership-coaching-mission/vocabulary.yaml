vocabulary:
- word: تَدْرِيبٌ
  meaning_id: coaching/latihan
  usage_note: 'Dipakai untuk arti "coaching/latihan". Contoh: "فِي تَدْرِيبِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ
    تَوْجِيهِيٍّ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَار..."'
- word: مَسَارٌ
  meaning_id: jalur/arah
  usage_note: 'Dipakai untuk arti "jalur/arah". Contoh: "فِي تَدْرِيبِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ تَوْجِيهِيٍّ،
    أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَار..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ إِدَارَةِ حِوَارٍ قِيَادِيٍّ
    تَوْجِيهِيٍّ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا..."'
- word: مُلَاحَظَةٌ
  meaning_id: catatan/masukan
  usage_note: 'Dipakai untuk arti "catatan/masukan". Contoh: "الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي
    تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ
    إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ."'
- word: قَرَارٌ
  meaning_id: keputusan
  usage_note: 'Dipakai untuk arti "keputusan". Contoh: "عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ
    بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ تُحَوِّلُ مَهَارَةَ إِدَارَةِ حِوَارٍ قِيَادِيٍّ
    تَوْجِيهِيٍّ إِلَى خُطْوَةٍ عَمَلِيَّةٍ؟"'
- word: مِعْيَارٌ
  meaning_id: norma/standar
  usage_note: 'Dipakai untuk arti "norma/standar". Contoh: "مَا الْمِعْيَارُ الَّذِي سَتَحْكُمُ بِهِ عَلَى
    نَجَاحِ الْحِوَارِ؟"'
