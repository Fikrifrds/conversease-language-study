- src: /images/lesson-visual-library/workplace-male/card-3.png
  width: 1254
  height: 1254
  label: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  alt: Cuplikan visual workplace male untuk frasa الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ
