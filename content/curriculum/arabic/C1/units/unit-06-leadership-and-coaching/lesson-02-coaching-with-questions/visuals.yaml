- src: /images/lesson-visual-library/workplace-male/card-2.png
  width: 1254
  height: 1254
  label: عِنْدَ تَطْبِيقِ التَّوْجِيهِ بِالْأَسْئِلَةِ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا،
    سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  alt: Cuplikan visual workplace male untuk frasa عِنْدَ تَطْبِيقِ التَّوْجِيهِ بِالْأَسْئِلَةِ، بَدَلًا
