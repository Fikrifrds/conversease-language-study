scenario_key: arabic_c1_giving_actionable_feedback
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تَجْعَلُ جَوَابَكَ فِي تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ مُقْنِعًا
  وَمُتَوَازِنًا؟
learner_goal: Latih percakapan Arab C1 untuk masukan yang bisa ditindaklanjuti dengan nuansa, struktur,
  presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تَجْعَلُ جَوَابَكَ فِي تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ مُقْنِعًا وَمُتَوَازِنًا؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ،
    أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَةٍ وَاضِحَةٍ.'
  sample_answer: فِي تَدْرِيبِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، أَوَّلُ شَيْءٍ هُوَ
    تَحْدِيدُ الْمَسَارِ بِصُورَةٍ وَاضِحَةٍ.
  focus: 'Menetapkan direction. Fokus lesson: masukan yang bisa ditindaklanjuti.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - تَقْدِيمِ
  - تَغْذِيَةٍ
  - رَاجِعَةٍ
  indonesian_explanation: Dalam latihan masukan yang bisa ditindaklanjuti, hal pertama adalah menetapkan
    arah dengan jelas.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، بَدَلًا
    مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ،
    بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.'
  sample_answer: عِنْدَ تَطْبِيقِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، بَدَلًا مِنْ أَنْ
    أُعْطِيَ جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  focus: Coaching dengan pertanyaan. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - تَقْدِيمِ
  - تَغْذِيَةٍ
  - رَاجِعَةٍ
  indonesian_explanation: Saat menerapkan masukan yang bisa ditindaklanjuti, daripada memberi jawaban
    langsung, saya akan bertanya pertanyaan yang membuka pemikiran.
- coach: 'استخدم الفكرة: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ
    لِلتَّطْبِيقِ.'
  hint: 'Jawab dengan struktur C1 memakai: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى
    خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.'
  sample_answer: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  focus: Memberi actionable feedback. Pakai sebagai penghubung dalam masukan yang bisa ditindaklanjuti.
  expected_keywords:
  - الْمُلَاحَظَةُ
  - الْمُفِيدَةُ
  - هِيَ
  - الَّتِي
  - تَتَحَوَّلُ
  indonesian_explanation: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat diterapkan.
- coach: 'استخدم الفكرة: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ
    وَالْجَوْدَةِ.'
  sample_answer: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  focus: Membimbing keputusan. Gunakan untuk repair dalam masukan yang bisa ditindaklanjuti.
  expected_keywords:
  - عِنْدَ
  - اتِّخَاذِ
  - الْقَرَارِ،
  - يَجِبُ
  - أَنْ
  indonesian_explanation: Saat mengambil keputusan, kita harus menyeimbangkan kecepatan dan kualitas.
