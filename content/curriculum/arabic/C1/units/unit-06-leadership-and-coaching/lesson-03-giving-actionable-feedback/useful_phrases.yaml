phrases:
- phrase: فِي مَهَارَةِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ
    الْمَسَارِ بِصُورَةٍ وَاضِحَةٍ.
  meaning_id: Dalam skill giving actionable feedback, Hal pertama adalah menetapkan arah dengan jelas.
  usage_note: 'Menetapkan direction. Fokus lesson: giving actionable feedback.'
- phrase: عِنْدَ تَطْبِيقِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، بَدَلًا مِنْ أَنْ أُعْطِيَ
    جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  meaning_id: Saat menerapkan giving actionable feedback, Daripada memberi jawaban langsung, saya akan
    bertanya pertanyaan yang membuka pemikiran.
  usage_note: Coaching dengan pertanyaan. Hubungkan dengan fokus lesson.
- phrase: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  meaning_id: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat diterapkan.
  usage_note: Memberi actionable feedback. Pakai sebagai penghubung dalam giving actionable feedback.
- phrase: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ
    بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  meaning_id: Jika muncul tantangan dalam skill ini, Saat mengambil keputusan, kita harus menyeimbangkan
    kecepatan dan kualitas.
  usage_note: Membimbing keputusan. Gunakan untuk repair dalam giving actionable feedback.
- phrase: فِي الصِّيَاغَةِ النِّهَائِيَّةِ لِهَذِهِ الْمَهَارَةِ، سَأُغْلِقُ الْحِوَارَ بِتَوْضِيحِ الْمَسْؤُولِيَّةِ
    وَالْمَوْعِدِ.
  meaning_id: Dalam final formulation untuk giving actionable feedback, Saya akan menutup percakapan dengan
    memperjelas tanggung jawab dan tenggat.
  usage_note: Menutup leadership conversation. Tutup percakapan sesuai fokus lesson.
