phrases:
- phrase: فِي تَدْرِيبِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ
    الْمَسَارِ بِصُورَةٍ وَاضِحَةٍ.
  meaning_id: Dalam latihan masukan yang bisa ditindaklanjuti, hal pertama adalah menetapkan arah dengan
    jelas.
  usage_note: 'Menetapkan direction. Fokus lesson: masukan yang bisa ditindaklanjuti.'
- phrase: عِنْدَ تَطْبِيقِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، بَدَلًا مِنْ أَنْ أُعْطِيَ
    جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  meaning_id: Saat menerapkan masukan yang bisa ditindaklanjuti, daripada memberi jawaban langsung, saya
    akan bertanya pertanyaan yang membuka pemikiran.
  usage_note: Coaching dengan pertanyaan. Hubungkan dengan fokus lesson.
- phrase: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  meaning_id: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat diterapkan.
  usage_note: Memberi actionable feedback. Pakai sebagai penghubung dalam masukan yang bisa ditindaklanjuti.
- phrase: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  meaning_id: Saat mengambil keputusan, kita harus menyeimbangkan kecepatan dan kualitas.
  usage_note: Membimbing keputusan. Gunakan untuk repair dalam masukan yang bisa ditindaklanjuti.
- phrase: فِي خِتَامِ تَقْدِيمِ تَغْذِيَةٍ رَاجِعَةٍ قَابِلَةٍ لِلْعَمَلِ، سَأُغْلِقُ الْحِوَارَ بِتَوْضِيحِ
    الْمَسْؤُولِيَّةِ وَالْمَوْعِدِ.
  meaning_id: Pada bagian akhir masukan yang bisa ditindaklanjuti, saya akan menutup percakapan dengan
    memperjelas tanggung jawab dan tenggat.
  usage_note: Menutup leadership conversation. Tutup percakapan sesuai fokus lesson.
