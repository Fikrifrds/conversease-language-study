scenario_key: arabic_c1_setting_direction
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تُطَبِّقُ مَهَارَةَ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ فِي حِوَارٍ رَسْمِيٍّ؟
learner_goal: Latih percakapan Arab C1 untuk penetapan arah dengan jelas dengan nuansa, struktur, presisi,
  dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تُطَبِّقُ مَهَارَةَ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ فِي حِوَارٍ رَسْمِيٍّ؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، أَوَّلُ شَيْءٍ
    هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَةٍ وَاضِحَةٍ.'
  sample_answer: فِي تَدْرِيبِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ
    بِصُورَةٍ وَاضِحَةٍ.
  focus: 'Menetapkan direction. Fokus lesson: penetapan arah dengan jelas.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - تَحْدِيدِ
  - الِاتِّجَاهِ
  - بِوُضُوحٍ،
  indonesian_explanation: Dalam latihan penetapan arah dengan jelas, hal pertama adalah menetapkan arah
    dengan jelas.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، بَدَلًا مِنْ أَنْ أُعْطِيَ
    جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، بَدَلًا
    مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.'
  sample_answer: عِنْدَ تَطْبِيقِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا
    مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  focus: Coaching dengan pertanyaan. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - تَحْدِيدِ
  - الِاتِّجَاهِ
  - بِوُضُوحٍ،
  indonesian_explanation: Saat menerapkan penetapan arah dengan jelas, daripada memberi jawaban langsung,
    saya akan bertanya pertanyaan yang membuka pemikiran.
- coach: 'استخدم الفكرة: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ
    لِلتَّطْبِيقِ.'
  hint: 'Jawab dengan struktur C1 memakai: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى
    خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.'
  sample_answer: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  focus: Memberi actionable feedback. Pakai sebagai penghubung dalam penetapan arah dengan jelas.
  expected_keywords:
  - الْمُلَاحَظَةُ
  - الْمُفِيدَةُ
  - هِيَ
  - الَّتِي
  - تَتَحَوَّلُ
  indonesian_explanation: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat diterapkan.
- coach: 'استخدم الفكرة: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ
    وَالْجَوْدَةِ.'
  sample_answer: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  focus: Membimbing keputusan. Gunakan untuk repair dalam penetapan arah dengan jelas.
  expected_keywords:
  - عِنْدَ
  - اتِّخَاذِ
  - الْقَرَارِ،
  - يَجِبُ
  - أَنْ
  indonesian_explanation: Saat mengambil keputusan, kita harus menyeimbangkan kecepatan dan kualitas.
