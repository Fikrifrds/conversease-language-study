vocabulary:
- word: اِتِّجَاهٌ
  meaning_id: arah
  usage_note: 'Dipakai untuk arti "arah". Contoh: "فِي مَهَارَةِ تَحْدِيدِ الِاتِّجَاهِ
    بِوُضُوحٍ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَ..."'
- word: مَسَارٌ
  meaning_id: jalur/arah
  usage_note: 'Dipakai untuk arti "jalur/arah". Contoh: "فِي مَهَارَةِ تَحْدِيدِ الِاتِّجَاهِ
    بِوُضُوحٍ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَ..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ تَحْدِيدِ
    الِاتِّجَاهِ بِوُضُوحٍ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرً..."'
- word: مُلَاحَظَةٌ
  meaning_id: catatan/masukan
  usage_note: 'Dipakai untuk arti "catatan/masukan". Contoh: "الْمُلَاحَظَةُ الْمُفِيدَةُ
    هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "الْمُلَاحَظَةُ الْمُفِيدَةُ
    هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ
    الْمَهَارَةِ، عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ..."'
- word: قَرَارٌ
  meaning_id: keputusan
  usage_note: 'Dipakai untuk arti "keputusan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ
    الْمَهَارَةِ، عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ..."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "كَيْفَ تُطَبِّقُ مَهَارَةَ
    تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ فِي حِوَارٍ رَسْمِيٍّ؟"'
