phrases:
- phrase: أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَةٍ وَاضِحَةٍ.
  meaning_id: Hal pertama adalah menetapkan arah dengan jelas.
  usage_note: Menetapkan direction.
- phrase: بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا، سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  meaning_id: Daripada memberi jawaban langsung, saya akan bertanya pertanyaan yang membuka pemikiran.
  usage_note: Coaching dengan pertanyaan.
- phrase: الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  meaning_id: Feedback yang berguna adalah yang berubah menjadi langkah yang dapat diterapkan.
  usage_note: Memberi actionable feedback.
- phrase: عِنْدَ اتِّخَاذِ الْقَرَارِ، يَجِبُ أَنْ نُوَازِنَ بَيْنَ السُّرْعَةِ وَالْجَوْدَةِ.
  meaning_id: Saat mengambil keputusan, kita harus menyeimbangkan kecepatan dan kualitas.
  usage_note: Membimbing keputusan.
- phrase: سَأُغْلِقُ الْحِوَارَ بِتَوْضِيحِ الْمَسْؤُولِيَّةِ وَالْمَوْعِدِ.
  meaning_id: Saya akan menutup percakapan dengan memperjelas tanggung jawab dan tenggat.
  usage_note: Menutup leadership conversation.
