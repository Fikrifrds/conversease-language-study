questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan penetapan arah dengan jelas, hal pertama adalah menetapkan
    arah dengan jelas."?
  options:
  - فِي تَدْرِيبِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ بِصُورَةٍ
    وَاضِحَةٍ.
  - عِنْدَ تَطْبِيقِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، بَدَلًا مِنْ أَنْ أُعْطِيَ جَوَابًا مُبَاشِرًا،
    سَأَسْأَلُ سُؤَالًا يُفَتِّحُ التَّفْكِيرَ.
  - الْمُلَاحَظَةُ الْمُفِيدَةُ هِيَ الَّتِي تَتَحَوَّلُ إِلَى خُطْوَةٍ قَابِلَةٍ لِلتَّطْبِيقِ.
  correct_answer: فِي تَدْرِيبِ تَحْدِيدِ الِاتِّجَاهِ بِوُضُوحٍ، أَوَّلُ شَيْءٍ هُوَ تَحْدِيدُ الْمَسَارِ
    بِصُورَةٍ وَاضِحَةٍ.
