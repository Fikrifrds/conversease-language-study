- word: السِّيَاقُ
  meaning_id: konteks
  usage_note: 'Dipakai untuk arti "konteks". Contoh: "عِنْدَ تَطْبِيقِ إِدَارَةِ مُحَادَثَةٍ
    نِهَائِيَّةٍ مُتَكَامِلَةٍ، فِي الْحِوَارِ الْمِهَنِيِّ..."'
- word: عَرْضٌ
  meaning_id: presentasi/tawaran
  usage_note: 'Dipakai untuk arti "presentasi/tawaran". Contoh: "عِنْدَ الْعَرْضِ
    أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ."'
- word: نِقَاشٌ
  meaning_id: diskusi
  usage_note: 'Dipakai untuk arti "diskusi". Contoh: "عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ،
