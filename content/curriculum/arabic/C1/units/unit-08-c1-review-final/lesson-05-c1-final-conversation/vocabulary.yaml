vocabulary:
- word: الْمُحَادَثَةُ النِّهَائِيَّةُ
  meaning_id: percakapan akhir
  usage_note: Dipakai untuk latihan percakapan C1 yang utuh.
- word: أُدِيرُ النِّقَاشَ
  meaning_id: saya mengelola diskusi
  usage_note: Dipakai saat memimpin alur percakapan.
- word: بِمُرُونَةٍ
  meaning_id: dengan fleksibel
  usage_note: Dipakai saat menyesuaikan respons dengan situasi.
- word: أَدْعُو
  meaning_id: saya mengundang/meminta
  usage_note: Dipakai saat memberi ruang pihak lain untuk merespons.
- word: الرَّدُّ
  meaning_id: respons/jawaban
  usage_note: Dipakai untuk tanggapan pihak lain.
- word: الدَّلِيلُ
  meaning_id: bukti
  usage_note: Dipakai untuk menghubungkan opini dengan alasan.
- word: نَبْرَةُ الْحِوَارِ
  meaning_id: nada percakapan
  usage_note: Dipakai saat menyesuaikan bahasa dengan suasana.
- word: خُطْوَةٌ تَالِيَةٌ
  meaning_id: langkah berikutnya
  usage_note: Dipakai untuk menutup percakapan dengan tindak lanjut.
