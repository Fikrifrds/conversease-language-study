vocabulary:
- word: أُرَاجِعُ
  meaning_id: saya mengulang/review
  usage_note: 'Dipakai untuk arti "saya mengulang/review". Contoh: "فِي مَهَارَةِ
    إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّر..."'
- word: كَيْفَ
  meaning_id: bagaimana
  usage_note: 'Dipakai untuk arti "bagaimana". Contoh: "فِي مَهَارَةِ إِدَارَةِ مُحَادَثَةٍ
    نِهَائِيَّةٍ مُتَكَامِلَةٍ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّر..."'
- word: رَأْيٌ
  meaning_id: pendapat
  usage_note: 'Dipakai untuk arti "pendapat". Contoh: "فِي مَهَارَةِ إِدَارَةِ مُحَادَثَةٍ
    نِهَائِيَّةٍ مُتَكَامِلَةٍ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّر..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ إِدَارَةِ
    مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، فِي الْحِوَارِ الْمِهَنِيِّ..."'
- word: مِهَنِيٌّ
  meaning_id: profesional
  usage_note: 'Dipakai untuk arti "profesional". Contoh: "عِنْدَ تَطْبِيقِ إِدَارَةِ
