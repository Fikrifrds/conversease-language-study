prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam percakapan akhir yang utuh, saya mengelola diskusi dengan jelas dan fleksibel.'
  target_response: فِي الْمُحَادَثَةِ النِّهَائِيَّةِ الْمُتَكَامِلَةِ، أُدِيرُ النِّقَاشَ بِوُضُوحٍ وَمُرُونَةٍ.
  acceptable_responses:
  - فِي الْمُحَادَثَةِ النِّهَائِيَّةِ الْمُتَكَامِلَةِ، أُدِيرُ النِّقَاشَ بِوُضُوحٍ وَمُرُونَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya mulai dengan menentukan topik, lalu mengundang pihak lain untuk merespons.'
  target_response: أَبْدَأُ بِتَحْدِيدِ الْمَوْضُوعِ، ثُمَّ أَدْعُو الطَّرَفَ الْآخَرَ إِلَى الرَّدِّ.
  acceptable_responses:
  - أَبْدَأُ بِتَحْدِيدِ الْمَوْضُوعِ، ثُمَّ أَدْعُو الطَّرَفَ الْآخَرَ إِلَى الرَّدِّ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya menghubungkan pendapat, bukti, dan pertanyaan agar percakapan tetap tersambung.'
  target_response: أَرْبِطُ بَيْنَ الرَّأْيِ وَالدَّلِيلِ وَالسُّؤَالِ حَتَّى يَظَلَّ الْحِوَارُ مُتَّصِلًا.
  acceptable_responses:
  - أَرْبِطُ بَيْنَ الرَّأْيِ وَالدَّلِيلِ وَالسُّؤَالِ حَتَّى يَظَلَّ الْحِوَارُ مُتَّصِلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Jika nada percakapan berubah, saya melunakkan bahasa dan mengarahkan ulang diskusi.'
  target_response: إِذَا تَغَيَّرَتْ نَبْرَةُ الْحِوَارِ، أُخَفِّفُ اللُّغَةَ وَأُعِيدُ تَوْجِيهَ النِّقَاشِ.
  acceptable_responses:
  - إِذَا تَغَيَّرَتْ نَبْرَةُ الْحِوَارِ، أُخَفِّفُ اللُّغَةَ وَأُعِيدُ تَوْجِيهَ النِّقَاشِ.
