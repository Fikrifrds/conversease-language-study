prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Mari mulai dengan menentukan apa yang ingin kita putuskan hari ini.'
  target_response: لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
  acceptable_responses:
  - لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
- prompt: 'Ucapkan dalam bahasa Arab: Bagaimana pendapatmu sebelum aku lanjut?'
  target_response: مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
  acceptable_responses:
  - مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
- prompt: 'Ucapkan dalam bahasa Arab: Aku kaitkan pendapatmu dengan bukti agar tetap di jalur.'
  target_response: أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.
  acceptable_responses:
  - أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau nadanya memanas, aku lembutkan dan arahkan ulang.'
  target_response: إِنِ احْتَدَّتِ النَّبْرَةُ، أُخَفِّفُهَا وَأُعِيدُ التَّوْجِيهَ.
  acceptable_responses:
  - إِنِ احْتَدَّتِ النَّبْرَةُ، أُخَفِّفُهَا وَأُعِيدُ التَّوْجِيهَ.
