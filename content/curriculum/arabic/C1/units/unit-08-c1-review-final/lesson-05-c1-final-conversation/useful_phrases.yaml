phrases:
- phrase: فِي الْمُحَادَثَةِ النِّهَائِيَّةِ الْمُتَكَامِلَةِ، أُدِيرُ النِّقَاشَ بِوُضُوحٍ وَمُرُونَةٍ.
  meaning_id: Dalam percakapan akhir yang utuh, saya mengelola diskusi dengan jelas dan fleksibel.
  usage_note: Membuka final conversation dengan kontrol arah.
- phrase: أَبْدَأُ بِتَحْدِيدِ الْمَوْضُوعِ، ثُمَّ أَدْعُو الطَّرَفَ الْآخَرَ إِلَى الرَّدِّ.
  meaning_id: Saya mulai dengan menentukan topik, lalu mengundang pihak lain untuk merespons.
  usage_note: Membuka interaksi dua arah secara terstruktur.
- phrase: أَرْبِطُ بَيْنَ الرَّأْيِ وَالدَّلِيلِ وَالسُّؤَالِ حَتَّى يَظَلَّ الْحِوَارُ مُتَّصِلًا.
  meaning_id: Saya menghubungkan pendapat, bukti, dan pertanyaan agar percakapan tetap tersambung.
  usage_note: Menjaga percakapan panjang tetap koheren.
- phrase: إِذَا تَغَيَّرَتْ نَبْرَةُ الْحِوَارِ، أُخَفِّفُ اللُّغَةَ وَأُعِيدُ تَوْجِيهَ النِّقَاشِ.
  meaning_id: Jika nada percakapan berubah, saya melunakkan bahasa dan mengarahkan ulang diskusi.
  usage_note: Menyesuaikan nada saat percakapan berubah.
- phrase: أُنْهِي الْمُحَادَثَةَ بِخُلَاصَةٍ وَخُطْوَةٍ تَالِيَةٍ وَاضِحَةٍ.
  meaning_id: Saya mengakhiri percakapan dengan ringkasan dan langkah berikutnya yang jelas.
  usage_note: Menutup final conversation dengan tindak lanjut.
