phrases:
- phrase: لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
  meaning_id: Mari mulai dengan menentukan apa yang ingin kita putuskan hari ini.
  usage_note: Membuka diskusi.
- phrase: مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
  meaning_id: Bagaimana pendapatmu sebelum aku lanjut?
  usage_note: Mengundang pihak lain.
- phrase: أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.
  meaning_id: Aku kaitkan pendapatmu dengan bukti agar tetap di jalur.
  usage_note: Menjaga keterhubungan.
- phrase: إِنِ احْتَدَّتِ النَّبْرَةُ، أُخَفِّفُهَا وَأُعِيدُ التَّوْجِيهَ.
  meaning_id: Kalau nadanya memanas, aku lembutkan dan arahkan ulang.
  usage_note: Mengelola nada.
- phrase: نَخْرُجُ بِخُطْوَةٍ وَاحِدَةٍ وَاضِحَةٍ.
  meaning_id: Kita keluar dengan satu langkah yang jelas.
  usage_note: Menutup dengan langkah.
