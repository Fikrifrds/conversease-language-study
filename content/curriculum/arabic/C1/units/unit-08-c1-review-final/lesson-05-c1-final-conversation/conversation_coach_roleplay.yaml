feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تُحَوِّلُ مَهَارَةَ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ إِلَى خُطْوَةٍ عَمَلِيَّةٍ؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ،
    أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.'
  sample_answer: فِي تَدْرِيبِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، أُرَاجِعُ الْآنَ كَيْفَ
    أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  focus: 'Review nuance. Fokus lesson: percakapan akhir C1 yang utuh.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - إِدَارَةِ
  - مُحَادَثَةٍ
  - نِهَائِيَّةٍ
  indonesian_explanation: Dalam latihan percakapan akhir C1 yang utuh, saya sedang mereview cara menyampaikan
    opini yang tepat tanpa berlebihan.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، فِي الْحِوَارِ
    الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ،
    فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.'
  sample_answer: عِنْدَ تَطْبِيقِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، فِي الْحِوَارِ الْمِهَنِيِّ،
    سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  focus: Review strategy. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - إِدَارَةِ
  - مُحَادَثَةٍ
  - نِهَائِيَّةٍ
  indonesian_explanation: Saat menerapkan percakapan akhir C1 yang utuh, dalam percakapan profesional,
    saya akan fokus pada konteks, ekspektasi, dan risiko.
- coach: 'استخدم الفكرة: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ
    مُقْنِعٍ.'
  sample_answer: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  focus: Review presenting and debate. Pakai sebagai penghubung dalam percakapan akhir C1 yang utuh.
  expected_keywords:
  - عِنْدَ
  - الْعَرْضِ
  - أَوِ
  - النِّقَاشِ،
  - سَأَبْنِي
  indonesian_explanation: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan yang persuasif.
- coach: 'استخدم الفكرة: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.'
  sample_answer: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
  focus: Review cross-cultural repair. Gunakan untuk repair dalam percakapan akhir C1 yang utuh.
  expected_keywords:
  - إِذَا
  - ظَهَرَ
  - سُوءُ
  - فَهْمٍ،
  - فَسَأُصْلِحُهُ
  indonesian_explanation: Jika muncul salah paham, saya akan memperbaikinya dengan tact dan kejelasan.
