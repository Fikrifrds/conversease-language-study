scenario_key: arabic_c1_c1_final_conversation
mode: lesson_practice_coach
level_code: C1
opening_line: هَذِهِ مُحَادَثَتُنَا الْأَخِيرَةُ. أَدِيرِيهَا.
learner_goal: 'Latih percakapan Arab C1 untuk memimpin diskusi utuh: membuka topik, mengundang, lalu menutup
  dengan langkah.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: هَذِهِ مُحَادَثَتُنَا الْأَخِيرَةُ. أَدِيرِيهَا.
  hint: 'Jawab dengan struktur B2 memakai: لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.'
  sample_answer: لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
  focus: Membuka diskusi.
  expected_keywords:
  - لِنَبْدَأْ
  - بِتَحْدِيدِ
  - مَا
  - نُرِيدُ
  - حَسْمَهُ
  indonesian_explanation: Mari mulai dengan menentukan apa yang ingin kita putuskan hari ini.
- coach: 'استخدم الفكرة: مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟'
  hint: 'Jawab dengan struktur B2 memakai: مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟'
  sample_answer: مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
  focus: Mengundang pihak lain.
  expected_keywords:
  - مَا
  - رَأْيُكِ
  - أَنْتِ
  - قَبْلَ
  - أَنْ
  indonesian_explanation: Bagaimana pendapatmu sebelum aku lanjut?
- coach: 'استخدم الفكرة: أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.'
  hint: 'Jawab dengan struktur B2 memakai: أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.'
  sample_answer: أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.
  focus: Menjaga keterhubungan.
  expected_keywords:
  - أَرْبِطُ
  - رَأْيَكِ
  - بِالدَّلِيلِ
  - حَتَّى
  - نَبْقَى
  indonesian_explanation: Aku kaitkan pendapatmu dengan bukti agar tetap di jalur.
- coach: 'استخدم الفكرة: إِنِ احْتَدَّتِ النَّبْرَةُ، أُخَفِّفُهَا وَأُعِيدُ التَّوْجِيهَ.'
  hint: 'Jawab dengan struktur B2 memakai: إِنِ احْتَدَّتِ النَّبْرَةُ، أُخَفِّفُهَا وَأُعِيدُ التَّوْجِيهَ.'
  sample_answer: إِنِ احْتَدَّتِ النَّبْرَةُ، أُخَفِّفُهَا وَأُعِيدُ التَّوْجِيهَ.
  focus: Mengelola nada.
  expected_keywords:
  - إِنِ
  - احْتَدَّتِ
  - النَّبْرَةُ
  - أُخَفِّفُهَا
  - وَأُعِيدُ
  indonesian_explanation: Kalau nadanya memanas, aku lembutkan dan arahkan ulang.
target_phrases:
- لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
- مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
- أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.
- إِنِ احْتَدَّتِ النَّبْرَةُ، أُخَفِّفُهَا وَأُعِيدُ التَّوْجِيهَ.
- نَخْرُجُ بِخُطْوَةٍ وَاحِدَةٍ وَاضِحَةٍ.
