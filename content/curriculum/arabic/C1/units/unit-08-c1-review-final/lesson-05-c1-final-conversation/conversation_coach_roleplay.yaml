turns:
- coach: كَيْفَ تُحَوِّلُ مَهَارَةَ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ إِلَى خُطْوَةٍ عَمَلِيَّةٍ؟
  hint: 'Jawab dengan struktur C1 memakai: فِي الْمُحَادَثَةِ النِّهَائِيَّةِ الْمُتَكَامِلَةِ، أُدِيرُ النِّقَاشَ بِوُضُوحٍ وَمُرُونَةٍ.'
  sample_answer: فِي الْمُحَادَثَةِ النِّهَائِيَّةِ الْمُتَكَامِلَةِ، أُدِيرُ النِّقَاشَ بِوُضُوحٍ وَمُرُونَةٍ.
  focus: Membuka final conversation dengan kontrol arah.
  expected_keywords:
