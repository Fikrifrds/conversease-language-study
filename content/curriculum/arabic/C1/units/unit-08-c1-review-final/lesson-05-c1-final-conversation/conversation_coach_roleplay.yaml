  - النِّهَائِيَّةِ
  - الْمُتَكَامِلَةِ
  - أُدِيرُ
  indonesian_explanation: Dalam percakapan akhir yang utuh, saya mengelola diskusi dengan jelas dan fleksibel.
- coach: 'استخدم الفكرة: أَبْدَأُ بِتَحْدِيدِ الْمَوْضُوعِ، ثُمَّ أَدْعُو الطَّرَفَ الْآخَرَ إِلَى الرَّدِّ.'
  hint: 'Jawab dengan struktur C1 memakai: أَبْدَأُ بِتَحْدِيدِ الْمَوْضُوعِ، ثُمَّ أَدْعُو الطَّرَفَ الْآخَرَ إِلَى الرَّدِّ.'
  sample_answer: أَبْدَأُ بِتَحْدِيدِ الْمَوْضُوعِ، ثُمَّ أَدْعُو الطَّرَفَ الْآخَرَ إِلَى الرَّدِّ.
  focus: Membuka interaksi dua arah secara terstruktur.
  expected_keywords:
  - أَبْدَأُ
  - بِتَحْدِيدِ
  - الْمَوْضُوعِ
  - ثُمَّ
  - أَدْعُو
  indonesian_explanation: Saya mulai dengan menentukan topik, lalu mengundang pihak lain untuk merespons.
- coach: 'استخدم الفكرة: أَرْبِطُ بَيْنَ الرَّأْيِ وَالدَّلِيلِ وَالسُّؤَالِ حَتَّى يَظَلَّ الْحِوَارُ مُتَّصِلًا.'
  hint: 'Jawab dengan struktur C1 memakai: أَرْبِطُ بَيْنَ الرَّأْيِ وَالدَّلِيلِ وَالسُّؤَالِ حَتَّى يَظَلَّ الْحِوَارُ مُتَّصِلًا.'
  sample_answer: أَرْبِطُ بَيْنَ الرَّأْيِ وَالدَّلِيلِ وَالسُّؤَالِ حَتَّى يَظَلَّ الْحِوَارُ مُتَّصِلًا.
  focus: Menjaga percakapan panjang tetap koheren.
  expected_keywords:
  - أَرْبِطُ
  - بَيْنَ
  - الرَّأْيِ
  - وَالدَّلِيلِ
  - وَالسُّؤَالِ
  indonesian_explanation: Saya menghubungkan pendapat, bukti, dan pertanyaan agar percakapan tetap tersambung.
- coach: 'استخدم الفكرة: إِذَا تَغَيَّرَتْ نَبْرَةُ الْحِوَارِ، أُخَفِّفُ اللُّغَةَ وَأُعِيدُ تَوْجِيهَ النِّقَاشِ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا تَغَيَّرَتْ نَبْرَةُ الْحِوَارِ، أُخَفِّفُ اللُّغَةَ وَأُعِيدُ تَوْجِيهَ النِّقَاشِ.'
  sample_answer: إِذَا تَغَيَّرَتْ نَبْرَةُ الْحِوَارِ، أُخَفِّفُ اللُّغَةَ وَأُعِيدُ تَوْجِيهَ النِّقَاشِ.
  focus: Menyesuaikan nada saat percakapan berubah.
  expected_keywords:
  - إِذَا
  - تَغَيَّرَتْ
  - نَبْرَةُ
  - الْحِوَارِ
  - أُخَفِّفُ
  indonesian_explanation: Jika nada percakapan berubah, saya melunakkan bahasa dan mengarahkan ulang diskusi.
