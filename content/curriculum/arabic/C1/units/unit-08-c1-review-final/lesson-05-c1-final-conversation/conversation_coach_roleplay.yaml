opening_line: كَيْفَ تُحَوِّلُ مَهَارَةَ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ إِلَى خُطْوَةٍ
  عَمَلِيَّةٍ؟
learner_goal: Latih percakapan Arab C1 untuk percakapan akhir C1 yang utuh dengan nuansa, struktur, presisi,
  dan respons profesional.
