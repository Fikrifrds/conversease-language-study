questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Mari mulai dengan menentukan apa yang ingin kita putuskan hari ini."?
  options:
  - لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
  - مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
  - أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.
  correct_answer: لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Bagaimana pendapatmu sebelum aku lanjut?"?
  options:
  - مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
  - لِنَبْدَأْ بِتَحْدِيدِ مَا نُرِيدُ حَسْمَهُ الْيَوْمَ.
  - أَرْبِطُ رَأْيَكِ بِالدَّلِيلِ حَتَّى نَبْقَى عَلَى الْمَسَارِ.
  correct_answer: مَا رَأْيُكِ أَنْتِ قَبْلَ أَنْ أُكْمِلَ؟
