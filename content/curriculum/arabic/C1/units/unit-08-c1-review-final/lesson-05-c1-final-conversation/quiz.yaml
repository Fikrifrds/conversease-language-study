questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan percakapan akhir C1 yang utuh, saya sedang mereview cara
    menyampaikan opini yang tepat tanpa berlebihan."?
  options:
  - فِي تَدْرِيبِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ
    عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  - عِنْدَ تَطْبِيقِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ
    عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  - عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  correct_answer: فِي تَدْرِيبِ إِدَارَةِ مُحَادَثَةٍ نِهَائِيَّةٍ مُتَكَامِلَةٍ، أُرَاجِعُ الْآنَ كَيْفَ
    أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
