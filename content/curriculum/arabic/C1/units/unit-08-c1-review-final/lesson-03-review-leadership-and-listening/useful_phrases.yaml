phrases:
- phrase: عِنْدَ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُصْغِي أَوَّلًا ثُمَّ أُوَجِّهُ الْحِوَارَ.
  meaning_id: Saat meninjau kepemimpinan dan listening, saya mendengarkan dulu lalu mengarahkan percakapan.
  usage_note: Memimpin dengan mendengar sebelum memberi arahan.
- phrase: أَسْأَلُ سُؤَالًا مُفْتُوحًا لِأَفْهَمَ مَا يَحْتَاجُهُ الطَّرَفُ الْآخَرُ.
  meaning_id: Saya mengajukan pertanyaan terbuka untuk memahami kebutuhan pihak lain.
  usage_note: Menggali kebutuhan sebelum menawarkan respons.
- phrase: أُعِيدُ النُّقْطَةَ بِكَلِمَاتِي لِأَتَأَكَّدَ أَنَّنِي فَهِمْتُهَا.
  meaning_id: Saya mengulang poin dengan kata-kata saya sendiri untuk memastikan saya memahaminya.
  usage_note: Menunjukkan active listening dengan parafrasa.
- phrase: إِذَا اخْتَلَفَتِ الْآرَاءُ، أُحَافِظُ عَلَى الْهُدُوءِ وَأُوَضِّحُ الْخُطْوَةَ التَّالِيَةَ.
  meaning_id: Jika pendapat berbeda, saya tetap tenang dan menjelaskan langkah berikutnya.
  usage_note: Menjaga arah saat percakapan menegang.
- phrase: أَخْتِمُ الْحِوَارَ بِمَا اتَّفَقْنَا عَلَيْهِ وَمَا يَبْقَى لِلْمُتَابَعَةِ.
  meaning_id: Saya menutup percakapan dengan hal yang sudah disepakati dan yang masih perlu ditindaklanjuti.
  usage_note: Menutup percakapan leadership dengan keputusan yang jelas.
