phrases:
- phrase: فِي مَهَارَةِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ
    عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  meaning_id: Dalam skill reviewing leadership and listening, Saya sedang mereview cara menyampaikan opini
    yang tepat tanpa berlebihan.
  usage_note: 'Review nuance. Fokus lesson: reviewing leadership and listening.'
- phrase: عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، فِي الْحِوَارِ الْمِهَنِيِّ،
    سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  meaning_id: Saat menerapkan reviewing leadership and listening, Dalam percakapan profesional, saya akan
    fokus pada konteks, ekspektasi, dan risiko.
  usage_note: Review strategy. Hubungkan dengan fokus lesson.
- phrase: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  meaning_id: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan yang persuasif.
  usage_note: Review presenting and debate. Pakai sebagai penghubung dalam reviewing leadership and listening.
- phrase: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ
    وَوُضُوحٍ.
  meaning_id: Jika muncul tantangan dalam skill ini, Jika muncul salah paham, saya akan memperbaikinya
    dengan tact dan kejelasan.
  usage_note: Review cross-cultural repair. Gunakan untuk repair dalam reviewing leadership and listening.
- phrase: فِي الصِّيَاغَةِ النِّهَائِيَّةِ لِهَذِهِ الْمَهَارَةِ، فِي التَّقْيِيمِ النِّهَائِيِّ، سَأُظْهِرُ
    الدِّقَّةَ وَالْمُرُونَةَ وَحُسْنَ الِاسْتِمَاعِ.
  meaning_id: Dalam final formulation untuk reviewing leadership and listening, Dalam tes akhir, saya
    akan menunjukkan presisi, fleksibilitas, dan listening yang baik.
  usage_note: Menutup final C1. Tutup percakapan sesuai fokus lesson.
