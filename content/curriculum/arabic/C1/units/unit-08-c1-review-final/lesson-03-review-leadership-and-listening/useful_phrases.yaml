phrases:
- phrase: أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  meaning_id: Saya sedang mereview cara menyampaikan opini yang tepat tanpa berlebihan.
  usage_note: Review nuance.
- phrase: فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  meaning_id: Dalam percakapan profesional, saya akan fokus pada konteks, ekspektasi, dan risiko.
  usage_note: Review strategy.
- phrase: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  meaning_id: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan yang persuasif.
  usage_note: Review presenting and debate.
- phrase: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
  meaning_id: Jika muncul salah paham, saya akan memperbaikinya dengan tact dan kejelasan.
  usage_note: Review cross-cultural repair.
- phrase: فِي التَّقْيِيمِ النِّهَائِيِّ، سَأُظْهِرُ الدِّقَّةَ وَالْمُرُونَةَ وَحُسْنَ الِاسْتِمَاعِ.
  meaning_id: Dalam tes akhir, saya akan menunjukkan presisi, fleksibilitas, dan listening yang baik.
  usage_note: Menutup final C1.
