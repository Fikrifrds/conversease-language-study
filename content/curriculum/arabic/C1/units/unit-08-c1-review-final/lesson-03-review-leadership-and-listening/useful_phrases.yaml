phrases:
- phrase: دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
  meaning_id: Coba aku pahami dulu apa yang membuatmu cemas.
  usage_note: Membuka dengan mendengar.
- phrase: إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
  meaning_id: Kalau aku paham benar, masalahnya waktu, bukan usaha.
  usage_note: Memantulkan pemahaman.
- phrase: مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟
  meaning_id: Apa yang membantumu menyelesaikannya minggu ini?
  usage_note: Bertanya terbuka.
- phrase: أَبْقَى هَادِئَةً حَتَّى لَوِ اخْتَلَفْنَا.
  meaning_id: Aku tetap tenang meski kita berbeda.
  usage_note: Menjaga ketenangan.
- phrase: الْخُطْوَةُ التَّالِيَةُ أَنْ تُجَرِّبِي أَصْغَرَ جُزْءٍ.
  meaning_id: Langkah berikutnya, coba bagian terkecilnya.
  usage_note: Menutup dengan langkah.
