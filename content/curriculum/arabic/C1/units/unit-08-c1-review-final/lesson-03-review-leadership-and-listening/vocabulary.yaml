vocabulary:
- word: الْقِيَادَةُ
  meaning_id: kepemimpinan
  usage_note: Dipakai untuk mengarahkan percakapan atau tim.
- word: حُسْنُ الِاسْتِمَاعِ
  meaning_id: keterampilan menyimak dengan baik
  usage_note: Dipakai saat menunjukkan active listening.
- word: أُصْغِي
  meaning_id: saya menyimak
  usage_note: Dipakai saat mendengarkan dengan serius sebelum merespons.
- word: أُوَجِّهُ الْحِوَارَ
  meaning_id: saya mengarahkan percakapan
  usage_note: Dipakai untuk menjaga diskusi tetap produktif.
- word: سُؤَالٌ مُفْتُوحٌ
  meaning_id: pertanyaan terbuka
  usage_note: Dipakai untuk menggali kebutuhan atau pandangan lain.
- word: أُعِيدُ النُّقْطَةَ
  meaning_id: saya mengulang poin
  usage_note: Dipakai saat memparafrasekan untuk memastikan pemahaman.
- word: اخْتَلَفَتِ الْآرَاءُ
  meaning_id: pendapat berbeda
  usage_note: Dipakai saat menangani perbedaan pandangan.
- word: مُتَابَعَةٌ
  meaning_id: tindak lanjut
  usage_note: Dipakai untuk menyebut langkah setelah percakapan.
