scenario_key: arabic_c1_review_leadership_and_listening
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تَجْعَلُ جَوَابَكَ فِي مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ مُقْنِعًا وَمُتَوَازِنًا؟
learner_goal: Latih percakapan Arab C1 untuk peninjauan kepemimpinan dan listening dengan nuansa, struktur, presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تَجْعَلُ جَوَابَكَ فِي مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ مُقْنِعًا وَمُتَوَازِنًا؟
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُصْغِي أَوَّلًا ثُمَّ أُوَجِّهُ الْحِوَارَ.'
  sample_answer: عِنْدَ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُصْغِي أَوَّلًا ثُمَّ أُوَجِّهُ الْحِوَارَ.
  focus: Memimpin dengan mendengar sebelum memberi arahan.
  expected_keywords:
  - عِنْدَ
  - مُرَاجَعَةِ
  - الْقِيَادَةِ
  - وَحُسْنِ
  - الِاسْتِمَاعِ
  indonesian_explanation: Saat meninjau kepemimpinan dan listening, saya mendengarkan dulu lalu mengarahkan percakapan.
- coach: 'استخدم الفكرة: أَسْأَلُ سُؤَالًا مُفْتُوحًا لِأَفْهَمَ مَا يَحْتَاجُهُ الطَّرَفُ الْآخَرُ.'
  hint: 'Jawab dengan struktur C1 memakai: أَسْأَلُ سُؤَالًا مُفْتُوحًا لِأَفْهَمَ مَا يَحْتَاجُهُ الطَّرَفُ الْآخَرُ.'
  sample_answer: أَسْأَلُ سُؤَالًا مُفْتُوحًا لِأَفْهَمَ مَا يَحْتَاجُهُ الطَّرَفُ الْآخَرُ.
  focus: Menggali kebutuhan sebelum menawarkan respons.
  expected_keywords:
  - أَسْأَلُ
  - سُؤَالًا
  - مُفْتُوحًا
  - لِأَفْهَمَ
  - مَا
  indonesian_explanation: Saya mengajukan pertanyaan terbuka untuk memahami kebutuhan pihak lain.
- coach: 'استخدم الفكرة: أُعِيدُ النُّقْطَةَ بِكَلِمَاتِي لِأَتَأَكَّدَ أَنَّنِي فَهِمْتُهَا.'
  hint: 'Jawab dengan struktur C1 memakai: أُعِيدُ النُّقْطَةَ بِكَلِمَاتِي لِأَتَأَكَّدَ أَنَّنِي فَهِمْتُهَا.'
  sample_answer: أُعِيدُ النُّقْطَةَ بِكَلِمَاتِي لِأَتَأَكَّدَ أَنَّنِي فَهِمْتُهَا.
  focus: Menunjukkan active listening dengan parafrasa.
  expected_keywords:
  - أُعِيدُ
  - النُّقْطَةَ
  - بِكَلِمَاتِي
  - لِأَتَأَكَّدَ
  - أَنَّنِي
  indonesian_explanation: Saya mengulang poin dengan kata-kata saya sendiri untuk memastikan saya memahaminya.
- coach: 'استخدم الفكرة: إِذَا اخْتَلَفَتِ الْآرَاءُ، أُحَافِظُ عَلَى الْهُدُوءِ وَأُوَضِّحُ الْخُطْوَةَ التَّالِيَةَ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا اخْتَلَفَتِ الْآرَاءُ، أُحَافِظُ عَلَى الْهُدُوءِ وَأُوَضِّحُ الْخُطْوَةَ التَّالِيَةَ.'
  sample_answer: إِذَا اخْتَلَفَتِ الْآرَاءُ، أُحَافِظُ عَلَى الْهُدُوءِ وَأُوَضِّحُ الْخُطْوَةَ التَّالِيَةَ.
  focus: Menjaga arah saat percakapan menegang.
  expected_keywords:
  - إِذَا
  - اخْتَلَفَتِ
  - الْآرَاءُ
  - أُحَافِظُ
  - عَلَى
  indonesian_explanation: Jika pendapat berbeda, saya tetap tenang dan menjelaskan langkah berikutnya.
target_phrases:
- عِنْدَ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُصْغِي أَوَّلًا ثُمَّ أُوَجِّهُ الْحِوَارَ.
- أَسْأَلُ سُؤَالًا مُفْتُوحًا لِأَفْهَمَ مَا يَحْتَاجُهُ الطَّرَفُ الْآخَرُ.
- أُعِيدُ النُّقْطَةَ بِكَلِمَاتِي لِأَتَأَكَّدَ أَنَّنِي فَهِمْتُهَا.
- إِذَا اخْتَلَفَتِ الْآرَاءُ، أُحَافِظُ عَلَى الْهُدُوءِ وَأُوَضِّحُ الْخُطْوَةَ التَّالِيَةَ.
- أَخْتِمُ الْحِوَارَ بِمَا اتَّفَقْنَا عَلَيْهِ وَمَا يَبْقَى لِلْمُتَابَعَةِ.
