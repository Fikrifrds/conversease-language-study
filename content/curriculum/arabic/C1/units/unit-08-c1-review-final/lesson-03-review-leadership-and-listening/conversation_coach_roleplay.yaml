scenario_key: arabic_c1_review_leadership_and_listening
mode: lesson_practice_coach
level_code: C1
opening_line: زَمِيلَتُكِ مُرْتَبِكَةٌ وَلَا تَعْرِفُ مِنْ أَيْنَ تَبْدَأُ.
learner_goal: 'Latih percakapan Arab C1 untuk memimpin lewat mendengar: bertanya terbuka, memantulkan,
  lalu mengarahkan.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: زَمِيلَتُكِ مُرْتَبِكَةٌ وَلَا تَعْرِفُ مِنْ أَيْنَ تَبْدَأُ.
  hint: 'Jawab dengan struktur B2 memakai: دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.'
  sample_answer: دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
  focus: Membuka dengan mendengar.
  expected_keywords:
  - دَعِينِي
  - أَفْهَمُ
  - مَا
  - يُقْلِقُكِ
  - أَوَّلًا
  indonesian_explanation: Coba aku pahami dulu apa yang membuatmu cemas.
- coach: 'استخدم الفكرة: إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.'
  hint: 'Jawab dengan struktur B2 memakai: إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.'
  sample_answer: إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
  focus: Memantulkan pemahaman.
  expected_keywords:
  - إِنْ
  - فَهِمْتُكِ
  - صَحِيحًا
  - الْمُشْكِلَةُ
  - فِي
  indonesian_explanation: Kalau aku paham benar, masalahnya waktu, bukan usaha.
- coach: 'استخدم الفكرة: مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟'
  hint: 'Jawab dengan struktur B2 memakai: مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟'
  sample_answer: مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟
  focus: Bertanya terbuka.
  expected_keywords:
  - مَا
  - الَّذِي
  - يُسَاعِدُكِ
  - عَلَى
  - إِنْجَازِهِ
  indonesian_explanation: Apa yang membantumu menyelesaikannya minggu ini?
- coach: 'استخدم الفكرة: أَبْقَى هَادِئَةً حَتَّى لَوِ اخْتَلَفْنَا.'
  hint: 'Jawab dengan struktur B2 memakai: أَبْقَى هَادِئَةً حَتَّى لَوِ اخْتَلَفْنَا.'
  sample_answer: أَبْقَى هَادِئَةً حَتَّى لَوِ اخْتَلَفْنَا.
  focus: Menjaga ketenangan.
  expected_keywords:
  - أَبْقَى
  - هَادِئَةً
  - حَتَّى
  - لَوِ
  - اخْتَلَفْنَا
  indonesian_explanation: Aku tetap tenang meski kita berbeda.
target_phrases:
- دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
- إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
- مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟
- أَبْقَى هَادِئَةً حَتَّى لَوِ اخْتَلَفْنَا.
- الْخُطْوَةُ التَّالِيَةُ أَنْ تُجَرِّبِي أَصْغَرَ جُزْءٍ.
