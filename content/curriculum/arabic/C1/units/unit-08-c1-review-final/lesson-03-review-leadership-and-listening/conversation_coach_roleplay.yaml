scenario_key: arabic_c1_review_leadership_and_listening
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تَجْعَلُ جَوَابَكَ فِي مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ مُقْنِعًا
  وَمُتَوَازِنًا؟
learner_goal: Latih percakapan Arab C1 untuk peninjauan kepemimpinan dan listening dengan nuansa, struktur,
  presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تَجْعَلُ جَوَابَكَ فِي مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ مُقْنِعًا وَمُتَوَازِنًا؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ،
    أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.'
  sample_answer: فِي تَدْرِيبِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُرَاجِعُ الْآنَ كَيْفَ
    أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  focus: 'Review nuance. Fokus lesson: peninjauan kepemimpinan dan listening.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - مُرَاجَعَةِ
  - الْقِيَادَةِ
  - وَحُسْنِ
  indonesian_explanation: Dalam latihan peninjauan kepemimpinan dan listening, saya sedang mereview cara
    menyampaikan opini yang tepat tanpa berlebihan.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، فِي الْحِوَارِ
    الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ،
    فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.'
  sample_answer: عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، فِي الْحِوَارِ الْمِهَنِيِّ،
    سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  focus: Review strategy. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - مُرَاجَعَةِ
  - الْقِيَادَةِ
  - وَحُسْنِ
  indonesian_explanation: Saat menerapkan peninjauan kepemimpinan dan listening, dalam percakapan profesional,
    saya akan fokus pada konteks, ekspektasi, dan risiko.
- coach: 'استخدم الفكرة: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ
    مُقْنِعٍ.'
  sample_answer: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  focus: Review presenting and debate. Pakai sebagai penghubung dalam peninjauan kepemimpinan dan listening.
  expected_keywords:
  - عِنْدَ
  - الْعَرْضِ
  - أَوِ
  - النِّقَاشِ،
  - سَأَبْنِي
  indonesian_explanation: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan yang persuasif.
- coach: 'استخدم الفكرة: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.'
  sample_answer: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
  focus: Review cross-cultural repair. Gunakan untuk repair dalam peninjauan kepemimpinan dan listening.
  expected_keywords:
  - إِذَا
  - ظَهَرَ
  - سُوءُ
  - فَهْمٍ،
  - فَسَأُصْلِحُهُ
  indonesian_explanation: Jika muncul salah paham, saya akan memperbaikinya dengan tact dan kejelasan.
target_phrases:
- فِي تَدْرِيبِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ
  رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
- عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ
  عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
- عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
- إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
- فِي خِتَامِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، فِي التَّقْيِيمِ النِّهَائِيِّ، سَأُظْهِرُ
  الدِّقَّةَ وَالْمُرُونَةَ وَحُسْنَ الِاسْتِمَاعِ.
