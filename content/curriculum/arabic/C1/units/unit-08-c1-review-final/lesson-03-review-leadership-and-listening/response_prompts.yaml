prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saat meninjau kepemimpinan dan listening, saya mendengarkan dulu lalu mengarahkan percakapan.'
  target_response: عِنْدَ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُصْغِي أَوَّلًا ثُمَّ أُوَجِّهُ الْحِوَارَ.
  acceptable_responses:
  - عِنْدَ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُصْغِي أَوَّلًا ثُمَّ أُوَجِّهُ الْحِوَارَ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya mengajukan pertanyaan terbuka untuk memahami kebutuhan pihak lain.'
  target_response: أَسْأَلُ سُؤَالًا مُفْتُوحًا لِأَفْهَمَ مَا يَحْتَاجُهُ الطَّرَفُ الْآخَرُ.
  acceptable_responses:
  - أَسْأَلُ سُؤَالًا مُفْتُوحًا لِأَفْهَمَ مَا يَحْتَاجُهُ الطَّرَفُ الْآخَرُ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya mengulang poin dengan kata-kata saya sendiri untuk memastikan saya memahaminya.'
  target_response: أُعِيدُ النُّقْطَةَ بِكَلِمَاتِي لِأَتَأَكَّدَ أَنَّنِي فَهِمْتُهَا.
  acceptable_responses:
  - أُعِيدُ النُّقْطَةَ بِكَلِمَاتِي لِأَتَأَكَّدَ أَنَّنِي فَهِمْتُهَا.
- prompt: 'Ucapkan dalam bahasa Arab: Jika pendapat berbeda, saya tetap tenang dan menjelaskan langkah berikutnya.'
  target_response: إِذَا اخْتَلَفَتِ الْآرَاءُ، أُحَافِظُ عَلَى الْهُدُوءِ وَأُوَضِّحُ الْخُطْوَةَ التَّالِيَةَ.
  acceptable_responses:
  - إِذَا اخْتَلَفَتِ الْآرَاءُ، أُحَافِظُ عَلَى الْهُدُوءِ وَأُوَضِّحُ الْخُطْوَةَ التَّالِيَةَ.
