prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Coba aku pahami dulu apa yang membuatmu cemas.'
  target_response: دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
  acceptable_responses:
  - دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau aku paham benar, masalahnya waktu, bukan usaha.'
  target_response: إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
  acceptable_responses:
  - إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
- prompt: 'Ucapkan dalam bahasa Arab: Apa yang membantumu menyelesaikannya minggu ini?'
  target_response: مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟
  acceptable_responses:
  - مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟
- prompt: 'Ucapkan dalam bahasa Arab: Aku tetap tenang meski kita berbeda.'
  target_response: أَبْقَى هَادِئَةً حَتَّى لَوِ اخْتَلَفْنَا.
  acceptable_responses:
  - أَبْقَى هَادِئَةً حَتَّى لَوِ اخْتَلَفْنَا.
