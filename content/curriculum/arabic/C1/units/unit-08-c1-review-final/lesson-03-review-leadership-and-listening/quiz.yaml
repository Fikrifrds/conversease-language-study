questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Coba aku pahami dulu apa yang membuatmu cemas."?
  options:
  - دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
  - إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
  - مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟
  correct_answer: دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
- key: phrase_2
  prompt: Frasa mana yang berarti "Kalau aku paham benar, masalahnya waktu, bukan usaha."?
  options:
  - إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
  - دَعِينِي أَفْهَمُ مَا يُقْلِقُكِ أَوَّلًا.
  - مَا الَّذِي يُسَاعِدُكِ عَلَى إِنْجَازِهِ هَذَا الْأُسْبُوعَ؟
  correct_answer: إِنْ فَهِمْتُكِ صَحِيحًا، الْمُشْكِلَةُ فِي الْوَقْتِ لَا الْجُهْدِ.
