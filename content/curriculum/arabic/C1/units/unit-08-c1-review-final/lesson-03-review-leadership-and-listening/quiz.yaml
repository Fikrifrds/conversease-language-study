questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam skill reviewing leadership and listening, Saya sedang mereview
    cara menyampaikan opini yang tepat tanpa berlebihan."?
  options:
  - فِي مَهَارَةِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ
    رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  - عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ
    عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  - عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  correct_answer: فِي مَهَارَةِ مُرَاجَعَةِ الْقِيَادَةِ وَحُسْنِ الِاسْتِمَاعِ، أُرَاجِعُ الْآنَ كَيْفَ
    أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
