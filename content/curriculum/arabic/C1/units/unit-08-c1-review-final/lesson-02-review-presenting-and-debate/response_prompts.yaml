prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Saat meninjau presentasi dan debat, saya menetapkan klaim lalu mendukungnya dengan bukti.'
  target_response: عِنْدَ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُحَدِّدُ ادِّعَائِي ثُمَّ أَدْعَمُهُ بِدَلِيلٍ.
  acceptable_responses:
  - عِنْدَ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُحَدِّدُ ادِّعَائِي ثُمَّ أَدْعَمُهُ بِدَلِيلٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya memisahkan poin utama dan detail agar presentasi tetap fokus.'
  target_response: أَفْصِلُ بَيْنَ النُّقْطَةِ الرَّئِيسِيَّةِ وَالتَّفَاصِيلِ حَتَّى يَبْقَى الْعَرْضُ مُرَكَّزًا.
  acceptable_responses:
  - أَفْصِلُ بَيْنَ النُّقْطَةِ الرَّئِيسِيَّةِ وَالتَّفَاصِيلِ حَتَّى يَبْقَى الْعَرْضُ مُرَكَّزًا.
- prompt: 'Ucapkan dalam bahasa Arab: Saya mengantisipasi sanggahan dan menjawabnya dengan tenang.'
  target_response: أَتَوَقَّعُ الِاعْتِرَاضَ، وَأُجِيبُ عَنْهُ بِهُدُوءٍ.
  acceptable_responses:
  - أَتَوَقَّعُ الِاعْتِرَاضَ، وَأُجِيبُ عَنْهُ بِهُدُوءٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika seseorang memotong saya, saya kembali ke poin utama dengan kalimat singkat.'
  target_response: إِذَا قَاطَعَنِي أَحَدٌ، أَعُودُ إِلَى النُّقْطَةِ بِجُمْلَةٍ قَصِيرَةٍ.
  acceptable_responses:
  - إِذَا قَاطَعَنِي أَحَدٌ، أَعُودُ إِلَى النُّقْطَةِ بِجُمْلَةٍ قَصِيرَةٍ.
