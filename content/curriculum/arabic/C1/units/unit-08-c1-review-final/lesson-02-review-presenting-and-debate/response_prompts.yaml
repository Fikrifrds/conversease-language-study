prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Klaimku, kualitas mendahului kecepatan di sini.'
  target_response: ادِّعَائِي هُوَ أَنَّ الْجَوْدَةَ تَسْبِقُ السُّرْعَةَ هُنَا.
  acceptable_responses:
  - ادِّعَائِي هُوَ أَنَّ الْجَوْدَةَ تَسْبِقُ السُّرْعَةَ هُنَا.
- prompt: 'Ucapkan dalam bahasa Arab: Buktiku, pengalaman kita kehilangan klien.'
  target_response: وَدَلِيلِي تَجْرِبَةٌ خَسِرْنَا فِيهَا عَمِيلًا.
  acceptable_responses:
  - وَدَلِيلِي تَجْرِبَةٌ خَسِرْنَا فِيهَا عَمِيلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Aku menduga kamu bilang pasar tidak menunggu.'
  target_response: أَتَوَقَّعُ أَنْ تَقُولِي إِنَّ السُّوقَ لَا يَنْتَظِرُ.
  acceptable_responses:
  - أَتَوَقَّعُ أَنْ تَقُولِي إِنَّ السُّوقَ لَا يَنْتَظِرُ.
- prompt: 'Ucapkan dalam bahasa Arab: Itu benar, tapi kepercayaan lebih mahal jangka panjang.'
  target_response: وَهَذَا صَحِيحٌ، لَكِنَّ الثِّقَةَ أَغْلَى عَلَى الْمَدَى الطَّوِيلِ.
  acceptable_responses:
  - وَهَذَا صَحِيحٌ، لَكِنَّ الثِّقَةَ أَغْلَى عَلَى الْمَدَى الطَّوِيلِ.
