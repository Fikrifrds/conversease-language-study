questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan peninjauan presentasi dan debat, saya sedang mereview
    cara menyampaikan opini yang tepat tanpa berlebihan."?
  options:
  - فِي تَدْرِيبِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ
    دُونَ مُبَالَغَةٍ.
  - عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى
    السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  - عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  correct_answer: فِي تَدْرِيبِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ
    عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
