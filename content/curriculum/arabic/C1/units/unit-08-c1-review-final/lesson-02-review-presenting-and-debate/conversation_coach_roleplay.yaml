scenario_key: arabic_c1_review_presenting_and_debate
mode: lesson_practice_coach
level_code: C1
opening_line: 'لِنَتَنَاظَرْ: السُّرْعَةُ أَمِ الْجَوْدَةُ؟'
learner_goal: 'Latih percakapan Arab C1 untuk berdebat: menyatakan klaim, mengantisipasi sanggahan, lalu
  menutup ringkas.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: 'لِنَتَنَاظَرْ: السُّرْعَةُ أَمِ الْجَوْدَةُ؟'
  hint: 'Jawab dengan struktur B2 memakai: ادِّعَائِي هُوَ أَنَّ الْجَوْدَةَ تَسْبِقُ السُّرْعَةَ هُنَا.'
  sample_answer: ادِّعَائِي هُوَ أَنَّ الْجَوْدَةَ تَسْبِقُ السُّرْعَةَ هُنَا.
  focus: Menyatakan klaim.
  expected_keywords:
  - ادِّعَائِي
  - هُوَ
  - أَنَّ
  - الْجَوْدَةَ
  - تَسْبِقُ
  indonesian_explanation: Klaimku, kualitas mendahului kecepatan di sini.
- coach: 'استخدم الفكرة: وَدَلِيلِي تَجْرِبَةٌ خَسِرْنَا فِيهَا عَمِيلًا.'
  hint: 'Jawab dengan struktur B2 memakai: وَدَلِيلِي تَجْرِبَةٌ خَسِرْنَا فِيهَا عَمِيلًا.'
  sample_answer: وَدَلِيلِي تَجْرِبَةٌ خَسِرْنَا فِيهَا عَمِيلًا.
  focus: Menopang klaim.
  expected_keywords:
  - وَدَلِيلِي
  - تَجْرِبَةٌ
  - خَسِرْنَا
  - فِيهَا
  - عَمِيلًا
  indonesian_explanation: Buktiku, pengalaman kita kehilangan klien.
- coach: 'استخدم الفكرة: أَتَوَقَّعُ أَنْ تَقُولِي إِنَّ السُّوقَ لَا يَنْتَظِرُ.'
  hint: 'Jawab dengan struktur B2 memakai: أَتَوَقَّعُ أَنْ تَقُولِي إِنَّ السُّوقَ لَا يَنْتَظِرُ.'
  sample_answer: أَتَوَقَّعُ أَنْ تَقُولِي إِنَّ السُّوقَ لَا يَنْتَظِرُ.
  focus: Mengantisipasi sanggahan.
  expected_keywords:
  - أَتَوَقَّعُ
  - أَنْ
  - تَقُولِي
  - إِنَّ
  - السُّوقَ
  indonesian_explanation: Aku menduga kamu bilang pasar tidak menunggu.
- coach: 'استخدم الفكرة: وَهَذَا صَحِيحٌ، لَكِنَّ الثِّقَةَ أَغْلَى عَلَى الْمَدَى الطَّوِيلِ.'
  hint: 'Jawab dengan struktur B2 memakai: وَهَذَا صَحِيحٌ، لَكِنَّ الثِّقَةَ أَغْلَى عَلَى الْمَدَى الطَّوِيلِ.'
  sample_answer: وَهَذَا صَحِيحٌ، لَكِنَّ الثِّقَةَ أَغْلَى عَلَى الْمَدَى الطَّوِيلِ.
  focus: Menjawab sanggahan.
  expected_keywords:
  - وَهَذَا
  - صَحِيحٌ
  - لَكِنَّ
  - الثِّقَةَ
  - أَغْلَى
  indonesian_explanation: Itu benar, tapi kepercayaan lebih mahal jangka panjang.
target_phrases:
- ادِّعَائِي هُوَ أَنَّ الْجَوْدَةَ تَسْبِقُ السُّرْعَةَ هُنَا.
- وَدَلِيلِي تَجْرِبَةٌ خَسِرْنَا فِيهَا عَمِيلًا.
- أَتَوَقَّعُ أَنْ تَقُولِي إِنَّ السُّوقَ لَا يَنْتَظِرُ.
- وَهَذَا صَحِيحٌ، لَكِنَّ الثِّقَةَ أَغْلَى عَلَى الْمَدَى الطَّوِيلِ.
- 'خُلَاصَةً: جَوْدَةٌ أَوَّلًا، ثُمَّ سُرْعَةٌ مُنَظَّمَةٌ.'
rubric:
  speaking:
    minimum_score: 72
  relevance:
    minimum_score: 72
  argument_structure:
    minimum_score: 70
  grammar:
    minimum_score: 70
