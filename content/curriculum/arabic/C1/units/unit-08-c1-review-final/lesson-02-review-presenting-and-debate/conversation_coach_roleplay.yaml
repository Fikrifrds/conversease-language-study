scenario_key: arabic_c1_review_presenting_and_debate
mode: lesson_practice_coach
level_code: C1
opening_line: مَا الطَّرِيقَةُ الأَدَقُّ لِاسْتِخْدَامِ مَهَارَةِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ؟
learner_goal: Latih percakapan Arab C1 untuk peninjauan presentasi dan debat dengan nuansa, struktur, presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا الطَّرِيقَةُ الأَدَقُّ لِاسْتِخْدَامِ مَهَارَةِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ؟
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُحَدِّدُ ادِّعَائِي ثُمَّ أَدْعَمُهُ بِدَلِيلٍ.'
  sample_answer: عِنْدَ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُحَدِّدُ ادِّعَائِي ثُمَّ أَدْعَمُهُ بِدَلِيلٍ.
  focus: Membuka presentasi atau debat dengan klaim yang jelas.
  expected_keywords:
  - عِنْدَ
  - مُرَاجَعَةِ
  - الْعَرْضِ
  - وَالنِّقَاشِ
  - أُحَدِّدُ
  indonesian_explanation: Saat meninjau presentasi dan debat, saya menetapkan klaim lalu mendukungnya dengan bukti.
- coach: 'استخدم الفكرة: أَفْصِلُ بَيْنَ النُّقْطَةِ الرَّئِيسِيَّةِ وَالتَّفَاصِيلِ حَتَّى يَبْقَى الْعَرْضُ مُرَكَّزًا.'
  hint: 'Jawab dengan struktur C1 memakai: أَفْصِلُ بَيْنَ النُّقْطَةِ الرَّئِيسِيَّةِ وَالتَّفَاصِيلِ حَتَّى يَبْقَى الْعَرْضُ مُرَكَّزًا.'
  sample_answer: أَفْصِلُ بَيْنَ النُّقْطَةِ الرَّئِيسِيَّةِ وَالتَّفَاصِيلِ حَتَّى يَبْقَى الْعَرْضُ مُرَكَّزًا.
  focus: Menjaga struktur presentasi tetap rapi.
  expected_keywords:
  - أَفْصِلُ
  - بَيْنَ
  - النُّقْطَةِ
  - الرَّئِيسِيَّةِ
  - وَالتَّفَاصِيلِ
  indonesian_explanation: Saya memisahkan poin utama dan detail agar presentasi tetap fokus.
- coach: 'استخدم الفكرة: أَتَوَقَّعُ الِاعْتِرَاضَ، وَأُجِيبُ عَنْهُ بِهُدُوءٍ.'
  hint: 'Jawab dengan struktur C1 memakai: أَتَوَقَّعُ الِاعْتِرَاضَ، وَأُجِيبُ عَنْهُ بِهُدُوءٍ.'
  sample_answer: أَتَوَقَّعُ الِاعْتِرَاضَ، وَأُجِيبُ عَنْهُ بِهُدُوءٍ.
  focus: Menangani counterpoint tanpa kehilangan arah.
  expected_keywords:
  - أَتَوَقَّعُ
  - الِاعْتِرَاضَ
  - وَأُجِيبُ
  - عَنْهُ
  - بِهُدُوءٍ
  indonesian_explanation: Saya mengantisipasi sanggahan dan menjawabnya dengan tenang.
- coach: 'استخدم الفكرة: إِذَا قَاطَعَنِي أَحَدٌ، أَعُودُ إِلَى النُّقْطَةِ بِجُمْلَةٍ قَصِيرَةٍ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا قَاطَعَنِي أَحَدٌ، أَعُودُ إِلَى النُّقْطَةِ بِجُمْلَةٍ قَصِيرَةٍ.'
  sample_answer: إِذَا قَاطَعَنِي أَحَدٌ، أَعُودُ إِلَى النُّقْطَةِ بِجُمْلَةٍ قَصِيرَةٍ.
  focus: Mengambil kembali alur diskusi secara profesional.
  expected_keywords:
  - إِذَا
  - قَاطَعَنِي
  - أَحَدٌ
  - أَعُودُ
  - إِلَى
  indonesian_explanation: Jika seseorang memotong saya, saya kembali ke poin utama dengan kalimat singkat.
target_phrases:
- عِنْدَ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُحَدِّدُ ادِّعَائِي ثُمَّ أَدْعَمُهُ بِدَلِيلٍ.
- أَفْصِلُ بَيْنَ النُّقْطَةِ الرَّئِيسِيَّةِ وَالتَّفَاصِيلِ حَتَّى يَبْقَى الْعَرْضُ مُرَكَّزًا.
- أَتَوَقَّعُ الِاعْتِرَاضَ، وَأُجِيبُ عَنْهُ بِهُدُوءٍ.
- إِذَا قَاطَعَنِي أَحَدٌ، أَعُودُ إِلَى النُّقْطَةِ بِجُمْلَةٍ قَصِيرَةٍ.
- أَخْتِمُ الْمُنَاقَشَةَ بِتَلْخِيصٍ يُظْهِرُ الْمَوْقِفَ وَالسَّبَبَ.
