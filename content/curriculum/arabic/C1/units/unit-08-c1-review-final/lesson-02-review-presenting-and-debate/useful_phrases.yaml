phrases:
- phrase: فِي تَدْرِيبِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ رَأْيٍ
    دَقِيقٍ دُونَ مُبَالَغَةٍ.
  meaning_id: Dalam latihan peninjauan presentasi dan debat, saya sedang mereview cara menyampaikan opini
    yang tepat tanpa berlebihan.
  usage_note: 'Review nuance. Fokus lesson: peninjauan presentasi dan debat.'
- phrase: عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ
    عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  meaning_id: Saat menerapkan peninjauan presentasi dan debat, dalam percakapan profesional, saya akan
    fokus pada konteks, ekspektasi, dan risiko.
  usage_note: Review strategy. Hubungkan dengan fokus lesson.
- phrase: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  meaning_id: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan yang persuasif.
  usage_note: Review presenting and debate. Pakai sebagai penghubung dalam peninjauan presentasi dan debat.
- phrase: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
  meaning_id: Jika muncul salah paham, saya akan memperbaikinya dengan tact dan kejelasan.
  usage_note: Review cross-cultural repair. Gunakan untuk repair dalam peninjauan presentasi dan debat.
- phrase: فِي خِتَامِ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، فِي التَّقْيِيمِ النِّهَائِيِّ، سَأُظْهِرُ الدِّقَّةَ
    وَالْمُرُونَةَ وَحُسْنَ الِاسْتِمَاعِ.
  meaning_id: Pada bagian akhir peninjauan presentasi dan debat, dalam tes akhir, saya akan menunjukkan
    presisi, fleksibilitas, dan listening yang baik.
  usage_note: Menutup final C1. Tutup percakapan sesuai fokus lesson.
