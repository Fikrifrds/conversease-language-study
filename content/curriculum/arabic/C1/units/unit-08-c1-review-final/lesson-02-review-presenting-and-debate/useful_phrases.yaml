phrases:
- phrase: ادِّعَائِي هُوَ أَنَّ الْجَوْدَةَ تَسْبِقُ السُّرْعَةَ هُنَا.
  meaning_id: Klaimku, kualitas mendahului kecepatan di sini.
  usage_note: Menyatakan klaim.
- phrase: وَدَلِيلِي تَجْرِبَةٌ خَسِرْنَا فِيهَا عَمِيلًا.
  meaning_id: Buktiku, pengalaman kita kehilangan klien.
  usage_note: Menopang klaim.
- phrase: أَتَوَقَّعُ أَنْ تَقُولِي إِنَّ السُّوقَ لَا يَنْتَظِرُ.
  meaning_id: Aku menduga kamu bilang pasar tidak menunggu.
  usage_note: Mengantisipasi sanggahan.
- phrase: وَهَذَا صَحِيحٌ، لَكِنَّ الثِّقَةَ أَغْلَى عَلَى الْمَدَى الطَّوِيلِ.
  meaning_id: Itu benar, tapi kepercayaan lebih mahal jangka panjang.
  usage_note: Menjawab sanggahan.
- phrase: 'خُلَاصَةً: جَوْدَةٌ أَوَّلًا، ثُمَّ سُرْعَةٌ مُنَظَّمَةٌ.'
  meaning_id: 'Kesimpulan: kualitas dulu, lalu kecepatan terkelola.'
  usage_note: Menutup ringkas.
