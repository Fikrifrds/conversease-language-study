phrases:
- phrase: عِنْدَ مُرَاجَعَةِ الْعَرْضِ وَالنِّقَاشِ، أُحَدِّدُ ادِّعَائِي ثُمَّ أَدْعَمُهُ بِدَلِيلٍ.
  meaning_id: Saat meninjau presentasi dan debat, saya menetapkan klaim lalu mendukungnya dengan bukti.
  usage_note: Membuka presentasi atau debat dengan klaim yang jelas.
- phrase: أَفْصِلُ بَيْنَ النُّقْطَةِ الرَّئِيسِيَّةِ وَالتَّفَاصِيلِ حَتَّى يَبْقَى الْعَرْضُ مُرَكَّزًا.
  meaning_id: Saya memisahkan poin utama dan detail agar presentasi tetap fokus.
  usage_note: Menjaga struktur presentasi tetap rapi.
- phrase: أَتَوَقَّعُ الِاعْتِرَاضَ، وَأُجِيبُ عَنْهُ بِهُدُوءٍ.
  meaning_id: Saya mengantisipasi sanggahan dan menjawabnya dengan tenang.
  usage_note: Menangani counterpoint tanpa kehilangan arah.
- phrase: إِذَا قَاطَعَنِي أَحَدٌ، أَعُودُ إِلَى النُّقْطَةِ بِجُمْلَةٍ قَصِيرَةٍ.
  meaning_id: Jika seseorang memotong saya, saya kembali ke poin utama dengan kalimat singkat.
  usage_note: Mengambil kembali alur diskusi secara profesional.
- phrase: أَخْتِمُ الْمُنَاقَشَةَ بِتَلْخِيصٍ يُظْهِرُ الْمَوْقِفَ وَالسَّبَبَ.
  meaning_id: Saya menutup diskusi dengan ringkasan yang menunjukkan posisi dan alasannya.
  usage_note: Menutup debat dengan kesimpulan yang tegas.
