vocabulary:
- word: ادِّعَاءٌ
  meaning_id: klaim
  usage_note: Dipakai untuk posisi utama dalam presentasi atau debat.
- word: دَلِيلٌ
  meaning_id: bukti
  usage_note: Dipakai untuk mendukung klaim agar lebih kuat.
- word: نُقْطَةٌ رَئِيسِيَّةٌ
  meaning_id: poin utama
  usage_note: Dipakai untuk menjaga presentasi tetap fokus.
- word: تَفَاصِيلُ
  meaning_id: detail
  usage_note: Dipakai untuk informasi pendukung setelah poin utama.
- word: الِاعْتِرَاضُ
  meaning_id: sanggahan/keberatan
  usage_note: Dipakai saat merespons counterpoint dalam debat.
- word: بِهُدُوءٍ
  meaning_id: dengan tenang
  usage_note: Dipakai untuk menjaga nada saat menjawab sanggahan.
- word: قَاطَعَنِي
  meaning_id: dia memotong saya
  usage_note: Dipakai saat mengelola interupsi dalam diskusi.
- word: تَلْخِيصٌ
  meaning_id: ringkasan
  usage_note: Dipakai untuk menutup diskusi dengan jelas.
