scenario_key: arabic_c1_review_nuance_and_strategy
mode: lesson_practice_coach
level_code: C1
opening_line: هَلْ تُؤَيِّدِينَ سِيَاسَةَ الْعَمَلِ الْمَرِنِ؟
learner_goal: 'Latih percakapan Arab C1 untuk menyampaikan pendapat bernuansa: setuju sebagian, beri syarat,
  lalu rumuskan dengan tepat.'
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: هَلْ تُؤَيِّدِينَ سِيَاسَةَ الْعَمَلِ الْمَرِنِ؟
  hint: 'Jawab dengan struktur B2 memakai: أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.'
  sample_answer: أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
  focus: Setuju dengan kualifikasi.
  expected_keywords:
  - أَتَّفِقُ
  - مَعَكِ
  - جُزْئِيًّا
  - لَا
  - بِشَكْلٍ
  indonesian_explanation: Aku setuju sebagian, tidak sepenuhnya.
- coach: 'استخدم الفكرة: أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.'
  hint: 'Jawab dengan struktur B2 memakai: أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.'
  sample_answer: أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
  focus: Memberi syarat.
  expected_keywords:
  - أُؤَيِّدُ
  - الْفِكْرَةَ
  - بِشَرْطٍ
  - وَاحِدٍ
  - مُهِمٍّ
  indonesian_explanation: Aku dukung idenya dengan satu syarat penting.
- coach: 'استخدم الفكرة: مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.'
  hint: 'Jawab dengan struktur B2 memakai: مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.'
  sample_answer: مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.
  focus: Menambah perspektif.
  expected_keywords:
  - مِنْ
  - زَاوِيَةٍ
  - أُخْرَى
  - هُنَاكَ
  - خَطَرٌ
  indonesian_explanation: Dari sudut lain, ada risiko tersembunyi.
- coach: 'استخدم الفكرة: لِأَكُونَ دَقِيقَةً، الْمَسْأَلَةُ تَوَازُنٌ لَا اخْتِيَارٌ حَادٌّ.'
  hint: 'Jawab dengan struktur B2 memakai: لِأَكُونَ دَقِيقَةً، الْمَسْأَلَةُ تَوَازُنٌ لَا اخْتِيَارٌ
    حَادٌّ.'
  sample_answer: لِأَكُونَ دَقِيقَةً، الْمَسْأَلَةُ تَوَازُنٌ لَا اخْتِيَارٌ حَادٌّ.
  focus: Memperhalus rumusan.
  expected_keywords:
  - لِأَكُونَ
  - دَقِيقَةً
  - الْمَسْأَلَةُ
  - تَوَازُنٌ
  - لَا
  indonesian_explanation: Supaya tepat, ini soal keseimbangan, bukan pilihan keras.
target_phrases:
- أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
- أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
- مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.
- لِأَكُونَ دَقِيقَةً، الْمَسْأَلَةُ تَوَازُنٌ لَا اخْتِيَارٌ حَادٌّ.
- 'الصِّيَاغَةُ الْأَدَقُّ هِيَ: نَعَمْ مَعَ ضَوَابِطَ.'
rubric:
  speaking:
    minimum_score: 72
  relevance:
    minimum_score: 72
  argument_structure:
    minimum_score: 70
  grammar:
    minimum_score: 70
