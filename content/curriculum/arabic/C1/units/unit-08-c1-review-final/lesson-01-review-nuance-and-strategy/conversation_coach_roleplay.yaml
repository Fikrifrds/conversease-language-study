scenario_key: arabic_c1_review_nuance_and_strategy
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تُطَبِّقُ مَهَارَةَ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ فِي حِوَارٍ رَسْمِيٍّ؟
learner_goal: Latih percakapan Arab C1 untuk peninjauan nuansa dan strategi dengan nuansa, struktur, presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تُطَبِّقُ مَهَارَةَ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ فِي حِوَارٍ رَسْمِيٍّ؟
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، أُوَازِنُ بَيْنَ الصَّرَاحَةِ وَاللُّبَاقَةِ.'
  sample_answer: عِنْدَ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، أُوَازِنُ بَيْنَ الصَّرَاحَةِ وَاللُّبَاقَةِ.
  focus: Menempatkan opini dengan presisi tanpa terdengar berlebihan.
  expected_keywords:
  - عِنْدَ
  - مُرَاجَعَةِ
  - الدِّقَّةِ
  - وَالِاسْتِرَاتِيجِيَّةِ
  - أُوَازِنُ
  indonesian_explanation: Saat meninjau nuansa dan strategi, saya menyeimbangkan keterusterangan dan kesantunan.
- coach: 'استخدم الفكرة: فِي الْحِوَارِ الْمِهَنِيِّ، أَرْبِطُ الرَّأْيَ بِالسِّيَاقِ وَالْمَخَاطِرِ الْمُحْتَمَلَةِ.'
  hint: 'Jawab dengan struktur C1 memakai: فِي الْحِوَارِ الْمِهَنِيِّ، أَرْبِطُ الرَّأْيَ بِالسِّيَاقِ وَالْمَخَاطِرِ الْمُحْتَمَلَةِ.'
  sample_answer: فِي الْحِوَارِ الْمِهَنِيِّ، أَرْبِطُ الرَّأْيَ بِالسِّيَاقِ وَالْمَخَاطِرِ الْمُحْتَمَلَةِ.
  focus: Menambahkan konteks agar strategi terdengar matang.
  expected_keywords:
  - فِي
  - الْحِوَارِ
  - الْمِهَنِيِّ
  - أَرْبِطُ
  - الرَّأْيَ
  indonesian_explanation: Dalam dialog profesional, saya mengaitkan pendapat dengan konteks dan risiko yang mungkin muncul.
- coach: 'استخدم الفكرة: أُقَدِّمُ الْفِكْرَةَ بِتَسَلْسُلٍ يُسَهِّلُ عَلَى الطَّرَفِ الآخَرِ مُتَابَعَتَهَا.'
  hint: 'Jawab dengan struktur C1 memakai: أُقَدِّمُ الْفِكْرَةَ بِتَسَلْسُلٍ يُسَهِّلُ عَلَى الطَّرَفِ الآخَرِ مُتَابَعَتَهَا.'
  sample_answer: أُقَدِّمُ الْفِكْرَةَ بِتَسَلْسُلٍ يُسَهِّلُ عَلَى الطَّرَفِ الآخَرِ مُتَابَعَتَهَا.
  focus: Membangun alur argumentasi yang bisa diikuti.
  expected_keywords:
  - أُقَدِّمُ
  - الْفِكْرَةَ
  - بِتَسَلْسُلٍ
  - يُسَهِّلُ
  - عَلَى
  indonesian_explanation: Saya menyampaikan ide dengan urutan yang memudahkan pihak lain mengikutinya.
- coach: 'استخدم الفكرة: إِذَا ظَهَرَ سُوءُ فَهْمٍ، أُعِيدُ الصِّيَاغَةَ بِلُطْفٍ وَدِقَّةٍ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا ظَهَرَ سُوءُ فَهْمٍ، أُعِيدُ الصِّيَاغَةَ بِلُطْفٍ وَدِقَّةٍ.'
  sample_answer: إِذَا ظَهَرَ سُوءُ فَهْمٍ، أُعِيدُ الصِّيَاغَةَ بِلُطْفٍ وَدِقَّةٍ.
  focus: Memperbaiki miskomunikasi tanpa menaikkan tensi.
  expected_keywords:
  - إِذَا
  - ظَهَرَ
  - سُوءُ
  - فَهْمٍ
  - أُعِيدُ
  indonesian_explanation: Jika muncul salah paham, saya menyusun ulang kalimat dengan lembut dan tepat.
target_phrases:
- عِنْدَ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، أُوَازِنُ بَيْنَ الصَّرَاحَةِ وَاللُّبَاقَةِ.
- فِي الْحِوَارِ الْمِهَنِيِّ، أَرْبِطُ الرَّأْيَ بِالسِّيَاقِ وَالْمَخَاطِرِ الْمُحْتَمَلَةِ.
- أُقَدِّمُ الْفِكْرَةَ بِتَسَلْسُلٍ يُسَهِّلُ عَلَى الطَّرَفِ الآخَرِ مُتَابَعَتَهَا.
- إِذَا ظَهَرَ سُوءُ فَهْمٍ، أُعِيدُ الصِّيَاغَةَ بِلُطْفٍ وَدِقَّةٍ.
- فِي النِّهَايَةِ، أُؤَكِّدُ الرِّسَالَةَ بِوُضُوحٍ دُونَ أَنْ أُبَالِغَ.
