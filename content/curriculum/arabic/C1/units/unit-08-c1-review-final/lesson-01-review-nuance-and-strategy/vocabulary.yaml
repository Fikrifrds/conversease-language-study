vocabulary:
- word: مُرَاجَعَةٌ
  meaning_id: peninjauan/peninjauan ulang
  usage_note: Dipakai saat menilai ulang kualitas argumen atau strategi.
- word: الدِّقَّةُ
  meaning_id: ketepatan/presisi
  usage_note: Dipakai saat menuntut pilihan kata yang tidak berlebihan.
- word: الِاسْتِرَاتِيجِيَّةُ
  meaning_id: strategi
  usage_note: Dipakai untuk cara menyusun respons profesional.
- word: أُوَازِنُ
  meaning_id: saya menyeimbangkan
  usage_note: 'Contoh: أُوَازِنُ بَيْنَ الصَّرَاحَةِ وَاللُّبَاقَةِ.'
- word: الصَّرَاحَةُ
  meaning_id: keterusterangan
  usage_note: Dipakai saat menyampaikan opini secara jelas.
- word: اللُّبَاقَةُ
  meaning_id: kesantunan/tact
  usage_note: Dipakai saat menjaga nada tetap profesional.
- word: الْمَخَاطِرُ الْمُحْتَمَلَةُ
  meaning_id: risiko yang mungkin muncul
  usage_note: Dipakai saat menimbang dampak dari sebuah pilihan.
- word: أُعِيدُ الصِّيَاغَةَ
  meaning_id: saya menyusun ulang kalimat
  usage_note: Dipakai saat memperbaiki salah paham dengan tepat.
