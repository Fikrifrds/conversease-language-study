prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku setuju sebagian, tidak sepenuhnya.'
  target_response: أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
  acceptable_responses:
  - أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku dukung idenya dengan satu syarat penting.'
  target_response: أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
  acceptable_responses:
  - أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
- prompt: 'Ucapkan dalam bahasa Arab: Dari sudut lain, ada risiko tersembunyi.'
  target_response: مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.
  acceptable_responses:
  - مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.
- prompt: 'Ucapkan dalam bahasa Arab: Supaya tepat, ini soal keseimbangan, bukan pilihan keras.'
  target_response: لِأَكُونَ دَقِيقَةً، الْمَسْأَلَةُ تَوَازُنٌ لَا اخْتِيَارٌ حَادٌّ.
  acceptable_responses:
  - لِأَكُونَ دَقِيقَةً، الْمَسْأَلَةُ تَوَازُنٌ لَا اخْتِيَارٌ حَادٌّ.
