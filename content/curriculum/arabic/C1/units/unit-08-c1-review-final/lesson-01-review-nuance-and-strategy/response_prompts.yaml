prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam skill reviewing nuance and strategy, Saya sedang mereview
    cara menyampaikan opini yang tepat tanpa berlebihan.'
  target_response: فِي مَهَارَةِ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، أُرَاجِعُ الْآنَ كَيْفَ
    أُعَبِّرُ عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  acceptable_responses:
  - فِي مَهَارَةِ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ
    رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan reviewing nuance and strategy, Dalam percakapan
    profesional, saya akan fokus pada konteks, ekspektasi, dan risiko.'
  target_response: عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، فِي الْحِوَارِ الْمِهَنِيِّ،
    سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ
    عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan
    yang persuasif.'
  target_response: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  acceptable_responses:
  - عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika muncul tantangan dalam skill ini, Jika muncul salah paham,
    saya akan memperbaikinya dengan tact dan kejelasan.'
  target_response: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ
    بِلَبَاقَةٍ وَوُضُوحٍ.
  acceptable_responses:
  - إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ
    وَوُضُوحٍ.
