phrases:
- phrase: عِنْدَ مُرَاجَعَةِ الدِّقَّةِ وَالِاسْتِرَاتِيجِيَّةِ، أُوَازِنُ بَيْنَ الصَّرَاحَةِ وَاللُّبَاقَةِ.
  meaning_id: Saat meninjau nuansa dan strategi, saya menyeimbangkan keterusterangan dan kesantunan.
  usage_note: Menempatkan opini dengan presisi tanpa terdengar berlebihan.
- phrase: فِي الْحِوَارِ الْمِهَنِيِّ، أَرْبِطُ الرَّأْيَ بِالسِّيَاقِ وَالْمَخَاطِرِ الْمُحْتَمَلَةِ.
  meaning_id: Dalam dialog profesional, saya mengaitkan pendapat dengan konteks dan risiko yang mungkin muncul.
  usage_note: Menambahkan konteks agar strategi terdengar matang.
- phrase: أُقَدِّمُ الْفِكْرَةَ بِتَسَلْسُلٍ يُسَهِّلُ عَلَى الطَّرَفِ الآخَرِ مُتَابَعَتَهَا.
  meaning_id: Saya menyampaikan ide dengan urutan yang memudahkan pihak lain mengikutinya.
  usage_note: Membangun alur argumentasi yang bisa diikuti.
- phrase: إِذَا ظَهَرَ سُوءُ فَهْمٍ، أُعِيدُ الصِّيَاغَةَ بِلُطْفٍ وَدِقَّةٍ.
  meaning_id: Jika muncul salah paham, saya menyusun ulang kalimat dengan lembut dan tepat.
  usage_note: Memperbaiki miskomunikasi tanpa menaikkan tensi.
- phrase: فِي النِّهَايَةِ، أُؤَكِّدُ الرِّسَالَةَ بِوُضُوحٍ دُونَ أَنْ أُبَالِغَ.
  meaning_id: Di akhir, saya menegaskan pesan dengan jelas tanpa melebih-lebihkan.
  usage_note: Menutup dengan presisi dan kontrol nada.
