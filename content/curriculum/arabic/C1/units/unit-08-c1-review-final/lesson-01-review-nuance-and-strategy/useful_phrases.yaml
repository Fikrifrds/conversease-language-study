phrases:
- phrase: أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
  meaning_id: Aku setuju sebagian, tidak sepenuhnya.
  usage_note: Setuju dengan kualifikasi.
- phrase: أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
  meaning_id: Aku dukung idenya dengan satu syarat penting.
  usage_note: Memberi syarat.
- phrase: مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.
  meaning_id: Dari sudut lain, ada risiko tersembunyi.
  usage_note: Menambah perspektif.
- phrase: لِأَكُونَ دَقِيقَةً، الْمَسْأَلَةُ تَوَازُنٌ لَا اخْتِيَارٌ حَادٌّ.
  meaning_id: Supaya tepat, ini soal keseimbangan, bukan pilihan keras.
  usage_note: Memperhalus rumusan.
- phrase: 'الصِّيَاغَةُ الْأَدَقُّ هِيَ: نَعَمْ مَعَ ضَوَابِطَ.'
  meaning_id: 'Rumusan paling tepat: ya dengan kontrol.'
  usage_note: Menutup dengan rumusan.
