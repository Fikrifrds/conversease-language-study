questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku setuju sebagian, tidak sepenuhnya."?
  options:
  - أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
  - أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
  - مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.
  correct_answer: أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Aku dukung idenya dengan satu syarat penting."?
  options:
  - أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
  - أَتَّفِقُ مَعَكِ جُزْئِيًّا، لَا بِشَكْلٍ كَامِلٍ.
  - مِنْ زَاوِيَةٍ أُخْرَى، هُنَاكَ خَطَرٌ خَفِيٌّ.
  correct_answer: أُؤَيِّدُ الْفِكْرَةَ بِشَرْطٍ وَاحِدٍ مُهِمٍّ.
