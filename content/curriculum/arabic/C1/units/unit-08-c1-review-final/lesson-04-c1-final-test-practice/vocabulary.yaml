vocabulary:
- word: الِاخْتِبَارُ النِّهَائِيُّ
  meaning_id: tes akhir
  usage_note: Dipakai untuk konteks evaluasi C1.
- word: الدِّقَّةُ
  meaning_id: ketepatan
  usage_note: Dipakai untuk jawaban yang akurat secara makna dan struktur.
- word: الطَّلَاقَةُ
  meaning_id: kefasihan
  usage_note: Dipakai untuk kelancaran berbicara.
- word: الْوُضُوحُ
  meaning_id: kejelasan
  usage_note: Dipakai untuk jawaban yang mudah diikuti.
- word: أُضِيفُ
  meaning_id: saya menambahkan
  usage_note: Dipakai saat menambah alasan atau contoh.
- word: أُعِيدُ الصِّيَاغَةَ
  meaning_id: saya menyusun ulang kalimat
  usage_note: Dipakai saat mengganti kata yang terlupa.
- word: ضَاقَ الْوَقْتُ
  meaning_id: waktu menjadi sempit
  usage_note: Dipakai saat merespons tekanan waktu.
- word: الْمَهَمَّةُ الْمَطْلُوبَةُ
  meaning_id: tugas yang diminta
  usage_note: Dipakai untuk menjaga jawaban tetap relevan.
