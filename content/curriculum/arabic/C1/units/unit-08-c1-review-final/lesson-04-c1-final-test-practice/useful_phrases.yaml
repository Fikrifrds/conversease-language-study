phrases:
- phrase: 'مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
  meaning_id: 'Posisiku tepat: aku mendukung, tapi dengan batas.'
  usage_note: Membuka jawaban.
- phrase: الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.
  meaning_id: Buktinya, hasil yang berulang di dua tim.
  usage_note: Menopang dengan bukti.
- phrase: مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.
  meaning_id: Di sisi lain, aku akui ada risikonya.
  usage_note: Mengakui sisi lain.
- phrase: لَوْ نَسِيتُ مُصْطَلَحًا، أَشْرَحُ الْفِكْرَةَ بِكَلِمَاتٍ أَبْسَطَ.
  meaning_id: Kalau lupa istilah, aku jelaskan idenya dengan kata lebih sederhana.
  usage_note: Mengatasi lupa.
- phrase: 'خُلَاصَتِي الدَّقِيقَةُ: نَعَمْ، مَعَ مُتَابَعَةٍ مُسْتَمِرَّةٍ.'
  meaning_id: 'Kesimpulan tepatku: ya, dengan pemantauan berkelanjutan.'
  usage_note: Menutup tajam.
