phrases:
- phrase: فِي تَدْرِيبِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ
    رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  meaning_id: Dalam latihan latihan tes akhir C1, saya sedang mereview cara menyampaikan opini yang tepat
    tanpa berlebihan.
  usage_note: 'Review nuance. Fokus lesson: latihan tes akhir C1.'
- phrase: عِنْدَ تَطْبِيقِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ
    عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  meaning_id: Saat menerapkan latihan tes akhir C1, dalam percakapan profesional, saya akan fokus pada
    konteks, ekspektasi, dan risiko.
  usage_note: Review strategy. Hubungkan dengan fokus lesson.
- phrase: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  meaning_id: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan yang persuasif.
  usage_note: Review presenting and debate. Pakai sebagai penghubung dalam latihan tes akhir C1.
- phrase: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
  meaning_id: Jika muncul salah paham, saya akan memperbaikinya dengan tact dan kejelasan.
  usage_note: Review cross-cultural repair. Gunakan untuk repair dalam latihan tes akhir C1.
- phrase: فِي خِتَامِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، فِي التَّقْيِيمِ النِّهَائِيِّ، سَأُظْهِرُ
    الدِّقَّةَ وَالْمُرُونَةَ وَحُسْنَ الِاسْتِمَاعِ.
  meaning_id: Pada bagian akhir latihan tes akhir C1, dalam tes akhir, saya akan menunjukkan presisi,
    fleksibilitas, dan listening yang baik.
  usage_note: Menutup final C1. Tutup percakapan sesuai fokus lesson.
