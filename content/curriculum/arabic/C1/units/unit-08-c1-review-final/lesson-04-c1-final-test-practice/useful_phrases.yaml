phrases:
- phrase: فِي تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أَجْمَعُ الدِّقَّةَ وَالطَّلَاقَةَ وَالْوُضُوحَ.
  meaning_id: Dalam latihan tes akhir, saya menggabungkan ketepatan, kefasihan, dan kejelasan.
  usage_note: Menjawab tes akhir dengan tiga target utama.
- phrase: أُجِيبُ أَوَّلًا عَنْ السُّؤَالِ، ثُمَّ أُضِيفُ سَبَبًا وَمِثَالًا قَصِيرًا.
  meaning_id: Saya menjawab pertanyaan terlebih dahulu, lalu menambahkan alasan dan contoh singkat.
  usage_note: Membuat jawaban tes tetap lengkap dan terarah.
- phrase: إِذَا نَسِيتُ كَلِمَةً، أُعِيدُ الصِّيَاغَةَ وَلَا أَتَوَقَّفُ طَوِيلًا.
  meaning_id: Jika saya lupa satu kata, saya menyusun ulang kalimat dan tidak berhenti terlalu lama.
  usage_note: Menjaga kelancaran saat ada kata yang terlupa.
- phrase: إِذَا ضَاقَ الْوَقْتُ، أَخْتَارُ جُمْلَةً وَاضِحَةً بَدَلًا مِنْ جُمْلَةٍ مُعَقَّدَةٍ.
  meaning_id: Jika waktu sempit, saya memilih kalimat yang jelas daripada kalimat yang rumit.
  usage_note: Memprioritaskan kejelasan saat waktu terbatas.
- phrase: فِي آخِرِ الْإِجَابَةِ، أَرْبِطُ النُّقْطَةَ بِالْمَهَمَّةِ الْمَطْلُوبَةِ.
  meaning_id: Di akhir jawaban, saya menghubungkan poin dengan tugas yang diminta.
  usage_note: Menutup jawaban tes dengan relevansi yang kuat.
