scenario_key: arabic_c1_c1_final_test_practice
mode: lesson_practice_coach
level_code: C1
opening_line: 'سُؤَالٌ كَالِاخْتِبَارِ: هَلْ نَعْتَمِدُ الْأَتْمَتَةَ؟'
learner_goal: Latih percakapan Arab C1 untuk menjawab pertanyaan ujian dengan posisi bernuansa, bukti,
  lalu kesimpulan tajam.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: 'سُؤَالٌ كَالِاخْتِبَارِ: هَلْ نَعْتَمِدُ الْأَتْمَتَةَ؟'
  hint: 'Jawab dengan struktur B2 memakai: مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
  sample_answer: 'مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
  focus: Membuka jawaban.
  expected_keywords:
  - مَوْقِفِي
  - 'دَقِيقٌ:'
  - أُؤَيِّدُ
  - لَكِنْ
  - بِحُدُودٍ
  indonesian_explanation: 'Posisiku tepat: aku mendukung, tapi dengan batas.'
- coach: 'استخدم الفكرة: الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.'
  hint: 'Jawab dengan struktur B2 memakai: الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.'
  sample_answer: الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.
  focus: Menopang dengan bukti.
  expected_keywords:
  - الدَّلِيلُ
  - هُوَ
  - نَتِيجَةٌ
  - تَكَرَّرَتْ
  - فِي
  indonesian_explanation: Buktinya, hasil yang berulang di dua tim.
- coach: 'استخدم الفكرة: مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.'
  hint: 'Jawab dengan struktur B2 memakai: مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.'
  sample_answer: مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.
  focus: Mengakui sisi lain.
  expected_keywords:
  - مِنْ
  - نَاحِيَةٍ
  - أُخْرَى
  - أَعْتَرِفُ
  - بِالْخَطَرِ
  indonesian_explanation: Di sisi lain, aku akui ada risikonya.
- coach: 'استخدم الفكرة: لَوْ نَسِيتُ مُصْطَلَحًا، أَشْرَحُ الْفِكْرَةَ بِكَلِمَاتٍ أَبْسَطَ.'
  hint: 'Jawab dengan struktur B2 memakai: لَوْ نَسِيتُ مُصْطَلَحًا، أَشْرَحُ الْفِكْرَةَ بِكَلِمَاتٍ
    أَبْسَطَ.'
  sample_answer: لَوْ نَسِيتُ مُصْطَلَحًا، أَشْرَحُ الْفِكْرَةَ بِكَلِمَاتٍ أَبْسَطَ.
  focus: Mengatasi lupa.
  expected_keywords:
  - لَوْ
  - نَسِيتُ
  - مُصْطَلَحًا
  - أَشْرَحُ
  - الْفِكْرَةَ
  indonesian_explanation: Kalau lupa istilah, aku jelaskan idenya dengan kata lebih sederhana.
target_phrases:
- 'مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
- الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.
- مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.
- لَوْ نَسِيتُ مُصْطَلَحًا، أَشْرَحُ الْفِكْرَةَ بِكَلِمَاتٍ أَبْسَطَ.
- 'خُلَاصَتِي الدَّقِيقَةُ: نَعَمْ، مَعَ مُتَابَعَةٍ مُسْتَمِرَّةٍ.'
