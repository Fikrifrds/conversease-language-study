questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam skill practicing the final test, Saya sedang mereview cara menyampaikan
    opini yang tepat tanpa berlebihan."?
  options:
  - فِي مَهَارَةِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ رَأْيٍ
    دَقِيقٍ دُونَ مُبَالَغَةٍ.
  - عِنْدَ تَطْبِيقِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى
    السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  - عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  correct_answer: فِي مَهَارَةِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ
    عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
