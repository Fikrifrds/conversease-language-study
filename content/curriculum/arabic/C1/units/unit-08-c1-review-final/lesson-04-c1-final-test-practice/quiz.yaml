questions:
- key: phrase_1
  prompt: 'Frasa mana yang berarti "Posisiku tepat: aku mendukung, tapi dengan batas."?'
  options:
  - 'مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
  - الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.
  - مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.
  correct_answer: 'مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
- key: phrase_2
  prompt: Frasa mana yang berarti "Buktinya, hasil yang berulang di dua tim."?
