questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan tes akhir, saya menggabungkan ketepatan, kefasihan, dan kejelasan."?
  options:
  - فِي تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أَجْمَعُ الدِّقَّةَ وَالطَّلَاقَةَ وَالْوُضُوحَ.
  - أُجِيبُ أَوَّلًا عَنْ السُّؤَالِ، ثُمَّ أُضِيفُ سَبَبًا وَمِثَالًا قَصِيرًا.
  - إِذَا نَسِيتُ كَلِمَةً، أُعِيدُ الصِّيَاغَةَ وَلَا أَتَوَقَّفُ طَوِيلًا.
  correct_answer: فِي تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أَجْمَعُ الدِّقَّةَ وَالطَّلَاقَةَ وَالْوُضُوحَ.
- key: phrase_2
  prompt: Frasa mana yang berarti "Saya menjawab pertanyaan terlebih dahulu, lalu menambahkan alasan dan contoh singkat."?
  options:
  - أُجِيبُ أَوَّلًا عَنْ السُّؤَالِ، ثُمَّ أُضِيفُ سَبَبًا وَمِثَالًا قَصِيرًا.
  - فِي تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أَجْمَعُ الدِّقَّةَ وَالطَّلَاقَةَ وَالْوُضُوحَ.
  - إِذَا نَسِيتُ كَلِمَةً، أُعِيدُ الصِّيَاغَةَ وَلَا أَتَوَقَّفُ طَوِيلًا.
  correct_answer: أُجِيبُ أَوَّلًا عَنْ السُّؤَالِ، ثُمَّ أُضِيفُ سَبَبًا وَمِثَالًا قَصِيرًا.
