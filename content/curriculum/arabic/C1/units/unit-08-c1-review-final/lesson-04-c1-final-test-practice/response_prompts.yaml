prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam latihan tes akhir, saya menggabungkan ketepatan, kefasihan, dan kejelasan.'
  target_response: فِي تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أَجْمَعُ الدِّقَّةَ وَالطَّلَاقَةَ وَالْوُضُوحَ.
  acceptable_responses:
  - فِي تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أَجْمَعُ الدِّقَّةَ وَالطَّلَاقَةَ وَالْوُضُوحَ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya menjawab pertanyaan terlebih dahulu, lalu menambahkan alasan dan contoh singkat.'
  target_response: أُجِيبُ أَوَّلًا عَنْ السُّؤَالِ، ثُمَّ أُضِيفُ سَبَبًا وَمِثَالًا قَصِيرًا.
  acceptable_responses:
  - أُجِيبُ أَوَّلًا عَنْ السُّؤَالِ، ثُمَّ أُضِيفُ سَبَبًا وَمِثَالًا قَصِيرًا.
- prompt: 'Ucapkan dalam bahasa Arab: Jika saya lupa satu kata, saya menyusun ulang kalimat dan tidak berhenti terlalu lama.'
  target_response: إِذَا نَسِيتُ كَلِمَةً، أُعِيدُ الصِّيَاغَةَ وَلَا أَتَوَقَّفُ طَوِيلًا.
  acceptable_responses:
  - إِذَا نَسِيتُ كَلِمَةً، أُعِيدُ الصِّيَاغَةَ وَلَا أَتَوَقَّفُ طَوِيلًا.
- prompt: 'Ucapkan dalam bahasa Arab: Jika waktu sempit, saya memilih kalimat yang jelas daripada kalimat yang rumit.'
  target_response: إِذَا ضَاقَ الْوَقْتُ، أَخْتَارُ جُمْلَةً وَاضِحَةً بَدَلًا مِنْ جُمْلَةٍ مُعَقَّدَةٍ.
  acceptable_responses:
  - إِذَا ضَاقَ الْوَقْتُ، أَخْتَارُ جُمْلَةً وَاضِحَةً بَدَلًا مِنْ جُمْلَةٍ مُعَقَّدَةٍ.
