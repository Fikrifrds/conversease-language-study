prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam latihan latihan tes akhir C1, saya sedang mereview cara menyampaikan
    opini yang tepat tanpa berlebihan.'
  target_response: فِي تَدْرِيبِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ
    عَنْ رَأْيٍ دَقِيقٍ دُونَ مُبَالَغَةٍ.
  acceptable_responses:
  - فِي تَدْرِيبِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، أُرَاجِعُ الْآنَ كَيْفَ أُعَبِّرُ عَنْ رَأْيٍ
    دَقِيقٍ دُونَ مُبَالَغَةٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan latihan tes akhir C1, dalam percakapan profesional,
    saya akan fokus pada konteks, ekspektasi, dan risiko.'
  target_response: عِنْدَ تَطْبِيقِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، فِي الْحِوَارِ الْمِهَنِيِّ،
    سَأُرَكِّزُ عَلَى السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ تَدْرِيبِ الِاخْتِبَارِ النِّهَائِيِّ، فِي الْحِوَارِ الْمِهَنِيِّ، سَأُرَكِّزُ عَلَى
    السِّيَاقِ وَالتَّوَقُّعَاتِ وَالْمَخَاطِرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat presentasi atau diskusi, saya akan membangun ide dengan urutan
    yang persuasif.'
  target_response: عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
  acceptable_responses:
  - عِنْدَ الْعَرْضِ أَوِ النِّقَاشِ، سَأَبْنِي الْفِكْرَةَ بِتَسَلْسُلٍ مُقْنِعٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika muncul salah paham, saya akan memperbaikinya dengan tact dan
    kejelasan.'
  target_response: إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
  acceptable_responses:
  - إِذَا ظَهَرَ سُوءُ فَهْمٍ، فَسَأُصْلِحُهُ بِلَبَاقَةٍ وَوُضُوحٍ.
