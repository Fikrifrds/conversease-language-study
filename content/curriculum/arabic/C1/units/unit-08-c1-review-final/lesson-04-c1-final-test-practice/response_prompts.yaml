prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Posisiku tepat: aku mendukung, tapi dengan batas.'
  target_response: 'مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
  acceptable_responses:
  - 'مَوْقِفِي دَقِيقٌ: أُؤَيِّدُ، لَكِنْ بِحُدُودٍ.'
- prompt: 'Ucapkan dalam bahasa Arab: Buktinya, hasil yang berulang di dua tim.'
  target_response: الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.
  acceptable_responses:
  - الدَّلِيلُ هُوَ نَتِيجَةٌ تَكَرَّرَتْ فِي فَرِيقَيْنِ.
- prompt: 'Ucapkan dalam bahasa Arab: Di sisi lain, aku akui ada risikonya.'
  target_response: مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.
  acceptable_responses:
  - مِنْ نَاحِيَةٍ أُخْرَى، أَعْتَرِفُ بِالْخَطَرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau lupa istilah, aku jelaskan idenya dengan kata lebih sederhana.'
  target_response: لَوْ نَسِيتُ مُصْطَلَحًا، أَشْرَحُ الْفِكْرَةَ بِكَلِمَاتٍ أَبْسَطَ.
  acceptable_responses:
  - لَوْ نَسِيتُ مُصْطَلَحًا، أَشْرَحُ الْفِكْرَةَ بِكَلِمَاتٍ أَبْسَطَ.
