prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam skill summarizing what you heard accurately, Makna tersiratnya
    di sini adalah pembicara belum sepenuhnya yakin.'
  target_response: فِي مَهَارَةِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ
    أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  acceptable_responses:
  - فِي مَهَارَةِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ
    غَيْرُ مُتَأَكِّدٍ تَمَامًا.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan summarizing what you heard accurately, Saya akan
    menjawab poin utama dulu, lalu kembali ke detail.'
  target_response: عِنْدَ تَطْبِيقِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ
    الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ،
    ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika saya merangkum apa yang saya dengar, ide utamanya adalah menunda
    keputusan.'
  target_response: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  acceptable_responses:
  - إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika muncul tantangan dalam skill ini, Pertanyaan follow-up terbaik
    adalah: apa yang akan mengubah keputusan ini?'
  target_response: 'إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ:
    مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
  acceptable_responses:
  - 'إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي
    سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
