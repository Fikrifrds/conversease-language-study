scenario_key: arabic_c1_summarizing_what_you_heard
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تَجْعَلُ جَوَابَكَ فِي تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ مُقْنِعًا وَمُتَوَازِنًا؟
learner_goal: Latih percakapan Arab C1 untuk rangkuman akurat atas apa yang didengar dengan nuansa, struktur,
  presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تَجْعَلُ جَوَابَكَ فِي تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ مُقْنِعًا وَمُتَوَازِنًا؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، الْمَعْنَى
    الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.'
  sample_answer: فِي تَدْرِيبِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ
    أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  focus: 'Menangkap implied meaning. Fokus lesson: rangkuman akurat atas apa yang didengar.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - تَلْخِيصِ
  - مَا
  - سَمِعْتَهُ
  indonesian_explanation: Dalam latihan rangkuman akurat atas apa yang didengar, makna tersiratnya di
    sini adalah pembicara belum sepenuhnya yakin.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، سَأُجِيبُ أَوَّلًا عَلَى
    النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، سَأُجِيبُ
    أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.'
  sample_answer: عِنْدَ تَطْبِيقِ تَلْخِيصِ مَا سَمِعْتَهُ بِدِقَّةٍ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ
    الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  focus: Merespons long turn. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - تَلْخِيصِ
  - مَا
  - سَمِعْتَهُ
  indonesian_explanation: Saat menerapkan rangkuman akurat atas apa yang didengar, saya akan menjawab
    poin utama dulu, lalu kembali ke detail.
- coach: 'استخدم الفكرة: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ
    الْقَرَارِ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ
    هِيَ تَأْخِيرُ الْقَرَارِ.'
  sample_answer: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  focus: Merangkum yang didengar. Pakai sebagai penghubung dalam rangkuman akurat atas apa yang didengar.
  expected_keywords:
  - إِذَا
  - لَخَّصْتُ
  - مَا
  - سَمِعْتُهُ،
  - فَالْفِكْرَةُ
  indonesian_explanation: Jika saya merangkum apa yang saya dengar, ide utamanya adalah menunda keputusan.
- coach: 'استخدم الفكرة: سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
  hint: 'Jawab dengan struktur C1 memakai: سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ
    هَذَا الْقَرَارَ؟'
  sample_answer: 'سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
  focus: Bertanya follow-up berkualitas. Gunakan untuk repair dalam rangkuman akurat atas apa yang didengar.
  expected_keywords:
  - سُؤَالُ
  - الْمُتَابَعَةِ
  - الْأَفْضَلُ
  - 'هُوَ:'
  - مَا
  indonesian_explanation: 'Pertanyaan follow-up terbaik adalah: apa yang akan mengubah keputusan ini?'
target_phrases:
