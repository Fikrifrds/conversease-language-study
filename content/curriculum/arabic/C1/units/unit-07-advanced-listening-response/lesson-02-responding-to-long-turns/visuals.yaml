cards:
- src: /images/lesson-visual-library/classroom-male/card-1.png
  width: 1254
  height: 1254
  label: فِي مَهَارَةِ الرَّدِّ عَلَى كَلَامٍ طَوِيلٍ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ
    غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  alt: Cuplikan visual classroom male untuk frasa فِي مَهَارَةِ الرَّدِّ عَلَى كَلَامٍ طَوِيلٍ، الْمَعْنَى
    الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا..
- src: /images/lesson-visual-library/classroom-male/card-2.png
  width: 1254
  height: 1254
  label: عِنْدَ تَطْبِيقِ الرَّدِّ عَلَى كَلَامٍ طَوِيلٍ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ،
    ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  alt: Cuplikan visual classroom male untuk frasa عِنْدَ تَطْبِيقِ الرَّدِّ عَلَى كَلَامٍ طَوِيلٍ، سَأُجِيبُ
    أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ..
- src: /images/lesson-visual-library/classroom-male/card-3.png
  width: 1254
  height: 1254
  label: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  alt: Cuplikan visual classroom male untuk frasa إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ
    هِيَ تَأْخِيرُ الْقَرَارِ..
