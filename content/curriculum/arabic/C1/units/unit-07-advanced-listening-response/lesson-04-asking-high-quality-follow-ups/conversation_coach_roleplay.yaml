scenario_key: arabic_c1_asking_high_quality_follow_ups
mode: lesson_practice_coach
level_code: C1
opening_line: مَاذَا فَهِمْتَ مِنَ الْكَلَامِ الطَّوِيلِ الَّذِي سَمِعْتَهُ؟
learner_goal: Latih percakapan Arab C1 untuk asking high-quality follow-ups dengan nuance, struktur, presisi,
  dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَاذَا فَهِمْتَ مِنَ الْكَلَامِ الطَّوِيلِ الَّذِي سَمِعْتَهُ؟
  hint: 'Jawab dengan struktur C1 memakai: الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ
    مُتَأَكِّدٍ تَمَامًا.'
  sample_answer: الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  focus: Menangkap implied meaning.
  expected_keywords:
  - الْمَعْنَى
  - الضِّمْنِيُّ
  - هُنَا
  - هُوَ
  - أَنَّ
  indonesian_explanation: Makna tersiratnya di sini adalah pembicara belum sepenuhnya yakin.
- coach: 'استخدم الفكرة: سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.'
  hint: 'Jawab dengan struktur C1 memakai: سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ
    أَعُودُ إِلَى التَّفَاصِيلِ.'
  sample_answer: سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  focus: Merespons long turn.
  expected_keywords:
  - سَأُجِيبُ
  - أَوَّلًا
  - عَلَى
  - النُّقْطَةِ
  - الْأَسَاسِيَّةِ،
  indonesian_explanation: Saya akan menjawab poin utama dulu, lalu kembali ke detail.
- coach: 'استخدم الفكرة: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ
    الْقَرَارِ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ
    هِيَ تَأْخِيرُ الْقَرَارِ.'
  sample_answer: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  focus: Merangkum yang didengar.
  expected_keywords:
  - إِذَا
  - لَخَّصْتُ
  - مَا
  - سَمِعْتُهُ،
  - فَالْفِكْرَةُ
  indonesian_explanation: Jika saya merangkum apa yang saya dengar, ide utamanya adalah menunda keputusan.
- coach: 'استخدم الفكرة: سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
  hint: 'Jawab dengan struktur C1 memakai: سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ
    هَذَا الْقَرَارَ؟'
  sample_answer: 'سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
  focus: Bertanya follow-up berkualitas.
  expected_keywords:
  - سُؤَالُ
  - الْمُتَابَعَةِ
  - الْأَفْضَلُ
  - 'هُوَ:'
  - مَا
  indonesian_explanation: 'Pertanyaan follow-up terbaik adalah: apa yang akan mengubah keputusan ini?'
target_phrases:
- الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
- سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
- إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
- 'سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
- بِهَذِهِ الطَّرِيقَةِ، لَا أَرُدُّ عَلَى الْكَلِمَاتِ فَقَطْ، بَلْ عَلَى الْمَقْصُودِ.
