- src: /images/lesson-visual-library/workplace-male/card-1.png
  width: 1254
  height: 1254
  label: فِي مَهَارَةِ طَرْحِ أَسْئِلَةِ مُتَابَعَةٍ عَالِيَةِ الْجَوْدَةِ، الْمَعْنَى الضِّمْنِيُّ هُنَا
    هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
