    الْجَوْدَةِ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا..
- src: /images/lesson-visual-library/workplace-male/card-2.png
  width: 1254
  height: 1254
  label: عِنْدَ تَطْبِيقِ طَرْحِ أَسْئِلَةِ مُتَابَعَةٍ عَالِيَةِ الْجَوْدَةِ، سَأُجِيبُ أَوَّلًا عَلَى
