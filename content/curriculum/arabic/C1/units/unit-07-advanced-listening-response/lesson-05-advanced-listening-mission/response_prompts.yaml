prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam latihan respons setelah listening lanjutan, makna tersiratnya
    di sini adalah pembicara belum sepenuhnya yakin.'
  target_response: فِي تَدْرِيبِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ، الْمَعْنَى الضِّمْنِيُّ
    هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  acceptable_responses:
  - فِي تَدْرِيبِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ
    الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan respons setelah listening lanjutan, saya akan menjawab
    poin utama dulu, lalu kembali ke detail.'
  target_response: عِنْدَ تَطْبِيقِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ، سَأُجِيبُ أَوَّلًا
    عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ
    الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika saya merangkum apa yang saya dengar, ide utamanya adalah menunda
    keputusan.'
  target_response: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  acceptable_responses:
  - إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
- prompt: 'Ucapkan dalam bahasa Arab: Pertanyaan follow-up terbaik adalah: apa yang akan mengubah keputusan
    ini?'
  target_response: 'سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
  acceptable_responses:
  - 'سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
