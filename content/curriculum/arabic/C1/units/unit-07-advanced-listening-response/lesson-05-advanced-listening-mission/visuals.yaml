- src: /images/lesson-visual-library/health-male/card-1.png
  width: 1254
  height: 1254
  label: فِي تَدْرِيبِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ
    أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  alt: Cuplikan visual health male untuk frasa فِي تَدْرِيبِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ،
    الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا..
- src: /images/lesson-visual-library/health-male/card-2.png
  width: 1254
  height: 1254
  label: عِنْدَ تَطْبِيقِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ
    الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  alt: Cuplikan visual health male untuk frasa عِنْدَ تَطْبِيقِ إِدَارَةِ رَدٍّ بَعْدَ اِسْتِمَاعٍ مُتَقَدِّمٍ،
    سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ، ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ..
- src: /images/lesson-visual-library/health-male/card-3.png
  width: 1254
  height: 1254
  label: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  alt: Cuplikan visual health male untuk frasa إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ
    هِيَ تَأْخِيرُ الْقَرَارِ..
