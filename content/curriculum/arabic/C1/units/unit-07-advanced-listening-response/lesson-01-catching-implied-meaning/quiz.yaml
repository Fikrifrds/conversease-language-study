questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam latihan penangkapan makna tersirat, makna tersiratnya di sini
    adalah pembicara belum sepenuhnya yakin."?
  options:
  - فِي تَدْرِيبِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ
    غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  - عِنْدَ تَطْبِيقِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ،
    ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  - إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  correct_answer: فِي تَدْرِيبِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ
    أَنَّ الْمُتَحَدِّثَ غَيْرُ مُتَأَكِّدٍ تَمَامًا.
