- word: تَأْخِيرٌ
  meaning_id: keterlambatan
  usage_note: 'Dipakai untuk arti "keterlambatan". Contoh: "إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ
    الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ."'
