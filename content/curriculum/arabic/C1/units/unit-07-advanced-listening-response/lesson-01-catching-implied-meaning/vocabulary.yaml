vocabulary:
- word: تَدْرِيبٌ
  meaning_id: coaching/latihan
  usage_note: 'Dipakai untuk arti "coaching/latihan". Contoh: "فِي تَدْرِيبِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ،
    الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُ..."'
- word: ضِمْنِيٌّ
  meaning_id: tersirat
  usage_note: 'Dipakai untuk arti "tersirat". Contoh: "فِي تَدْرِيبِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ،
    الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُ..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ،
    سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَس..."'
