phrases:
- phrase: فِي تَدْرِيبِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ، الْمَعْنَى الضِّمْنِيُّ هُنَا هُوَ أَنَّ الْمُتَحَدِّثَ
    غَيْرُ مُتَأَكِّدٍ تَمَامًا.
  meaning_id: Dalam latihan penangkapan makna tersirat, makna tersiratnya di sini adalah pembicara belum
    sepenuhnya yakin.
  usage_note: 'Menangkap implied meaning. Fokus lesson: penangkapan makna tersirat.'
- phrase: عِنْدَ تَطْبِيقِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ، سَأُجِيبُ أَوَّلًا عَلَى النُّقْطَةِ الْأَسَاسِيَّةِ،
    ثُمَّ أَعُودُ إِلَى التَّفَاصِيلِ.
  meaning_id: Saat menerapkan penangkapan makna tersirat, saya akan menjawab poin utama dulu, lalu kembali
    ke detail.
  usage_note: Merespons long turn. Hubungkan dengan fokus lesson.
- phrase: إِذَا لَخَّصْتُ مَا سَمِعْتُهُ، فَالْفِكْرَةُ الرَّئِيسِيَّةُ هِيَ تَأْخِيرُ الْقَرَارِ.
  meaning_id: Jika saya merangkum apa yang saya dengar, ide utamanya adalah menunda keputusan.
  usage_note: Merangkum yang didengar. Pakai sebagai penghubung dalam penangkapan makna tersirat.
- phrase: 'سُؤَالُ الْمُتَابَعَةِ الْأَفْضَلُ هُوَ: مَا الَّذِي سَيُغَيِّرُ هَذَا الْقَرَارَ؟'
  meaning_id: 'Pertanyaan follow-up terbaik adalah: apa yang akan mengubah keputusan ini?'
  usage_note: Bertanya follow-up berkualitas. Gunakan untuk repair dalam penangkapan makna tersirat.
- phrase: فِي خِتَامِ الْتِقَاطِ الْمَعْنَى الضِّمْنِيِّ، بِهَذِهِ الطَّرِيقَةِ، لَا أَرُدُّ عَلَى الْكَلِمَاتِ
    فَقَطْ، بَلْ عَلَى الْمَقْصُودِ.
  meaning_id: Pada bagian akhir penangkapan makna tersirat, dengan cara ini, saya tidak hanya merespons
    kata-kata, tetapi maksudnya.
  usage_note: Menutup advanced listening response. Tutup percakapan sesuai fokus lesson.
