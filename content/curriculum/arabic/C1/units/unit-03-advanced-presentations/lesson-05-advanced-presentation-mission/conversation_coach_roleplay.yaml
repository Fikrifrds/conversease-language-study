scenario_key: arabic_c1_advanced_presentation_mission
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تُقَدِّمِينَ مَوْضُوعًا مُعَقَّدًا بِوُضُوحٍ؟
learner_goal: Latih percakapan Arab C1 untuk advanced presentation mission dengan nuance, struktur, presisi,
  dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تُقَدِّمِينَ مَوْضُوعًا مُعَقَّدًا بِوُضُوحٍ؟
  hint: 'Jawab dengan struktur C1 memakai: سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ الْجُمْهُورُ
    سِيَاقَهُ.'
  sample_answer: سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
  focus: Membingkai topik kompleks.
  expected_keywords:
  - سَأُؤَطِّرُ
  - الْمَوْضُوعَ
  - أَوَّلًا
  - حَتَّى
  - يَفْهَمَ
  indonesian_explanation: Saya akan membingkai topiknya dulu agar audiens memahami konteksnya.
- coach: 'استخدم الفكرة: بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.'
  hint: 'Jawab dengan struktur C1 memakai: بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً
    فَخُطْوَةً.'
  sample_answer: بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
  focus: Membangun persuasive flow.
  expected_keywords:
  - بَعْدَ
  - ذَلِكَ،
  - سَأَبْنِي
  - التَّسَلْسُلَ
  - الْإِقْنَاعِيَّ
  indonesian_explanation: Setelah itu, saya akan membangun alur persuasif langkah demi langkah.
- coach: 'استخدم الفكرة: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.'
  hint: 'Jawab dengan struktur C1 memakai: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ
    إِلَى التَّأْثِيرِ.'
  sample_answer: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  focus: Memakai transisi presisi.
  expected_keywords:
  - الِانْتِقَالُ
  - الْأَدَقُّ
  - هُنَا
  - هُوَ
  - أَنْ
  indonesian_explanation: Transisi yang lebih tepat di sini adalah berpindah dari sebab ke dampak.
- coach: 'استخدم الفكرة: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ
    الْأَسَاسَ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ
    ثُمَّ أُوَضِّحُ الْأَسَاسَ.'
  sample_answer: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
  focus: Menjawab pertanyaan menantang.
  expected_keywords:
  - إِذَا
  - جَاءَ
  - سُؤَالٌ
  - صَعْبٌ،
  - فَسَأَعْتَرِفُ
  indonesian_explanation: Jika ada pertanyaan sulit, saya akan mengakui batas jawaban lalu menjelaskan
    dasarnya.
target_phrases:
- سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
- بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
- الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
- إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
- فِي النِّهَايَةِ، أُرِيدُ أَنْ يَخْرُجَ الْجُمْهُورُ بِرِسَالَةٍ وَاضِحَةٍ.
