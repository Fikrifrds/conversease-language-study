scenario_key: arabic_c1_advanced_presentation_mission
mode: lesson_practice_coach
level_code: C1
opening_line: أَمَامَكِ الْإِدَارَةُ وَخَمْسُ دَقَائِقَ. اعْرِضِي.
learner_goal: Latih percakapan Arab C1 untuk menyampaikan presentasi lengkap ke manajemen dan meminta
  keputusan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: أَمَامَكِ الْإِدَارَةُ وَخَمْسُ دَقَائِقَ. اعْرِضِي.
  hint: 'Jawab dengan struktur B2 memakai: رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.'
  sample_answer: رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.
  focus: Membuka dengan pesan inti.
  expected_keywords:
  - رِسَالَتِي
  - الْأَسَاسِيَّةُ
  - هِيَ
  - أَنَّنَا
  - نَخْسَرُ
  indonesian_explanation: Pesan utamaku, kita kehilangan waktu berharga.
- coach: 'استخدم الفكرة: كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.'
  hint: 'Jawab dengan struktur B2 memakai: كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.'
  sample_answer: كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.
  focus: Menjaga fokus.
  expected_keywords:
  - كُلُّ
  - قِسْمٍ
  - فِي
  - عَرْضِي
  - يَخْدُمُ
  indonesian_explanation: Tiap bagian presentasiku melayani keputusan ini.
- coach: 'استخدم الفكرة: الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.'
  hint: 'Jawab dengan struktur B2 memakai: الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.'
  sample_answer: الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.
  focus: Menopang dengan bukti.
  expected_keywords:
  - الدَّلِيلُ
  - هُوَ
  - مُقَارَنَةٌ
  - بَيْنَ
  - شَهْرَيْنِ
  indonesian_explanation: Buktinya, perbandingan antara dua bulan.
- coach: 'استخدم الفكرة: الْمُخَاطَرَةُ صَغِيرَةٌ لِأَنَّنَا نُجَرِّبُ أَوَّلًا.'
  hint: 'Jawab dengan struktur B2 memakai: الْمُخَاطَرَةُ صَغِيرَةٌ لِأَنَّنَا نُجَرِّبُ أَوَّلًا.'
  sample_answer: الْمُخَاطَرَةُ صَغِيرَةٌ لِأَنَّنَا نُجَرِّبُ أَوَّلًا.
  focus: Menjawab risiko.
  expected_keywords:
  - الْمُخَاطَرَةُ
  - صَغِيرَةٌ
  - لِأَنَّنَا
  - نُجَرِّبُ
  - أَوَّلًا
  indonesian_explanation: Risikonya kecil karena kita uji dulu.
target_phrases:
- رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.
- كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.
- الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.
- الْمُخَاطَرَةُ صَغِيرَةٌ لِأَنَّنَا نُجَرِّبُ أَوَّلًا.
- أَطْلُبُ قَرَارًا الْيَوْمَ، وَلَوْ كَانَ مَبْدَئِيًّا.
