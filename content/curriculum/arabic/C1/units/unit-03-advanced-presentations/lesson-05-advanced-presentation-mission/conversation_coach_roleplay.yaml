- فِي خِتَامِ تَقْدِيمِ عَرْضٍ مُتَقَدِّمٍ وَاضِحٍ، فِي النِّهَايَةِ، أُرِيدُ أَنْ يَخْرُجَ الْجُمْهُورُ
