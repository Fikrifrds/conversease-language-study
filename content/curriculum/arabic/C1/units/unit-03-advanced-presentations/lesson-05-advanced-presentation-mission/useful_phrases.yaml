phrases:
- phrase: فِي مَهَارَةِ تَقْدِيمِ عَرْضٍ مُتَقَدِّمٍ وَاضِحٍ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى
    يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
  meaning_id: Dalam skill delivering an advanced presentation, Saya akan membingkai topiknya dulu agar
    audiens memahami konteksnya.
  usage_note: 'Membingkai topik kompleks. Fokus lesson: delivering an advanced presentation.'
- phrase: عِنْدَ تَطْبِيقِ تَقْدِيمِ عَرْضٍ مُتَقَدِّمٍ وَاضِحٍ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ
    الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
  meaning_id: Saat menerapkan delivering an advanced presentation, Setelah itu, saya akan membangun alur
    persuasif langkah demi langkah.
  usage_note: Membangun persuasive flow. Hubungkan dengan fokus lesson.
- phrase: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  meaning_id: Transisi yang lebih tepat di sini adalah berpindah dari sebab ke dampak.
  usage_note: Memakai transisi presisi. Pakai sebagai penghubung dalam delivering an advanced presentation.
- phrase: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ
    الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
  meaning_id: Jika muncul tantangan dalam skill ini, Jika ada pertanyaan sulit, saya akan mengakui batas
    jawaban lalu menjelaskan dasarnya.
  usage_note: Menjawab pertanyaan menantang. Gunakan untuk repair dalam delivering an advanced presentation.
- phrase: فِي الصِّيَاغَةِ النِّهَائِيَّةِ لِهَذِهِ الْمَهَارَةِ، فِي النِّهَايَةِ، أُرِيدُ أَنْ يَخْرُجَ
    الْجُمْهُورُ بِرِسَالَةٍ وَاضِحَةٍ.
  meaning_id: Dalam final formulation untuk delivering an advanced presentation, Pada akhirnya, saya ingin
    audiens pulang dengan pesan yang jelas.
  usage_note: Menutup presentasi advanced. Tutup percakapan sesuai fokus lesson.
