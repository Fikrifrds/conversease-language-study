phrases:
- phrase: رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.
  meaning_id: Pesan utamaku, kita kehilangan waktu berharga.
  usage_note: Membuka dengan pesan inti.
- phrase: كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.
  meaning_id: Tiap bagian presentasiku melayani keputusan ini.
  usage_note: Menjaga fokus.
- phrase: الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.
  meaning_id: Buktinya, perbandingan antara dua bulan.
  usage_note: Menopang dengan bukti.
- phrase: الْمُخَاطَرَةُ صَغِيرَةٌ لِأَنَّنَا نُجَرِّبُ أَوَّلًا.
  meaning_id: Risikonya kecil karena kita uji dulu.
  usage_note: Menjawab risiko.
- phrase: أَطْلُبُ قَرَارًا الْيَوْمَ، وَلَوْ كَانَ مَبْدَئِيًّا.
  meaning_id: Aku minta keputusan hari ini, walau sementara.
  usage_note: Menutup dengan permintaan.
