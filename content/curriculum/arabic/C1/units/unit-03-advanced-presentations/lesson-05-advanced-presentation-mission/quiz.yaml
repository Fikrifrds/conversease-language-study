questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Pesan utamaku, kita kehilangan waktu berharga."?
  options:
  - رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.
  - كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.
  - الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.
  correct_answer: رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.
