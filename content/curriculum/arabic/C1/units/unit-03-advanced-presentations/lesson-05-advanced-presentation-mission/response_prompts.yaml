prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Pesan utamaku, kita kehilangan waktu berharga.'
  target_response: رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.
  acceptable_responses:
  - رِسَالَتِي الْأَسَاسِيَّةُ هِيَ أَنَّنَا نَخْسَرُ وَقْتًا ثَمِينًا.
- prompt: 'Ucapkan dalam bahasa Arab: Tiap bagian presentasiku melayani keputusan ini.'
  target_response: كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.
  acceptable_responses:
  - كُلُّ قِسْمٍ فِي عَرْضِي يَخْدُمُ هَذَا الْقَرَارَ.
- prompt: 'Ucapkan dalam bahasa Arab: Buktinya, perbandingan antara dua bulan.'
  target_response: الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.
  acceptable_responses:
  - الدَّلِيلُ هُوَ مُقَارَنَةٌ بَيْنَ شَهْرَيْنِ.
- prompt: 'Ucapkan dalam bahasa Arab: Risikonya kecil karena kita uji dulu.'
  target_response: الْمُخَاطَرَةُ صَغِيرَةٌ لِأَنَّنَا نُجَرِّبُ أَوَّلًا.
  acceptable_responses:
  - الْمُخَاطَرَةُ صَغِيرَةٌ لِأَنَّنَا نُجَرِّبُ أَوَّلًا.
