prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam skill delivering an advanced presentation, Saya akan membingkai
    topiknya dulu agar audiens memahami konteksnya.'
  target_response: فِي مَهَارَةِ تَقْدِيمِ عَرْضٍ مُتَقَدِّمٍ وَاضِحٍ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا
    حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
  acceptable_responses:
  - فِي مَهَارَةِ تَقْدِيمِ عَرْضٍ مُتَقَدِّمٍ وَاضِحٍ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ
    الْجُمْهُورُ سِيَاقَهُ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan delivering an advanced presentation, Setelah itu,
    saya akan membangun alur persuasif langkah demi langkah.'
  target_response: عِنْدَ تَطْبِيقِ تَقْدِيمِ عَرْضٍ مُتَقَدِّمٍ وَاضِحٍ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ
    الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ تَقْدِيمِ عَرْضٍ مُتَقَدِّمٍ وَاضِحٍ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ
    خُطْوَةً فَخُطْوَةً.
- prompt: 'Ucapkan dalam bahasa Arab: Transisi yang lebih tepat di sini adalah berpindah dari sebab ke
    dampak.'
  target_response: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  acceptable_responses:
  - الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Jika muncul tantangan dalam skill ini, Jika ada pertanyaan sulit,
    saya akan mengakui batas jawaban lalu menjelaskan dasarnya.'
  target_response: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ
    بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
  acceptable_responses:
  - إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ
    الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
