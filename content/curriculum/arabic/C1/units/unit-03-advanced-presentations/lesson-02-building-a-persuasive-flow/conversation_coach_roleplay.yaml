scenario_key: arabic_c1_building_a_persuasive_flow
mode: lesson_practice_coach
level_code: C1
opening_line: مَا الطَّرِيقَةُ الأَدَقُّ لِاسْتِخْدَامِ مَهَارَةِ بِنَاءِ تَسَلْسُلٍ إِقْنَاعِيٍّ؟
learner_goal: Latih percakapan Arab C1 untuk pembangunan alur persuasif dengan nuansa, struktur, presisi,
  dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَا الطَّرِيقَةُ الأَدَقُّ لِاسْتِخْدَامِ مَهَارَةِ بِنَاءِ تَسَلْسُلٍ إِقْنَاعِيٍّ؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ بِنَاءِ تَسَلْسُلٍ إِقْنَاعِيٍّ، سَأُؤَطِّرُ
    الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.'
  sample_answer: فِي تَدْرِيبِ بِنَاءِ تَسَلْسُلٍ إِقْنَاعِيٍّ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى
    يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
  focus: 'Membingkai topik kompleks. Fokus lesson: pembangunan alur persuasif.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - بِنَاءِ
  - تَسَلْسُلٍ
  - إِقْنَاعِيٍّ،
  indonesian_explanation: Dalam latihan pembangunan alur persuasif, saya akan membingkai topiknya dulu
    agar audiens memahami konteksnya.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ بِنَاءِ تَسَلْسُلٍ إِقْنَاعِيٍّ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ
    الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ بِنَاءِ تَسَلْسُلٍ إِقْنَاعِيٍّ، بَعْدَ ذَلِكَ،
    سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.'
  sample_answer: عِنْدَ تَطْبِيقِ بِنَاءِ تَسَلْسُلٍ إِقْنَاعِيٍّ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ
    الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
  focus: Membangun persuasive flow. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - بِنَاءِ
  - تَسَلْسُلٍ
  - إِقْنَاعِيٍّ،
  indonesian_explanation: Saat menerapkan pembangunan alur persuasif, setelah itu, saya akan membangun
    alur persuasif langkah demi langkah.
- coach: 'استخدم الفكرة: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.'
  hint: 'Jawab dengan struktur C1 memakai: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ
    إِلَى التَّأْثِيرِ.'
  sample_answer: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  focus: Memakai transisi presisi. Pakai sebagai penghubung dalam pembangunan alur persuasif.
  expected_keywords:
  - الِانْتِقَالُ
  - الْأَدَقُّ
  - هُنَا
  - هُوَ
  - أَنْ
  indonesian_explanation: Transisi yang lebih tepat di sini adalah berpindah dari sebab ke dampak.
- coach: 'استخدم الفكرة: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ
    الْأَسَاسَ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ
    ثُمَّ أُوَضِّحُ الْأَسَاسَ.'
  sample_answer: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
  focus: Menjawab pertanyaan menantang. Gunakan untuk repair dalam pembangunan alur persuasif.
  expected_keywords:
  - إِذَا
  - جَاءَ
  - سُؤَالٌ
  - صَعْبٌ،
  - فَسَأَعْتَرِفُ
  indonesian_explanation: Jika ada pertanyaan sulit, saya akan mengakui batas jawaban lalu menjelaskan
    dasarnya.
