scenario_key: arabic_c1_building_a_persuasive_flow
mode: lesson_practice_coach
level_code: C1
opening_line: عَرْضُ النُّمُوِّ مَلِيءٌ بِالْأَرْقَامِ. كَيْفَ تُرَتِّبِينَهُ؟
learner_goal: Latih percakapan Arab C1 untuk membangun alur persuasif dari masalah ke bukti lalu pilihan.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: عَرْضُ النُّمُوِّ مَلِيءٌ بِالْأَرْقَامِ. كَيْفَ تُرَتِّبِينَهُ؟
  hint: 'Jawab dengan struktur B2 memakai: أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.'
  sample_answer: أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.
  focus: Membuka alur.
  expected_keywords:
  - أَبْدَأُ
  - مِنَ
  - الْمُشْكِلَةِ
  - قَبْلَ
  - أَيِّ
  indonesian_explanation: Aku mulai dari masalah sebelum angka apa pun.
- coach: 'استخدم الفكرة: يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.'
  hint: 'Jawab dengan struktur B2 memakai: يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.'
  sample_answer: يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.
  focus: Menghubungkan ke bukti.
  expected_keywords:
  - يَقُودُنَا
  - ذَلِكَ
  - إِلَى
  - الدَّلِيلِ
  - بِشَكْلٍ
  indonesian_explanation: Itu membawa kita ke bukti secara natural.
- coach: 'استخدم الفكرة: الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.'
  hint: 'Jawab dengan struktur B2 memakai: الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.'
  sample_answer: الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.
  focus: Menandai pilihan.
  expected_keywords:
  - الْآنَ
  - نَنْظُرُ
  - إِلَى
  - الْخِيَارَيْنِ
  - الْمُتَاحَيْنِ
  indonesian_explanation: Sekarang kita lihat dua opsi yang tersedia.
- coach: 'استخدم الفكرة: لَوْ قَاطَعَنِي أَحَدٌ، أُجِيبُ ثُمَّ أَعُودُ إِلَى الْمَسَارِ.'
  hint: 'Jawab dengan struktur B2 memakai: لَوْ قَاطَعَنِي أَحَدٌ، أُجِيبُ ثُمَّ أَعُودُ إِلَى الْمَسَارِ.'
  sample_answer: لَوْ قَاطَعَنِي أَحَدٌ، أُجِيبُ ثُمَّ أَعُودُ إِلَى الْمَسَارِ.
  focus: Mengelola interupsi.
  expected_keywords:
  - لَوْ
  - قَاطَعَنِي
  - أَحَدٌ
  - أُجِيبُ
  - ثُمَّ
  indonesian_explanation: Kalau ada yang memotong, aku jawab lalu kembali ke alur.
target_phrases:
- أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.
- يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.
- الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.
- لَوْ قَاطَعَنِي أَحَدٌ، أُجِيبُ ثُمَّ أَعُودُ إِلَى الْمَسَارِ.
- هَكَذَا يَصِلُ الْجُمْهُورُ إِلَى الِاسْتِنْتَاجِ مَعِي.
