phrases:
- phrase: أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.
  meaning_id: Aku mulai dari masalah sebelum angka apa pun.
  usage_note: Membuka alur.
- phrase: يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.
  meaning_id: Itu membawa kita ke bukti secara natural.
  usage_note: Menghubungkan ke bukti.
- phrase: الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.
  meaning_id: Sekarang kita lihat dua opsi yang tersedia.
  usage_note: Menandai pilihan.
- phrase: لَوْ قَاطَعَنِي أَحَدٌ، أُجِيبُ ثُمَّ أَعُودُ إِلَى الْمَسَارِ.
  meaning_id: Kalau ada yang memotong, aku jawab lalu kembali ke alur.
  usage_note: Mengelola interupsi.
- phrase: هَكَذَا يَصِلُ الْجُمْهُورُ إِلَى الِاسْتِنْتَاجِ مَعِي.
  meaning_id: Dengan begitu audiens sampai ke kesimpulan bersamaku.
  usage_note: Menutup alur.
