prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Aku mulai dari masalah sebelum angka apa pun.'
  target_response: أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.
  acceptable_responses:
  - أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Itu membawa kita ke bukti secara natural.'
  target_response: يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.
  acceptable_responses:
  - يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.
- prompt: 'Ucapkan dalam bahasa Arab: Sekarang kita lihat dua opsi yang tersedia.'
  target_response: الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.
  acceptable_responses:
  - الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalau ada yang memotong, aku jawab lalu kembali ke alur.'
  target_response: لَوْ قَاطَعَنِي أَحَدٌ، أُجِيبُ ثُمَّ أَعُودُ إِلَى الْمَسَارِ.
  acceptable_responses:
  - لَوْ قَاطَعَنِي أَحَدٌ، أُجِيبُ ثُمَّ أَعُودُ إِلَى الْمَسَارِ.
