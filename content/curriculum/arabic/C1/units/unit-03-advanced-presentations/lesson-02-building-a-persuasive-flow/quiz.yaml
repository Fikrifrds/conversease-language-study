questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Aku mulai dari masalah sebelum angka apa pun."?
  options:
  - أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.
  - يَقُودُنَا ذَلِكَ إِلَى الدَّلِيلِ بِشَكْلٍ طَبِيعِيٍّ.
  - الْآنَ نَنْظُرُ إِلَى الْخِيَارَيْنِ الْمُتَاحَيْنِ.
  correct_answer: أَبْدَأُ مِنَ الْمُشْكِلَةِ قَبْلَ أَيِّ رَقْمٍ.
