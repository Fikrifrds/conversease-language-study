phrases:
- phrase: لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.
  meaning_id: Mari pindah dari sebab ke dampak langsungnya.
  usage_note: Transisi sebab-dampak.
- phrase: بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.
  meaning_id: Berdasarkan yang tadi, langkah berikutnya jadi jelas.
  usage_note: Menjembatani ke langkah.
- phrase: قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.
  meaning_id: Sebelum lanjut, aku rangkum poin sebelumnya.
  usage_note: Merangkum sebelum lanjut.
- phrase: هَذِهِ الْجُمْلَةُ تُهَيِّئُ الْجُمْهُورَ لِلتَّحَوُّلِ.
  meaning_id: Kalimat ini menyiapkan audiens untuk peralihan.
  usage_note: Menyiapkan peralihan.
- phrase: بِهَذَا لَا يَبْدُو الِانْتِقَالُ مُفَاجِئًا.
  meaning_id: Dengan begitu transisinya tidak terasa mendadak.
  usage_note: Menjaga kehalusan.
