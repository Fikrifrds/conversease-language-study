phrases:
- phrase: سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
  meaning_id: Saya akan membingkai topiknya dulu agar audiens memahami konteksnya.
  usage_note: Membingkai topik kompleks.
- phrase: بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
  meaning_id: Setelah itu, saya akan membangun alur persuasif langkah demi langkah.
  usage_note: Membangun persuasive flow.
- phrase: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  meaning_id: Transisi yang lebih tepat di sini adalah berpindah dari sebab ke dampak.
  usage_note: Memakai transisi presisi.
- phrase: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
  meaning_id: Jika ada pertanyaan sulit, saya akan mengakui batas jawaban lalu menjelaskan dasarnya.
  usage_note: Menjawab pertanyaan menantang.
- phrase: فِي النِّهَايَةِ، أُرِيدُ أَنْ يَخْرُجَ الْجُمْهُورُ بِرِسَالَةٍ وَاضِحَةٍ.
  meaning_id: Pada akhirnya, saya ingin audiens pulang dengan pesan yang jelas.
  usage_note: Menutup presentasi advanced.
