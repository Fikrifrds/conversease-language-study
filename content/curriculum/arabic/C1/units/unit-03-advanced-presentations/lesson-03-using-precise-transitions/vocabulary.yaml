vocabulary:
- word: أَوَّلًا
  meaning_id: pertama
  usage_note: 'Dipakai untuk arti "pertama". Contoh: "فِي مَهَارَةِ اِسْتِخْدَامِ اِنْتِقَالَاتٍ دَقِيقَةٍ،
    سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى ي..."'
- word: جُمْهُورٌ
  meaning_id: audiens
  usage_note: 'Dipakai untuk arti "audiens". Contoh: "فِي مَهَارَةِ اِسْتِخْدَامِ اِنْتِقَالَاتٍ دَقِيقَةٍ،
    سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى ي..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ اِسْتِخْدَامِ اِنْتِقَالَاتٍ
    دَقِيقَةٍ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ..."'
- word: خُطْوَةٌ
  meaning_id: langkah
  usage_note: 'Dipakai untuk arti "langkah". Contoh: "عِنْدَ تَطْبِيقِ اِسْتِخْدَامِ اِنْتِقَالَاتٍ دَقِيقَةٍ،
    بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ..."'
- word: سَبَبٌ
  meaning_id: alasan
  usage_note: 'Dipakai untuk arti "alasan". Contoh: "الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ
    مِنَ السَّبَبِ إِلَى التَّأْثِيرِ."'
- word: تَأْثِيرٌ
  meaning_id: dampak/pengaruh
  usage_note: 'Dipakai untuk arti "dampak/pengaruh". Contoh: "الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ
    نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
    إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُو..."'
- word: صَعْبٌ
  meaning_id: sulit
  usage_note: 'Dipakai untuk arti "sulit". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، إِذَا
