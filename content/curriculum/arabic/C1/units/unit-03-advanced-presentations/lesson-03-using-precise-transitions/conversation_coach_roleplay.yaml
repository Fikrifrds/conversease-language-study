scenario_key: arabic_c1_using_precise_transitions
mode: lesson_practice_coach
level_code: C1
opening_line: عَرْضُكِ يَقْفِزُ بَيْنَ الْأَفْكَارِ. كَيْفَ تُحَسِّنِينَ الِانْتِقَالَاتِ؟
learner_goal: Latih percakapan Arab C1 untuk memakai transisi yang presisi antarbagian presentasi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: عَرْضُكِ يَقْفِزُ بَيْنَ الْأَفْكَارِ. كَيْفَ تُحَسِّنِينَ الِانْتِقَالَاتِ؟
  hint: 'Jawab dengan struktur B2 memakai: لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.'
  sample_answer: لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.
  focus: Transisi sebab-dampak.
  expected_keywords:
  - لِنَنْتَقِلْ
  - مِنَ
  - السَّبَبِ
  - إِلَى
  - أَثَرِهِ
  indonesian_explanation: Mari pindah dari sebab ke dampak langsungnya.
- coach: 'استخدم الفكرة: بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.'
  hint: 'Jawab dengan struktur B2 memakai: بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.'
  sample_answer: بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.
  focus: Menjembatani ke langkah.
  expected_keywords:
  - بِنَاءً
  - عَلَى
  - مَا
  - سَبَقَ
  - تَتَّضِحُ
  indonesian_explanation: Berdasarkan yang tadi, langkah berikutnya jadi jelas.
- coach: 'استخدم الفكرة: قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.'
  hint: 'Jawab dengan struktur B2 memakai: قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.'
  sample_answer: قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.
  focus: Merangkum sebelum lanjut.
  expected_keywords:
  - قَبْلَ
  - أَنْ
  - نُكْمِلَ
  - أُلَخِّصُ
  - النُّقْطَةَ
  indonesian_explanation: Sebelum lanjut, aku rangkum poin sebelumnya.
- coach: 'استخدم الفكرة: هَذِهِ الْجُمْلَةُ تُهَيِّئُ الْجُمْهُورَ لِلتَّحَوُّلِ.'
  hint: 'Jawab dengan struktur B2 memakai: هَذِهِ الْجُمْلَةُ تُهَيِّئُ الْجُمْهُورَ لِلتَّحَوُّلِ.'
  sample_answer: هَذِهِ الْجُمْلَةُ تُهَيِّئُ الْجُمْهُورَ لِلتَّحَوُّلِ.
  focus: Menyiapkan peralihan.
  expected_keywords:
  - هَذِهِ
  - الْجُمْلَةُ
  - تُهَيِّئُ
  - الْجُمْهُورَ
  - لِلتَّحَوُّلِ
  indonesian_explanation: Kalimat ini menyiapkan audiens untuk peralihan.
target_phrases:
- لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.
- بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.
- قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.
- هَذِهِ الْجُمْلَةُ تُهَيِّئُ الْجُمْهُورَ لِلتَّحَوُّلِ.
- بِهَذَا لَا يَبْدُو الِانْتِقَالُ مُفَاجِئًا.
