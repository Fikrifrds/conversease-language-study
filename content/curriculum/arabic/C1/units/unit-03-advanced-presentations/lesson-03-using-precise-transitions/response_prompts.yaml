prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Mari pindah dari sebab ke dampak langsungnya.'
  target_response: لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.
  acceptable_responses:
  - لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Berdasarkan yang tadi, langkah berikutnya jadi jelas.'
  target_response: بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.
  acceptable_responses:
  - بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.
- prompt: 'Ucapkan dalam bahasa Arab: Sebelum lanjut, aku rangkum poin sebelumnya.'
  target_response: قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.
  acceptable_responses:
  - قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.
- prompt: 'Ucapkan dalam bahasa Arab: Kalimat ini menyiapkan audiens untuk peralihan.'
  target_response: هَذِهِ الْجُمْلَةُ تُهَيِّئُ الْجُمْهُورَ لِلتَّحَوُّلِ.
  acceptable_responses:
  - هَذِهِ الْجُمْلَةُ تُهَيِّئُ الْجُمْهُورَ لِلتَّحَوُّلِ.
