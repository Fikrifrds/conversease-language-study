questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Mari pindah dari sebab ke dampak langsungnya."?
  options:
  - لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.
  - بِنَاءً عَلَى مَا سَبَقَ، تَتَّضِحُ الْخُطْوَةُ التَّالِيَةُ.
  - قَبْلَ أَنْ نُكْمِلَ، أُلَخِّصُ النُّقْطَةَ السَّابِقَةَ.
  correct_answer: لِنَنْتَقِلْ مِنَ السَّبَبِ إِلَى أَثَرِهِ الْمُبَاشِرِ.
