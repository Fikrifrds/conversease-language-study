prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Ini poin yang nyata, dan terima kasih atasnya.'
  target_response: هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
  acceptable_responses:
  - هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
- prompt: 'Ucapkan dalam bahasa Arab: Aku bedakan biaya sekarang dan biaya keterlambatan.'
  target_response: أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
  acceptable_responses:
  - أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
- prompt: 'Ucapkan dalam bahasa Arab: Aku tidak punya angkanya sekarang, tapi kupastikan besok.'
  target_response: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.
  acceptable_responses:
  - لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.
- prompt: 'Ucapkan dalam bahasa Arab: Biar kuhubungkan jawaban ke tujuan presentasi.'
  target_response: دَعِينِي أَرْبِطُ الْجَوَابَ بِهَدَفِ الْعَرْضِ.
  acceptable_responses:
  - دَعِينِي أَرْبِطُ الْجَوَابَ بِهَدَفِ الْعَرْضِ.
