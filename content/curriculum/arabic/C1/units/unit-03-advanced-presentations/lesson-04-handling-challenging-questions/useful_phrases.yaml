phrases:
- phrase: هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
  meaning_id: Ini poin yang nyata, dan terima kasih atasnya.
  usage_note: Mengakui pertanyaan.
- phrase: أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
  meaning_id: Aku bedakan biaya sekarang dan biaya keterlambatan.
  usage_note: Membedah pertanyaan.
- phrase: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.
  meaning_id: Aku tidak punya angkanya sekarang, tapi kupastikan besok.
  usage_note: Jujur soal batas.
- phrase: دَعِينِي أَرْبِطُ الْجَوَابَ بِهَدَفِ الْعَرْضِ.
  meaning_id: Biar kuhubungkan jawaban ke tujuan presentasi.
  usage_note: Mengembalikan ke fokus.
- phrase: هَكَذَا أُجِيبُ بِصِدْقٍ دُونَ أَنْ أَفْقِدَ خَيْطَ الْعَرْضِ.
  meaning_id: Dengan begitu aku jawab jujur tanpa kehilangan alur.
  usage_note: Menutup.
