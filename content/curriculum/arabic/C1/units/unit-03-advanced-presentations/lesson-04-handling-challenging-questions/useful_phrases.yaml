phrases:
- phrase: فِي تَدْرِيبِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى
    يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
  meaning_id: Dalam latihan penanganan pertanyaan menantang, saya akan membingkai topiknya dulu agar audiens
    memahami konteksnya.
  usage_note: 'Membingkai topik kompleks. Fokus lesson: penanganan pertanyaan menantang.'
- phrase: عِنْدَ تَطْبِيقِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ
    الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
  meaning_id: Saat menerapkan penanganan pertanyaan menantang, setelah itu, saya akan membangun alur persuasif
    langkah demi langkah.
  usage_note: Membangun persuasive flow. Hubungkan dengan fokus lesson.
- phrase: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  meaning_id: Transisi yang lebih tepat di sini adalah berpindah dari sebab ke dampak.
  usage_note: Memakai transisi presisi. Pakai sebagai penghubung dalam penanganan pertanyaan menantang.
- phrase: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
  meaning_id: Jika ada pertanyaan sulit, saya akan mengakui batas jawaban lalu menjelaskan dasarnya.
  usage_note: Menjawab pertanyaan menantang. Gunakan untuk repair dalam penanganan pertanyaan menantang.
- phrase: فِي خِتَامِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، فِي النِّهَايَةِ، أُرِيدُ أَنْ يَخْرُجَ الْجُمْهُورُ
    بِرِسَالَةٍ وَاضِحَةٍ.
  meaning_id: Pada bagian akhir penanganan pertanyaan menantang, pada akhirnya, saya ingin audiens pulang
    dengan pesan yang jelas.
  usage_note: Menutup presentasi advanced. Tutup percakapan sesuai fokus lesson.
