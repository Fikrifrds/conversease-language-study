scenario_key: arabic_c1_handling_challenging_questions
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تُحَافِظُ عَلَى الْوُضُوحِ عِنْدَ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ؟
learner_goal: Latih percakapan Arab C1 untuk penanganan pertanyaan menantang dengan nuansa, struktur,
  presisi, dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تُحَافِظُ عَلَى الْوُضُوحِ عِنْدَ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، سَأُؤَطِّرُ
    الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.'
  sample_answer: فِي تَدْرِيبِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا
    حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
  focus: 'Membingkai topik kompleks. Fokus lesson: penanganan pertanyaan menantang.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - التَّعَامُلِ
  - مَعَ
  - أَسْئِلَةٍ
  indonesian_explanation: Dalam latihan penanganan pertanyaan menantang, saya akan membingkai topiknya
    dulu agar audiens memahami konteksnya.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، بَعْدَ ذَلِكَ، سَأَبْنِي
    التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، بَعْدَ
    ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.'
  sample_answer: عِنْدَ تَطْبِيقِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ
    الْإِقْنَاعِيَّ خُطْوَةً فَخُطْوَةً.
  focus: Membangun persuasive flow. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - التَّعَامُلِ
  - مَعَ
  - أَسْئِلَةٍ
  indonesian_explanation: Saat menerapkan penanganan pertanyaan menantang, setelah itu, saya akan membangun
    alur persuasif langkah demi langkah.
- coach: 'استخدم الفكرة: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.'
  hint: 'Jawab dengan struktur C1 memakai: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ
    إِلَى التَّأْثِيرِ.'
  sample_answer: الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  focus: Memakai transisi presisi. Pakai sebagai penghubung dalam penanganan pertanyaan menantang.
  expected_keywords:
  - الِانْتِقَالُ
  - الْأَدَقُّ
  - هُنَا
  - هُوَ
  - أَنْ
  indonesian_explanation: Transisi yang lebih tepat di sini adalah berpindah dari sebab ke dampak.
- coach: 'استخدم الفكرة: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ
    الْأَسَاسَ.'
  hint: 'Jawab dengan struktur C1 memakai: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ
    ثُمَّ أُوَضِّحُ الْأَسَاسَ.'
  sample_answer: إِذَا جَاءَ سُؤَالٌ صَعْبٌ، فَسَأَعْتَرِفُ بِحُدُودِ الْجَوَابِ ثُمَّ أُوَضِّحُ الْأَسَاسَ.
  focus: Menjawab pertanyaan menantang. Gunakan untuk repair dalam penanganan pertanyaan menantang.
  expected_keywords:
  - إِذَا
  - جَاءَ
  - سُؤَالٌ
  - صَعْبٌ،
  - فَسَأَعْتَرِفُ
  indonesian_explanation: Jika ada pertanyaan sulit, saya akan mengakui batas jawaban lalu menjelaskan
    dasarnya.
