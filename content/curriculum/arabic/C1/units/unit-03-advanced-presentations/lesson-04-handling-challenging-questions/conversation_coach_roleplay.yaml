scenario_key: arabic_c1_handling_challenging_questions
mode: lesson_practice_coach
level_code: C1
opening_line: بَعْدَ الْعَرْضِ سَأَسْأَلُكِ سُؤَالًا صَعْبًا عَنِ التَّكْلِفَةِ.
learner_goal: Latih percakapan Arab C1 untuk menjawab pertanyaan sulit setelah presentasi dengan jujur
  dan tenang.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: بَعْدَ الْعَرْضِ سَأَسْأَلُكِ سُؤَالًا صَعْبًا عَنِ التَّكْلِفَةِ.
  hint: 'Jawab dengan struktur B2 memakai: هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.'
  sample_answer: هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
  focus: Mengakui pertanyaan.
  expected_keywords:
  - هَذِهِ
  - نُقْطَةٌ
  - حَقِيقِيَّةٌ
  - وَأَشْكُرُكِ
  - عَلَيْهَا
  indonesian_explanation: Ini poin yang nyata, dan terima kasih atasnya.
- coach: 'استخدم الفكرة: أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.'
  hint: 'Jawab dengan struktur B2 memakai: أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.'
  sample_answer: أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
  focus: Membedah pertanyaan.
  expected_keywords:
  - أُفَرِّقُ
  - بَيْنَ
  - تَكْلِفَةِ
  - الْآنَ
  - وَتَكْلِفَةِ
  indonesian_explanation: Aku bedakan biaya sekarang dan biaya keterlambatan.
- coach: 'استخدم الفكرة: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.'
  hint: 'Jawab dengan struktur B2 memakai: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.'
  sample_answer: لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.
  focus: Jujur soal batas.
  expected_keywords:
  - لَا
  - أَمْلِكُ
  - الرَّقْمَ
  - الْآنَ
  - لَكِنِّي
  indonesian_explanation: Aku tidak punya angkanya sekarang, tapi kupastikan besok.
- coach: 'استخدم الفكرة: دَعِينِي أَرْبِطُ الْجَوَابَ بِهَدَفِ الْعَرْضِ.'
  hint: 'Jawab dengan struktur B2 memakai: دَعِينِي أَرْبِطُ الْجَوَابَ بِهَدَفِ الْعَرْضِ.'
  sample_answer: دَعِينِي أَرْبِطُ الْجَوَابَ بِهَدَفِ الْعَرْضِ.
  focus: Mengembalikan ke fokus.
  expected_keywords:
  - دَعِينِي
  - أَرْبِطُ
  - الْجَوَابَ
  - بِهَدَفِ
  - الْعَرْضِ
  indonesian_explanation: Biar kuhubungkan jawaban ke tujuan presentasi.
target_phrases:
- هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
- أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
- لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.
- دَعِينِي أَرْبِطُ الْجَوَابَ بِهَدَفِ الْعَرْضِ.
- هَكَذَا أُجِيبُ بِصِدْقٍ دُونَ أَنْ أَفْقِدَ خَيْطَ الْعَرْضِ.
