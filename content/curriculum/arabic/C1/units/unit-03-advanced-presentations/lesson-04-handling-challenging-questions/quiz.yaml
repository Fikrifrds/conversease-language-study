questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Ini poin yang nyata, dan terima kasih atasnya."?
  options:
  - هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
  - أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
  - لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.
  correct_answer: هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
- key: phrase_2
  prompt: Frasa mana yang berarti "Aku bedakan biaya sekarang dan biaya keterlambatan."?
  options:
  - أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
  - هَذِهِ نُقْطَةٌ حَقِيقِيَّةٌ، وَأَشْكُرُكِ عَلَيْهَا.
  - لَا أَمْلِكُ الرَّقْمَ الْآنَ، لَكِنِّي سَأُؤَكِّدُهُ غَدًا.
  correct_answer: أُفَرِّقُ بَيْنَ تَكْلِفَةِ الْآنَ وَتَكْلِفَةِ التَّأْخِيرِ.
