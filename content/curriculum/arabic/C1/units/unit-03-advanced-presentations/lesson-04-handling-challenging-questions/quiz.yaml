questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam skill handling challenging questions, Saya akan membingkai topiknya
    dulu agar audiens memahami konteksnya."?
  options:
  - فِي مَهَارَةِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا حَتَّى يَفْهَمَ
    الْجُمْهُورُ سِيَاقَهُ.
  - عِنْدَ تَطْبِيقِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، بَعْدَ ذَلِكَ، سَأَبْنِي التَّسَلْسُلَ الْإِقْنَاعِيَّ
    خُطْوَةً فَخُطْوَةً.
  - الِانْتِقَالُ الْأَدَقُّ هُنَا هُوَ أَنْ نَنْتَقِلَ مِنَ السَّبَبِ إِلَى التَّأْثِيرِ.
  correct_answer: فِي مَهَارَةِ التَّعَامُلِ مَعَ أَسْئِلَةٍ صَعْبَةٍ، سَأُؤَطِّرُ الْمَوْضُوعَ أَوَّلًا
    حَتَّى يَفْهَمَ الْجُمْهُورُ سِيَاقَهُ.
