phrases:
- phrase: دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.
  meaning_id: Izinkan aku letakkan kerangkanya sebelum solusi apa pun.
  usage_note: Membuka pembingkaian.
- phrase: الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ تَنْسِيقٍ.
  meaning_id: Ini bukan masalah alat, tapi masalah koordinasi.
  usage_note: Mengarahkan ulang masalah.
- phrase: 'السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
  meaning_id: 'Pertanyaan sebenarnya: kenapa koordinasinya terlambat?'
  usage_note: Menetapkan pertanyaan inti.
- phrase: حِينَ نَفْهَمُ السِّيَاقَ، يُصْبِحُ الْحَلُّ أَوْضَحَ.
  meaning_id: Saat kita paham konteks, solusinya jadi lebih jelas.
  usage_note: Menjelaskan nilai pembingkaian.
- phrase: أُرِيدُ أَنْ يَخْرُجَ الْجُمْهُورُ بِرِسَالَةٍ وَاحِدَةٍ وَاضِحَةٍ.
  meaning_id: Aku ingin audiens pulang dengan satu pesan yang jelas.
  usage_note: Menutup dengan tujuan.
