prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Izinkan aku letakkan kerangkanya sebelum solusi apa pun.'
  target_response: دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.
  acceptable_responses:
  - دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.
- prompt: 'Ucapkan dalam bahasa Arab: Ini bukan masalah alat, tapi masalah koordinasi.'
  target_response: الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ تَنْسِيقٍ.
  acceptable_responses:
  - الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ تَنْسِيقٍ.
- prompt: 'Ucapkan dalam bahasa Arab: Pertanyaan sebenarnya: kenapa koordinasinya terlambat?'
  target_response: 'السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
  acceptable_responses:
  - 'السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
- prompt: 'Ucapkan dalam bahasa Arab: Saat kita paham konteks, solusinya jadi lebih jelas.'
  target_response: حِينَ نَفْهَمُ السِّيَاقَ، يُصْبِحُ الْحَلُّ أَوْضَحَ.
  acceptable_responses:
  - حِينَ نَفْهَمُ السِّيَاقَ، يُصْبِحُ الْحَلُّ أَوْضَحَ.
