scenario_key: arabic_c1_framing_a_complex_topic
mode: lesson_practice_coach
level_code: C1
opening_line: مَوْضُوعُكِ عَنْ تَغْيِيرِ نِظَامِ الْعَمَلِ وَاسِعٌ. كَيْفَ تَبْدَئِينَ؟
learner_goal: Latih percakapan Arab C1 untuk membingkai topik kompleks agar audiens memahami konteks sebelum
  solusi.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: مَوْضُوعُكِ عَنْ تَغْيِيرِ نِظَامِ الْعَمَلِ وَاسِعٌ. كَيْفَ تَبْدَئِينَ؟
  hint: 'Jawab dengan struktur B2 memakai: دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.'
  sample_answer: دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.
  focus: Membuka pembingkaian.
  expected_keywords:
  - دَعِينِي
  - أَضَعُ
  - الْإِطَارَ
  - قَبْلَ
  - أَيِّ
  indonesian_explanation: Izinkan aku letakkan kerangkanya sebelum solusi apa pun.
- coach: 'استخدم الفكرة: الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ تَنْسِيقٍ.'
  hint: 'Jawab dengan struktur B2 memakai: الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ
    تَنْسِيقٍ.'
  sample_answer: الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ تَنْسِيقٍ.
  focus: Mengarahkan ulang masalah.
  expected_keywords:
  - الْمَسْأَلَةُ
  - لَيْسَتْ
  - مُشْكِلَةَ
  - أَدَاةٍ
  - بَلْ
  indonesian_explanation: Ini bukan masalah alat, tapi masalah koordinasi.
- coach: 'استخدم الفكرة: السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
  hint: 'Jawab dengan struktur B2 memakai: السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
  sample_answer: 'السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
  focus: Menetapkan pertanyaan inti.
  expected_keywords:
  - السُّؤَالُ
  - الْحَقِيقِيُّ
  - 'هُوَ:'
  - لِمَاذَا
  - تَأَخَّرَ
  indonesian_explanation: 'Pertanyaan sebenarnya: kenapa koordinasinya terlambat?'
- coach: 'استخدم الفكرة: حِينَ نَفْهَمُ السِّيَاقَ، يُصْبِحُ الْحَلُّ أَوْضَحَ.'
  hint: 'Jawab dengan struktur B2 memakai: حِينَ نَفْهَمُ السِّيَاقَ، يُصْبِحُ الْحَلُّ أَوْضَحَ.'
  sample_answer: حِينَ نَفْهَمُ السِّيَاقَ، يُصْبِحُ الْحَلُّ أَوْضَحَ.
  focus: Menjelaskan nilai pembingkaian.
  expected_keywords:
  - حِينَ
  - نَفْهَمُ
  - السِّيَاقَ
  - يُصْبِحُ
  - الْحَلُّ
  indonesian_explanation: Saat kita paham konteks, solusinya jadi lebih jelas.
target_phrases:
- دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.
- الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ تَنْسِيقٍ.
- 'السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
- حِينَ نَفْهَمُ السِّيَاقَ، يُصْبِحُ الْحَلُّ أَوْضَحَ.
- أُرِيدُ أَنْ يَخْرُجَ الْجُمْهُورُ بِرِسَالَةٍ وَاحِدَةٍ وَاضِحَةٍ.
