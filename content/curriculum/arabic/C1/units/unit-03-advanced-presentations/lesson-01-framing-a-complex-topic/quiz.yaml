questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Izinkan aku letakkan kerangkanya sebelum solusi apa pun."?
  options:
  - دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.
  - الْمَسْأَلَةُ لَيْسَتْ مُشْكِلَةَ أَدَاةٍ، بَلْ مُشْكِلَةُ تَنْسِيقٍ.
  - 'السُّؤَالُ الْحَقِيقِيُّ هُوَ: لِمَاذَا تَأَخَّرَ التَّنْسِيقُ؟'
  correct_answer: دَعِينِي أَضَعُ الْإِطَارَ قَبْلَ أَيِّ حَلٍّ.
- key: phrase_2
