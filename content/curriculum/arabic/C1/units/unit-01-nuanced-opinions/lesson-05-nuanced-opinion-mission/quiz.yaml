  - فِي تَدْرِيبِ تَرْكِيبِ رَأْيٍ دَقِيقٍ مُتَكَامِلٍ، مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى هَذَا الرَّأْيِ،
    وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.
  - مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ.
