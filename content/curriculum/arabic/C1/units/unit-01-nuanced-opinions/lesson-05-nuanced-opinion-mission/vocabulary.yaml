vocabulary:
- word: رَأْيٌ
  meaning_id: pendapat
  usage_note: 'Dipakai untuk arti "pendapat". Contoh: "فِي مَهَارَةِ تَرْكِيبِ رَأْيٍ دَقِيقٍ مُتَكَامِلٍ،
    مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى هَذَا..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ تَرْكِيبِ رَأْيٍ دَقِيقٍ مُتَكَامِلٍ،
    لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ الْ..."'
- word: أَدِلَّةٌ
  meaning_id: bukti-bukti
  usage_note: 'Dipakai untuk arti "bukti-bukti". Contoh: "عِنْدَ تَطْبِيقِ تَرْكِيبِ رَأْيٍ دَقِيقٍ مُتَكَامِلٍ،
    لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ الْ..."'
- word: مَسَارٌ
  meaning_id: jalur/arah
  usage_note: 'Dipakai untuk arti "jalur/arah". Contoh: "عِنْدَ تَطْبِيقِ تَرْكِيبِ رَأْيٍ دَقِيقٍ مُتَكَامِلٍ،
    لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ الْ..."'
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ
    جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ."'
- word: مَخَاطِرُ
  meaning_id: risiko
  usage_note: 'Dipakai untuk arti "risiko". Contoh: "مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ
    أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
    أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى..."'
- word: وِجْهَةٌ
  meaning_id: arah/sudut pandang
  usage_note: 'Dipakai untuk arti "arah/sudut pandang". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
    أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى..."'
