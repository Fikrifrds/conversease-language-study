- src: /images/lesson-visual-library/travel-male/card-1.png
  width: 1254
  height: 1254
  label: فِي مَهَارَةِ الْمُوَازَنَةِ بَيْنَ وِجْهَتَيْ نَظَرٍ، مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى
    هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.
  alt: Cuplikan visual travel male untuk frasa فِي مَهَارَةِ الْمُوَازَنَةِ بَيْنَ وِجْهَتَيْ نَظَرٍ،
    مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ..
- src: /images/lesson-visual-library/travel-male/card-2.png
  width: 1254
  height: 1254
  label: عِنْدَ تَطْبِيقِ الْمُوَازَنَةِ بَيْنَ وِجْهَتَيْ نَظَرٍ، لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ
    الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ.
  alt: Cuplikan visual travel male untuk frasa عِنْدَ تَطْبِيقِ الْمُوَازَنَةِ بَيْنَ وِجْهَتَيْ نَظَرٍ،
    لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ..
- src: /images/lesson-visual-library/travel-male/card-3.png
  width: 1254
  height: 1254
  label: مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ.
  alt: Cuplikan visual travel male untuk frasa مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ
