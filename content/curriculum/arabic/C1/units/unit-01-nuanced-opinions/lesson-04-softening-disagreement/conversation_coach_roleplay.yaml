scenario_key: arabic_c1_softening_disagreement
mode: lesson_practice_coach
level_code: C1
opening_line: كَيْفَ تُحَافِظُ عَلَى الْوُضُوحِ عِنْدَ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ؟
learner_goal: Latih percakapan Arab C1 untuk pelunakan ketidaksetujuan dengan nuansa, struktur, presisi,
  dan respons profesional.
max_turns: 8
feedback_level:
  free: basic
  pro: detailed
turns:
- coach: كَيْفَ تُحَافِظُ عَلَى الْوُضُوحِ عِنْدَ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ؟
  hint: 'Jawab dengan struktur C1 memakai: فِي تَدْرِيبِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، مِنْ
    حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.'
  sample_answer: فِي تَدْرِيبِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ
    إِلَى هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.
  focus: 'Menyampaikan opini dengan nuance. Fokus lesson: pelunakan ketidaksetujuan.'
  expected_keywords:
  - فِي
  - تَدْرِيبِ
  - تَلْطِيفِ
  - الِاخْتِلَافِ
  - مَعَ
  indonesian_explanation: Dalam latihan pelunakan ketidaksetujuan, secara prinsip, saya cenderung pada
    pendapat ini, tetapi saya punya satu catatan penting.
- coach: 'استخدم الفكرة: عِنْدَ تَطْبِيقِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، لَسْتُ مُتَيَقِّنًا
    تَمَامًا، لَكِنَّ الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ.'
  hint: 'Jawab dengan struktur C1 memakai: عِنْدَ تَطْبِيقِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ،
    لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ.'
  sample_answer: عِنْدَ تَطْبِيقِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، لَسْتُ مُتَيَقِّنًا تَمَامًا،
    لَكِنَّ الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ.
  focus: Menyatakan kepastian dan keraguan. Hubungkan dengan fokus lesson.
  expected_keywords:
  - عِنْدَ
  - تَطْبِيقِ
  - تَلْطِيفِ
  - الِاخْتِلَافِ
  - مَعَ
  indonesian_explanation: Saat menerapkan pelunakan ketidaksetujuan, saya belum sepenuhnya yakin, tetapi
    bukti mengarah ke arah ini.
- coach: 'استخدم الفكرة: مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ
    وَاضِحَةٌ.'
  hint: 'Jawab dengan struktur C1 memakai: مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى،
    لَهُ مَخَاطِرُ وَاضِحَةٌ.'
  sample_answer: مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ.
  focus: Menyeimbangkan dua sudut pandang. Pakai sebagai penghubung dalam pelunakan ketidaksetujuan.
  expected_keywords:
  - مِنْ
  - جِهَةٍ،
  - هَذَا
  - الْخِيَارُ
  - عَمَلِيٌّ،
  indonesian_explanation: Di satu sisi opsi ini praktis, di sisi lain ia punya risiko yang jelas.
- coach: 'استخدم الفكرة: أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى الْمَسْأَلَةَ مِنْ زَاوِيَةٍ
    أُخْرَى.'
  hint: 'Jawab dengan struktur C1 memakai: أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى الْمَسْأَلَةَ
    مِنْ زَاوِيَةٍ أُخْرَى.'
  sample_answer: أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى الْمَسْأَلَةَ مِنْ زَاوِيَةٍ أُخْرَى.
  focus: Melunakkan disagreement. Gunakan untuk repair dalam pelunakan ketidaksetujuan.
  expected_keywords:
  - أُقَدِّرُ
  - وِجْهَةَ
  - نَظَرِكَ،
  - غَيْرَ
  - أَنَّنِي
  indonesian_explanation: Saya menghargai sudut pandangmu, tetapi saya melihat masalah ini dari sisi lain.
