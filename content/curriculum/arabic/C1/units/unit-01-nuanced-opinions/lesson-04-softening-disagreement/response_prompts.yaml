prompts:
- prompt: 'Ucapkan dalam bahasa Arab: Dalam latihan pelunakan ketidaksetujuan, secara prinsip, saya cenderung
    pada pendapat ini, tetapi saya punya satu catatan penting.'
  target_response: فِي تَدْرِيبِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ
    إِلَى هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.
  acceptable_responses:
  - فِي تَدْرِيبِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى هَذَا
    الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.
- prompt: 'Ucapkan dalam bahasa Arab: Saat menerapkan pelunakan ketidaksetujuan, saya belum sepenuhnya
    yakin, tetapi bukti mengarah ke arah ini.'
  target_response: عِنْدَ تَطْبِيقِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، لَسْتُ مُتَيَقِّنًا تَمَامًا،
    لَكِنَّ الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ.
  acceptable_responses:
  - عِنْدَ تَطْبِيقِ تَلْطِيفِ الِاخْتِلَافِ مَعَ الْآخَرِينَ، لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ الْأَدِلَّةَ
    تُشِيرُ إِلَى هَذَا الْمَسَارِ.
- prompt: 'Ucapkan dalam bahasa Arab: Di satu sisi opsi ini praktis, di sisi lain ia punya risiko yang
    jelas.'
  target_response: مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ.
  acceptable_responses:
  - مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ.
- prompt: 'Ucapkan dalam bahasa Arab: Saya menghargai sudut pandangmu, tetapi saya melihat masalah ini
    dari sisi lain.'
  target_response: أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى الْمَسْأَلَةَ مِنْ زَاوِيَةٍ أُخْرَى.
  acceptable_responses:
  - أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى الْمَسْأَلَةَ مِنْ زَاوِيَةٍ أُخْرَى.
