phrases:
- phrase: فِي تَدْرِيبِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ، مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى
    هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.
  meaning_id: Dalam latihan pembedaan kepastian dan keraguan, secara prinsip, saya cenderung pada pendapat
    ini, tetapi saya punya satu catatan penting.
  usage_note: 'Menyampaikan opini dengan nuance. Fokus lesson: pembedaan kepastian dan keraguan.'
- phrase: عِنْدَ تَطْبِيقِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ، لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ
    الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ.
  meaning_id: Saat menerapkan pembedaan kepastian dan keraguan, saya belum sepenuhnya yakin, tetapi bukti
    mengarah ke arah ini.
  usage_note: Menyatakan kepastian dan keraguan. Hubungkan dengan fokus lesson.
- phrase: مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ.
  meaning_id: Di satu sisi opsi ini praktis, di sisi lain ia punya risiko yang jelas.
  usage_note: Menyeimbangkan dua sudut pandang. Pakai sebagai penghubung dalam pembedaan kepastian dan
    keraguan.
- phrase: أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى الْمَسْأَلَةَ مِنْ زَاوِيَةٍ أُخْرَى.
  meaning_id: Saya menghargai sudut pandangmu, tetapi saya melihat masalah ini dari sisi lain.
  usage_note: Melunakkan disagreement. Gunakan untuk repair dalam pembedaan kepastian dan keraguan.
- phrase: فِي خِتَامِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ، لِذَلِكَ أُفَضِّلُ صِيَاغَةً أَكْثَرَ
    دِقَّةً وَمُرُونَةً.
  meaning_id: Pada bagian akhir pembedaan kepastian dan keraguan, karena itu, saya lebih memilih formulasi
    yang lebih tepat dan fleksibel.
  usage_note: Menutup opini dengan presisi. Tutup percakapan sesuai fokus lesson.
