vocabulary:
- word: يَقِينٌ
  meaning_id: kepastian
  usage_note: 'Dipakai untuk arti "kepastian". Contoh: "فِي مَهَارَةِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ،
    مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى..."'
- word: رَأْيٌ
  meaning_id: pendapat
  usage_note: 'Dipakai untuk arti "pendapat". Contoh: "فِي مَهَارَةِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ،
    مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى..."'
- word: تَطْبِيقٌ
  meaning_id: penerapan
  usage_note: 'Dipakai untuk arti "penerapan". Contoh: "عِنْدَ تَطْبِيقِ التَّفْرِيقِ بَيْنَ الْيَقِينِ
    وَالشَّكِّ، لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنّ..."'
- word: أَدِلَّةٌ
  meaning_id: bukti-bukti
  usage_note: 'Dipakai untuk arti "bukti-bukti". Contoh: "عِنْدَ تَطْبِيقِ التَّفْرِيقِ بَيْنَ الْيَقِينِ
    وَالشَّكِّ، لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنّ..."'
- word: مَسَارٌ
  meaning_id: jalur/arah
  usage_note: 'Dipakai untuk arti "jalur/arah". Contoh: "عِنْدَ تَطْبِيقِ التَّفْرِيقِ بَيْنَ الْيَقِينِ
    وَالشَّكِّ، لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنّ..."'
- word: خِيَارٌ
  meaning_id: pilihan
  usage_note: 'Dipakai untuk arti "pilihan". Contoh: "مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ
    جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ."'
- word: مَخَاطِرُ
  meaning_id: risiko
  usage_note: 'Dipakai untuk arti "risiko". Contoh: "مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ
    أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ."'
- word: تَحَدٍّ
  meaning_id: tantangan
  usage_note: 'Dipakai untuk arti "tantangan". Contoh: "إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ،
    أُقَدِّرُ وِجْهَةَ نَظَرِكَ، غَيْرَ أَنَّنِي أَرَى..."'
