cards:
- src: /images/lesson-visual-library/service-male/card-1.png
  width: 1254
  height: 1254
  label: فِي مَهَارَةِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ، مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى
    هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ.
  alt: Cuplikan visual service male untuk frasa فِي مَهَارَةِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ،
    مِنْ حَيْثُ الْمَبْدَأُ، أَمِيلُ إِلَى هَذَا الرَّأْيِ، وَلَكِنْ لَدَيَّ تَحَفُّظٌ مُهِمٌّ..
- src: /images/lesson-visual-library/service-male/card-2.png
  width: 1254
  height: 1254
  label: عِنْدَ تَطْبِيقِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ، لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ
    الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ.
  alt: Cuplikan visual service male untuk frasa عِنْدَ تَطْبِيقِ التَّفْرِيقِ بَيْنَ الْيَقِينِ وَالشَّكِّ،
    لَسْتُ مُتَيَقِّنًا تَمَامًا، لَكِنَّ الْأَدِلَّةَ تُشِيرُ إِلَى هَذَا الْمَسَارِ..
- src: /images/lesson-visual-library/service-male/card-3.png
  width: 1254
  height: 1254
  label: مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ.
  alt: Cuplikan visual service male untuk frasa مِنْ جِهَةٍ، هَذَا الْخِيَارُ عَمَلِيٌّ، وَمِنْ جِهَةٍ
    أُخْرَى، لَهُ مَخَاطِرُ وَاضِحَةٌ..
