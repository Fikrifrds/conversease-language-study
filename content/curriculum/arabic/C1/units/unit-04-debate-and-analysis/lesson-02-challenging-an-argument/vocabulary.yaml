vocabulary:
- word: تَدْرِيبٌ
  meaning_id: coaching/latihan
  usage_note: 'Dipakai untuk arti "coaching/latihan". Contoh: "فِي تَدْرِيبِ مُنَاقَشَةِ حُجَّةٍ بِأَدَبٍ،
    أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ هُنَا غ..."'
