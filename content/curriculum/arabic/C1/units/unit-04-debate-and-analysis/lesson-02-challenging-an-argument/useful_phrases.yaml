phrases:
- phrase: فِي مَهَارَةِ مُنَاقَشَةِ حُجَّةٍ بِأَدَبٍ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ هُنَا
    غَيْرُ مَذْكُورٍ بِوُضُوحٍ.
  meaning_id: Dalam skill challenging an argument politely, Saya pikir asumsi dasarnya di sini belum disebutkan
    dengan jelas.
  usage_note: 'Mengidentifikasi asumsi. Fokus lesson: challenging an argument politely.'
- phrase: عِنْدَ تَطْبِيقِ مُنَاقَشَةِ حُجَّةٍ بِأَدَبٍ، يُمْكِنُنَا أَنْ نُحَدِّيَ هَذِهِ الْحُجَّةَ
    مِنْ جِهَةِ الْأَدِلَّةِ.
  meaning_id: Saat menerapkan challenging an argument politely, Kita bisa menantang argumen ini dari sisi
