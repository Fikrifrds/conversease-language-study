vocabulary:
- word: أَعْتَقِدُ
  meaning_id: saya pikir
  usage_note: 'Dipakai untuk arti "saya pikir". Contoh: "فِي مَهَارَةِ تَحْدِيدِ الِافْتِرَاضَاتِ
    الْخَفِيَّةِ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِ..."'
- word: اِفْتِرَاضٌ
  meaning_id: asumsi
  usage_note: 'Dipakai untuk arti "asumsi". Contoh: "فِي مَهَارَةِ تَحْدِيدِ الِافْتِرَاضَاتِ
    الْخَفِيَّةِ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِ..."'
- word: أَسَاسِيٌّ
  meaning_id: utama
  usage_note: 'Dipakai untuk arti "utama". Contoh: "فِي مَهَارَةِ تَحْدِيدِ الِافْتِرَاضَاتِ
