phrases:
- phrase: فِي تَدْرِيبِ تَحْدِيدِ الِافْتِرَاضَاتِ الْخَفِيَّةِ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ
    هُنَا غَيْرُ مَذْكُورٍ بِوُضُوحٍ.
  meaning_id: Dalam latihan identifikasi asumsi tersembunyi, saya pikir asumsi dasarnya di sini belum
    disebutkan dengan jelas.
  usage_note: 'Mengidentifikasi asumsi. Fokus lesson: identifikasi asumsi tersembunyi.'
- phrase: عِنْدَ تَطْبِيقِ تَحْدِيدِ الِافْتِرَاضَاتِ الْخَفِيَّةِ، يُمْكِنُنَا أَنْ نُحَدِّيَ هَذِهِ
    الْحُجَّةَ مِنْ جِهَةِ الْأَدِلَّةِ.
  meaning_id: Saat menerapkan identifikasi asumsi tersembunyi, kita bisa menantang argumen ini dari sisi
    bukti.
  usage_note: Menantang argumen. Hubungkan dengan fokus lesson.
- phrase: الدَّلِيلُ الْأَقْوَى هُوَ أَنَّ النَّتِيجَةَ تَكَرَّرَتْ فِي أَكْثَرَ مِنْ سِيَاقٍ.
  meaning_id: Bukti paling kuat adalah bahwa hasilnya berulang dalam lebih dari satu konteks.
  usage_note: Menyajikan evidence. Pakai sebagai penghubung dalam identifikasi asumsi tersembunyi.
- phrase: تَحْتَ الضَّغْطِ، سَأُرَكِّزُ عَلَى النُّقْطَةِ الْمَرْكَزِيَّةِ وَلَا أُطِيلُ.
  meaning_id: Di bawah tekanan, saya akan fokus pada poin pusat dan tidak berpanjang-panjang.
  usage_note: Merespons under pressure. Gunakan untuk repair dalam identifikasi asumsi tersembunyi.
- phrase: فِي خِتَامِ تَحْدِيدِ الِافْتِرَاضَاتِ الْخَفِيَّةِ، لِذَلِكَ فَالرَّدُّ الْأَقْوَى هُوَ تَوْضِيحُ
    الِافْتِرَاضِ ثُمَّ فَحْصُ الدَّلِيلِ.
  meaning_id: Pada bagian akhir identifikasi asumsi tersembunyi, karena itu, respons terkuat adalah memperjelas
    asumsi lalu memeriksa bukti.
  usage_note: Menutup analisis debat. Tutup percakapan sesuai fokus lesson.
