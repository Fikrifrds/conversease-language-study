phrases:
- phrase: فِي مَهَارَةِ الرَّدِّ تَحْتَ الضَّغْطِ بِهُدُوءٍ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ
    هُنَا غَيْرُ مَذْكُورٍ بِوُضُوحٍ.
  meaning_id: Dalam skill responding calmly under pressure, Saya pikir asumsi dasarnya di sini belum disebutkan
    dengan jelas.
  usage_note: 'Mengidentifikasi asumsi. Fokus lesson: responding calmly under pressure.'
- phrase: عِنْدَ تَطْبِيقِ الرَّدِّ تَحْتَ الضَّغْطِ بِهُدُوءٍ، يُمْكِنُنَا أَنْ نُحَدِّيَ هَذِهِ الْحُجَّةَ
    مِنْ جِهَةِ الْأَدِلَّةِ.
  meaning_id: Saat menerapkan responding calmly under pressure, Kita bisa menantang argumen ini dari sisi
