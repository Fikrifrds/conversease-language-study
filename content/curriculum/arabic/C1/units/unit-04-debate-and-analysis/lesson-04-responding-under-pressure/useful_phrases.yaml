  usage_note: Menantang argumen. Hubungkan dengan fokus lesson.
- phrase: الدَّلِيلُ الْأَقْوَى هُوَ أَنَّ النَّتِيجَةَ تَكَرَّرَتْ فِي أَكْثَرَ مِنْ سِيَاقٍ.
  meaning_id: Bukti paling kuat adalah bahwa hasilnya berulang dalam lebih dari satu konteks.
  usage_note: Menyajikan evidence. Pakai sebagai penghubung dalam responding calmly under pressure.
- phrase: إِذَا ظَهَرَ تَحَدٍّ فِي هَذِهِ الْمَهَارَةِ، تَحْتَ الضَّغْطِ، سَأُرَكِّزُ عَلَى النُّقْطَةِ
    الْمَرْكَزِيَّةِ وَلَا أُطِيلُ.
  meaning_id: Jika muncul tantangan dalam skill ini, Di bawah tekanan, saya akan fokus pada poin pusat
    dan tidak berpanjang-panjang.
  usage_note: Merespons under pressure. Gunakan untuk repair dalam responding calmly under pressure.
- phrase: فِي الصِّيَاغَةِ النِّهَائِيَّةِ لِهَذِهِ الْمَهَارَةِ، لِذَلِكَ فَالرَّدُّ الْأَقْوَى هُوَ
    تَوْضِيحُ الِافْتِرَاضِ ثُمَّ فَحْصُ الدَّلِيلِ.
  meaning_id: Dalam final formulation untuk responding calmly under pressure, Karena itu, respons terkuat
    adalah memperjelas asumsi lalu memeriksa bukti.
  usage_note: Menutup analisis debat. Tutup percakapan sesuai fokus lesson.
