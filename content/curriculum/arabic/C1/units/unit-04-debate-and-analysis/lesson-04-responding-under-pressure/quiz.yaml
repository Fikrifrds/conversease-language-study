questions:
- key: phrase_1
  prompt: Frasa mana yang berarti "Dalam skill responding calmly under pressure, Saya pikir asumsi dasarnya
    di sini belum disebutkan dengan jelas."?
  options:
  - فِي مَهَارَةِ الرَّدِّ تَحْتَ الضَّغْطِ بِهُدُوءٍ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ هُنَا
    غَيْرُ مَذْكُورٍ بِوُضُوحٍ.
  - عِنْدَ تَطْبِيقِ الرَّدِّ تَحْتَ الضَّغْطِ بِهُدُوءٍ، يُمْكِنُنَا أَنْ نُحَدِّيَ هَذِهِ الْحُجَّةَ
    مِنْ جِهَةِ الْأَدِلَّةِ.
  - الدَّلِيلُ الْأَقْوَى هُوَ أَنَّ النَّتِيجَةَ تَكَرَّرَتْ فِي أَكْثَرَ مِنْ سِيَاقٍ.
  correct_answer: فِي مَهَارَةِ الرَّدِّ تَحْتَ الضَّغْطِ بِهُدُوءٍ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ
    هُنَا غَيْرُ مَذْكُورٍ بِوُضُوحٍ.
