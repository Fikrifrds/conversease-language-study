vocabulary:
- word: ضَغْطٌ
  meaning_id: tekanan
  usage_note: 'Dipakai untuk arti "tekanan". Contoh: "فِي مَهَارَةِ الرَّدِّ تَحْتَ الضَّغْطِ بِهُدُوءٍ،
    أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ..."'
- word: أَعْتَقِدُ
  meaning_id: saya pikir
  usage_note: 'Dipakai untuk arti "saya pikir". Contoh: "فِي مَهَارَةِ الرَّدِّ تَحْتَ الضَّغْطِ بِهُدُوءٍ،
    أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ..."'
