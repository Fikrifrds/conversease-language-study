- word: دَلِيلٌ
  meaning_id: bukti/petunjuk
  usage_note: 'Dipakai untuk arti "bukti/petunjuk". Contoh: "الدَّلِيلُ الْأَقْوَى هُوَ أَنَّ النَّتِيجَةَ
