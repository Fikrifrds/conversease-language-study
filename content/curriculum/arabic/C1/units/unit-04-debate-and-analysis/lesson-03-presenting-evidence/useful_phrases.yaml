phrases:
- phrase: فِي تَدْرِيبِ تَقْدِيمِ دَلِيلٍ مُرْتَبِطٍ بِالْمَوْضُوعِ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَسَاسِيَّ
    هُنَا غَيْرُ مَذْكُورٍ بِوُضُوحٍ.
  meaning_id: Dalam latihan penyajian bukti yang relevan, saya pikir asumsi dasarnya di sini belum disebutkan
    dengan jelas.
  usage_note: 'Mengidentifikasi asumsi. Fokus lesson: penyajian bukti yang relevan.'
- phrase: عِنْدَ تَطْبِيقِ تَقْدِيمِ دَلِيلٍ مُرْتَبِطٍ بِالْمَوْضُوعِ، يُمْكِنُنَا أَنْ نُحَدِّيَ هَذِهِ
    الْحُجَّةَ مِنْ جِهَةِ الْأَدِلَّةِ.
  meaning_id: Saat menerapkan penyajian bukti yang relevan, kita bisa menantang argumen ini dari sisi
    bukti.
  usage_note: Menantang argumen. Hubungkan dengan fokus lesson.
- phrase: الدَّلِيلُ الْأَقْوَى هُوَ أَنَّ النَّتِيجَةَ تَكَرَّرَتْ فِي أَكْثَرَ مِنْ سِيَاقٍ.
  meaning_id: Bukti paling kuat adalah bahwa hasilnya berulang dalam lebih dari satu konteks.
  usage_note: Menyajikan evidence. Pakai sebagai penghubung dalam penyajian bukti yang relevan.
- phrase: تَحْتَ الضَّغْطِ، سَأُرَكِّزُ عَلَى النُّقْطَةِ الْمَرْكَزِيَّةِ وَلَا أُطِيلُ.
  meaning_id: Di bawah tekanan, saya akan fokus pada poin pusat dan tidak berpanjang-panjang.
  usage_note: Merespons under pressure. Gunakan untuk repair dalam penyajian bukti yang relevan.
- phrase: فِي خِتَامِ تَقْدِيمِ دَلِيلٍ مُرْتَبِطٍ بِالْمَوْضُوعِ، لِذَلِكَ فَالرَّدُّ الْأَقْوَى هُوَ
    تَوْضِيحُ الِافْتِرَاضِ ثُمَّ فَحْصُ الدَّلِيلِ.
  meaning_id: Pada bagian akhir penyajian bukti yang relevan, karena itu, respons terkuat adalah memperjelas
    asumsi lalu memeriksa bukti.
  usage_note: Menutup analisis debat. Tutup percakapan sesuai fokus lesson.
