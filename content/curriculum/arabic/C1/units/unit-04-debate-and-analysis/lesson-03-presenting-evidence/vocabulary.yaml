vocabulary:
- word: تَدْرِيبٌ
  meaning_id: coaching/latihan
  usage_note: 'Dipakai untuk arti "coaching/latihan". Contoh: "فِي تَدْرِيبِ تَقْدِيمِ دَلِيلٍ مُرْتَبِطٍ
    بِالْمَوْضُوعِ، أَعْتَقِدُ أَنَّ الِافْتِرَاضَ الْأَس..."'
